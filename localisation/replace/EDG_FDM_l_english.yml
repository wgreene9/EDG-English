EDG_FDMEvents.71.title: "The Nile Bursts Its Banks!"
EDG_FDMEvents.71.desc: "Calamity has struck.\n\nThe Nile—the mother river that has nourished Egypt for millennia—has suddenly turned violent and uncontrollable. Unprecedented floods have breached the dikes, drowned villages, and swallowed vast fields of wheat. When the waters receded, they left behind not the usual fertile silt, but ruins and desolation everywhere.\n\nPeasants knelt in the mud and wept—their crops, their homes, their livestock, all were reduced to nothing in a single night. Grain prices in Cairo soared, and the shadow of famine began to loom over the entire Nile Valley.\n\nIn the eyes of the native Egyptians, this was divine punishment upon these foreign rulers. Ancient legends of the goddess Isis began to circulate once more among the common folk—people said the flood was the tears of Isis weeping, and this time, her tears had become a flood of destruction."
EDG_FDMEvents.71.a: "Has even Allah forsaken us?"
EDG_FDMEvents.71.a_tt: "All provinces under our rule will have their §RBase Production cleared§!. After a period of time, we shall enter the disaster §TThe Tears of Isis§!, and the cleared base production will be restored upon the conclusion of §TThe Tears of Isis§!."

EDG_FDMEvents.72.title: "The Tears of Isis"
EDG_FDMEvents.72.desc: "“We tested them with suffering and hardship, that they might humble themselves. When Our command came, they did not act justly, and they did not take heed.” — Qur'an 7:94-95\n\nIsis was a goddess of ancient Egyptian religion, whose worship spread throughout the Greco-Roman world. She was revered as the ideal mother and wife, as the protector of nature and magic. It was believed that the annual flooding of the Nile was the sorrowful tears of Isis weeping for Osiris. Thus, every year, rituals re-enacting the death and rebirth of Osiris were performed.\n\nBut the Nile—which nourished our forefathers and witnessed the first glory of the Fatimids—now defies the natural order observed for millennia.\n\nUnprecedented drought has reduced the annual flood, which once came like clockwork, to nothing; cracked riverbeds scar the land of Egypt like ugly wounds. And when the rare rainstorm does come, it turns into a violent deluge, destroying dikes, villages, and vast fields of wheat.\n\nThe awesome power of nature has mercilessly laid waste to this once-fertile land that served as the breadbasket of the eastern Mediterranean. Farmlands lie barren, harvests have failed, and terrible hunger and despair spread throughout the Nile Valley. In the eyes of the native Egyptians, this is divine punishment upon us foreign rulers. The 'betrayal' of this ancient river has not only pushed the empire's agriculture and finances to the brink of collapse, but also driven our already precarious legitimacy to the edge of the abyss.\n\nIf we cannot quickly raise funds to repair the irrigation works, relieve the afflicted, and weather this natural catastrophe, our forefathers' grand dream of reclaiming our homeland will be buried beneath this famine-stricken mire."
EDG_FDMEvents.72.a: "Sorrow flows upstream, becoming a river."
EDG_FDMEvents.72.a_tt: "Enter the disaster §TThe Tears of Isis§!.\n\nUnlock §YDecisions§!: §TThe Tears of Isis§!: Emergency Relief\nUnlock §YDecisions§!: §TThe Tears of Isis§!: Open the Granaries\nUnlock §YDecisions§!: §TThe Tears of Isis§!: Suppress Grain Prices\nUnlock §YDecisions§!: §TThe Tears of Isis§!: Hoard Grain\nUnlock §YDecisions§!: §TThe Tears of Isis§!: Increase Taxation\nUnlock §YDecisions§!: §TThe Tears of Isis§!: Conscript Labour\nUnlock §YDecisions§!: §TThe Tears of Isis§!: Issue State Bonds"
EDG_FDMEvents.73.title: "After the Cataclysm"
EDG_FDMEvents.73.desc: "The calamity of the Nile has finally passed.\n\nAfter months of arduous effort, the dikes destroyed by the floods have been repaired, the submerged farmlands have re-emerged, and the ruined villages have begun to be rebuilt. Those peasants who survived the famine have taken up their hoes and sickles once more, weary but with determined eyes.\n\nWhat is more, though the floods brought destruction, they also left a generous gift—the layer of rich silt blanketing the fields will yield harvests far exceeding those of years past for years to come. The Nile, in its own way, has proven to the people of this land that destruction and rebirth have always been two sides of the same coin.\n\nThe empire's agriculture and finances are recovering, slowly but surely. Those who once despaired in the disaster now see the light of hope once more. The tears of Isis have run dry, and her blessings are only just beginning."
EDG_FDMEvents.73.a: "Praise be to Allah."
EDG_FDMEvents.73.a_tt: "The disaster §TThe Tears of Isis§! will end. The base production cleared before the disaster will be §Gfully restored§!, with an additional point of base production granted as a bonus."
EDG_FDMEvents_73_modifier: "§TThe Tears of Isis§!"
EDG_FDMEvents.74.title: "The Red Sea Predicament"
EDG_FDMEvents.74.desc: "“For the custom of the Quraysh—their winter and summer journeys. Let them worship the Lord of this House, Who has fed them against hunger, and made them safe from fear.” — Qur'an 106:1-4\n\nBy virtue of its control over Egypt and the Red Sea, the Fatimid dynasty held the throat of Eurasian trade in its grip. Spices from India and silks from the East—all passed through our customs houses at Suez and Alexandria without exception. The immense tolls and monopoly profits filled the imperial coffers, allowing us to maintain an invincible army and make Cairo the centre of the world.\n\nYet when Portuguese and Spanish explorers rounded the Cape of Good Hope in their caravels, the course of history took a fatal turn. The new sea route to India, opened by European infidels, struck at the very foundations of our economic system. Merchant ships laden with spices no longer sailed into the Red Sea, but directly into the harbours of Lisbon; the bustle of Alexandria's markets faded swiftly, replaced by silent, towering warehouses. The collapse of customs revenues brought the imperial machinery, so heavily dependent on trade dividends, to a grinding halt.\n\nWhat made matters worse was that the financial exhaustion prevented us from maintaining the large Red Sea patrol fleets, nor could we afford to appease the Arab tribes along the coast who lived by trade. Bankrupt merchant guilds harboured resentment; pirates and regional separatists took advantage of the chaos to revive their activities along the Red Sea and the Hijaz. In this age of great voyages, the empire faces an unprecedented economic suffocation—if we cannot mount cannons on the waves of the Indian Ocean to break the infidel monopoly, or promptly discover new sources of revenue for the empire, this once-glorious economic edifice will surely crumble."
EDG_FDMEvents.74.a: "Is the once-thriving Alexandria destined to become history?"
EDG_FDMEvents.74.a_tt: "Enter the disaster §TThe Red Sea Predicament§!."

EDG_FDMEvents.75.title: "City of Miracles"
EDG_FDMEvents.75.desc: "A miracle has come to pass.\n\nWhen the Portuguese and Spanish caravels rounded the Cape of Good Hope, when the trade routes of the Red Sea fell into decline, when the empire's economic lifelines were ruthlessly severed by the tides of the Age of Discovery—Cairo, this thousand-year-old metropolis on the banks of the Nile, achieved its own redemption in a way no one had foreseen.\n\nThrough the cutting of the Suez Canal, the development of local crafts, the expansion of trade networks into the African interior, and the leveraging of the empire's vast domestic market, Cairo re-emerged as a supreme commercial hub linking the Mediterranean, the Red Sea, and the Indian Ocean. The docks of Alexandria once again teemed with activity; spices were piled high in the markets of Cairo; merchants from every corner of the globe flocked to this city of wonders in search of fortune and opportunity.\n\nThe Red Sea Predicament has been thoroughly overcome. The Fatimid economy no longer depends on a single stream of transit trade, but stands upon diversified and sustainable foundations. Cairo has truly become the centre of the world."
EDG_FDMEvents.75.a: "Cairo, the centre of the world."
EDG_FDMEvents.75.a_tt: "The disaster §TThe Red Sea Predicament§! will end."
EDG_FDMEvents_75_modifier: "§TThe Prosperous Port of Alexandria§!"
EDG_FDMEvents.76.title: "A Target for All"
EDG_FDMEvents.76.desc: "The return of the Fatimid Caliphate has fallen like a great stone into still waters, sending ripples across the entire known world.\n\nFrom Constantinople to Paris, from Delhi to Lisbon, every king, sultan, and emperor watches closely this Shi'a empire rising from the deserts of the Maghrib. They have seen the lightning sweep of Fatimid armies across North Africa and the Middle East; they have seen the rapid spread of Ismaili faith across the Arab world; they have seen the fundamental threat that a united Islamic empire poses to the existing world order.\n\nFear has bred alliance. Those powers that were once hostile to each other—Catholic Europe, the Sunni Ottomans, Orthodox Russia—in the face of a common threat, have found rare common ground. A concerted effort to contain the Fatimids is quietly taking shape.\n\nWe were once the hunted; now we are the hunters. But the hunter can also become the hunted—when the whole world sees you as a threat, you become a target for all."
EDG_FDMEvents.76.a: "Nothing can stop the Fatimid revival!"
EDG_FDMEvents.76.a_tt: "The return of the @FDM§YFatimid§! Caliphate has aroused the fear of many nations. All non-§YShi'a§! great powers will activate the modifier '§YThe Great Powers' Contest§!' to contain the @FDM§YFatimid§! Caliphate's ambition to reunite the Islamic world.\n\nThis event has fired because you have enabled §YVery Hard§! mode. To disable this modifier, please turn off Very Hard mode."
EDG_FDMEvents.77.title: "The Rebirth of Andalus"
EDG_FDMEvents.77.desc: "Under the sun of Iberia, a quiet cultural revolution is completing its final piece.\n\nFrom the Red Palace of Córdoba to the Giralda of Seville, from the Alhambra of Granada to the port of Lisbon—this land of Iberia, once famed for its interweaving of Christian, Moor, and Jew, has found a new unity under Fatimid rule.\n\nAndalus—a name that carries the memory of centuries of Islamic civilisation at the westernmost edge of Europe. It is no longer merely an echo of history, but the birth of a new cultural identity. The local Arabs, Berbers, converts from Christianity, and mixed descendants, guided by the cultural policies of the Fatimid court, have gradually fused into a unique cultural group known as 'Andalusian.'\n\nThey have retained the Iberian gift for seafaring and commercial acumen, while absorbing the philosophical speculation of Ismailism and the artistic sensibilities of Shi'a aesthetics. The Fatimid banner flying over this land is no longer seen as a sign of foreign conquest, but has become a proud emblem of Andalusian identity."
EDG_FDMEvents.77.a: "Andalus, the pearl of the Fatimids in the West"
EDG_FDMEvents.77.a_tt: "All provinces of the §YIberian§! culture group will convert to §TAndalusian§! culture, which belongs to the §TLevantine§! culture group."

EDG_FDMEvents.78.title: "The Fusion of Itaniyya"
EDG_FDMEvents.78.desc: "The ancient lands of the Apennine Peninsula and the Latin world are undergoing an unprecedented cultural reshaping.\n\nThe ruins of Rome, the dome of Florence, the canals of Venice, the harbours of Naples—these iconic landscapes of Latin Christendom have now been endowed with new cultural meaning under Fatimid rule. The minarets of Ismailism stand beside the ruins of the Roman Forum; Shi'a academies have replaced monasteries as centres of learning.\n\nItaniyya—a new name coined by the scholars of the Fatimid court—is becoming the shared identity of all inhabitants of this land. Latin merchants, descendants of converted Christians, Berber migrants from North Africa, and Muslim scholars from the East—all are gradually melding together in the Fatimid cultural crucible.\n\nThey have inherited the Latin passion for law and order, while embracing the Islamic world's ardour for science and the arts. Itaniyyan culture is the most perfect crystallization of East and West under the Fatimid banner."
EDG_FDMEvents.78.a: "The glory of the Latin world shall be reborn under the Ismaili banner"
EDG_FDMEvents.78.a_tt: "All provinces of the §YLatin§! culture group will convert to §TItaniyyan§! culture, which belongs to the §TLevantine§! culture group."
EDG_FDMEvents.79.title: "The Naturalisation of Habasha"
EDG_FDMEvents.79.desc: "The ancient lands of the Horn of Africa have at last been incorporated into the Fatimid cultural domain.\n\nFrom the obelisks of Aksum to the monasteries of the Ethiopian highlands, from the ports of the Gulf of Aden to the spice coast of Somalia—this land once proud of its tales of Solomon's descendants and the Queen of Sheba has now opened a new chapter under Fatimid rule.\n\nHabasha—a name derived from the ancient Arabic term for Ethiopia—now represents, in the cultural vision of the Fatimid court, the fused new identity of all the peoples of the Horn of Africa. Descendants of Coptic Christians, Muslim merchants, the ancient remnants of Aksum, and migrants from the Arabian Peninsula are gradually fusing into a single cultural body upon these highlands.\n\nThey have retained the deep affection of the Horn's peoples for their highlands and seas, while embracing the framework of Shi'a faith and the rational traditions of Ismailism. Habasha culture is a brilliant jewel planted by the Fatimid Empire upon the African continent."
EDG_FDMEvents.79.a: "The Horn of Africa, the pride of the Fatimids in the South"
EDG_FDMEvents.79.a_tt: "All provinces in the §YHorn of Africa§! region will convert to §THabashan§! culture, which belongs to the §TLevantine§! culture group."
EDG_FDMEvents.80.title: "The Reshaping of Bilad Faris"
EDG_FDMEvents.80.desc: "Persia—this ancient land that gave birth to the glories of the Achaemenids and the Sassanids—is undergoing a profound cultural transformation under Fatimid rule.\n\nFrom the Chehel Sotoun of Isfahan to the poetic gardens of Shiraz, from the ruins of Persepolis to the ports of the Strait of Hormuz, the thousand-year heritage of Persian civilisation is colliding and fusing with the Fatimid traditions of Shi'a Ismailism.\n\nBilad Faris—a new name blending the Persian 'Land of Fars' with Arabic geographical concepts—is becoming the common identifier of all inhabitants of this land. Persian Shi'a scholars, remnants of the Sunni establishment, descendants of Zoroastrians, and migrants from the Arabian Peninsula are gradually fusing under Fatimid cultural policy into a new cultural group.\n\nThey have inherited the Persian love for poetry, gardens, and refined living, while integrating Ismaili philosophical speculation into Persia's long intellectual tradition. Bilad Faris culture is a cultural monument raised by the Fatimid Empire in the Eastern world."
EDG_FDMEvents.80.a: "The wisdom of Persia shall shine with new brilliance under the Fatimid banner"
EDG_FDMEvents.80.a_tt: "All provinces of the §YIranian§! culture group will convert to §TBilad Farisi§! culture, which belongs to the §TLevantine§! culture group."

EDG_FDMEvents.81.title: "Night Visit to the Souk"
EDG_FDMEvents.81.desc: "One sleepless night, [Root.Monarch.GetName] donned the attire of an ordinary merchant and slipped out of the palace alone.\n\nThe souk of Cairo presented a vastly different visage under the moonlight than it did by day. The bustling market of daylight hours now held only scattered lamps and the low murmurs of night watchmen. The Caliph sat down at a tea stall, ordered a pot of mint tea, and listened in silence to the idle chatter of two merchants nearby.\n\n'The Caliph is indeed a wise ruler,' said one merchant. 'Since the Fatimids returned, trade in Cairo has been many times better than in the days of Sahada.' The other merchant snorted dismissively: 'Wise ruler? Perhaps. But what of the tax collectors around him? My goods were detained three times last month, and each time I had to slip extra coin to get them released. The Caliph sits in his palace—how would he know the hardships of us small merchants?'\n\n[Root.Monarch.GetName] did not interject. He quietly finished his tea. When he left, he placed a gold coin upon the stall—enough to pay that complaining merchant's taxes for half a year."
EDG_FDMEvents.81.a: "Remember the praises—they are the cornerstone of the empire's stability"
EDG_FDMEvents.81.tt: "This event belongs to the §TReign of Irren§! event group."
EDG_FDMEvents.98.tt: "This event belongs to the §TPath of Rebirth§! event group."
EDG_FDMEvents.81.b: "Remember the complaints—they are the alarm bell of the empire's corruption"
EDG_FDMEvents.82.title: "Scimitar and Pen"
EDG_FDMEvents.82.desc: "Late at night in his study, [Root.Monarch.GetName] sat alone before a decree that required his signature.\n\nCandlelight flickered, casting shadows upon the mountain of documents piled before him. He took up the pen, only to find his hand trembling slightly—the same hand that could steady a warhorse and wield a scimitar with ease, that had cut down his first enemy at thirteen, yet now felt as clumsy as a child's when faced with this dense script.\n\nHe remembered the days when the old vizier had made him copy tax registers. He had complained bitterly then, deeming it an insult to a prince. It was not until he spotted a falsified figure in the registers that he understood the vizier's true intent.\n\n'My father gave me the hand for the blade,' [Root.Monarch.GetName] muttered to himself with a wry smile, 'and the vizier gave me the eye for numbers. But who will give me the patience for the pen?'\n\nHe stared at the decree for a long while, then finally took up the pen."
EDG_FDMEvents.82.a: "An empire cannot be governed by the sword alone"
EDG_FDMEvents.82.b: "The battlefield is where the Caliph truly belongs"
EDG_FDMEvents.83.title: "A Worthy Adversary"
EDG_FDMEvents.83.desc: "A mysterious traveller claiming to be from Persia arrived in Cairo and requested an audience with the Caliph to play chess. He claimed to have once been a son of the Shah of Tabaristan, serving under the Timurid Sultan, until he returned to Amol alone upon hearing of his homeland's peril, only to find his country buried in the grave alongside his own father the Shah. After much wandering, he had come to Cairo, to the Caliph's court.\n\n[Root.Monarch.GetName] received him in the palace gardens. The Persian was plainly dressed, his face weathered dark and rough by sun and wind, yet his bearing carried an indescribable composure. His style of play was utterly unorthodox—he followed no known opening, and each move seemed deliberately to expose a weakness, only to draw all his scattered pieces into a deadly checkmate at the final moment.\n\n[Root.Monarch.GetName] lost.\n\nHe stared at the chessboard in silence for a long time, then looked up and asked: 'Who are you?'\n\nThe Persian smiled faintly, rose without a word, turned, and departed—never to be seen again. Like a wisp of smoke, he vanished into the teeming crowds of Cairo."
EDG_FDMEvents.83.a: "I must know who he is"
EDG_FDMEvents.83.a_tt: "The Caliph sent men to trace the traveller's whereabouts, but all they found was a letter left for the Caliph, its pages blank save for a single, enigmatic signature: The Returned One."
EDG_FDMEvents.83.b: "There is always a higher heaven and a greater man beyond"

EDG_FDMEvents.84.title: "The Fisherman's Wisdom"
EDG_FDMEvents.84.desc: "During an incognito outing, [Root.Monarch.GetName] encountered an old fisherman by the banks of the Nile.\n\nThe old man did not recognise him, taking him for some nobleman's son, and so fell into easy conversation. The two sat upon the embankment, watching the sunset stain the Nile a golden red.\n\n'Young man, look at this river,' said the old fisherman, pointing to the gently flowing water. 'It never clashes head-on with the rocks—it flows around them. But give it a thousand years, and it will wear mountains down to sand.'\n\n[Root.Monarch.GetName] fell into thought. He recalled all the iron-fisted measures he had employed since his accession—suppressing rebellions, purging heretics, maintaining order by the sword. Effective they were, but they had also left countless resentments and rifts in their wake.\n\nAs he was leaving, the fisherman called after him: 'Young man, your eyes are too fierce. Look more at the river, and less at the blade.'\n\n[Root.Monarch.GetName] did not look back, but his steps slowed noticeably."
EDG_FDMEvents.84.a: "Dripping water wears through stone—softness overcomes hardness"
EDG_FDMEvents.84.b: "Blade and flowing water—neither can be lacking"
EDG_FDMEvents_84_modifier: "The Fisherman's Wisdom"
EDG_FDMEvents.85.title: "His Mother's Face"
EDG_FDMEvents.85.desc: "While sorting through his late father's effects, [Root.Monarch.GetName] discovered a small silver locket.\n\nThe locket lay at the bottom of an old wooden box, wrapped in layers of silk. Inside was a miniature portrait—the face of a young woman bearing a striking resemblance to [Root.Monarch.GetName] himself. The faint smile at the corners of her mouth seemed to gaze upon someone beyond the frame.\n\nOn the back of the locket were inscribed a few small words: 'May God protect you, my child.'\n\nAn attendant told him in a low voice that this was the only keepsake left by his mother before she passed. She had been with child when she gave birth to him amid the deserts of the Maghrib. She never lived to see him grow up, never saw him ascend to the throne, never saw the Fatimid banner fly once more above the walls of Cairo.\n\n[Root.Monarch.GetName] pressed the locket to his forehead. The silver crescent mark on his brow aligned perfectly with the inscription, as if his mother's hand were reaching across time and space to gently stroke his face."
EDG_FDMEvents.85.a: "Let my mother's blessing stay with me always"
EDG_FDMEvents.85.b: "Let my mother's blessing shield the entire empire"
EDG_FDMEvents_85_modifier: "A Mother's Blessing"
EDG_FDMEvents.86.title: "Visions in the Sandstorm"
EDG_FDMEvents.86.desc: "During an expedition, [Root.Monarch.GetName]'s army was caught in a rare sandstorm on the edge of the Sahara.\n\nThe heavens and earth turned to yellow; the gale lashed them with sand like knife-cuts. The column scattered, horses screamed, and soldiers struggled to find their bearings in the blinding storm. [Root.Monarch.GetName] was thrown from his mount by a violent gust; when he scrambled to his feet, he found himself utterly alone.\n\nAmidst the swirling sand, he saw a vision.\n\nHis father stood atop a dune, white robes snapping in the wind, holding the scimitar that had been passed down through generations. His father said nothing—simply proffered the blade to him. [Root.Monarch.GetName] reached out to take it, but grasped only empty air—the figure dissolved like a mirage into the storm.\n\nWhen the tempest finally passed, he found himself kneeling in the sand, his hands clutching only the dust-covered scimitar. The very same blade his father had been grasping when he fell into the Nile.\n\nWhen his attendants finally reached him, they found the Caliph kneeling alone in the desert, the silver crescent upon his brow gleaming in the sunlight. He said nothing. He rose slowly, mounted his horse, and pressed onward."
EDG_FDMEvents.86.a: "My father's spirit watches over me"
EDG_FDMEvents.86.b: "My father's blood flows through my veins"
EDG_FDMEvents_86_modifier: "Epiphany in the Sandstorm"

EDG_FDMEvents.87.title: "The Rebel's Son"
EDG_FDMEvents.87.desc: "After a battle, a boy was captured by the soldiers—the son of the rebel leader.\n\nBy custom, the child should have been executed or imprisoned for life. When [Root.Monarch.GetName] entered the tent where the captive was being held, the youth was curled up in a corner, covered in wounds, yet stubbornly refusing to bow his head.\n\n'Do you hate me?' [Root.Monarch.GetName] asked.\n\nThe youth raised his head, his eyes burning with a fury far beyond his years: 'You killed my father.'\n\n[Root.Monarch.GetName] fell silent.\n\nIn those eyes, he saw something all too familiar—it was the gaze of his thirteen-year-old self, after his first kill on the battlefield of the Atlas mountains. Stubborn, furious, refusing to yield. If fate had taken a slightly different turn, it might have been him kneeling there.\n\n'How old are you?' [Root.Monarch.GetName] asked.\n\n'Thirteen.'\n\nAgain, thirteen."
EDG_FDMEvents.87.a: "Take him as a foster son—this child reminds me of who I once was"
EDG_FDMEvents.87.b: "The empire's law admits no personal sentiment"
EDG_FDMEvents.88.title: "Al-Azhar at Midnight"
EDG_FDMEvents.88.desc: "On a sleepless night, [Root.Monarch.GetName] walked alone into the Al-Azhar Mosque.\n\nMoonlight streamed through the dome, spilling silver patches upon the prayer hall's floor. The vast hall was silent, save for the distant footfalls of a night watchman.\n\n[Root.Monarch.GetName] sat down at the centre of the hall and began to recite the Qur'an in a low voice. It was the first time in years he had prayed without ceremony—no courtiers watching, no chroniclers recording, only the most private communion between himself and God.\n\nAn old watchman approached, not recognising him, and simply sat down beside him to pray in silence. The two sat shoulder to shoulder in the moonlight—one the highest ruler, the other the lowliest servant, yet in that moment, both knelt equal before God.\n\nAt dawn, the watchman rose to leave. As he departed, he patted [Root.Monarch.GetName] on the shoulder and left him with these words: 'Young man, God does not need your knee to bend—He needs your heart to bend.'\n\n[Root.Monarch.GetName] watched the old man walk away, then sat alone in the morning light for a long, long time."
EDG_FDMEvents.88.a: "Before God, I shall always be a humble servant"
EDG_FDMEvents.88.b: "But I have no need to change myself"
EDG_FDMEvents.89.title: "The Life of the Irren"
EDG_FDMEvents.89.desc: "When [Root.Monarch.GetName] mounted his warhorse for the last time, he was no longer young.\n\nThe silver crescent upon his brow had long been worn faint by the passage of years; the scimitar passed down from his forefather Sulayman had been re-sheathed three times. Yet he still insisted on leading the army in person—just as he had done on the very first day of his reign.\n\nIt was a minor border skirmish, not a matter of great importance. The rebel remnant had fortified itself in a desolate valley; with his numbers, he could have laid siege and waited for them to starve. But he chose an assault. 'I do not wish to die in pursuit as my father did,' he told his generals, 'but neither will I wait upon the walls for others to die in my stead.'\n\nThe battle ended swiftly. Yet as the field was being cleared, a hidden arrow loosed from an unseen hand struck his shoulder. The arrowhead was poisoned.\n\nBy the time his attendants carried him back to Cairo, he knew his days were numbered. He refused the physicians' treatment—'The poison has reached the bone,' he said calmly. 'Better to depart with dignity than to linger on a sickbed.'\n\nIn his final moments, he asked for the scimitar to be brought to him and placed beside his pillow. Gazing out the window at the skyline of Cairo, a faint smile crossed his lips.\n\n'Father,' he whispered, 'I did it.'\n\nThen he closed his eyes.\n\nThe silver crescent on his brow glimmered for one last time in the candlelight—and then faded forever."
EDG_FDMEvents.89.a: "Thus ends the tale of this legendary Caliph"

EDG_FDMEvents.90.title: "The Lamps of the House of Wisdom"
EDG_FDMEvents.90.desc: "A scholar from Baghdad arrived at the port of Alexandria with a ship full of manuscripts.\n\nHe claimed to be the descendant of the last librarian of the Abbasid House of Wisdom. When the Mongol hooves had trampled Baghdad, his ancestor risked his life to rescue thousands of precious manuscripts from the flames—including Arabic translations of Greek philosophers, star charts of Persian astronomers, treatises of Indian mathematicians, and numerous secret works of early Ismaili scholars.\n\n'These manuscripts have no place left in the Sunni world,' the old scholar knelt before the Caliph and said, 'but under the Fatimid banner, they may find a new home.'\n\nThe ulama at court were divided. Some argued that these manuscripts were tainted with the heretical ideas of Sunni scholars and should be burned; others believed that knowledge knew no sects, and that the lamps of the House of Wisdom should illuminate the entire world.\n\nThe Caliph leafed through the yellowed parchments, his fingertips brushing across Euclid's geometric diagrams, Ptolemy's star tables, Ibn Sina's medical treatises. He raised his head and gazed out at the skyline of Cairo, then spoke slowly: 'The most precious gift God has given to humanity is not gold, not the sword—it is knowledge.'"
EDG_FDMEvents.90.a: "Knowledge knows no sects"
EDG_FDMEvents.90.b: "True faith must not be defiled"
EDG_FDMEvents_90_modifier: "The Lamps of the House of Wisdom"
EDG_FDMEvents.91.title: "The Man Who Moved Mountains"
EDG_FDMEvents.91.desc: "The old scholars at court had begun telling that ancient tale once again.\n\nWhen the forefather al-Mu'izz founded Cairo, Mount Muqattam blocked the city's geomantic flow. The Caliph ordered the engineer Ja'far ibn Muhammad to remove the mountain. Ja'far did not truly move the mountain—that was plainly impossible—but instead lit countless torches upon it, creating the optical illusion at night that the mountain had vanished, leading the Caliph to believe that it had been moved.\n\n'The man who moved the mountain,' [Root.Monarch.GetName] murmured to himself, 'did not truly move the mountain—he made people believe that the mountain was no longer there.'\n\nNow, the empire faced a task that seemed equally impossible. The enemy's fortress was impregnable; a frontal assault would exact a terrible toll. The generals argued endlessly before the sand table—some urged siege, some urged assault, some urged a detour.\n\n[Root.Monarch.GetName] gazed at the little hill on the sand table that represented the fortress, and a faint smile crossed his lips: 'Our forefather al-Mu'izz said that true victory is not moving the mountain, but making the mountain move itself.'"
EDG_FDMEvents.91.a: "Follow our forefather's way of moving mountains"
EDG_FDMEvents.91.b: "The sword is the Caliph's true language"
EDG_FDMEvents_91_modifier: "The Wisdom of the Mountain-Mover"
EDG_FDMEvents.92.title: "The Ghost of the Mad Caliph"
EDG_FDMEvents.92.desc: "While sorting through the archives of the old palace in Cairo, [Root.Monarch.GetName] discovered a long-sealed confidential letter.\n\nThe seal bore the crescent emblem of the Fatimid dynasty, but it was cracked and yellowed with age. When opened, it revealed a letter written in the name of Caliph al-Hakim—that ruler known to history as 'the Mad Caliph,' who had ultimately vanished mysteriously upon Mount Muqattam.\n\nThe letter read: 'If you are reading this, then I am no longer here. Do not seek me. All that I did—the prohibitions, the madness, the decisions that made the entire empire tremble—all served one purpose: to remind people that God's will is not conveyed through the Caliph's mouth, but felt through each person's heart. Truth is not upon the mountaintop; it is within every heart.'\n\n[Root.Monarch.GetName] read the letter and fell into a long silence. Was al-Hakim a madman, or a misunderstood saint? Were his mad acts—forbidding chess, forbidding women from leaving their homes, destroying the Church of the Holy Sepulchre in Jerusalem—acts of tyranny, or revelations of something deeper?\n\nThe scholars at court debated endlessly, but [Root.Monarch.GetName] simply folded the letter and placed it back into the wooden box."
EDG_FDMEvents.92.a: "He was a misunderstood saint"
EDG_FDMEvents.92.b: "Do not repeat his mistakes"
EDG_FDMEvents_92_modifier: "The Legacy of the Mad Caliph"
EDG_FDMEvents.93.title: "The Nilometer's Measure"
EDG_FDMEvents.93.desc: "The flooding season of the Nile was approaching, but the Nilometer on Roda Island had shown an anomaly.\n\nThis precision instrument, built by the Fatimid forefathers, had been the lifeblood of the empire's agriculture for a thousand years. Through the markings in the octagonal measuring well, scholars could accurately predict the height of the flood, thereby determining the year's taxation quota. A rise of three cubits meant abundance; a fall of three meant famine.\n\nBut this year's reading was neither high nor low—it was an intermediate value never seen before.\n\nThe scholars at court argued endlessly. Astronomers believed this was due to an anomaly in the stars; hydraulic engineers believed it indicated a change in the river's upper course; the ulama believed it was a test from God upon the empire.\n\n'What does this reading mean?' [Root.Monarch.GetName] asked.\n\nThe chief scholar was silent for a long time, then finally replied: 'Most high Caliph, to be frank—we do not know.'"
EDG_FDMEvents.93.a: "Take it as an omen of good fortune, and lower taxes to celebrate"
EDG_FDMEvents.93.b: "Take it as an omen of famine, and raise taxes to prepare for lean years"

EDG_FDMEvents.94.title: "The Da'i's Secret Letter"
EDG_FDMEvents.94.desc: "A secret letter from a distant land, passed through many hands, finally reached Cairo.\n\nThe letter was written in Ismaili cipher, legible only to the most senior Da'is at court. It reported that in the heartland of a certain Sunni great power, our missionaries had developed a vast network of secret believers. These people hid behind the mask of Sunnism, feigning prayer in the mosques and feigning trade in the markets, while secretly spreading the truth of Shi'a Islam.\n\nBut this network was on the verge of exposure. Local agents had begun investigating the source of heretical ideas, and several core believers had already been arrested. The Da'i urgently requested immediate funding and diplomatic support from Cairo; otherwise, the entire network would be destroyed within months.\n\n'If we support them,' the vizier said with concern, 'it may trigger a diplomatic crisis with that great power. But if we turn our backs, decades of effort will be wasted.'"
EDG_FDMEvents.94.a: "Fully support the Da'i—the spark of faith must not be extinguished"
EDG_FDMEvents.94.b: "Sever ties—protect the empire's diplomatic interests"
EDG_FDMEvents_94_modifier: "The Da'i's Network"
EDG_FDMEvents.95.title: "The Prophet's Birthday"
EDG_FDMEvents.95.desc: "The ulama at court presented a petition to the Caliph.\n\nThey proposed restoring the grand celebrations for the birthday of the Prophet Muhammad—a tradition of the Fatimid dynasty that had gradually declined during the turbulent years. According to tradition, on this day, the streets of Cairo were to hold grand parades, the Caliph was to personally attend prayers at the mosque, and the poor were to receive alms of food and money.\n\n'Mawlid (the Prophet's birthday) is the perfect opportunity to unite the Muslim world,' the chief ulama said reverently. 'Both Shi'a and Sunni—all Muslims hold the Prophet in reverence. Through grand celebrations, we can show the entire Islamic world the piety and generosity of the Fatimids.'\n\nBut some scholars raised objections: 'Such celebrations carry the colour of popular carnival, and are even mixed with pre-Islamic pagan traditions. As the Imam of the Ismailis, we should adhere to orthodoxy, rather than cater to the base tastes of the masses.'"
EDG_FDMEvents.95.a: "The Prophet's birthday belongs to all"
EDG_FDMEvents.95.a_tt: "The Caliph orders grand celebrations for the Prophet's birthday, increasing §YLegitimacy§! and §YPrestige§!, but reducing treasury income."
EDG_FDMEvents.95.b: "Faith needs no revelry"
EDG_FDMEvents.95.b_tt: "The Caliph insists on low-key celebrations, increasing §YPiety§!, but reducing §YLegitimacy§!."
EDG_FDMEvents.96.title: "The Weight of Gold"
EDG_FDMEvents.96.desc: "The empire's mintmaster was urgently summoned to court.\n\nHe knelt before the Caliph, trembling, for he brought terrible news: in recent years, serious quality issues had emerged in the minting of the imperial gold dinar. Unscrupulous individuals had been adulterating the coins with copper and silver, significantly reducing the gold's purity.\n\nThe impact of this problem extended far beyond the empire's borders. The Fatimid gold dinar was the hard currency of the entire Mediterranean world—from the merchants of Venice to the kings of Mali, from the emperors of Byzantium to the sultans of India, all trusted the coin bearing the Caliph's name. If the dinar's reputation was damaged, the entire international trade system would descend into chaos.\n\n'We have two options,' said the vizier. 'One is to severely punish the counterfeiters and re-mint pure gold dinars—but this would require massive gold reserves. The other is to reform the minting system and introduce new anti-counterfeiting technologies—but this would take more time and greater investment.'"
EDG_FDMEvents.96.a: "Severely punish the counterfeiters and restore the coin's purity"
EDG_FDMEvents.96.b: "Reform the minting system and introduce anti-counterfeiting technologies"
EDG_FDMEvents_96_modifier_1: "Pure Gold Dinar"
EDG_FDMEvents_96_modifier_2: "New Minting System"
EDG_FDMEvents.97.title: "Evening Prayer on Mount Muqattam"
EDG_FDMEvents.97.desc: "One evening, [Root.Monarch.GetName] climbed Mount Muqattam alone.\n\nThis limestone mountain, which had witnessed countless rises and falls, overlooked all of Cairo. The setting sun dyed the Nile a golden red; the muezzins on the minarets began to chant the evening prayer, their melodious voices echoing through the valley, as if the entire world had fallen silent in that moment.\n\n[Root.Monarch.GetName] stood atop the mountain, gazing down at the city founded by his forefather al-Mu'izz. Cairo—the 'City of Victory'—had risen from the desert, known the glory and decline of the Fatimid dynasty, endured the usurpation of the Ayyubids and the return of the Fatimids, and now at last, once again, stood as the heart of the Ismaili world.\n\nBut what of the future?\n\nHow long could this city continue to shine? How many more generations could this dynasty endure? How much longer could the blood of the Prophet flow upon this land?\n\nNo one could answer these questions. The Caliph simply stood there in silence, listening to the evening prayer, watching the sun slowly sink beyond the end of the Nile."
EDG_FDMEvents.97.a: "Let things take their natural course"
EDG_FDMEvents.97.b: "Be vigilant in times of peace"
EDG_FDMEvents_97_modifier: "Revelation on Mount Muqattam"

EDG_FDMEvents.98.title: "The Gates of Tunis"
EDG_FDMEvents.98.desc: "The gates of Tunis at last collapsed beneath our assault.\n\nWhen the Fatimid banner first flew over this city, [Root.Monarch.GetName] rode through the gates, followed by the triumphant army, with the inhabitants kneeling on both sides of the road. This city—once the Crusaders' bridgehead in North Africa, the place where the white robes of the Knights Templar held sway—had at last returned to the hands of Ali's descendants.\n\nWhen our forefather Sulayman fled Cairo, he had skirted around Tunis, not daring to pause. The Fatimids were still too weak then to challenge the Crusaders entrenched there. But now, more than two centuries of accumulated strength had been unleashed in a single thunderbolt.\n\nThe fall of Tunis was not merely a change of hands for one city—it signalled that Fatimid rule in the Maghrib was now unshakable. From here, the road to Cairo lay open."
EDG_FDMEvents.98.a: "Tunis—the first monument of the Fatimids in the Maghrib"
EDG_FDMEvents.99.title: "The Green Banner of Marrakesh"
EDG_FDMEvents.99.desc: "The green banners upon the walls of Marrakesh were at last struck down by our own hands.\n\nThis city, which rose from the foot of the Atlas Mountains, had been the heart of the Almohad Caliphate. That empire, which styled itself 'Unitarians' and was infamous for its extreme legal puritanism, had ruthlessly persecuted Shi'is, Jews, and indeed any Muslims they deemed 'impure.' Now their capital had fallen beneath our hooves.\n\nOur troops marched across the square before Ibn Tumart's mausoleum and took possession of that vast inheritance which once stood alongside our forefathers in North Africa. The markets, academies, and palaces of Marrakesh would all be incorporated into the Fatimid domain.\n\nThe unification of the Maghrib was steadily becoming reality. From Kabylia to Marrakesh, from the edge of the Sahara to the coast of the Atlantic—the Fatimid banner was covering this ancient land."
EDG_FDMEvents.99.a: "The age of the Almohads is over"
EDG_FDMEvents_99_modifier: "Victory at Marrakesh"
EDG_FDMEvents.100.title: "The Bronze Gates of Fes"
EDG_FDMEvents.100.desc: "The ancient bronze gates of Fes opened wide to our armies.\n\nThis city, nestled in the narrow corridor winding between the Atlas Mountains and the Atlantic, was the bastion of the Maliki school, the seat of the Qarawiyyin Mosque, the very heart of Sunni learning in the western Maghrib. The fuqaha' of the city had once openly proclaimed us 'heretics who usurp the Prophet's name,' and Berber tribal leaders in the mountains had cursed our Caliph in their prayers.\n\nNow those voices were silent.\n\nWhen [Root.Monarch.GetName] rode into Fes, he deliberately took a detour past the Qarawiyyin Mosque. This ancient mosque, founded in 859, was older than the Fatimid dynasty itself. He did not order it converted, but paused briefly before its gates and said softly: 'Knowledge knows no sects. One day, the scholars here will understand that the truth of Ismailism is no more wicked than their Sunni doctrines.'\n\nThe conquest of Fes marked the formal establishment of Fatimid rule over all of Morocco."
EDG_FDMEvents.100.a: "The lamps of the Qarawiyyin shall continue to illuminate this land"
EDG_FDMEvents.101.title: "Twilight over Córdoba"
EDG_FDMEvents.101.desc: "The Red Palace of Córdoba at last fell beneath our iron hooves.\n\nThis palace, which once made all of Iberia tremble, had been the stage upon which the Umayyad usurpers flaunted their might and wealth—while our forefathers raised the Shi'a banner in Cairo, they styled themselves the 'true Caliphs' in Andalus, using Sunni doctrine to deny the sanctity of the Fatimid bloodline. For centuries, two caliphates stood facing each other across the Mediterranean, their mutual hatred woven into every decree, every sermon, every Friday prayer.\n\nNow history had delivered its verdict.\n\nAs [Root.Monarch.GetName] entered the Great Mosque of Córdoba, sunlight streamed through hundreds of red-and-white striped arches onto the prayer hall's floor. This magnificent structure, founded by Abd al-Rahman I and expanded over centuries, had once been the most glorious mosque in the entire Islamic world. Now its minarets would once again chant prayers for the Ismaili faith.\n\nThe centuries-old struggle for the caliphate between Shi'a and Sunni had today come to an end, with the final victory of the Fatimids. The spirits of our forefathers al-Mu'izz and Ubayd Allah could at last rest in peace."
EDG_FDMEvents.101.a: "Let the Tower of Calahorra bear witness to the eternal glory of the Fatimids"
EDG_FDMEvents_101_modifier: "Twilight over Córdoba"

EDG_FDMEvents.102.title: "The Lighthouse of Alexandria"
EDG_FDMEvents.102.desc: "Alexandria—the legendary city founded by Alexander the Great, whose Pharos once illuminated the entire Mediterranean—now flew the Fatimid banner once more.\n\nWhen [Root.Monarch.GetName]'s fleet sailed into the port of Alexandria, the docks were crowded with residents who had come to welcome him. Among them were Arab merchants, Coptic Christians, Jewish bankers, and even a few Latin trade representatives from Venice and Genoa. The people of this city knew better than anyone: whoever held Alexandria held the lifeline of Mediterranean trade.\n\nThough the Lighthouse of Alexandria had long since fallen in an earthquake, the arrival of the Fatimids brought a new light to the city. Customs revenues would fill the imperial treasury; warships from the dockyards would guard the imperial coasts; and the warehouses piled high with spices and silk would become the cornerstone of the Fatimid economic revival.\n\nThe final step toward Cairo had been taken."
EDG_FDMEvents.102.a: "Alexandria, the pearl of the Mediterranean"
EDG_FDMEvents.103.title: "The Sacred Rock of Al-Quds"
EDG_FDMEvents.103.desc: "Jerusalem—Al-Quds, the 'Holy City'—had at last returned to Fatimid hands.\n\nWhen [Root.Monarch.GetName] rode through the Jaffa Gate and set foot upon the ancient stone-paved streets of this city, the whole city seemed to hold its breath. The golden dome of the Dome of the Rock glittered in the sunlight; the minaret of Al-Aqsa Mosque pointed to the heavens; and beyond, on the Mount of Olives, the bells of Christian churches mingled with the call to prayer from the mosques.\n\nThis city had witnessed so much history. The Prophet Muhammad had ascended to heaven from here; King David had established his kingdom here; Jesus had been crucified here. It had been destroyed by the Romans, occupied by the Crusaders, recaptured by Saladin, and now had fallen once more into Fatimid hands.\n\n[Root.Monarch.GetName] entered the Dome of the Rock and stood before the sacred rock upon which the Prophet was said to have stepped during his night journey. He slowly knelt. He did not pray—he simply gazed at the stone in silence, as if in dialogue with a thousand years of history.\n\n'Al-Quds,' he whispered, 'you have at last found your true guardian.'"
EDG_FDMEvents.103.a: "The Holy City of God shall forever be under Fatimid protection"
EDG_FDMEvents.104.title: "The Prophet's Mosque"
EDG_FDMEvents.104.desc: "Medina—the City of the Prophet, the final resting place of Muhammad—now flew the Fatimid banner.\n\nWhen [Root.Monarch.GetName] entered the Prophet's Mosque, his steps became unusually gentle, as if afraid to disturb the spirit of the Prophet who rested there. Beneath the green dome lay the tombs of Muhammad, Abu Bakr, and Umar. The three great men lay quietly there, having witnessed the rise and fall of the Islamic world across a thousand years.\n\nAs a direct descendant of Fatimah and Ali, [Root.Monarch.GetName] knelt before the tomb and recited a passage from the Qur'an in a low voice. The worshippers around him held their breath; some quietly wiped tears from their eyes.\n\nThe conquest of Medina was not merely a military campaign—it was a spiritual homecoming. Since the Prophet's Hijra, this city had been one of the holiest places in the Islamic world. Now, at last, it had returned to the hands of the Prophet's bloodline.\n\nFrom the window of the Prophet's Mosque, the entire city of Medina could be seen. The setting sun painted the desert golden-red, and the muezzin on the minaret began to chant the evening prayer. [Root.Monarch.GetName] closed his eyes and listened to the melodious voice, feeling a peace he had never known before."
EDG_FDMEvents.104.a: "The Prophet's bloodline shall forever guard this holy land"
EDG_FDMEvents_104_modifier: "The Prophet's Blessing"
EDG_FDMEvents.105.title: "The Key to the Kaaba"
EDG_FDMEvents.105.desc: "Mecca—the site of the Sacred Mosque, the Kaaba, the holiest place toward which all Muslims turn in prayer—had fallen into Fatimid hands.\n\nWhen [Root.Monarch.GetName] entered the Sacred Mosque and saw for the first time that cuboid structure draped in black silk, he stopped, unable to speak for a long moment. The Kaaba—the sacred house built by Abraham and his son Ishmael—was the most sacred site in the Islamic world. Every Muslim was to make pilgrimage here at least once in a lifetime, and in each of the five daily prayers, they would turn toward this very structure.\n\n[Root.Monarch.GetName] walked slowly toward the Kaaba and reached out to touch its cold stone walls. The golden embroidery on the kiswa glittered in the sunlight; the pilgrims around him knelt and recited praises in low voices.\n\nAs a descendant of Fatimah and Ali, as the Imam of the Ismailis, [Root.Monarch.GetName] had the right to open the door of the Kaaba with his own hands. He took the ancient key and slowly pushed open the heavy wooden door.\n\nInside was an empty hall, with only a few pillars supporting the ceiling. Sunlight streamed through the doorway, illuminating the marble floor. [Root.Monarch.GetName] stepped inside, knelt, and pressed his forehead to the cold stone.\n\nThis was the most glorious moment in the centuries-long history of the Fatimid dynasty. From the deserts of the Maghrib to the sanctuary of Mecca, from the shores of Kabylia to the threshold of the Kaaba—the Prophet's bloodline had returned at last to the Prophet's holy city.\n\nThe key to the Kaaba had finally fallen into the hands of its true master."
EDG_FDMEvents.105.a: "There is no god but God; Muhammad is the Messenger of God"
EDG_FDMEvents_105_modifier: "Guardian of the Kaaba"

EDG_FDMEvents.106.tt: "This event belongs to the §TScales of the Imam§! event group."
EDG_FDMEvents.106.title: "The Shadow Upon the Golden Age"
EDG_FDMEvents.106.desc: "The Fatimids had entered their most glorious age.\n\nFrom the Atlantic to the Persian Gulf, from the highlands of Anatolia to the shores of the Horn of Africa, the Fatimid banner covered half the Islamic world. The markets of Cairo overflowed with spices from India and silks from China; the halls of Al-Azhar gathered scholars from every corner; the imperial treasury overflowed, and the army was invincible.\n\nYet beneath this prosperous surface, a deep fracture was silently spreading.\n\nThe further the empire expanded, the sharper the contradictions grew between the Shi'a ruling establishment and the Sunni majority. In Cairo, Shi'a ulama held the central positions of the court, while Sunni scholars could only linger at the margins; in Baghdad, Sunni commoners were forced to recite in their Friday sermons the name of an Imam they did not believe in; in Persia, those who had once followed the Safavids discovered they had merely exchanged one master for another.\n\nOn the surface, the empire's religious tolerance still functioned—Christians and Jews could still worship freely after paying the jizya. But within the Muslim community, the chasm between Shi'a and Sunni was becoming an unbridgeable abyss.\n\nFarsighted figures at court had already sensed the danger. An aged vizier said in private with grave concern: 'The larger the empire grows, the deeper the fissures run. When these fissures finally tear apart, the Fatimids will face a disaster more terrible than any foreign invasion.'"
EDG_FDMEvents.106.a: "Beneath the prosperity, dark currents flow"
EDG_FDMEvents.106.a_tt: "Disable the §MFatimid Religious Tolerance§! mechanic."
EDG_FDMEvents.107.title: "The Petition of the Ulama"
EDG_FDMEvents.107.desc: "A petition signed by hundreds of Sunni scholars was placed upon the Caliph's desk.\n\nThe wording of the petition was respectful but firm. These Sunni ulama from across the empire, invoking the Prophet's hadiths, beseeched the Caliph to address the growing religious inequality within the empire. They pointed out that in many provinces, Sunni mosques were prohibited from performing certain traditional rites; at court, Sunni scholars had almost no path for advancement; and in the army, Sunni soldiers were treated far worse than their Shi'a comrades.\n\n'We do not question the Caliph's authority,' the petition read, 'we merely ask that the Caliph, as a descendant of the Prophet, show the Prophet's compassion to all Muslims—whether they are Shi'a or Sunni. The Prophet said: "All Muslims are brothers." Has this saying lost its meaning beneath the Fatimid banner?'\n\nThe Shi'a zealots at court were incensed: 'These Sunni hypocrites dare to challenge the Imam's rule! They should all be arrested and made an example of!' But the pragmatic bureaucrats warned that arresting such respected scholars would only inflame tensions and make the situation uncontainable.\n\nTwo paths lay before [Root.Monarch.GetName]: to heed these voices, or to suppress them completely?"
EDG_FDMEvents.107.a: "The Prophet's compassion should know no sectarian divide"
EDG_FDMEvents.107.b: "The Imam's authority is not to be questioned"
EDG_FDMEvents.108.title: "Blood in the Souk"
EDG_FDMEvents.108.desc: "Bloody conflict erupted in the souk of Cairo.\n\nThe cause seemed trivial at first: a Shi'a merchant, while weighing his goods, became embroiled in an argument with a Sunni customer. The quarrel quickly escalated into physical altercation, then into a riot that swept through the entire market. Shi'a and Sunni residents poured out of their respective quarters, wielding clubs and swords, slaughtering each other in the narrow alleyways.\n\nBy the time the troops arrived, dozens lay dead in pools of blood. Among the dead were the elderly, women, and even several children. What was more chilling still was that some soldiers, while carrying out their orders, visibly favoured those of their own sect.\n\nAs word spread, similar disturbances broke out in cities across the empire. In Baghdad, Sunni mobs burned Shi'a mosques; in Damascus, Shi'a militias massacred Sunni neighbourhoods; in Isfahan, the conflict even spilled over to the local Jews and Christians.\n\nThe empire's glittering prosperity was dissolving at an alarming rate. Sects that had once coexisted peacefully beneath the Fatimid banner were now slaughtering each other like mortal enemies.\n\nWhen [Root.Monarch.GetName] received the reports, he fell silent for a long time. At length, he asked a question that left all his ministers frozen in dread: 'Whose fault is all this?'"
EDG_FDMEvents.108.a: "We must find the hand behind this"
EDG_FDMEvents.108.b: "The empire's order must not be broken"

EDG_FDMEvents.109.title: "The Caliph's Choice"
EDG_FDMEvents.109.desc: "The atmosphere at court had reached a breaking point.\n\nThe representatives of the Sunnis and Shi'as sat on opposite sides of the hall, glaring at each other, as if ready to draw blades at any moment. The Caliph sat upon the dais, looking down upon these courtiers who had once bowed before him, feeling a sense of helplessness he had never known before.\n\nThe Sunni representative spoke first: 'Most high Caliph, we demand equal rights. We demand a voice at court, opportunities for advancement in the army, and the right to worship freely in our mosques. We are the majority of this empire—we should not be treated as second-class citizens!'\n\nThe Shi'a representative retorted immediately: 'These Sunni opportunists seek to overthrow the Imam's rule! Their so-called "equality" is merely a pretext for seizing power. If the Caliph yields to them, the Shi'a traditions of the Fatimids will be wiped out!'\n\nThe argument between the two sides grew increasingly heated, nearly escalating to blows. [Root.Monarch.GetName] tried to mediate, but his words seemed feeble and powerless against the fury of both factions.\n\nAn old vizier quietly approached the Caliph and whispered: 'Most high Caliph, the scales have tilted too far. Whichever side you choose, the other will not accept it. Civil war, I fear, has become unavoidable.'\n\n[Root.Monarch.GetName] closed his eyes and let out a long sigh. He knew the old vizier spoke the truth."
EDG_FDMEvents.109.a: "Attempt one final mediation, however hopeless it may be"
EDG_FDMEvents.109.b: "Some rifts cannot be healed"
EDG_FDMEvents.110.title: "The Scales Tip Over"
EDG_FDMEvents.110.desc: "The last hope was shattered.\n\n[Root.Monarch.GetName] tried to broker a compromise between the two factions, but his efforts only yielded more suspicion and resentment. The Sunnis believed he favoured the Shi'as; the Shi'as believed he was conceding to the Sunnis. The Caliph's authority tottered in the midst of this religious crisis, and the unity of the empire was visibly unravelling.\n\nWhen the last Sunni representative stormed out, when the last Shi'a elder slammed the door in fury, [Root.Monarch.GetName] sat alone in the empty hall, facing a brutal truth: the religious balance upon which the Fatimid dynasty had staked its existence had collapsed completely.\n\nThe Scales of the Imam—once the core of Fatimid statecraft, which maintained a delicate equilibrium between Shi'a orthodoxy and Sunni majority to allow the empire to function on a foundation of religious pluralism—had now tilted beyond redemption.\n\nOn one side stood the zealous defenders of Shi'a orthodoxy, demanding that the Caliph, in the name of the Imam, purge all heresy; on the other stood the Sunni majority, yearning for equal rights and refusing to endure their marginalised fate any longer. The Caliph, caught in the middle, would inevitably betray one side by choosing the other.\n\nThe shadow of civil war loomed over the entire empire. From the palaces of Cairo to the markets of Baghdad, from the highlands of Persia to the valleys of Anatolia—everyone was waiting for the inevitable eruption.\n\n[Root.Monarch.GetName] gazed out at the skyline of Cairo and whispered: 'Forefather al-Mu'izz, when you founded this empire, did you ever foresee this moment?'\n\nNo one answered. Only the wind echoed through the empty hall, mourning the catastrophe to come."
EDG_FDMEvents.110.a: "Disaster is at hand"
EDG_FDMEvents.110.a_tt: "§TThe Scales of the Imam§! will tip irrevocably out of balance."
EDG_FDMEvents.111.tt: "This event belongs to the §TTears of Isis§! event group."
EDG_FDMEvents.111.title: "Hassan's Field"
EDG_FDMEvents.111.desc: "In a small village in Upper Egypt, a farmer named Hassan ibn Yusuf crouched by the edge of his own field, staring at the once-golden wheat before him.\n\nThe field had cracked. The wheat stalks that had once swayed in the breeze were now withered and flattened, as if an invisible hand had torn them from the earth. Hassan took a handful of dry soil in his rough fingers; the clod crumbled to dust in his grip and was carried away by the wind.\n\nThis field had been passed down from Hassan's grandfather. Grandfather's father, father's father—generation upon generation had tilled this land beside the Nile. Every flood season, the Nile's waters would bring rich silt to nourish the earth, making the wheat grow taller than a man. Hassan had heard his father say since childhood: 'The Nile is our mother—she will never abandon us.'\n\nBut this year, the mother had abandoned her children.\n\nThe Nile had not flooded. The riverbed lay bare, like an ugly scar across the land. The rains upstream had not come as expected—instead came the merciless sun and parching hot winds. Hassan's neighbours had already begun slaughtering their livestock, for there was no fodder left to feed them.\n\nHassan's wife Nafisa came out of the house, holding their youngest child in her arms—an infant girl just past her first year. Nafisa's eyes were filled with fear, but she said nothing; she simply stood silently beside her husband, gazing at the dead field.\n\n'What shall we do?' she finally spoke, her voice sounding as if it came from far away.\n\nHassan did not answer. He did not know the answer."
EDG_FDMEvents.111.a: "May God have mercy upon us"

EDG_FDMEvents.112.title: "The Road to Cairo"
EDG_FDMEvents.112.desc: "Hassan finally made a decision: he would go to Cairo.\n\nHe had heard from passing merchants that the Caliph had opened the granaries in Cairo to relieve the famine. Cairo was the heart of the empire, the centre of the world—there would surely be food there. If he could just reach Cairo, his family would survive.\n\nHassan sold the last goat they owned, exchanging it for a few days' supply of dried bread. He left the greater part for his wife and children, eating only a few hard biscuits himself. They joined the stream of people heading for Cairo—thousands of peasants, craftsmen, and vagrants, moving northward along the Nile Valley like a slow river.\n\nThe sights along the road were heartbreaking. Every few miles, they passed bodies lying by the roadside—some starved, some dead of illness, some murdered by robbers. Hassan gripped his wife's hand tightly, with his daughter on his back, never daring to relax his guard.\n\nOn the third day, their water ran out. Hassan's lips cracked and bled; his throat burned as if scorched by fire. His little daughter began to run a fever, her forehead as hot as a freshly baked loaf. Nafisa soaked her own headscarf in muddy water from a roadside puddle and pressed it to the girl's brow.\n\n'Hassan,' Nafisa said in a low voice, 'if... if our daughter cannot hold on...'\n\n'She will hold on,' Hassan cut her off, his voice hoarse but firm. 'Cairo is just ahead. Once we reach Cairo, everything will be fine.'"
EDG_FDMEvents.112.a: "Press on"
EDG_FDMEvents.113.title: "Beneath the City Walls"
EDG_FDMEvents.113.desc: "Hassan's family finally reached Cairo.\n\nBut they could not get through the gates. Outside the city walls were gathered tens of thousands of refugees, packed tightly upon the dusty ground like abandoned cattle. The Caliph had indeed opened the granaries, but the grain was nowhere near enough—each person could only receive a bowl of thin gruel per day, and queuing for it took hours.\n\nHassan stood in line, watching those ahead of him take their rations one by one. When his turn came, only a few dregs remained in the pot. The soldier distributing the gruel shook his head: 'Come back tomorrow.'\n\nNafisa sat beneath a withered tree, holding her daughter. The little girl no longer cried—not because she was better, but because she no longer had the strength to cry. Her breaths grew shallower, like a lamp about to flicker out.\n\nHassan knelt beside his daughter and moistened her cracked lips with a drop of water from his finger. The infant's eyes fluttered open, glanced briefly at her father, and then closed again.\n\n'God,' Hassan prayed in a low voice, 'if You must punish someone, punish me alone. Do not take my daughter. She is only one year old. She knows nothing yet.'\n\nNo one answered him."
EDG_FDMEvents.113.a: "Waiting for the dawn"
EDG_FDMEvents.114.title: "The Last Prayer"
EDG_FDMEvents.114.desc: "The little girl died before dawn.\n\nNafisa discovered it first. When she awoke, the body in her arms had gone cold and stiff. She did not scream, did not weep—she simply wrapped her daughter in her headscarf, gently laid her upon the ground, and went to Hassan's side.\n\n'Hassan,' she said, her voice eerily calm, 'our daughter is gone.'\n\nHassan knelt before his daughter's body and was silent for a long time. He wanted to weep, but his tears had long run dry. He wanted to rage, but did not know where to direct his fury. At God? At the Caliph? At the Nile? Or at this cruel world?\n\nIn the end, he simply reached out and gently stroked his daughter's cold cheek. 'May you have bread without end and water without end in heaven,' he whispered. 'May you never have to suffer again.'\n\nNafisa sat beside him and took his hand. The two sat together in silence, watching the eastern sky slowly grow light.\n\nWhen the sun rose, Hassan stood up. He did not bury his daughter—the ground was too hard; he had no strength to dig. He simply placed her beneath the withered tree and covered her face with a few stones.\n\n'Come,' he said to Nafisa. 'We still have a long road ahead.'"
EDG_FDMEvents.114.a: "May God bless her soul"
EDG_FDMEvents.115.title: "A Nameless Father"
EDG_FDMEvents.115.desc: "The empire's calamity finally came to an end.\n\nThe Nile resumed its normal flooding; the cracked riverbeds were once again covered with rich silt; tender green wheat shoots grew once more in the fields. The Caliph's decrees had spread throughout Egypt; the irrigation works were repaired; the shadow of famine was dissipating. The calls of traders rang out again in Cairo's markets; children chased each other through the streets—as if nothing had ever happened.\n\nBut some things had been lost forever.\n\nOutside the walls of Cairo, on a patch of wasteland, stood a withered tree. Beneath it lay a pile of stones, and beneath those stones was a tiny body. No one knew her name. No one remembered she had ever existed. She had lived but one year, not old enough even to learn to say 'father.'\n\nHassan did not return to his fields. He and Nafisa remained in Cairo, joining the city's countless beggars. He no longer prayed, no longer spoke; he simply sat each morning at the foot of the city wall, staring blankly at the passing crowds, his eyes as hollow as a dried-up well.\n\nNafisa would sometimes lead him to the mosque, but he would only kneel there in silence. When she asked why he no longer prayed, he was silent for a long time, and finally said:\n\n'When my daughter died, I was praying. God did not answer me. Now, I do not know what to say to Him anymore.'"
EDG_FDMEvents.115.a: "His grief is as old as the Nile, and as heavy as the land of Egypt."

EDG_FDMEvents.116.tt: "This event belongs to the §TRed Sea Predicament§! event group."
EDG_FDMEvents.116.title: "Twilight Over Alexandria"
EDG_FDMEvents.116.desc: "As the sun sank low, the skyline of Alexandria was dyed a bloody red.\n\nThe once-busy docks now lay desolate, with only a few dilapidated fishing boats bobbing in the waves. The warehouses that had once overflowed with Indian spices and Chinese silks now stood empty, their shelves bare and thick with dust. Old Captain Hassan stood upon the quay, gazing at the dead port before him, his eyes filled with bewilderment.\n\n'Thirty years ago,' he murmured to himself, 'a hundred merchant ships passed through here every day. Merchants from Venice, Genoa, and Barcelona would fight over the finest spices. My father made his fortune shipping spices.'\n\nThe young sailor beside him asked: 'And now?'\n\nHassan pointed to the distant horizon with a bitter smile: 'Now? Now they all sail around the Cape of Good Hope and go straight to India. Who needs us anymore?'\n\nThe decline of Alexandria was not merely a shift in trade routes—it was the severing of the empire's economic lifeline. Those generations of merchants, boatmen, porters, and warehouse keepers who had lived by the transit trade now found themselves without a livelihood. Their resentment was building, like magma beneath the earth, ready to erupt at any moment."
EDG_FDMEvents.116.a: "Accept reality—this is the beginning of a new age"
EDG_FDMEvents.116.b: "Forcefully retain the merchants with subsidies"
EDG_FDMEvents.117.title: "The Bankrupt Spice Merchant"
EDG_FDMEvents.117.desc: "Cairo's wealthiest spice merchant, Abd al-Rahman ibn Mahmud, knelt before the Caliph's palace, weeping uncontrollably.\n\nHis family had traded in spices for three generations, and he had once been among the richest merchants in all of Egypt. Pepper, cinnamon, and cloves brought from India all passed through his warehouses before being re-exported across the Mediterranean. His caravans had once stretched for miles, the bells of his camels ringing from Suez all the way to Alexandria.\n\nNow, everything was lost.\n\nThe Portuguese ships rounded the Cape of Good Hope and brought spices directly from India, at half the price of the Red Sea route. Abd al-Rahman's goods sat piled in his warehouses, unsold. He was drowning in debt; bankers came calling every day; his wife and children had been forced to move out of their grand mansion into a hovel in Old Cairo.\n\n'Most high Caliph,' Abd al-Rahman sobbed, 'I beg for your mercy. We merchants are the pillars of the empire—if we all go bankrupt, the empire's economy will collapse. Please grant us some relief, that we may tide over this crisis.'\n\nThe ministers at court were divided. Some advocated relief for these merchants to preserve the empire's commercial foundations; others argued for letting them sink, and using resources on more pressing needs."
EDG_FDMEvents.117.a: "Grant them relief—these merchants are the empire's foundation"
EDG_FDMEvents_117_modifier_1: "The Caliph's Grace"
EDG_FDMEvents.117.b: "Turn a blind eye—let them fend for themselves"
EDG_FDMEvents_117_modifier_2: "The Merchant's Resentment"
EDG_FDMEvents.117.c: "Confiscate their assets and fill the treasury"
EDG_FDMEvents_117_modifier_3: "Merchants Flee the Fatimids"
EDG_FDMEvents.118.title: "The Rise of Piracy"
EDG_FDMEvents.118.desc: "Pirate banners once again flew upon the shipping lanes of the Red Sea.\n\nAs the imperial navy declined, the pirate forces that had once been suppressed rose again. Bedouin tribes along the Arabian coast, exiled nobles from Yemen, and even some disbanded imperial sailors had joined the dangerous trade. They sailed swift lateen-rigged vessels, ambushing merchant ships in the narrow channels of the Red Sea, plundering cargo, and kidnapping crews for ransom.\n\nA pirate fleet from Aden had even dared to attack an official imperial transport vessel, looting the silk and spices on board, worth a fortune. Even more shocking was that the leader of this pirate band was a former imperial naval officer who had mutinied because of unpaid wages.\n\n'These pirates are strangling our last remaining trade lifeline,' the naval minister reported with grave concern. 'If we do not act swiftly, the Red Sea will become nothing but a pirate haven.'\n\nBut the imperial treasury was empty; building new warships would require vast sums and time. Could we afford this costly naval campaign?"
EDG_FDMEvents.118.a: "Form an escort fleet to protect the merchant ships"
EDG_FDMEvents_118_modifier_1: "Red Sea Escort"
EDG_FDMEvents.118.b: "Buy off the pirate leader—turn an enemy into an ally"
EDG_FDMEvents.118.c: "Stand idle and concentrate resources on other crises"
EDG_FDMEvents_118_modifier_2: "Piracy Runs Rampant"

EDG_FDMEvents.119.title: "Hope from the Persian Gulf"
EDG_FDMEvents.119.desc: "A merchant from the coast of the Persian Gulf brought news that stirred the court.\n\nOn the far side of the Strait of Hormuz, our merchants had discovered a new trade route. Through the Persian Gulf, we could bypass the Portuguese-controlled Cape of Good Hope and establish direct contact with Gujarati merchants in northwestern India. Though this route was longer than the Red Sea, it avoided Portuguese interception.\n\n'Most high Caliph,' the merchant said excitedly, 'I saw those Indian merchant ships with my own eyes in Hormuz. They bring spices, cotton cloth, and gems, and at prices lower than the Portuguese. If we can invest in port facilities in the Persian Gulf and open a stable route from Basra to Hormuz, we can reclaim a share of the trade.'\n\nThe news stirred heated debate among the ministers. Some saw it as an opportunity for imperial revival; others feared that investing in the Persian Gulf would divert already strained resources.\n\n'The Persian Gulf?' the finance minister frowned. 'It is far from the empire's heartland and would require massive infrastructure investment. Do we truly have the capacity to maintain both the Red Sea and the Persian Gulf trade routes at once?'"
EDG_FDMEvents.119.a: "Invest in the Persian Gulf—seize this opportunity"
EDG_FDMEvents_119_modifier: "Persian Gulf Trade Route"
EDG_FDMEvents.119.b: "Abandon this opportunity and concentrate resources"
EDG_FDMEvents.120.title: "The Scholars of Cairo's Proposal"
EDG_FDMEvents.120.desc: "The scholars of the Al-Azhar Mosque submitted a detailed reform plan to the Caliph.\n\nThe plan ran to dozens of pages and covered many aspects of the economy, society, and culture. The scholars argued that the empire's economic model, which relied excessively on transit trade, was unsustainable and required fundamental reform. They recommended developing local handicrafts, particularly textiles, ceramics, and metalworking, to reduce dependence on imported goods.\n\n'We cannot forever fill our treasury with other people's goods,' the chief scholar said. 'We must create our own wealth. Cairo's artisans possess exquisite skills, but they lack capital and markets. If the Caliph can provide support, we can build our own manufacturing base.'\n\nThe plan also recommended expanding trade networks into the African interior, establishing links with Sudan and Ethiopia through the upper Nile to obtain gold, ivory, and slaves.\n\n'This is a long and difficult road,' the scholars acknowledged, 'but it is the only hope for the empire's revival.'"
EDG_FDMEvents.120.a: "Fund this research—embark on the path of reform"
EDG_FDMEvents.120.b: "Ignore this advice and maintain the status quo"
EDG_FDMEvents.121.title: "The Revival of Cairo's Handicrafts"
EDG_FDMEvents.121.desc: "The fruits of reform began to show.\n\nWith the Caliph's patronage, Cairo's artisans began experimenting with new production techniques. Textile techniques learned from India were combined with local traditional methods to produce a unique cotton cloth of high quality at reasonable prices. This cloth soon found markets in North Africa and the eastern Mediterranean.\n\nThe ceramic craftsmen were not far behind. Drawing from Chinese porcelain-making methods and incorporating Islamic geometric patterns, they created ceramic wares of distinctive style. These products sold well not only domestically but were also exported to Europe, becoming prized collector's items among the nobility.\n\nThe metalworking industry also achieved breakthroughs. Cairo's blacksmiths invented a new steel-making technique, producing blades of quality rivaling Damascus steel. These weapons not only met the imperial army's needs but also became important export goods.\n\n'Praise be to God,' the chief scholar said with emotion, 'we have found a new way forward. Though we cannot restore our former trade monopoly, at least we are no longer dependent on others.'"
EDG_FDMEvents.121.a: "Continue to support handicraft development"
EDG_FDMEvents_121_modifier: "Cairo Manufacturing."
EDG_FDMEvents.121.b: "Cut funding and stop while we are ahead"
EDG_FDMEvents.122.title: "The End of the Holy Roman Emperor"
EDG_FDMEvents.122.desc: "The Holy Roman Emperor knelt before the Caliph's throne.\n\nHis purple imperial robes had been stripped away, replaced by a coarse linen prison tunic. The jewel-encrusted crown lay discarded in a corner of the hall like a piece of trash. His hands were bound in iron chains, and every movement he made produced a harsh metallic clatter.\n\nWas this the same man who had once styled himself 'Protector of Christendom' and 'legitimate heir of the Roman Empire'? Was this the same man who had led Crusades against the East, vowing to wipe the Islamic world from the map?\n\n[Root.Monarch.GetName] looked down upon the kneeling old man, a cold smile curling at the corner of his lips. 'Look up,' he commanded.\n\nThe Emperor slowly raised his head. His once-haughty face was now covered in grime and exhaustion. His lips trembled as if he wanted to speak, but only a low sob escaped.\n\n'You once dreamed of conquering Cairo,' [Root.Monarch.GetName] said, his voice cold as iron, 'you once dreamed of trampling the Fatimid banner underfoot. And now you kneel here, while your empire has crumbled to ashes. Our green banners fly from the walls of Vienna; your princes vie to pledge allegiance to me; your Pope is now my prisoner.'\n\nThe Emperor's body began to tremble; tears streamed down his cheeks.\n\n'God is the Greatest,' [Root.Monarch.GetName] rose to his full height, looking down upon the erstwhile Emperor, 'and you are nothing but dust upon the pages of history.'"
EDG_FDMEvents.122.a: "Take him away—let the world see the fate of those who blaspheme"

EDG_FDMEvents.123.title: "The Trial of the King of France"
EDG_FDMEvents.123.desc: "When the King of France was brought to Cairo in chains, his fleur-de-lis banners had already been torn to shreds.\n\nThe soldiers forced him to kneel upon the stone floor of the hall, but his back remained straight, his chin raised, his arrogant blue eyes burning with defiance. His lips were pressed tightly together, as if enduring some great agony—not of the body, but of dignity trampled underfoot.\n\n'The King of France does not kneel to infidels,' he said, his voice hoarse but stubborn. 'That is a rule passed down by my ancestors.'\n\n[Root.Monarch.GetName] did not grow angry. He merely smiled coldly, descended from his throne, and walked before the king. 'Your ancestors?' He looked down upon his captive. 'Your ancestors once led Crusades to this land, dreaming of conquering our faith with fire and sword. Their bones have long turned to dust, yet we still stand here.'\n\nThe king's eyes dimmed for a moment, but soon regained their cold composure. 'What will you do with me?'\n\n'Do with you?' [Root.Monarch.GetName] reached out, seized the king's chin, and forced him to look up. 'I will do nothing to you. I will let you live—let you watch your kingdom submit beneath the Fatimid banner with your own eyes. Watch your nobles bow to me, watch your churches turned into mosques, watch your people learn to fear God under our rule.'\n\nThe king's face turned pale, but he did not beg for mercy. He simply closed his eyes, as if awaiting the final judgment.\n\n'Take him away,' [Root.Monarch.GetName] released his grip and turned back toward his throne. 'Let him ponder in his cage how small the fleur-de-lis of France is before the crescent of the Fatimids.'"
EDG_FDMEvents.123.a: "Pride is the greatest sin—and he has paid the price"
EDG_FDMEvents.124.title: "The King of Britain Kneels"
EDG_FDMEvents.124.desc: "The King of Britain knelt upon the docks of Cairo.\n\nHis crown had been removed and placed at the feet of [Root.Monarch.GetName]. That jewel-encrusted golden crown, which had once symbolised the glory of the 'empire on which the sun never set,' was now a trophy of Fatimid victory. The docks were crowded with onlookers, all watching as the monarch who had once ruled half the world submitted to the Caliph of the East.\n\nThe king's queen and young prince stood behind him, their faces etched with fear and humiliation. The prince clung tightly to his mother's skirt, not daring to look up at the Fatimid soldiers surrounding them.\n\n'I, King of England,' the king's voice was hoarse and trembling, 'hereby surrender to the Fatimid Caliph. I offer my freedom in exchange for the safety of my people.'\n\n[Root.Monarch.GetName] did not answer immediately. He bent down, picked up the crown, weighed it in his hands, and tossed it to an attendant beside him. 'Put this in the treasury,' he said. 'Let all see how the once-invincible King of Britain bowed before the Fatimids.'\n\nThe king's face turned pale, but he said nothing. He knew that from this moment on, his name would forever be linked with shame.\n\n'Your fleets lie at the bottom of the sea,' [Root.Monarch.GetName] said, his voice cold as iron. 'Your colonies have raised our banners. Your people shall learn under our rule what true order means. From this day forward, Britain is no longer master of the seas—it is a vassal of the Fatimids.'\n\nThe king lowered his head and was silent for a long time. At last, he whispered: 'May God have mercy on Britain.'\n\n'God will have mercy only on those who submit,' [Root.Monarch.GetName] turned and walked away, leaving the king kneeling in the dust of the quay. 'And you, have learned submission.'"
EDG_FDMEvents.124.a: "Master of the seas? No—from this day forward, there is only one master"
EDG_FDMEvents.125.title: "The Twilight of the Palaiologoi"
EDG_FDMEvents.125.desc: "When the last heir of the Palaiologoi was brought into the great hall of Cairo, his hands were bound in iron chains, and a leather collar was fixed around his neck—the mark Fatimid soldiers placed upon their captives.\n\nHe was a young man, fine-featured, but with no light left in his eyes. His purple robes had been stripped away, replaced by a tattered prison tunic. His crown, his sceptre, his sword—all had become Fatimid spoils.\n\nBut in his hands, he clutched one thing tightly: a small icon, depicting the Virgin Mary holding the infant Jesus. The frame was worn, the paint chipped in places, yet his grip upon it was unwavering, as if it were his last lifeline.\n\n'Put it down,' commanded [Root.Monarch.GetName].\n\nThe young man raised his head, his eyes flashing with fear that was quickly replaced by defiance. 'No,' his voice trembled but remained firm. 'This was left by my ancestors. I cannot give it up.'\n\n[Root.Monarch.GetName] smiled coldly, descended from his throne, snatched the icon from the youth's hands, raised it high, and hurled it to the ground. The glass shattered, fragments scattering in all directions. The young man let out a cry of anguish, fell to his knees, and tried to gather the pieces.\n\n'Your empire is no more,' [Root.Monarch.GetName] looked down upon the young man kneeling and weeping on the floor. 'Your ancestors, your faith, your pride—all have turned to dust. From this day forward, Rome is no longer the centre of the world. Cairo is.'\n\nThe young man did not answer. He knelt upon the ground, clutching the broken shards of the icon, tears falling upon the cold stone.\n\n'Take him away,' [Root.Monarch.GetName] turned and walked toward his throne. 'Let him ponder in his cage what it means to witness the fall of a two-thousand-year empire.'"
EDG_FDMEvents.125.a: "The glory of Rome? Merely another name trampled beneath the feet of the Fatimids"

EDG_FDMEvents.126.title: "The Silence of the Dalai Lama"
EDG_FDMEvents.126.desc: "Among all the captive rulers, the Dalai Lama was the quietest.\n\nHe wore no ornate robes, no jewel-encrusted hat—only a simple red monastic gown, barefoot, sitting cross-legged on the floor of the great hall. He did not kneel, but sat, as if he were not awaiting judgment but meditating in a monastery.\n\nHis face was serene as a still pool—no fear, no anger, no sorrow, only a tranquility that transcended the mundane. When [Root.Monarch.GetName] entered the hall, the Dalai Lama did not even open his eyes.\n\n'Stand up,' the Caliph commanded.\n\nThe Dalai Lama did not move.\n\n'I said stand up!' the Caliph's voice rose.\n\nThe Dalai Lama slowly opened his eyes, his deep gaze reflecting the figure of [Root.Monarch.GetName]. 'Why should I stand?' his voice was soft but firm. 'Before God, all should kneel. And in my faith, sitting in stillness brings one closer to truth than standing.'\n\n[Root.Monarch.GetName] smiled coldly and walked before him, looking down upon this monk from the snowy plateau. 'Your faith?' his voice dripped with contempt. 'Your faith could not protect your country, could not protect your people, could not even protect yourself. You kneel here, while your temples have been occupied by our soldiers, your followers scattered by our armies, your snowy mountains brought to submission beneath the Fatimid banner.'\n\nThe Dalai Lama said nothing, only gazing quietly at the Caliph, his eyes holding not fear but an unfathomable peace.\n\n'Take him away,' [Root.Monarch.GetName] turned and walked off. 'Let him ponder in his cage just how much his faith is worth.'\n\nAs the Dalai Lama was led away, his lips moved slightly, as if chanting something—perhaps a prayer, perhaps a mantra, or perhaps only a sigh."
EDG_FDMEvents.126.a: "Faith? Before the swords of the Fatimids, faith is but a coward's excuse"
EDG_FDMEvents.127.title: "The Fall of the Son of Heaven"
EDG_FDMEvents.127.desc: "When the Emperor of China was brought to Cairo, he carried something that astonished all who saw it—a decree written on yellow dragon-patterned paper.\n\nThe decree read: 'By the Mandate of Heaven, the Emperor decrees: I, sovereign of ten thousand chariots, now bow before a ruler of foreign lands—this is indeed the will of Heaven. Yet though I am a captive, I do not lose the majesty of the Son of Heaven. If the Fatimid Caliph treats me with courtesy, I shall pledge brotherhood with him and share in peace. If he humiliates me, I shall die rather than submit.'\n\n[Root.Monarch.GetName] read the decree, let out a cold laugh, and tore it to shreds.\n\n'Son of Heaven?' He looked down upon this emperor from the East. 'Where is your Heaven? Where is your Son? Your empire has been levelled by our armies, your palaces reduced to ash by our flames, your consorts and princes taken captive. And you dare speak to me of the majesty of the Son of Heaven?'\n\nThe emperor's face turned pale, but he did not lower his head. 'I am ordained by Heaven,' his voice trembled but remained defiant. 'I may be imprisoned, but I cannot be humiliated. My bloodline shall endure forever, while your empire shall one day turn to dust.'\n\n[Root.Monarch.GetName] smiled coldly, walked before the emperor, reached out, and snatched the imperial jade seal from his hands—the last symbol of the Son of Heaven's dignity. He raised it high, then hurled it to the ground. The seal shattered, fragments scattering across the floor. The emperor let out a cry of anguish and fell to his knees.\n\n'Your Mandate of Heaven is at an end,' [Root.Monarch.GetName] turned toward his throne. 'From this day forward, the East is no longer the centre of the world—Cairo is. And you are nothing more than another failure crushed beneath the heel of the Fatimids.'\n\nThe emperor knelt on the ground, clutching the broken fragments of the jade seal, tears falling upon the cold stone. His empire, his dignity, his Heavenly Mandate—all had been reduced to nothing in that instant."
EDG_FDMEvents.127.a: "Son of Heaven? Before the Fatimids, nothing but another prostrate speck of dust"
EDG_FDMEvents.128.title: "The Pope's Cross"
EDG_FDMEvents.128.desc: "The news that the Pope of Rome had been brought to Cairo in chains shook the entire Islamic world more than any victory on the battlefield.\n\nWhen the old man in white robes and triple crown was led into the great hall, his steps were no longer steady, his face no longer serene. His triple crown had been taken from him, his white robes were covered in dust, his hands bound in iron chains that clattered with every step.\n\nWas this the man who had once styled himself 'Vicar of Christ on Earth' and 'Successor of Saint Peter'? Was this the same Pope who had called for Crusades, dreaming of erasing the Islamic world from the map?\n\nThe Pope stopped before the Caliph, slowly lowered his head, and removed from his neck the golden cross—a sacred relic passed down through generations of popes for a thousand years—and held it in his hands, raising it to his chest.\n\n'I, Bishop of Rome,' his voice was ancient and weary, 'hereby acknowledge that the Fatimid Caliph is the mightiest ruler of this age.'\n\n[Root.Monarch.GetName] did not answer. He smiled coldly, descended from his throne, snatched the cross from the Pope's hands, raised it high, and hurled it to the ground. The metal shattered, fragments scattering, and the Pope let out a cry of anguish as he fell to his knees.\n\n'Your God could not protect you,' [Root.Monarch.GetName] looked down upon the weeping old man kneeling on the floor. 'Your cross could not save you. Your faith could not stop the Fatimid armies from trampling your Rome. From this day forward, the age of Christendom has ended; the age of Islam has only just begun.'\n\nThe Pope said nothing. He knelt upon the ground, clutching the broken fragments of the cross, tears falling upon the cold stone.\n\n'Take him away,' [Root.Monarch.GetName] turned toward his throne. 'Let him ponder in his cage whose world it is now—the world he once dreamed of conquering.'"
EDG_FDMEvents.128.a: "The cross has shattered; the crescent shall forever illuminate this world"