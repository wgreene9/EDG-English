EDG_FDM_tear_of_iset_disaster: "§TThe Tears of Isis§!"
EDG_FDM_tear_of_iset_disaster_tt: "--------------\n\"We tested them with suffering and hardship, that they might humble themselves. When Our command came, they did not act justly, and they did not take heed.\" — Qur'an 7:94-95\n\nIsis was a goddess of ancient Egyptian religion, whose worship spread throughout the Greco-Roman world. She was revered as the ideal mother and wife, as the protector of nature and magic. It was believed that the annual flooding of the Nile was the sorrowful tears of Isis weeping for Osiris. Thus, every year, rituals re-enacting the death and rebirth of Osiris were performed.\n\nBut the Nile—which nourished our forefathers and witnessed the first glory of the Fatimids—now defies the natural order observed for millennia.\n\nUnprecedented drought has reduced the annual flood, which once came like clockwork, to nothing; cracked riverbeds scar the land of Egypt like ugly wounds. And when the rare rainstorm does come, it turns into a violent deluge, destroying dikes, villages, and vast fields of wheat.\n\nThe awesome power of nature has mercilessly laid waste to this once-fertile land that served as the breadbasket of the eastern Mediterranean. Farmlands lie barren, harvests have failed, and terrible hunger and despair spread throughout the Nile Valley. In the eyes of the native Egyptians, this is divine punishment upon us foreign rulers. The 'betrayal' of this ancient river has not only pushed the empire's agriculture and finances to the brink of collapse, but also driven our already precarious legitimacy to the edge of the abyss.\n\nIf we cannot quickly raise funds to repair the irrigation works, relieve the afflicted, and weather this natural catastrophe, our forefathers' grand dream of reclaiming our homeland will be buried beneath this famine-stricken mire."
EDG_FDM_tear_of_iset_disaster_can_start_tt: "The §YNile§! has been struck by a §Rsevere natural disaster§!"
EDG_FDM_tear_of_iset_disaster_can_end_tt: "Overcome the Nile's calamity and restored production"
EDG_FDM_tear_of_iset_disaster_ended_tt: "The disaster §TThe Tears of Isis§! has ended"


EDG_FDM_plight_of_the_red_sea_disaster: "§TThe Red Sea Predicament§!"
EDG_FDM_plight_of_the_red_sea_disaster_tt: "--------------\n\"For the custom of the Quraysh—their winter and summer journeys. Let them worship the Lord of this House, Who has fed them against hunger, and made them safe from fear.\" — Qur'an 106:1-4\n\nBy virtue of its control over Egypt and the Red Sea, the Fatimid dynasty held the throat of Eurasian trade in its grip. Spices from India and silks from the East—all passed through our customs houses at Suez and Alexandria without exception. The immense tolls and monopoly profits filled the imperial coffers, allowing us to maintain an invincible army and make Cairo the centre of the world.\n\nYet when Portuguese and Spanish explorers rounded the Cape of Good Hope in their caravels, the course of history took a fatal turn. The new sea route to India, opened by European infidels, struck at the very foundations of our economic system. Merchant ships laden with spices no longer sailed into the Red Sea, but directly into the harbours of Lisbon; the bustle of Alexandria's markets faded swiftly, replaced by silent, towering warehouses. The collapse of customs revenues brought the imperial machinery, so heavily dependent on trade dividends, to a grinding halt.\n\nWhat made matters worse was that the financial exhaustion prevented us from maintaining the large Red Sea patrol fleets, nor could we afford to appease the Arab tribes along the coast who lived by trade. Bankrupt merchant guilds harboured resentment; pirates and regional separatists took advantage of the chaos to revive their activities along the Red Sea and the Hijaz. In this age of great voyages, the empire faces an unprecedented economic suffocation—if we cannot mount cannons on the waves of the Indian Ocean to break the infidel monopoly, or promptly discover new sources of revenue for the empire, this once-glorious economic edifice will surely crumble."
EDG_FDM_plight_of_the_red_sea_disaster_can_end_tt: "All of the following conditions must be met:\n— Our §YHome Trade Node§! is located in an §YEnd Node§!\n— We have the highest §YTrade Power§! in our §YHome Trade Node§!\n— Our §YHome Trade Node§! has the highest §YTrade Value§! in the world"



#Government Reforms
EDG_FDM_Fatima_caliph_reform: "Fatimid Caliphate"
EDG_FDM_Fatima_caliph_reform_desc: "In 909, Ubayd Allah, the Shi'a leader in Tunisia, proclaimed himself Caliph, claiming descent from Fatimah and Ali. As the Fatimid Caliphate's legitimacy derives from Ali, it is inextricably bound to Shi'a Islam.\n\nThe Fatimid dynasty's foundation rests upon the sanctity of the Imam as a descendant of the Prophet. The Caliph is not merely a temporal sovereign, but the supreme religious leader and spiritual guide of the Shi'a Ismaili faith. Under this system, imperial authority and religious authority are highly unified; the law of the state is sacred law, and the realm of the state is a bastion of truth. Every decree of the Caliph is regarded as revelation from a divine source, and this absolute spiritual appeal grants the state immense cohesion. However, this system also demands that the ruler maintain his sacred image at all times—any failure in temporal affairs may be interpreted as a loss of divine favour. Under this system, the state is guided by religion, dedicated to raising the pure banner of Shi'a Islam in the turbulent Islamic world."
sanction_holy_war_claims_tt: "Gain §Permanent Claims§! on all adjacent §YRegions§!, with each province already claimed granting §Y1§! point of §YArmy Tradition§!."
EDG_FDM_provincial_supervision_reform: "Provincial Supervisory System"
EDG_FDM_provincial_supervision_reform_desc: "The Fatimid dynasty long remained wary of the iqta logic of exchanging land for loyalty, instead relying on the Diwan system to strengthen fiscal and military oversight over the provinces. Through the appointment of rotatable provincial officials and the establishment of regular audits and tax register verification, the central government weakened the private control of local military aristocrats over land and revenue sources. Provincial military expenditure was primarily funded by the imperial treasury, and military and administrative responsibilities were divided and codified in written procedures. This maintained frontier mobilisation capacity while preventing regional fragmentation and dynastic rule. The core objective of this reform was to replace feudal fiefs with bureaucratic oversight and fiscal penetration, ensuring the Caliphate's sustained control over its territories."
EDG_FDM_wazir_centered_bureaucracy_reform: "Wazir-Centric Bureaucracy"
EDG_FDM_wazir_centered_bureaucracy_reform_desc: "When the Caliph was absorbed in spiritual contemplation or unable to govern personally, the Grand Wazir became the de facto master of the empire. The Fatimid dynasty established a highly professionalised bureaucratic system, with the Grand Wazir serving as a 'dual ruler' overseeing both civil and military affairs. Through a rigorous system of memorials and hierarchical reporting, he managed the empire's complex affairs with efficiency. This system greatly improved administrative efficiency, reduced delays in court decision-making, and allowed a class of talented but humble-born bureaucrats to rise. The Grand Wazir's power reached its zenith; he could even depose Caliphs or enact major policy shifts. This was an age of elite bureaucrats, where the rudiments of rule of law gradually replaced the edge of noble swords in the hands of scribes."
EDG_FDM_multicultural_guard_reform: "Professional Guard System"
EDG_FDM_multicultural_guard_reform_desc: "To reduce dependence on any single aristocratic class, the Fatimid dynasty established a multi-ethnic guard: Turkic cavalry provided mobility, North African Berber infantry offered loyalty, and Sudanese infantry were renowned for their fearlessness. This 'divide and rule' multicultural structure was essentially a sophisticated political balancing act. The subtle rivalries between the various corps ensured that no single faction could launch a coup in the capital. Although this army was extremely costly to maintain and often erupted in ethnic conflicts, it secured the Caliph's position as the supreme arbiter. This was a war machine loyal to pay and the Caliph's authority—the empire's final card in surviving the chaos of a world beset by wolves."
EDG_FDM_diwan_centralization_reform: "Diwan Centralisation"
EDG_FDM_diwan_centralization_reform_desc: "The Diwan was not merely the central financial department, but the central nervous system of the empire. Through comprehensive tax reform, population censuses, and currency management, the Fatimid government achieved precise control over national wealth. The reformed Diwan eliminated middlemen's withholdings through rigorous auditing and anti-corruption mechanisms, ensuring that every coin of tax revenue flowed into the treasury. This process entailed a contraction of power: local lords lost their final say over taxation, and imperial finance entered an era of quantitative management. As gold and silk accumulated in Cairo, shrewd financial operations allowed the Caliph not only to maintain a formidable army but also to fund vast scientific and cultural projects, making Egypt under Fatimid rule the economic heart of the Mediterranean world.

EDG_FDM_dawah_intellectualism_reform: "Islamic Scholarly Tradition"
EDG_FDM_dawah_intellectualism_reform_desc: "Fatimid rule relied not only on the sword, but also on the Dawah system—the propagation of ideas. This reform united religious mission, scientific research, and higher education. The state established an institution known as the 'House of Wisdom,' gathering astronomers, mathematicians, and jurists, and integrating Ismaili speculative philosophy into state education. This enlightened academic atmosphere not only advanced production technology but also enhanced the empire's appeal to intellectuals. The Dawah organisation reached deep into grassroots communities, incorporating non-Muslim settlements into the empire's civilisational order. Through these means, the Fatimid dynasty built a soft power hegemony, extending its cultural influence far beyond its military borders—realising the ideal of 'governing the realm through wisdom.'"
EDG_FDM_majlis_al_shura_reform: "Majlis al-Shura (Consultative Council)"
EDG_FDM_majlis_al_shura_reform_desc: "As imperial governance grew increasingly complex, reliance on palace decrees alone could no longer sustain order. The Majlis al-Shura, composed of religious scholars, local notables, and senior bureaucrats, assumed responsibility for policy deliberation and interest coordination. It provided the Caliph with an institutionalised advisory platform, ensuring that major decisions were no longer wholly dependent on personal will, but formed through multi-party debate into more robust consensus. By incorporating elites into political consultation, the court was able to mitigate regional centrifugal tendencies and enhance the implementability of reforms. Although this mechanism could slow decision-making, it significantly improved governing legitimacy and social stability."
EDG_FDM_mediterranean_hub_reform: "Mediterranean Hub"
EDG_FDM_mediterranean_hub_reform_desc: "The Fatimid dynasty positioned itself as a maritime intermediary linking the Maghrib, the Levant, and the Red Sea trade network. Through reforming port tariffs, expanding dockyards and warehouses, and strengthening customs oversight, the state wove Cairo and its coastal emporia into an efficient commercial network. Merchants, silver, gold, and spices converged here; the extension of trade routes in turn spurred diplomacy and naval development. This reform not only increased the state's tariff revenues and market influence, but also allowed the empire to wield greater leverage in Mediterranean power struggles, gradually converting economic advantage into strategic advantage."
EDG_FDM_ismaili_rationalism_reform: "Ismaili Rationalism"
EDG_FDM_ismaili_rationalism_reform_desc: "At the intersection of doctrinal interpretation and state governance, Ismaili Rationalism emphasises the unity of order, law, and rational deduction. The Fatimid court used this approach to strengthen central authority over legal, judicial, and administrative interpretation, subsuming complex political realities into a framework that could be argued and enforced. It suppressed the disparate voices of local religious authorities and provided a clearer ideological foundation for state mobilisation. As institutional discipline deepened, the empire demonstrated greater resilience in the face of internal strife and external threats, trading political concentration for long-term stability."
EDG_FDM_constitutional_caliphate_reform: "Constitutional Caliphate"
EDG_FDM_constitutional_caliphate_reform_desc: "As the empire entered a new political phase, Caliphal authority began to operate in parallel with codified institutions. The Constitutional Caliphate system did not weaken the religious core, but rather defined official jurisdictions, policy procedures, and oversight responsibilities, preventing power from descending into chaotic competition during crises. The civil service could operate under clearer rules, and major state policies could gain sustained cross-factional support. At the same time, the state integrated different interest groups through institutionalised coordination mechanisms, making governance more consistent. This reform achieved a limited but crucial fusion between traditional sacred authority and the logic of modern state governance."
EDG_FDM_dualist_judicial_executive_reform: "Dualist Judicial-Executive System"
EDG_FDM_dualist_judicial_executive_reform_desc: "To avoid governance imbalances caused by excessive power concentration, the Fatimid dynasty clearly distinguished judicial adjudication from executive administration: the former maintained legal authority through a professional judge system, while the latter ensured policy implementation through the bureaucracy. This dual structure allowed the state, during a phase of simultaneous expansion and consolidation, to maintain both legal stability and administrative efficiency. Local disputes no longer easily escalated into political crises, and the court could defuse conflicts between bureaucrats and aristocrats through institutional channels. This measure strengthened the state's capacity to withstand turbulence, ensuring that the imperial machinery remained controllable and resilient even under heavy strain."

