#Events
EDG_FDMEvents.0.title: "In the Midst of the Yellow Sands"
EDG_FDMEvents.0.desc: "Sulayman ibn Dawud, descendant of Fatimah and Ali, the supreme Sayyid, the last blood of the Fatimid house. In 1185, his mother was secretly spirited out of Cairo, and he was born into freedom; yet secrets travel fast, and he was soon placed under house arrest by the Ayyubids in a heavily guarded compound in Cairo, like his father before him, a caged bird used by the Kurds to bolster their legitimacy. The years of captivity tempered his spirit; he would often lean from the upper floor to gaze upon Cairo, firm in the belief that this was the land his ancestors were destined to rule.\n\nOn the Night of Bara'ah in Sha'ban of the year 1205 AH, a band of brigands, taking advantage of the townsfolk's presence at mosque prayers, fell upon the city with pillage and slaughter, weaving fire and sword through every quarter. With the aid of a few loyal servants, Sulayman mingled with the fleeing mob and escaped, leading a small cavalcade westward, skirting Tunis—then held by Crusaders—until he reached the land of his forefathers' rise: the Maghrib. Enraged by the news, the Ayyubid Sultan al-Kamil Muhammad had every remaining member of the Fatimid house secretly executed, while official records attributed their deaths to smallpox.\n\nAt that time, the Almohad Caliphate was mired in the Tangier revolt, its eastern frontiers unravelling, with Kabylia and Tlemcen going their own ways. Sulayman raised his banner, and the long-suppressed Ismaili faithful hailed the advent of their living Imam. When he first arrived in the Maghrib, he had but eight riders at his side; by the time he stood before the walls of Kabylia, tens of thousands had flocked to his standard—owing less to his lineage than to his personal charisma.\n\nAfter Kabylia fell, the cities of the Maghrib submitted one after another. The Crusaders entrenched in Tunis, chastened by their disastrous defeat in Egypt, abandoned further eastern ventures and instead turned Tunisia into a kingdom of holy warriors, driving multitudes of Muslims westward into Kabylia at sword-point. Sulayman opened his gates to them, demanding only one thing: that none but the descendants of the Prophet held the natural right to rule.\n\nThe state he founded would later be known as the Later Fatimid Caliphate. For the next two centuries, his descendants ruled in orderly succession, reintroducing Egyptian methods of governance to this land, opening wheat fields along the humid coast, and within fifty years restoring North Africa to its Roman-era status as a granary. Kabylia became the nexus of the slave–gold trade with the Mali Empire; though the Berbers took to literacy and agriculture, the lure of great profit never deterred them from returning to raiding, and Western merchant ships gave their coasts a wide berth, while chronicles abound of churches and manors in Western Europe plundered and fair-haired Christians bound to camels and sent to the goldfields of Mali. Rumours spoke of another sea-route west of Mount Tariq that led to the land of gold, and in the spring of 1444, the Fatimid Sultan ordered the formation of a fleet to seek out this path to boundless wealth—perhaps they would venture even farther. And there was yet another, more tangible path: to exploit the chaos in Egypt and seize that fertile land as their ancestors once had."
EDG_FDMEvents.0.a: "Allah will guide us whither"
EDG_FDMEvents.0.a_tt: "“The most honoured of you in the sight of Allah is the most righteous of you.”\n— Qur'an 49:13\n\nGameplay Reminders:\n\n1. @FDM§YFatimids§! require a sound foundational understanding of the game; it is not recommended for players with fewer than §Y1000§! hours to play this nation, nor for those with fewer than §Y2000§! hours to attempt §YVery Hard§! mode, and §Rnever§! to attempt §YMythical Conqueror§! difficulty.\n\n2. Most of @FDM§YFatimids§!' mission tree requires that provinces be held §Ypersonally§!; it is not advisable to acquire subjects through §Yrelease§! or §Ytreaty§! during your campaign.\n\n3. @FDM§YFatimids§! are forcibly locked to §YShia§! Islam and the §YIsmaili§! rite. §RDo not attempt to convert to any other religion by any means§!, as this may severely break your game.\n\n4. After defeating @CDC§YTunisia§! and the @KTP§YKnights Templar§!, the disaster §TThe Path of Rebirth§! will trigger, granting you §Tsubstantial wartime bonuses§! to aid in reclaiming the ancestral lands of the @FDM§YFatimids§!, but also generating heavy §Raggressive expansion§!—use the mission tree mechanics wisely to manage the coalition.\n\n5. Should §TThe Path of Rebirth§! end in §Rfailure§!, you will enter the punitive disaster §RThe Sword of Despair§!—do everything in your power to avoid this.\n\n6. Aside from §RThe Sword of Despair§!, all disasters are §Tnarrative disasters§! and are not meant to be prevented."

EDG_FDMEvents.1.title: "The Fate of the Christians"
EDG_FDMEvents.1.desc: "The gates of Tunis at last collapsed under our onslaught. The banners of the Tunisian Crusaders were trampled in the mud; the surviving white-robed knights of the Knights Templar were either slain or taken captive, and those Frankish nobles who had styled themselves 'holy warriors' could no longer lord it over the land of our forefathers.\n\nYet when our iron horsemen rode into the streets of Tunis, Djerba, and Tripolitania, we were greeted not by jubilant Muslim brethren lining the way, but by towering church spires, Latin-speaking townsfolk with Provençal accents, and tens of thousands of Christian settlers who had either converted under Crusader rule or immigrated there. After two centuries of occupation, this was no longer the pure Shi'a haven that Ifriqiya had once been—the chimes of the Holy Chapel echoed over the ruins of Carthage, and Frankish merchant guilds held sway over the ports' trade.\n\nAt court, the radical Ismaili ulama cried out: 'The blood of these infidels is a festering sore left by the Crusaders upon our ancestral soil—only fire and sword can purge it!' But the pragmatic diwan officials warned with concern that forced conversion would instantly paralyse port commerce and plunge the coastal regions into protracted rebellion."
EDG_FDMEvents.1.a: "Cleanse our ancestors' land with the blood of the holy warriors!"
EDG_FDMEvents.1.b: "The servants of Allah forgive the lost sheep."
EDG_FDMEvents.2.title: "The Moroccan Question"
EDG_FDMEvents.2.desc: "The last sultan of the Marinid dynasty has fallen in the bloody battle of Tangier, and the ancient bronze gates of Fes have opened to our grand army. That narrow corridor winding between the Atlas Mountains and the Atlantic, that ancient land which bred Moroccan riders and Berber scholars, now formally rests beneath the banners of the Fatimids.\n\nYet Fes was never Shi'a soil. This is the bastion of the Maliki school, the seat of the Qarawiyyin Mosque, the very heart of Sunni learning in the western Maghrib. The fuqaha' of the city openly decry us as 'heretics who usurp the Prophet's name,' while Berber tribal leaders in the mountains curse our Caliph in their prayers. Every imam, every tribal elder, every merchant in the market of this land takes pride in the Sunni faith passed down through generations.\n\nTo truly incorporate this stubborn land into the empire, the edge of the conqueror's sword alone will not suffice. We must decide—whether to end this sectarian strife once and for all by the authority of the Imam, or to purchase stability and revenue from this new province through the Caliph's tolerance."
EDG_FDMEvents.2.a: "Purge the heretics of Fes and raise the Shi'a banner over the Qarawiyyin!"
EDG_FDMEvents.2.b: "The traditions of Morocco are worthy of respect."

EDG_FDMEvents.3.title: "The Legacy of the Almohads"
EDG_FDMEvents.3.desc: "The green banners atop the walls of Marrakesh have at last been struck down by our own hands. The Almohad dynasty, which once rose from the Atlas Mountains, swept across the western Mediterranean, and drove the Christians of Andalus into retreat, has finally met its end amid internal strife and decline. Our troops have marched across the square before Ibn Tumart's mausoleum and taken possession of that vast inheritance which once stood alongside our forefathers in North Africa.\n\nYet this inheritance is a double-edged sword. The Almohads, styling themselves 'Unitarians,' were notorious for their extreme legal puritanism, ruthlessly persecuting Shi'is, Jews, and indeed any Muslims they deemed 'impure.' Now we stand upon their ruins—those Sunni qadis they once patronised, those tribal warriors who have been reared for generations on anti-Shi'a sentiment, those jurists who grew up in the madrasas of Marrakesh—all eye our every move with sullen suspicion.\n\nAt court, some urge us to give them a taste of their own medicine, to repay the Almohad heirs as they once treated our ancestors; others argue that it was precisely their bigotry that destroyed the Almohads, and that we should not repeat their error."
EDG_FDMEvents.3.a: "Reply to Ibn Tumart's followers with his own flame!"
EDG_FDMEvents.3.b: "Let us prove, through tolerance, that the Shi'a path is the right one."
EDG_FDMEvents.4.title: "Dealing with the Berbers"
EDG_FDMEvents.4.desc: "From the snowy peaks of the Atlas to the sand seas of the Sahara, from the cliffs of the Rif to the olive groves of Kabylia, the Berbers—the most ancient inhabitants of this land—form the overwhelming majority of the empire's population. They ride camels and Arab horses, speak Tamazight, and under the starry sky follow tribal laws older than Islam itself.\n\nWhen our forefather Sulayman first landed in Kabylia, it was these very Berber tribes who raised the Fatimid banner. Yet two centuries have passed, and their loyalty has always remained fickle. The Sanhaja tribes of the high mountains still secretly observe their shamanic traditions; the Masmuda, though converted to Islam, cling stubbornly to the Maliki school of Sunni law; and the Zenata nomads drift with the winds of the steppe, pledging fealty to the Caliph today, and to any amir who offers greater reward tomorrow.\n\nAt court, the Shi'a zealots fume: 'These highlanders are Muslims in name, but infidels in truth! They must be made to choose on the scales—either become true Ismaili believers, or be dealt with as apostates!' But the seasoned viziers remind us that the Berbers are the backbone of the imperial army; if we drive them to rebellion, even the Maghrib itself will be reduced to ashes."
EDG_FDMEvents.4.a: "Before the scales, the Berbers must choose!"
EDG_FDMEvents.4.b: "The Berbers are the loyal shield of the Fatimids."
EDG_FDMEvents.5.title: "Conquering Fezzan"
EDG_FDMEvents.5.desc: "South of Tripoli stretches a sea of death that makes European cartographers tremble—the Sahara. Yet deep within this vast expanse of golden sand lies a string of emerald jewels: Fezzan. Murzuk, Ghat, Ghadames—these oasis cities, like beacons in the sand-sea, have since ancient times been the vital nodes of trans-Saharan trade, through which the gold, salt, ivory, and slaves of the Mali Empire in West Africa were transshipped to the Mediterranean.\n\nNow, after months of gruelling trekking, our camel cavalry and Berber guides have at last planted the crescent banner of the Fatimids upon the battlements of Murzuk. But conquest is only the beginning—the inhabitants of Fezzan are a motley mix of Tuareg tribes, Tebu peoples, and Arab merchants, many of whom follow a Sufi mysticism blended with African traditions that diverges sharply from orthodoxy, and some tribes still venerate pre-Islamic gods in the remote oases.\n\nThe strategic value of these oases is beyond compare—they are the final link in our chain to the gold trade with Mali. Yet if we impose Shi'a orthodoxy with an iron fist, those guides and caravanners who know every grain of desert sand will vanish overnight; if we let religious chaos reign, the sacred authority of the empire will be eroded away in the sands."
EDG_FDMEvents.5.a: "Let the light of Ismailism illuminate every oasis of the Sahara!"
EDG_FDMEvents.5.b: "The caravan routes of the desert matter more than the minarets of the mosques."

EDG_FDMEvents.6.title: "Pouring Oil on the Fire"
EDG_FDMEvents.6.desc: "Several galleys flying unfamiliar banners put into our harbour under cover of darkness.\n\nWhen the customs officials boarded them for inspection, they produced travel documents personally signed by the Fatimid Caliph [From.Monarch.GetName], styling themselves 'emissaries of the servants of God.'\n\nThese visitors from the distant Maghrib carried little in the way of ordinary merchandise; their holds were laden with silver, silk, gold from sub-Saharan Africa, and—far more deadly—a cache of secret letters, transcribed in both Arabic and Latin. These letters were destined for various Iberian courts: to Asturias, to Badajoz, to Madrid, to Lisbon.\n\nThe Shi'a Caliph seated in his Kabylian palace seemed well versed in an ancient truth—the more the Christians and Sunnis south of the Pyrenees tore at each other, the safer the Maghrib's coasts would be. To every malcontent he promised silver and gunpowder; to every lord coveting his neighbour's lands, he offered rosters of mercenaries. The Fatimid envoys were like sparks cast upon a pile of tinder, adding to the already volatile powder keg of Iberia a flame enough to kindle the entire peninsula."
EDG_FDMEvents.6.a: "The machinations of the Fatimids stand revealed"
EDG_FDMEvents.7.title: "Kicking a Man When He Is Down"
EDG_FDMEvents.7.desc: "Calamitous news arrived at the palace of Sahada, one after another.\n\nAt the empire's most vulnerable moment, the Fatimid Caliph in the far Maghrib dispatched envoys. They brought not consolation, but a cold ultimatum. The Fatimids invoked the two-century-old account of the Ayyubid massacre of the Fatimid royal house, declaring that Sahada, as the current 'usurper' of Egypt, must pay the blood price for that crime. Meanwhile, along the entire coast from Tunis to Alexandria, Fatimid fleets were gathering.\n\nThe distant gaze that [From.Monarch.GetName] had long fixed upon Cairo was now being transformed into ten thousand drawn scimitars surging toward the Nile. Our treasuries were long empty, our armies exhausted, and we could not even be certain which of the amirs around us remained trustworthy."
EDG_FDMEvents.7.a: "May God have mercy on the people of Sahada"
EDG_FDMEvents.8.title: "Return to Cairo"
EDG_FDMEvents.8.desc: "More than two centuries ago, the young Prince Sulayman had leaned from the upper floor of a heavily guarded compound in Cairo, gazing across the layered palace walls at that city held by the Ayyubid usurpers. He was firm in the belief that this was the land his Fatimid forebears were destined to rule; nor could he have imagined that that single distant gaze would plant in his descendants a fixation that would endure for over two hundred years.\n\nNow, as the Fatimid banner once again flutters above the Citadel of Saladin, as the minarets of the Al-Azhar Mosque again chant prayers for the Ismaili Imam, as the murmur of the Nile intertwines with the triumphant trumpets of the Caliph atop the walls of Cairo—that long-suppressed gaze of forefather Sulayman, held for two centuries, has at last been realised in the hands of his blood descendants.\n\nCairo—the 'City of Victory' founded by the forefather al-Mu'izz himself, which once witnessed the most glorious days of the Fatimid Caliphate—has at last returned to the embrace of the descendants of Ali. We decree that the imperial capital be moved from Kabylia back to this thousand-year-old metropolis, while retaining Kabylia as the empire's secondary capital and Mediterranean gateway. The bounty of the Nile shall once again nourish this land, and the markets, dockyards, and academies of Cairo shall, under Fatimid rule, enter a second golden age.\n\nThis is not merely a transfer of the capital, but a great homecoming spanning two hundred years and the entire Maghrib. The seeds sown by our forefathers in the yellow sands have at last borne their richest fruit upon the banks of the Nile."
EDG_FDMEvents.8.a: "May the glory of Cairo endure forever, and may the banner of the Fatimids never fall!"

EDG_FDMEvents.9.title: "Capturing the Abbasid Caliph"
EDG_FDMEvents.9.desc: "He who styled himself the successor of the Prophet and held spiritual sway over the entire Sunni world—the Abbasid Caliph—now kneels prostrate at our feet as a captive.\n\nFor centuries, this 'puppet of the spirit,' passed from hand to hand among sultans and amirs, has been the final banner by which the Sunni world denied the legitimacy of our Fatimid bloodline. After Baghdad fell to the Mongol hooves, this hollowed shell, long since dead in all but name, was sheltered in Cairo, maintained by successive rulers of Egypt to gild their own rule with a veneer of sacredness. In every Friday sermon, he pronounced, in the name of the 'Commander of the Faithful,' doctrines denying the orthodoxy of the Ismailis; on every decree sent to every corner of the Islamic world, he affixed the seal symbolising Sunni legitimacy.\n\nAnd now this 'Commander of the Faithful' kneels before us. His aged hands tremble; his clouded eyes are a mixture of fear, humiliation, and a lingering trace of arrogance. The entire Islamic world holds its breath—waiting to see how the direct descendants of Fatimah, daughter of the Prophet, and of Ali, will deal with this usurper who has stolen the title of Caliph for centuries."
EDG_FDMEvents.9.a: "Mutilate him and hang his corpse at the gates of Cairo!"
EDG_FDMEvents.9.a_tt: "All known §YSunni§! nations have their opinion of us changed by §R-100§!."
EDG_FDMEvents.9.b: "Cast him into the dungeons of Cairo, never to be released for all eternity"
EDG_FDMEvents.9.b_tt: "All known §YSunni§! nations have their opinion of us changed by §R-25§!."
EDG_FDMEvents.10.title: "[GetYear] Taxation Act"
EDG_FDMEvents.10.desc: "With war looming, the court at Kabylia burns with lamplight through the night. The vizier spreads out before the Caliph stack upon stack of tax registers, densely recording the output and population of every town and every estate in the empire.\n\nThe Franks of Tunis still lord it over our ancestral soil; the white-robed banners of the Knights Templar still hang high above the ruins of Carthage. To drive out these infidels to the last man, we shall need tens of thousands of scimitars, warhorses, and galleys—and all of that requires gold.\n\nThe vizier proposes two plans: the first, to levy a moderate war surtax upon the provinces according to custom, which, though it may draw grumbles from the populace, remains bearable; the second, to raise tax rates sharply and collect several years' dues in advance, which would fill the treasury at once, but at the cost of irreversibly eroding the tax base of every province."
EDG_FDMEvents.10.a: "Levy a moderate war tax; do not drain the pond to catch the fish."
EDG_FDMEvents.10.a_tt: "Every owned province will give us §G10§!¤."
EDG_FDMEvents.10.b: "Collect taxes in advance—spare no cost for the holy war!"
EDG_FDMEvents.10.b_tt: "Every owned province will lose §G1§! point of §YBase Tax§!, then give us §G25§!¤."
EDG_FDMEvents.11.title: "[GetYear] Conscription Act"
EDG_FDMEvents.11.desc: "From the minarets of the mosques, the muezzin's voice rings out more fervently than usual. The Caliph, in the name of the Imam, issues a conscription decree, calling upon every able-bodied Muslim within the empire to set down the plough and the balance, and take up the spear and the scimitar, to fight for the liberation of the ancestral holy lands.\n\nThe ports of Kabylia labour day and night building warships; Berber tribesmen pour ceaselessly down from the passes of the Atlas into the mustering grounds; even the madrasa students, who once knew only recitation, now drill with the blade. Yet the well of manpower is not inexhaustible—the vizier whispers in warning: if we take too many able-bodied men from the provinces, the harvest will go ungathered, and the famine of the coming year may prove no less deadly than the swords of the Franks.\n\nShall we levy according to the standing army's establishment, or call for a general mobilisation and pour out the full might of the realm?"
EDG_FDMEvents.11.a: "Conscript according to establishment; do not shake the foundations of the state."
EDG_FDMEvents.11.a_tt: "Every owned province will give us §G1000§! £icon_manpower£§YManpower§!."
EDG_FDMEvents.11.b: "General mobilisation—let every Muslim become a soldier of God!"
EDG_FDMEvents.11.b_tt: "Every owned province will lose §G1§! point of §YBase Manpower§!, then give us §G2500§! £icon_manpower£§YManpower§!."

EDG_FDMEvents.12.title: "Great Vengeance Fulfilled"
EDG_FDMEvents.12.desc: "The Red Palace of Córdoba has at last fallen beneath our iron hooves.\n\nThis palace, which once made all of Iberia tremble, was the stage upon which the Umayyad usurpers flaunted their might and wealth—while our forefathers raised the Shi'a banner in Cairo, they styled themselves the 'true Caliphs' in Andalus, using Sunni doctrine to deny the sanctity of the Fatimid bloodline. For centuries, two caliphates stood facing each other across the Mediterranean, their mutual hatred woven into every decree, every sermon, every Friday prayer.\n\nNow, history has at last delivered its verdict. Our banners fly along the banks of the Guadalquivir; the minarets of the Great Mosque of Córdoba shall again chant prayers for the Ismaili faith. Those Umayyad remnants who once boasted of being 'guardians of the faith' now cower in the ruins, awaiting the judgment of the victor.\n\nThe spirits of our forefathers al-Mu'izz and Ubayd Allah may at last rest easy—the centuries-old struggle for the caliphate between Shi'a and Sunni has today come to an end, with the final victory of the Fatimids."
EDG_FDMEvents.12.a: "“You were born in iniquity, so die in shame.”"
EDG_FDMEvents.13.title: "A Captive in Chains"
EDG_FDMEvents.13.desc: "The last city of the Sahada Empire has fallen in flame. The Grand Malik is dragged from the palace vault by the guards; his golden crown is long gone, his fine robes stained with soot and blood, and his once-vaunted eyes now hold only emptiness and terror.\n\nHe is brought before [Root.Monarch.GetName], his knees striking the cold marble floor with a heavy thud. The entire palace falls silent; all eyes converge upon this once-mighty conqueror.\n\nThe Grand Malik prostrates himself, his trembling voice echoing through the vast hall: 'Most high Caliph… descendant of the most holy Ali… I too am a Shi'a believer; I have never forsaken my loyalty to God… We never coveted the ancestral lands of the Fatimids unprovoked… I beseech you, for the sake of our common origin, to pardon this wretched sinner…'\n\n[Root.Monarch.GetName] rises slowly, gazing down at the quivering prisoner at his feet, his voice as cold as the winter wind: 'You call yourself a Shi'a believer, yet you seized Cairo, the city founded by our forefather al-Mu'izz; you speak endlessly of loyalty to Ali, yet you sat comfortably in the palaces of the Ayyubid usurpers, inheriting the legacy they stained with the blood of the Fatimid royal house. You handed Cairo over to the Abbasid puppet and fled to Faiyum to eke out your miserable existence, not even daring to dwell in the city of your forefathers—and you dare speak of loyalty?'\n\nThe hall falls deathly silent. [Root.Monarch.GetName] looks down upon the prostrate usurper."
EDG_FDMEvents.13.a: "“You are nothing more than yet another self-important pretender. Take him away.”"
EDG_FDMEvents.14.title: "The Path of Rebirth"
EDG_FDMEvents.14.desc: "“Verily, with hardship comes ease.” — Qur'an 94:5\n\nEver since Prince Sulayman escaped from Cairo and established his foundation in Kabylia, the Fatimid dynasty has trodden a path of rebirth fraught with peril.\n\nThe Maghrib was never a haven of peace, but a land of contending powers on every side. To our west and south we were surrounded by entrenched Sunni regimes that always viewed us—bearers of the Ismaili banner—as heretics; along the coastal belts to our east and north, ambitious Christians were consolidating the gains of their Crusades, seeking to turn Tunisia into a lasting kingdom of holy war.\n\nAmidst this chaos of encircling wolves, the fledgling realm had no path of retreat. To preserve the bloodline of the Prophet, we had to rely upon military prowess and diplomatic cunning to survive and expand within the narrow crevices. Subdue the defiant Berber tribes; dismantle Crusader rule; unite the scattered forces of North Africa into a single unified empire.\n\nBut this was only the beginning. All the bitter wars and efforts at reconstruction we undertook in the Maghrib were but a gathering of strength for a greater historical mission: to advance eastward along the Mediterranean, cross the endless deserts, and plant the Fatimid banner once again upon the walls of Cairo."
EDG_FDMEvents.14.a: "This will be a road of thorns and mud"
EDG_FDMEvents.14.a_tt: "Enter the disaster §TThe Path of Rebirth§!.\n\nThe following reminders are extremely important—please read them carefully!\n\n§TRemaining Time for The Path of Rebirth§! is a government capacity bar that grants you §Tsubstantial wartime bonuses§! and §Rmassive aggressive expansion§!. Make good use of the mission tree mechanics to keep the coalition in check.\n\nOtherwise, if a coalition forms and impedes your expansion, it may cause the §TRemaining Time for The Path of Rebirth§! timer to run out, resulting in the §TThe Path of Rebirth§! ending in §Rfailure§!, at which point you will enter the punitive disaster §RThe Sword of Despair§!. Spare no effort to avoid this outcome."

EDG_FDMEvents.15.title: "The End of the Path of Rebirth"
EDG_FDMEvents.15.desc.a: "“Verily, with hardship comes ease.” — Qur'an 94:5\n\nWhen the Fatimid banner at last fluttered once more above the walls of Cairo, when the minarets of the Al-Azhar Mosque again chanted prayers for the Ismaili Imam, when the murmur of the Nile intertwined with the triumphant trumpets over the Citadel of Saladin—from the barren shores of Kabylia to the thousand-year-old metropolis of Cairo, we had walked this road for far too long.\n\nMore than two centuries ago, the young Prince Sulayman, fleeing this city held by usurpers, cast one last glance back beyond the palace walls. That single gaze became a fixation lasting over two hundred years, became the blood and sacrifice of generation after generation in the sands of the Maghrib. Now, the final wish of our forefathers has at last been realised in our hands.\n\nThe Berber tribes of the Maghrib have been incorporated into the empire's domains; the remnants of the Crusaders have been driven to the far side of the sea; the entire coastline from Tripoli to Alexandria has returned to Fatimid rule. The bounty of the Nile shall again nourish this land, and the markets, dockyards, and academies of Cairo shall, under the Fatimid banner, enter a second golden age.\n\nThe spirit of our forefather al-Mu'izz may at last rest in peace. The thorns of the Path of Rebirth have been trampled flat, the mud washed clean—and we, at last, have come home."
EDG_FDMEvents.15.desc.b: "The hourglass of time has at last run dry of its final grain.\n\nWhen the countdown of the Path of Rebirth reached zero, [Root.Monarch.GetName] stood upon a barren hill outside the walls of Cairo, gazing upon that city which remained unbreached. The Fatimid banner could still only flutter over the deserts of the Maghrib, while the 'City of Victory' founded by our forefather al-Mu'izz still kept its gates shut against us, in the hands of usurpers.\n\nWhen we set out from Kabylia, we carried with us the ambition that spanned two centuries, vowing to bring the bloodline of the Prophet back to the banks of the Nile. But reality proved far crueller than the dream—the enemy's resistance was more tenacious than anticipated, the betrayals of allies more frequent, and our own strength more fragile.\n\nThe last wish of Prince Sulayman was not to be fulfilled in this generation. Did the blood of those soldiers who fell in the sands of the Maghrib flow in vain? Were the sacrifices of those who perished from sickness, hunger, and exhaustion on the long marches utterly meaningless?\n\nNo. As long as the blood of the Fatimids endures, as long as the Ismaili faith is carried on by even one soul, the Path of Rebirth will never truly end. It is merely postponed—awaiting a more capable heir to take up this unfinished journey once again.\n\nBut for now, we must face a bitter truth: the Path of Rebirth has failed."
EDG_FDMEvents.15.a: "With one campaign we reclaim our ancestral soil; ten thousand loyal souls salute our forebears."
EDG_FDMEvents_15_modifier: "§TThe Fatimids Reborn from Fire§!"
EDG_FDMEvents.15.b: "Though this body turn to dust upon the frontier, still shall it cry to the heavens against the northern wind."
EDG_FDMEvents.16.title: "The Lion Cub's Fangs"
EDG_FDMEvents.16.desc: "[Root.Heir.GetName] first set foot on the battlefield at the age of thirteen.\n\nIt was a punitive expedition against Berber rebels in the Atlas mountains. [Root.Monarch.GetName] had placed him in the baggage train of the main army, guarded by the most loyal Mamluk retainers, intending only that the boy should observe war from a safe distance. But when the rebel cavalry suddenly burst from a side valley, charging straight at the baggage train, the youth did not scream, did not hide—instead, he snatched up the scimitar of a fallen guard and cut down the first enemy to reach him.\n\nWhen [Root.Monarch.GetName] toured the camp after the battle, he found [Root.Heir.GetName] sitting among a heap of corpses, his blade notched and his robes splattered with gore. He was not weeping. He merely looked up at his father and said, in a voice unnervingly calm for his age: 'Their scimitars are too short, Father. Give me a spear next time.'\n\n[Root.Monarch.GetName] was silent for a long while, then turned and ordered his attendants: 'From tomorrow, have [Root.Heir.GetName] study tactics with the generals.'"
EDG_FDMEvents.16.a: "This child was born to be a warrior"
EDG_FDMEvents.17.title: "The Vizier's Classroom"
EDG_FDMEvents.17.desc: "After returning from the Atlas mountains, [Root.Monarch.GetName] placed [Root.Heir.GetName] under the tutelage of the eldest vizier in the court.\n\nThe old vizier did not hasten to instruct the boy in statecraft. Instead, he first set him to a seemingly tedious task—copying tax registers. For three full months, [Root.Heir.GetName] bent over mountainous piles of parchment, transcribing, character by character, the population, acreage, and output of every town in the empire. At first he complained bitterly, deeming it an insult to a prince. Until one day, he suddenly spotted a falsified figure in the registers—the tax assessment of a certain distant province had been reduced by thirty per cent, and the official responsible for its verification happened to be the vizier's own nephew.\n\nHe reported the matter to the vizier. The old man showed no surprise; he merely smiled faintly. 'You have finally learned. The first lesson of governing an empire is not how to issue commands, but how to read lies in numbers.'"
EDG_FDMEvents.17.a: "And lies are an essential lesson in life"

EDG_FDMEvents.18.title: "A Game of Chess in the Desert"
EDG_FDMEvents.18.desc: "After the conquest of Tunis, [Root.Monarch.GetName] took [Root.Heir.GetName] along the edge of the Sahara to the oases of Fezzan, to inspect the newly conquered trade routes.\n\nAt the camp outside Murzuk, [Root.Monarch.GetName] ordered stones laid out upon the sand to form a great map—from Tripoli to Ghadames, from Fezzan to the upper Nile, every oasis, every caravan route, every tribal encampment marked with precision. He pointed to the map and said to [Root.Heir.GetName]: 'You think war is a clash of swords? No. The true war is here.' He traced a line with his finger between Tripoli and Fezzan: 'Whoever controls this trade route holds the lifeblood of the entire western Mediterranean. And to control it, you need not more soldiers, but a wiser game.'\n\nThat night, father and son played chess by the campfire until dawn. [Root.Heir.GetName] lost seven games, but each lasted several turns longer than the last."
EDG_FDMEvents.18.a: "The realm is a chessboard; think three moves ahead"
EDG_FDMEvents.19.title: "Granaries and Swords"
EDG_FDMEvents.19.desc: "After the return to Cairo, [Root.Monarch.GetName] began to include [Root.Heir.GetName] in the core affairs of the court.\n\nThe first matter he was made to face alone was a famine. The Nile flood had come a full month later than usual; the granaries of Upper Egypt were nearly empty, while the grain merchants in Cairo took the opportunity to hoard and drove prices up threefold. The poor on the city's outskirts had begun gnawing on tree bark, and corpses were carried from the markets every day. At the same time, the generals in the field pressed incessantly for provisions—the soldiers at the front were also starving, and without resupply, the newly conquered provinces might well change hands again.\n\nBefore [Root.Heir.GetName] lay two paths: first, to forcibly requisition the merchants' stocks and sell them to the people and the army at fair prices—this would swiftly quell unrest and stabilise the front, but the merchant networks behind the grain dealers spanned the entire Mediterranean, and antagonising them meant severing the empire's commercial lifelines; second, to borrow from Genoese merchants to purchase grain, resolving the crisis through market means—but this debt would shackle the imperial finances for years to come.\n\n[Root.Monarch.GetName] did not decide for him; he merely waited in his study. Three days later, [Root.Heir.GetName] submitted his solution: forcibly requisition half the merchants' stocks at fair prices, borrow from Genoa for the other half in the empire's name, and simultaneously decree that grain price controls would remain in effect until the next harvest season.\n\n[Root.Monarch.GetName] read the plan, was silent for a long time, and finally said: 'You have learned something that many rulers never learn in a lifetime—among two imperfect choices, find the one that keeps you alive long enough to reach the next choice.'"
EDG_FDMEvents.19.a: "The empire needs grain, not the gratitude of merchants"
EDG_FDMEvents.20.title: "Irren"
EDG_FDMEvents.20.desc: "In the tradition of the Fatimid court, every royal child, before coming of age, undergoes a ritual called the 'Irren'—a word in the ancient Berber tongue meaning 'the fire of trial.'\n\n[Root.Heir.GetName]'s Irren was held in the desert outside Cairo. As the rite required, he had to spend three days and three nights alone in the wilderness, carrying no food, sustaining himself on only a waterskin and a short knife. He had to face not only scorching heat and hunger, but also the venomous snakes, scorpions, and wolves that lurked in the sands.\n\nWhen the dawn of the third day broke, the attendants who came to receive him found [Root.Heir.GetName] seated atop a great rock, surrounded by the carcasses of several wolves; his blade was chipped, his robes torn to shreds, his body covered in wounds and sand. Yet his gaze was clearer than ever.\n\n[Root.Monarch.GetName] personally draped a new white robe over him and pressed a small silver crescent mark upon his forehead. From this moment on, [Root.Heir.GetName] was no longer merely a prince—he was the 'Irren' of the Fatimids, one who had passed through the fire of trial and come of age."
EDG_FDMEvents.20.a: "One truly prepared to ascend to the Caliphate"

EDG_FDMEvents.21.title: "A Blood-Red Twilight"
EDG_FDMEvents.21.desc: "When the news arrived, [Root.Heir.GetName] was reviewing a tax register from Alexandria in the palace of Cairo.\n\nA cavalryman, drenched in blood, staggered into the great hall, fell to his knees, and with a voice hoarse almost beyond recognition, uttered those words: 'My prince… the Caliph… the Caliph has fallen in battle.'\n\nIt was a battle that should never have been fought. [Root.Monarch.GetName] had personally led the vanguard in pursuit of a fleeing rebel remnant, only to be ambushed in a narrow valley upstream on the Nile. Thousands of rebels, lying in wait among the reeds, suddenly burst forth and cut the vanguard in two. Nearly all of [Root.Monarch.GetName]'s personal guards perished; he himself, struck by several arrows, still fought on horseback until his mount was brought down by a spear, plunging both horse and rider into the Nile.\n\nWhen his body was recovered downstream, his hand still clutched that scimitar—the very blade that Prince Sulayman had carried when he fled Cairo, passed down through generations, and now passed once more into the hands of [Root.Heir.GetName].\n\n[Root.Heir.GetName] shed no tears. He rose slowly, took the blade covered in mud and blood, turned to face the astonished courtiers and commanders in the hall, and spoke in a low, resolute voice he had never heard from himself before: 'The banner of the Fatimids shall not fall.'\n\nThat day, [Root.Heir.GetName] formally ascended to the Caliphate. He was but [Root.Heir.GetAge] years old."
EDG_FDMEvents.21.a: "The banner of the Fatimids shall not fall"
EDG_FDMEvents.22.title: "Born in the Saddle"
EDG_FDMEvents.22.desc: "The first decree [Root.Monarch.GetName] issued after his accession was not a tax law, nor the appointment of a vizier—it was to don his armour, mount his horse, and lead the army on campaign.\n\nThe old generals tried to dissuade him: the new Caliph had only just lost his father; the period of mourning was not yet over; to march rashly might shake the morale of the army. [Root.Monarch.GetName] simply swung into the saddle, cast one look back at the walls of Cairo, and said quietly: 'My father's blood is not yet dry. If I hide in the palace now, those who killed him will think the Fatimids are finished.'\n\nHis horsemanship had been honed on the rugged trails of the Atlas; his swordsmanship tempered in the sands of the Sahara; his tactics awakened on the chessboard of the Fezzan oases. When he charged at the very head of the army, scimitar drawn and white robe streaming in the wind, the soldiers behind him understood at last—this young Caliph had not become a warrior upon inheriting the throne; he had been born to the saddle.\n\nIf his father's spirit could look down upon this sight, surely he would smile with quiet pride."
EDG_FDMEvents.22.a: "[Root.Monarch.GetName] shall lead the Fatimids to rebirth!"
EDG_FDMEvents.23.title: "The Fatimid Caliph Demands Conversion to Shi'a Islam"
EDG_FDMEvents.23.desc: "Envoys of the Fatimid Caliph have arrived at our court, bearing a decree sealed with the crescent seal. With the supreme authority of the Prophet's descendants, the decree demands that we renounce the Sunni faith and convert to the Shi'a Ismaili rite.\n\nThe envoy's tone was not one of negotiation, but of command. He warned that refusal of the Caliph's will would be regarded as treason against the bloodline of the Prophet, and that the Fatimid armies would not hesitate to punish those stubborn heretics. Yet conversion means abandoning the faith passed down through our generations; means proclaiming in our mosques doctrines we have never recognised; means confessing before our people that our own beliefs were in error.\n\nThis is a choice that touches both soul and survival."
EDG_FDMEvents.23.a: "We gladly accept the Caliph's rule"
EDG_FDMEvents.23.b: "Refuse"

EDG_FDMEvents.24.title: "Introduction to Caliphate Mechanics"
EDG_FDMEvents.24.desc: "As we are or control either the Sunni or Shi'a Caliphate, we have access to Caliphate-related mechanics."
EDG_FDMEvents.24.a: "We Are the Caliphate"
EDG_FDMEvents.24.a_tt: "We Are the Caliphate"
EDG_FDMEvents.25.title: "Incompatible Religion"
EDG_FDMEvents.25.desc: "It has been detected that the nation you are playing does not permit this religion; hence this event has fired. If you have a save file, please reload to a point before you converted to this religion."
EDG_FDMEvents.25.a: "Please do not do this in your next game"
EDG_FDMEvents.25.b: "Please do not do this in your next game"
EDG_FDMEvents.26.title: "The Sword of Despair"
EDG_FDMEvents.26.desc: "The very foundations of the empire are crumbling.\n\nThe failure of the Path of Rebirth is not merely a military setback—it is a mortal blow to the legitimacy of the entire Fatimid regime. Our enemies, smelling blood, have swarmed in from all directions. Conquered provinces have kindled the flames of rebellion; former vassals have declared independence one after another; even the amirs at court have begun plotting their own escape routes.\n\nThe treasury is empty, the army exhausted, and debts tower like mountains. The Caliph's authority teeters on the brink in this storm, and the entire empire is like a battered ship about to capsize in gale-force waves. This is our darkest hour—if we cannot find a way out of this despair, the Fatimid dynasty will sink forever into the abyss of history.\n\nYet in the midst of despair, the sword remains unbroken."
EDG_FDMEvents.26.a: "Only by placing ourselves at death's door can we find new life!"
EDG_FDMEvents.26.a_tt: "Enter the punitive disaster §RThe Sword of Despair§!.\n\nTo end this disaster, you must occupy all countries that have declared war on us using the §RIndependence§! casus belli, and have at least 80% warscore against each of them. You can only resolve the war through this method, as manual peace has been disabled.\n\nAs this is a punitive disaster, it is not considered part of the normal gameplay progression, and there are no mechanics designed to make it easier to end. The author does not guarantee that you will be able to end this disaster, and there will be no rewards upon its conclusion."
EDG_FDMEvents.27.title: "Rebirth"
EDG_FDMEvents.27.desc: "The smoke of battle has finally cleared.\n\nWhen the last rebellious province once again raised the Fatimid banner, when the last amir who declared independence knelt before the Caliph's throne—this long and cruel civil war at last drew to a close.\n\nThough the empire's borders have shrunk considerably, its heart remains. Those soldiers who survived the flames of war, those commoners who held fast to their loyalty through famine—their blood and tears forged the final line of defence for the Fatimids. The Caliph looked around him; where once stood a vast empire, now only ruins and devastation remained—but above those ruins, the green banner still flew.\n\nThe Sword of Despair has been broken. From this day forward, we shall rebuild this nation in a different way. No longer pursuing hollow glory, but tending to every wound, one step at a time. As long as the bloodline of the Prophet endures, the Fatimids shall never truly perish."
EDG_FDMEvents.27.a: "The Smoke of Battle Has Cleared"
EDG_FDMEvents.27.a_tt: "The disaster §RThe Sword of Despair§! will end.\n\nAnnex all countries that declared war on us using the §RIndependence§! casus belli."

EDG_FDMEvents.28.title: "Embers Rekindled"
EDG_FDMEvents.28.desc: "Scarcely had the blood of the Abbasid Caliph dried upon the stones of Cairo when one claiming his title emerged from the shadows. This man proclaimed himself a surviving scion of the Abbasid house and garnered unexpectedly widespread support among the Sunni communities of Baghdad. The once-silent Sunni ulama now openly prayed for him in the mosques; merchants in the souks collected alms in his name; Bedouin tribes on the city's outskirts rallied under black banners along the banks of the Tigris.\n\nThis is no mere military rebellion. For decades, the empire's courtesy toward Sunni jurists, its patronage of Sunni madrasas, and its governance that treated all sects equally ensured that the Sunni religious network never truly dissolved—and now that network has become the most potent weapon arrayed against us. The order we wove through tolerance is being used to weave our own noose.\n\nThe scales of the Imam have begun to tip. The shadow of a dead caliph weighs heavier than he ever did in life."
EDG_FDMEvents.28.a: "A dead man returned from hell?"
EDG_FDMEvents.28.a_tt: "Enter the disaster §TThe Scales of the Imam§!."
EDG_FDMEvents.29.title: "After the Scales Are Broken"
EDG_FDMEvents.29.desc: "The Scales of the Imam have at last ceased their swaying.\n\nAfter a long internal struggle and a baptism of blood and fire, the interests of the empire's various factions have at last found a new equilibrium atop the ruins. The religious strife that once tore the nation apart—Shi'a zealotry against Sunni resistance, the rigidity of orthodoxy against the price of tolerance—has, after this cataclysm, become secondary.\n\nWhat matters is that the empire yet lives.\n\nThe Caliph, with iron hand and wise counsel, has reintegrated this fractured realm. The needle of the scales has finally pointed to a definitive direction. From this day forward, Fatimid rule shall be built upon a foundation more solid—and more ruthless."
EDG_FDMEvents_28_modifier: "§GA Dead Man Returned from Hell§!"
EDG_FDMEvents.29.a: "Henceforth, we shall not repeat the same mistakes"
EDG_FDMEvents_29_modifier_1: "Iron-Fisted Rule"
EDG_FDMEvents_29_modifier_2: "The Embodiment of the Imam"
EDG_FDMEvents.29.a_tt: "The disaster §TThe Scales of the Imam§! will end."
EDG_FDMEvents.30.title: "Descent into Hell Once More"
EDG_FDMEvents.30.desc: "The rebellion in Baghdad has been put down. He who claimed to be the surviving Abbasid heir was finally cornered by our forces in a derelict waystation on the east bank of the Tigris. It is said that when the soldiers broke down the door, they found him seated upon a worn rug, draped in a faded black robe salvaged from the old palace, his expression serene—as if he had long foreseen this very moment.\n\nHe neither begged for mercy nor delivered a grand speech. The chroniclers will not record his name—for perhaps he had none. Yet the ripples he stirred will not subside with his death: the pulpits of the Sunni ulama still echo with the titles they bestowed upon him; in the alleyways, some still whisper that he was 'the hidden Imam.' A man falsely dead can be killed a second time, but a symbol forged by faith does not lose its weight merely because its vessel perishes.\n\nThe black banner of the Abbasids may at last have fallen."
EDG_FDMEvents.30.a: "“Rest in a peaceful dream... my old adversary.”"
EDG_FDMEvents_30_modifier: "Rebellion Suppressed"
EDG_FDMEvents.31.title: "Betrayal from the Holy Land"
EDG_FDMEvents.31.desc: "From the depths of the Arabian desert came still more troubling news: the Ibadis, surging forth from the oases of Oman and Yemen, marched along the ancient caravan routes toward the Hijaz. Mecca and Medina—the City of the Prophet and the site of the Sacred Mosque—fell into their hands with scarcely any resistance.\n\nThe Ibadis have always stood outside the orthodox genealogies of both Sunni and Shi'a, acknowledging neither Abbasid lineage nor Fatimid saintly descent. They obey only an Imam elected by the community of believers—and that Imam now leads his army toward the Nile Valley. For us, this is a far greater challenge than the rebellion of the false Abbasid heir: we can find no dynasty to buy off, no title to bestow, no position to incorporate into court ceremonial. Ibadi authority springs not from blood, and therefore cannot be severed.\n\nFor years, the empire's governance of the Arabian Peninsula amounted to little more than tribute in exchange for nominal submission; the qadi of the Hijaz was appointed by us, but his authority never truly extended beyond the mosque's threshold. Now we see clearly: what we called 'indirect rule' was merely a polite way of saying they had not yet found a reason to strike.\n\nThe fall of the Holy Cities is not merely a military reverse. When the Imam in Cairo cannot even secure the guardianship of the Prophet's tomb, the very Shi'a saintly narrative upon which the Fatimid dynasty rests gains a wound that will not easily heal."
EDG_FDMEvents.31.a: "Damned Omanis!"
EDG_FDMEvents.32.title: "The Coptic Blade"
EDG_FDMEvents.32.desc: "News from the highlands of Aksum plunged the court of Cairo into deeper silence: the Coptic Church of Ethiopia, after the house arrest of the Patriarch of Alexandria, has at last publicly torn asunder the tissue-thin suzerainty that bound it to the Fatimid dynasty.\n\nThe Solomonic heirs of Aksum, invoking the recovery of the Holy Land, have once again raised the long-forgotten banner of the True Cross; Coptic monks along the upper Nile have carried the tidings downstream to Nubia and to every monastery in Upper Egypt.\n\nWhat chills the blood most is that this rebellion came with almost no warning. We had believed our tolerance toward the Copts to be generous enough—allowing them to keep their churches, use their own language, and trade under the empire's protection. But tolerance never builds loyalty; it merely builds a forbearance that may be withdrawn at any moment. When the empire's strength shows cracks, when the promise of tolerance is no longer backed by power, those who once gave thanks discover that gratitude is a burden easily cast aside.\n\nThe blade from the south is colder than those from east and west—for it strikes at a truth we least wish to admit: empires are never destroyed by external foes alone, but by everything they have absorbed, slowly unraveling from within."
EDG_FDMEvents.32.a: "I should have known!"
EDG_FDMEvents.33.title: "The Crusaders Return!"
EDG_FDMEvents.33.desc: "Along the western shores of the Mediterranean, however, a light we least wished to see has quietly kindled—the banners of the Franks once again appear upon the coast of Tunis.\n\nThis is no new Crusade. The Franks of Tunisia and the Knights Templar did not return to Europe; instead, they lay dormant in the harbours of Sicily, the fishing villages of Sardinia, and the chieftaincies of the Berbers at the western end of the Maghrib—like wolves scattered but not slain, patiently waiting for their prey to show a weakness.\n\nThey have waited long enough.\n\nThe Genoese merchants and Venetian seamen who ply the Mediterranean have long observed the empire's enfeeblement. When an empire cannot even guard its own borders, defeated enemies crawl back from their graves.\n\nThe Mediterranean wind once more carries the scent of iron and blood. This time, we do not have the strength to face enemies on two fronts at once."
EDG_FDMEvents.33.a: "Why didn't we kill all those Franks back in Tunis when we had the chance?"

EDG_FDMEvents.34.title: "The Andalusian Uprising"
EDG_FDMEvents.34.desc: "The Muslims of Andalus—those Sunni remnants who had eked out a precarious existence for generations under the slow encroachment of Christian kingdoms—have now rallied under the call of a man claiming descent from the Umayyad caliphs. He is said to be a scion of the royal house who fled to North Africa when the Caliphate of Córdoba fell, lay low for years in the madrasas of Fes, mastering both law and strategy, and now, seizing the moment of the empire's peril, has openly raised the white Umayyad banner before the Alhambra of Granada.\n\nYet the one who once set the board can no longer control its pieces. The silver we sent was intercepted by the Umayyad pretender; the fires we kindled he has turned back upon ourselves. Those Andalusian warriors we treated as expendable pawns have now found, under his banner, a cause worth fighting for beyond mere survival—a dynasty dead a century speaks louder to them than our living Caliph.\n\nThe ghost of the Abbasids has not yet faded, and now the spirit of the Umayyads has risen from the ruins of Iberia."
EDG_FDMEvents.34.a: "Nothing more than a rabble!"
EDG_FDMEvents.35.title: "Treachery in Anatolia"
EDG_FDMEvents.35.desc: "The Turkic beys of Anatolia scarcely hesitated before siding with the false Abbasid pretender. These warlords, who carved out their own domains upon the ruins of the Seljuks, had never truly submitted to the Shi'a Caliph in Cairo—they served only the strong. Now, with the empire's armies tied down on every front, what we called suzerainty proved as fleeting as footprints in the desert, erased by the first wind."
EDG_FDMEvents.35.a: "Traitors!"
EDG_FDMEvents.36.title: "Treachery in Persia"
EDG_FDMEvents.36.desc: "The defection of Persia came as little surprise. This land was once the heart of the Abbasid Caliphate, and the shadow of Baghdad still looms over every Persian mosque's dome. When the black banner of the Abbasid pretender rose along the Tigris, the Persian governors were already calculating the calculus of betrayal in their private chambers—the heretical rule of the Shi'is had always been a yoke imposed by the sword, and now that the sword had rusted, the yoke fell away."
EDG_FDMEvents.36.a: "Traitors!"
EDG_FDMEvents.37.title: "Treachery in the Caucasus"
EDG_FDMEvents.37.desc: "The highlanders of the Caucasus chose the most opportune moment to abandon us. The crosses of Georgia and the churches of Armenia had never truly accepted Shi'a rule, and the Turkmen tribes roaming the valleys recognised no decree but the scimitar. When the imperial border troops were redeployed south to suppress the rebellions, the passes of the Caucasus stood wide open, with no one left to guard them."
EDG_FDMEvents.37.a: "Traitors!"
EDG_FDMEvents.38.title: "Hidden Event"
EDG_FDMEvents.38.desc: ""
EDG_FDMEvents.38.a: "Hidden Event"
EDG_FDMEvents.39.title: "Surrender to the Caliph?"
EDG_FDMEvents.39.desc: "The empire's armies have arrived at our gates.\n\nThe black banner of the false Abbasid Caliph still flies over our walls, but beyond them, the Fatimid host has encircled us completely. Provisions are running low, water is nearly spent, and the defenders' morale has sunk to its lowest point.\n\nThe Fatimid envoy has delivered an ultimatum: surrender the city, and all soldiers and civilians who swear allegiance to the Shi'a Caliph shall have their lives and property spared; if we persist in resistance, the day the walls fall will be the day all are consumed in flame.\n\nShall we bow to this heretical Caliph?"
EDG_FDMEvents.39.a: "We are the loyal subjects of the true Caliph"
EDG_FDMEvents.39.b: "That will never happen"
EDG_FDMEvents.40.title: "Fighting for the Caliph"
EDG_FDMEvents.40.desc: "In the empire's hour of peril, our people have spontaneously offered supplies to the army and even volunteered to join the fight. Peasants from Egypt, merchants from Syria, scholars from Baghdad—each in their own way has shown their loyalty and support for the Caliph."
EDG_FDMEvents.40.a: "We sincerely thank them for their contributions"

EDG_FDMEvents.41.title: "The Dream of Aksum"
EDG_FDMEvents.41.desc: "The Aksumite monarch who styled himself a descendant of Solomon now kneels in the dust, the banner of the True Cross he once raised so high now trampled beneath our cavalry's hooves.\n\nHe is clad in a coarse linen robe, a weathered bronze cross hanging at his chest; his face is dark and gaunt, yet his eyes still burn with a devotion bordering on madness. When our general looks down upon him in triumph, he does not tremble, but slowly raises his head and mutters something in Ge'ez we cannot understand—our interpreter tells us he is praying for the Day of Judgement to come, praying that the throne of Solomon may open to him in heaven.\n\nThe spine of the Coptic rebellion has been broken. Yet from this captive's eyes, we read not a trace of remorse—only the peculiar serenity of a martyr. That serenity disturbs us far more than any curse."
EDG_FDMEvents.41.a: "Go and keep Solomon company in death"
EDG_FDMEvents_41_modifier: "Rebellion Suppressed"
EDG_FDMEvents.42.title: "The Blue Moon Shattered to Pieces"
EDG_FDMEvents.42.desc: "When the Ibadi Imam was brought to Cairo in chains, his white robe was soaked in blood, his turban lost, his grey hair dishevelled and hanging loose about his shoulders. But what caught the eye most was not his wretched state—it was the crescent emblem upon his chest, the mark of the Ibadis, which had been cleaved in two by a blade: one half still hung at his neck, the other lost upon some distant battlefield.\n\nHe was thrown down before the Caliph's throne, yet he refused to prostrate himself. In a voice calm to the point of indifference, he said: 'You may slay my body, but the path of the Ibadis will not end with me. God favours no sect; He judges only truth.' The accompanying officer reported that when taken, this man had fewer than a hundred weary men left at his side, yet he was still organising a last stand in the mountain valleys, as if unaware the war was already lost.\n\nA sect that acknowledges no worldly authority—its leader's bearing in captivity is no different from his bearing before capture. Perhaps this is what makes the Ibadis so formidable: they have no throne to destroy, no lineage to hold hostage. Faith itself is their only armour."
EDG_FDMEvents.42.a: "Perhaps you would do better to go and debate your doctrines with God Himself"
EDG_FDMEvents_42_modifier: "Rebellion Suppressed"
EDG_FDMEvents.43.title: "The Crusaders' Second Failure"
EDG_FDMEvents.43.desc: "The ports of Tunis once again fly the Fatimid banner. Those Frankish Crusaders who had lain dormant upon the Mediterranean islands, waiting to strike at the empire's moment of weakness, are now trapped by our fleet upon a narrow headland, with no way forward and no way back.\n\nWe recognise some of their faces—survivors from the last North African expedition, their armour still bearing dents from that earlier campaign. Their banners are blackened with smoke, their horses gaunt from months of siege, yet the crosses embroidered upon their shields still glare as fiercely as ever. A knight in rusted chainmail is brought before our lines; he refuses to kneel, shouting in Latin at the top of his lungs—our interpreter tells us he is calling upon God's judgement, declaring that the Franks shall one day return to this land.\n\nThis is the second time the Franks have been broken in North Africa. Last time we let the survivors go, and they returned. This time, history will not repeat itself."
EDG_FDMEvents.43.a: "This time we shall show no mercy"
EDG_FDMEvents_43_modifier: "Rebellion Suppressed"
EDG_FDMEvents.44.title: "The Farce of a False Believer"
EDG_FDMEvents.44.desc: "The Andalusian rebel leader who claimed descent from the Umayyad caliphs was brought into our camp wearing an archaic white robe looted from the palace of Granada—clearly an attempt to imitate the attire of the Córdoban caliphs, though the cheap cloth made the whole affair look absurdly theatrical.\n\nHe knelt on the ground, hands bound behind his back, his eyes showing less fear than a kind of shame at being unmasked. The interrogation officer reported that his ancestry could not withstand even the simplest scrutiny—he could neither read Arabic nor name a single Umayyad caliph in the lineage; the supposed 'royal blood' was nothing more than a tale invented by his father in a tavern in Badajoz. Yet this very fraud had actually stirred up a storm among the remnant Muslims of Andalus—not because he possessed any true authority, but because the empire's decline had created fertile ground for any lie to take root.\n\nA false prophet has been exposed. But the desperation of those Andalusian Muslims who followed him, clutching at any straw of hope in their despair—that desperation will not vanish with his unmasking."
EDG_FDMEvents.44.a: "With that level of organisation, you think you can inherit the legacy of the Umayyads?"
EDG_FDMEvents_44_modifier: "Rebellion Suppressed"

EDG_FDMEvents.45.title: "Aid from [EDG_FDMEvents_45_country_target.GetName]"
EDG_FDMEvents.45.desc: "In the empire's hour of direst need, when foes press in from every quarter, the ruler of [EDG_FDMEvents_45_country_target.GetName] has extended a helping hand, offering precious military and economic support."
EDG_FDMEvents.45.a: "We sincerely thank them for their contributions"
EDG_FDMEvents.45.a_tt: "Though the Caliph harbours deep suspicions regarding @TAB§YMazandaran§!'s loyalty to the Imam, in times of crisis, accepting their aid is doubtless the wiser course."
EDG_FDMEvents.46.title: "Mercy Blinds"
EDG_FDMEvents.46.desc: "Our tolerance toward our Sunni subjects has at last borne bitter fruit.\n\nThose Sunni communities we so generously welcomed have shown not gratitude, but instead have quietly gathered strength in the shadows, awaiting the moment to strike back. When the empire's armies were tied down on distant battlefields, these once-docile subjects suddenly raised the banner of rebellion. From the minarets of mosques came cries against the Caliph; merchants in the souks ceased paying taxes; able-bodied men in the villages took up arms.\n\nMercy, in this world of tooth and claw, is a fatal weakness."
EDG_FDMEvents.46.a: "Damn it!"
EDG_FDMEvents.47.title: "Give an Inch, They Take a Mile"
EDG_FDMEvents.47.desc: "The Ibadis have once again raised the standard of revolt.\n\nThese heretics who stand outside both Sunni and Shi'a orthodoxy have never truly submitted to any caliph. They obey only an Imam elected by the community of believers—and that Imam now leads a host of zealots pouring from the oases of Oman and Yemen, marching along the ancient trade routes toward the heart of the empire.\n\nWe tried to buy their quiescence with tolerance, but the Ibadi lexicon contains no word for quiescence. Their faith permits no bowing to any worldly authority—even one that claims descent from the Prophet."
EDG_FDMEvents.47.a: "Damn it!"
EDG_FDMEvents.48.title: "Closing the Noose"
EDG_FDMEvents.48.desc: "The Christian subjects within the empire have grown restless.\n\nThose Catholics who once lived peacefully under our policy of tolerance, now secretly incited by the Papacy, have begun to question the legitimacy of Shi'a rule. Priests in the churches hurl veiled attacks against our faith from the pulpit; Latin merchants in the coastal cities refuse to pay the jizya; rumours even whisper that Crusader envoys have slipped into the empire's interior.\n\nWe had believed tolerance could dissolve all hatred—but reality tells us otherwise: the chasm of faith is not one that goodwill alone can bridge."
EDG_FDMEvents.48.a: "Damn it!"
EDG_FDMEvents.49.title: "The Devil's Own Wiles"
EDG_FDMEvents.49.desc: "The Coptic Church upstream along the Nile has once again bared its fangs at us.\n\nThese ancient Christians—the oldest inhabitants of the land of Egypt—have, with covert support from their Ethiopian co-religionists, begun secretly organising armed resistance. Monasteries have become arsenals, monks have become couriers, and the Coptic communities that once flourished under our protection are now brewing a rebellion that could shake the empire to its foundations.\n\nWe granted them freedom of worship, eased their commerce, and gave them a place in the empire's governance. Yet tolerance has never cultivated loyalty—only a forbearance that may be revoked at any moment. When the empire's strength shows cracks, those who once gave thanks discover that gratitude is a burden easily cast aside."
EDG_FDMEvents.49.a: "Damn it!"

EDG_FDMEvents.50.title: "The Scales of the Imam"
EDG_FDMEvents.50.desc: "“He raised the heaven and set the balance. Do not transgress in the balance. And observe the weight with equity, and do not skimp the measure.” — Qur'an 55:7-9\n\nAs the direct descendants of Fatimah, daughter of the Prophet, and of Ali, the Caliph is not merely a temporal ruler, but the supreme embodiment of the Imam in the hearts of the Ismaili faithful.\n\nWhen Prince Sulayman opened the gates of Kabylia and welcomed all suffering Muslims who sought refuge, that tolerance was the wellspring of our nation's strength. Yet the governance of a dynasty must contend with a fundamental paradox: an empire that rules over a majority of subjects who follow a minority creed—does its survival depend upon unity of faith, or upon the tacit acceptance of division?\n\nThe famines and military mutinies of the Mustansirid era already exposed the fragility of this system: when crisis strikes, no unified core of faith remains to rally a fractured populace.\n\nOn the pulpit of the Aqsa Mosque, Sunni and Shi'a calls to prayer alternate; the church bells of Alexandria and the adhan of Cairo coexist within the same city walls. The Imams of the Fatimid dynasty placed themselves at the centre of this web of faith, striving to be the mediators of all contradictions and the arbiters of all sects. Yet the role of the mediator means that the mediator himself can no longer take a side. When the Buwayhids threatened Baghdad, when the Seljuk Turks swept across Syria, when the Crusaders beat upon the coast—the religious pluralism within the Fatimid court was no longer a source of strength, but the root of paralysis in decision-making.\n\nEvery accommodated sect becomes a potential interest group; every grant of tolerance becomes an irrevocable compact. The more the Imam's scales strive for perfect balance, the less they can bear any tilt to one side. Tolerance in itself does not constitute governance, and when tolerance replaces governance, the empire belongs to no one."
EDG_FDMEvents.50.a: "The two ends of the scales have never truly been in balance."
EDG_FDMEvents.50.a_tt: "Based on historical settings, §MThe Scales of the Imam§! is set to tilt towards §MTolerance§!.\n\nHistorically, tolerance taught the Fatimid dynasty harsh lessons—§Rindecision§! and §Rmisguided mercy§! brought profound suffering and bitter experience upon the Fatimids. §TWe shall not repeat the same mistakes§!."
EDG_FDMEvents.51.title: "A Caliphate in Name Only"
EDG_FDMEvents.51.desc: "“The believers are but one brotherhood. So make peace between your brothers, and fear Allah that you may receive mercy.” — Qur'an 49:10\n\nWhen the Fatimid banner once again fluttered upon the banks of the Nile, when the Cairo that the young Prince Sulayman had gazed upon from afar finally returned to the hands of Ali's descendants, that vengeance and homecoming seemed to reach the very summit of history.\n\nBut reality is far crueller than epic poetry. Those who now rule Egypt are 'outsiders'—men accustomed to the winds of the Maghrib and the ways of the Berbers. A century of separation had carved deep cultural divides between the two lands; the native Arabs of Egypt and the remnants of the old regime looked down upon these new nobles with their North African accents and coarse manners, regarding them as nothing more than Maghribi bandits who had stolen the name of the Fatimids and exploited Crusader wars and chaos for their own gain.\n\nThough we style ourselves Caliphs, the cultural estrangement and centrifugal forces render the entire system of rule an empty shell. Taxes are obstructed, decrees go unheeded, and those Nile-dwellers who ought to submit to the bloodline of the Prophet are now brewing schemes to drive us back into the western desert."
EDG_FDMEvents.51.a: "An Egyptian Caliph who is not Egyptian?"
EDG_FDMEvents.51.a_tt: "Enter the disaster §TA Caliphate in Name Only§!.\n\nUnlock §YDecisions§!: §TA Caliphate in Name Only§!: Appease the Egyptians.\nUnlock §YDecisions§!: §TA Caliphate in Name Only§!: Appease the Algerians.\nUnlock §YDecisions§!: §TA Caliphate in Name Only§!: Appease the Tunisians.\nUnlock §YDecisions§!: §TA Caliphate in Name Only§!: Appease the Moroccans.\nUnlock §YDecisions§!: §TA Caliphate in Name Only§!: Appease the Berbers.\nUnlock §YDecisions§!: §TA Caliphate in Name Only§!: Assimilate the Maghrib.\nUnlock §YDecisions§!: §TA Caliphate in Name Only§!: Reclaim Egyptian Identity.\n\n\nThis disaster does not bring rebellions, nor does it impede your expansion, but it is the only way to return to §YEgyptian§! primary culture. Plan accordingly."
EDG_FDMEvents.51.tt: "This event belongs to the §TCaliphate in Name Only§! event group."
EDG_FDMEvents.52.title: "The Caliphate in True Name"
EDG_FDMEvents.52.desc: "After a long process of cultural integration and political negotiation, the rift between the Maghrib and Egypt has at last been healed.\n\nThose Maghribi nobles once scorned as 'outsiders' by the native Egyptians have now fully assimilated into Nile society. Their children recite the Qur'an in the Al-Azhar Mosque; their estates employ Egyptian farmers; their caravans ply the length of the Nile Valley. Cultural estrangement is no longer an issue; tax collection has returned to normal; decrees once again flow unhindered.\n\nThe Fatimid dynasty is no longer a 'Caliphate in Name Only'—it has truly become the master of Egypt. The people of the Nile have at last accepted the rule of Ali's descendants, and in the markets of Cairo, the praise of the Caliph rings out once more.\n\nTrue to the name, worthy of the title."
EDG_FDMEvents.52.a: "We are Egyptians"
EDG_FDMEvents.52.a_tt: "The disaster §TA Caliphate in Name Only§! will end."

EDG_FDMEvents.53.title: "The Debate at Al-Azhar"
EDG_FDMEvents.53.desc: "A fierce debate erupted in the lecture halls of the Al-Azhar Mosque.\n\nOn one side stood the Shi'a scholars from the Maghrib, who insisted upon the orthodox doctrines of Ismailism and demanded that the empire's religious education be conducted strictly according to the norms of the Fatimid court. On the other side stood the native Sunni scholars of Egypt, who had inherited their own scholarly traditions for generations and were unwilling to abandon centuries of accumulated knowledge.\n\n'Your Maliki school is nothing but Sunni prejudice!' thundered the Maghribi scholar.\n\n'Your Ismailism is nothing but the fantasy of a minority!' shot back the Egyptian scholar without flinching.\n\nThe debate quickly escalated from scholarly disputation to personal attacks. The students who had gathered to watch also split into two factions; some began hurling books and inkwells at one another. By the time the Caliph's guards arrived, the lecture hall was in complete disarray.\n\nThis debate appeared to be about doctrinal differences on the surface, but in truth it reflected a deeper cultural rift running through the entire empire—between the Maghribi rulers and the Egyptian ruled, whose culture should hold sway?"
EDG_FDMEvents.53.a: "Respect Egypt's scholarly traditions—diversity is the empire's strength"
EDG_FDMEvents.53.b: "Enforce Ismaili orthodoxy—only unity of faith can unite the empire"
EDG_FDMEvents.54.title: "Undercurrents in the Nile Valley"
EDG_FDMEvents.54.desc: "Deep within the Nile Valley, a silent resistance was spreading.\n\nThe peasants of Egypt did not take up arms, nor did they raise the banner of revolt—but they expressed their discontent with their Maghribi rulers in a more insidious way: they began reviving forbidden ancient festivals, holding secret harvest ceremonies in the fields, and teaching old songs in Coptic rather than Arabic.\n\nWhat troubled the court even more was that tax collection in certain areas began to falter. Not because of poor harvests, but because the peasants deliberately underreported their yields, hiding surplus grain in cellars or selling it cheaply to local merchants who sympathised with their plight. The Maghribi tax collectors were powerless against this—they could punish individual tax evaders, but they could not punish the silence of an entire village.\n\n'This is not rebellion,' an old vizier said with grave concern, 'this is worse than rebellion. Rebellion can be put down with the sword, but silence... silence cannot be suppressed.'"
EDG_FDMEvents.54.a: "Respect their customs—forced assimilation will only backfire"
EDG_FDMEvents.54.b: "Tighten control—the empire's order shall not be challenged"
EDG_FDMEvents.58.title: "The Christians of North Africa"
EDG_FDMEvents.58.desc: "As the empire's centre of rule shifted from the Maghrib to Egypt, a subtle cultural fusion began to unfold quietly.\n\nAt the court in Cairo, the remaining Christians of the Maghrib and the Egyptian Arab bureaucrats began to interact frequently. At first, both sides were full of wariness and hostility—the Christians shrewd and calculating, the Arabs plain and straightforward; two very different styles of conduct constantly clashed in the court. Yet as time passed, some enlightened Egyptians also came to appreciate the military talents of these Christians.\n\nThe empire's military technology was undergoing a quiet transformation. The Muzaribites and Greek mercenaries began to merge with Egypt's heavy infantry system, giving rise to a new style of warfare. The Caliph keenly perceived this change and decided to institutionalise it."
EDG_FDMEvents.58.a: "We shall give these Maghribi Christians a place of honour"
EDG_FDMEvents.58.b: "There is no need"

EDG_FDMEvents.60.title: "The Caliph Mediates a War"
EDG_FDMEvents.60.desc: "As the supreme spiritual leader of the Islamic world, the Caliph has demanded that we cease our war against our brother Muslims. The Caliph's mediation represents the will of the entire Muslim world; refusal would mean ruin to our reputation in the eyes of Islam."
EDG_FDMEvents.60.a: "We accept the Caliph's mediation."
EDG_FDMEvents.61.title: "The Caliph Bestows Legitimacy"
EDG_FDMEvents.61.desc: "As the supreme authority and successor of the Prophet, the Caliph has formally recognised the legitimacy of our rule. This decree, bearing the Caliph's seal, will circulate throughout the Islamic world, greatly enhancing our orthodoxy and prestige."
EDG_FDMEvents.61.a: "Thanks be to the Caliph for his grace!"
EDG_FDMEvents.62.title: "The Caliph Demands an Oath of Allegiance"
EDG_FDMEvents.62.desc: "The Caliph demands that we swear an oath of allegiance in the name of the Qur'an. This ancient ritual will bind our centrifugal tendencies, while also consolidating the Caliph's suzerainty over us."
EDG_FDMEvents.62.a: "We swear allegiance to the Caliph."
EDG_FDMEvents.63.title: "The Caliph Calls for the Hajj"
EDG_FDMEvents.63.desc: "The Caliph has announced that he will organise a grand pilgrimage through our territories. Muslims from across the world will pass through our lands en route to the Holy Cities—this will not only enhance our religious prestige, but also bring considerable economic benefits."
EDG_FDMEvents.63.a: "This is a tremendous honour!"
EDG_FDMEvents.64.title: "The Caliph Permits Jihad"
EDG_FDMEvents.64.desc: "In his capacity as commander-in-chief of the Islamic world, the Caliph has granted us permission to wage jihad against the infidels. This decree will greatly inspire our soldiers, and at the same time provide us with a legitimate religious basis for our territorial expansion."
EDG_FDMEvents.64.a: "This is our golden opportunity for expansion!"
EDG_FDMEvents.65.title: "Our Request Has Been Denied"
EDG_FDMEvents.65.desc: "We submitted our request to the Caliph with high expectations, only to receive a letter of cold refusal.\n\nThe Caliph rejected our request under various high-sounding pretexts—claiming the time was not yet ripe, or that further deliberation was needed, or even citing canonical law to dismiss it outright. In any case, the result was the same: our request was rejected.\n\nThis is not merely a diplomatic setback, but a reminder of our standing in the Islamic world—in the Caliph's eyes, we may not be as important as we imagine ourselves to be."
EDG_FDMEvents.65.a: "Damn it!"
EDG_FDMEvents.66.title: "Select a Trade Good"
EDG_FDMEvents.66.desc: "Select a trade good for price increase"
EDG_FDMEvents.66.a: "Cancel"
EDG_FDMEvents.67.title: "Select an Idea Group"
EDG_FDMEvents.67.desc: "You may select an idea group"
EDG_FDMEvents.68.title: "A Mysterious Envoy"
EDG_FDMEvents.68.desc: "A mysterious envoy claiming to be from Morocco arrived at our court in secret, under cover of darkness.\n\nHe claimed to be a descendant of the Marinid family, which was overthrown by the Almohads, and said that he still enjoyed a wide network of supporters among the Moroccan populace. He brought with him a bold proposal: if we would support him in launching a rebellion against Almohad rule, he would, upon success, swear allegiance to the Fatimids and provide us with strategic intelligence and internal support from Morocco.\n\n'The Almohads' rule is already tottering,' the envoy whispered. 'Their persecution of the Shi'a, their suppression of dissent, have stirred the whole of Morocco to boiling rage. It needs only a spark to ignite the flame. And you, most high Caliph, are the one who holds the tinder.'"
EDG_FDMEvents.68.a: "This shall be our perfect tool against the Almohads!"
EDG_FDMEvents_68_modifier: "Support of the Marinid Descendant"

EDG_FDMEvents.69.title: "Epilogue"
EDG_FDMEvents.69.desc: "When the last enemy submitted beneath the iron hooves of the Fatimids, when every span of the Old World flew the green banner, when the Ismaili faith stretched from the Atlantic to the Pacific—an Islamic empire spanning three continents was united at last in the hands of Ali's descendants.\n\nIn the court of Cairo, the Caliph stood atop the highest point of the Al-Azhar Mosque, gazing down upon the vast domains spread before him. The murmur of the Nile, the surge of the Red Sea, the winds of the Mediterranean, the monsoons of the Indian Ocean—all the winds blew in a single direction, as if the entire world was paying homage to this descendant of the Prophet.\n\nFrom the barren shores of Kabylia to this boundless empire, we had walked this road for far too long. The last wish of our forefather Sulayman, the dreams of al-Mu'izz, the blood and tears of the Fatimid dynasty across two centuries—all of it, at this moment, had ripened into the richest fruit.\n\nThe banner of the Fatimids had at last covered the entire world."
EDG_FDMEvents.69.a_tt: "Thank you for playing through all the content of the @FDM§YFatimids§!!\n\nThe author §PDanxiaogu QAQ§! wishes you a pleasant life and happy gaming!"
EDG_FDMEvents_69_modifier: "Caliph of the World"
EDG_FDMEvents.70.title: "Heeding the Prophet's Teachings"
EDG_FDMEvents.70.desc: "Upon the accession of the new Caliph, the religious scholars of the court gathered to conduct a solemn ceremony for the new ruler.\n\nIn accordance with Fatimid tradition, every new Caliph, before formally assuming the reins of power, must choose one of the twelve virtues of the Prophet Muhammad as the guiding principle of his reign. These virtues are recorded in ancient hadiths, each embodying a philosophy of governance and a way of life.\n\n'Most high Caliph,' the chief ulama said reverently, 'choose your path from the Prophet's teachings. Compassion, Honesty, Fortitude, Gratitude, Humility, Justice, Tolerance, Generosity, Filial Piety, Contentment, Trustworthiness, and Purity—each of these virtues shall be the cornerstone of your rule, shaping the direction of the empire for decades to come.'\n\nThe Caliph closed his eyes slowly and murmured the Prophet's name in his heart."
EDG_FDMEvents.70.a: "Compassion"
EDG_FDMEvents.70.b: "Honesty"
