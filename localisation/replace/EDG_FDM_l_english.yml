EDG_FDM_path_of_rebirth_disaster: "§TThe Path of Rebirth§!"
EDG_FDM_path_of_rebirth_disaster_tt: "--------------\n\"Indeed, with hardship comes ease.\" — Qur'an 94:5\n\nAfter Prince Sulayman's escape from Cairo and his establishment of a base in Kabylia, the Fatimid dynasty embarked on a perilous rebirth.\n\nThe Maghrib was never a haven of peace, but a land of contending powers on every side. To our west and south we were surrounded by entrenched Sunni regimes that always viewed us—bearers of the Ismaili banner—as heretics; along the coastal belts to our east and north, ambitious Christians were consolidating the gains of their Crusades, seeking to turn Tunisia into a lasting kingdom of holy war.\n\nAmidst this chaos of encircling wolves, the fledgling realm had no path of retreat. To preserve the bloodline of the Prophet, we had to rely upon military prowess and diplomatic cunning to survive and expand within the narrow crevices. To subdue the defiant Berber tribes, shatter the Crusaders' grip, and unite the scattered forces of North Africa into a single unified empire.\n\nBut this was only the beginning. All the bitter wars and efforts at reconstruction we undertook in the Maghrib were but a gathering of strength for a greater historical mission: to advance eastward along the Mediterranean, cross the endless deserts, and plant the Fatimid banner once again upon the walls of Cairo.\n\n§YDuring the disaster, the overextension event group will present positive options§!"
# EDG_FDM_path_of_rebirth_disaster_tt: "--------------\n\"Indeed, with hardship comes ease.\" — Qur'an 94:5\n\nEver since Prince Sulayman escaped from Cairo and established his foundation in Kabylia, the Fatimid dynasty has trodden a path of rebirth fraught with peril.\n\nThe Maghrib was never a haven of peace, but a land of contending powers on every side. To our west and south we were surrounded by entrenched Sunni regimes that always viewed us—bearers of the Ismaili banner—as heretics; along the coastal belts to our east and north, ambitious Christians were consolidating the gains of their Crusades, seeking to turn Tunisia into a lasting kingdom of holy war.\n\nAmidst this chaos of encircling wolves, the fledgling realm had no path of retreat. To preserve the bloodline of the Prophet, we had to rely upon military prowess and diplomatic cunning to survive and expand within the narrow crevices. Subdue the defiant Berber tribes; dismantle Crusader rule; unite the scattered forces of North Africa into a single unified empire.\n\nBut this was only the beginning. All the bitter wars and efforts at reconstruction we undertook in the Maghrib were but a gathering of strength for a greater historical mission: to advance eastward along the Mediterranean, cross the endless deserts, and plant the Fatimid banner once again upon the walls of Cairo.\n\n§YDuring the disaster, the overextension event group will present positive options§!"
