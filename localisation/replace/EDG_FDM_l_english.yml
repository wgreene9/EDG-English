EDG_caliph_ideas_bonus: "Caliphal Ideas Completed"
EDG_caliph_ideas_1_desc: "The Caliph is not merely a temporal sovereign, but the continuation of the Prophet's bloodline and the spiritual beacon of the faithful. By virtue of this sacred lineage and authority, the Caliph's decrees maintain order and stability across vast lands. The people revere not the sword, but the supreme Imam who sits in the depths of the palace, carrying out the will of the Prophet. Under this sacred aura, rebellion and strife dissolve into nothingness.\n\nCaliphal Decree Cost: §G-50.0%§!"
EDG_caliph_ideas_2_desc: "The spread of faith depends not only on the edge of the sword, but on patient education and guidance. We establish missionary stations and Qur'anic schools across the lands, dispatching learned men to towns and villages, gently explaining the true meaning of Ismailism to those who have strayed. Every new mosque is a lighthouse of civilisation; every newly converted believer is a testament to divine grace. The tree of faith must be watered, not hewn."
EDG_caliph_ideas_3_desc: "From the spices of the Indian Ocean to the gold of Mali, from the silks of Persia to the silver of Europe, the caravans and sailing ships of Muslim merchants weave a trade network spanning the Old World. The Caliphate, as both guardian and beneficiary of this network, ensures through unified weights and measures, reliable postal relays, and protected trade routes that wealth flows steadily through the empire's veins. Commercial prosperity is the very lifeblood of the state."
EDG_caliph_ideas_4_desc: "While Europe still gropes in darkness, our academies already gather astronomers, mathematicians, and physicians from every corner. The Caliph generously patronises scholarship, carrying on and expanding the tradition of the House of Wisdom. New ideas and new technologies spread freely within the framework of true faith, keeping the empire always at the forefront of civilisation. Knowledge is the most precious gift God has given to humanity—and we are fortunate to be its guardians."
EDG_caliph_ideas_5_desc: "Muslims believe that Zakat is a duty (fard) ordained by God upon those believers who have been blessed with abundance—they are commanded to give a portion of their surplus wealth each year to aid the poor and those in need. God said: 'Establish prayer, give Zakat, and lend God a goodly loan. Whatever good you send ahead for yourselves, you will find it with God as better and greater in reward. And seek forgiveness from God—He is Forgiving, Merciful.' (Qur'an 73:20) And God said: 'Righteousness is to believe in God, the Last Day, the angels, the Book, and the prophets; and to give from one's beloved wealth to relatives, orphans, the needy, travellers, beggars, and for the freeing of slaves; and to establish prayer, give Zakat, fulfil covenants, and to persevere through poverty, hardship, and war. These are the truthful ones; these are the God-fearing.' (Qur'an 2:177)"
EDG_caliph_ideas_6_desc: "On the frontiers and newly conquered lands, missionaries gently and patiently call upon the people of other faiths to recognise the truth. They do not coerce through violence, but demonstrate the power of faith through debate, scholarship, and personal example. Every conversion of a soul is counted as a precious victory, for true faith must spring from the heart, not from the edge of a sword. This gentle yet steadfast approach to propagation deepens the empire's foundations of faith with every passing year."
EDG_caliph_ideas_7_desc: "The stability of a great empire depends on balancing the interests of all parties. The Caliph, as the supreme arbiter, carefully regulates the relationships between religious leaders, military aristocrats, merchants, and commoners—not allowing any single group to dominate, nor any to be completely suppressed. The Majlis al-Shura provides a channel for all estates to voice their concerns, while the Caliph's just judgment is the key to maintaining this delicate balance. Harmony and coexistence are the path to permanence."

EDG_FDM_enhanced_ideas: "§TReborn Fatimid Ideas§!"
EDG_FDM_enhanced_ideas_start: "§TFatimid Traditions§!"
EDG_FDM_enhanced_ideas_bonus: "§TFatimid Ambition§!"
EDG_FDM_enhanced_ideas_1: "§TReturn to Cairo§!"
EDG_FDM_enhanced_ideas_2: "§TReorganising the Mamluks§!"
EDG_FDM_enhanced_ideas_3: "§TMadrasa-Jurist System§!"
EDG_FDM_enhanced_ideas_4: "§TDescendants of Ali§!"
EDG_FDM_enhanced_ideas_5: "§TPeace Under the Caliph§!"
EDG_FDM_enhanced_ideas_6: "§TFatimid Professional Army System§!"
EDG_FDM_enhanced_ideas_7: "§TEndless Jihad§!"
EDG_FDM_enhanced_ideas_1_desc: "The years of house arrest in a small courtyard of Cairo, endured since childhood, left an indelible mark upon the soul of our forefather Sulayman—and forged in him a cold, unyielding resolve. Egypt is the land we were destined to rule; the Ayyubid usurpers who plotted the murder of the Fatimid royal house will pay the price. To return to the banks of the Nile and reclaim that fertile land where our dynasty first rose is the sacred duty of every descendant of the Fatimids—a burden we are bound to carry."
EDG_FDM_enhanced_ideas_2_desc: "When our forefather established the second dynasty, he brought the Egyptian way of governance back to the Maghrib. To impose absolute authority over the unruly Berber tribes and the flood of refugees pouring into Kabylia, we adopted Eastern military traditions, recruiting and training loyal Mamluk slave-guards. These elite slave-soldiers would become the backbone of the dynasty's rule."
EDG_FDM_enhanced_ideas_3_desc: "We conquered North Africa not only with the sword, but also with wisdom and faith, civilising this land. By establishing a comprehensive madrasa-jurist system, the Berbers not only set down their blades and learned to read, write, and farm, but the state also gained a steady stream of bureaucrats well-versed in Ismaili doctrine. Unified faith and an efficient administrative network are the cornerstones of the dynasty's long-term stability."
EDG_FDM_enhanced_ideas_4_desc: "Our forefather Sulayman was of the noble bloodline born of the union of Fatimah, daughter of the Prophet, and Ali—the supreme Sayyid. When we opened the gates of our city to the world, we asked only one thing: unwavering belief that only the descendants of the Prophet possess the natural right to rule. This sacred bloodline is the source of our legitimacy, an invisible banner that rallies all Muslims under our cause."
EDG_FDM_enhanced_ideas_5_desc: "After decades of cultivation and governance, we have brought long-lost prosperity to this land once shattered by chaos. Along the humid coastlines, vast fields of wheat sway in the wind; North Africa has miraculously regained its ancient status as the 'breadbasket' of Rome. Under the Caliph's merciful rule, trade flourishes, the treasury overflows, and the Maghrib has found true peace and renewal."
EDG_FDM_enhanced_ideas_6_desc: "Our armies are drawn from diverse origins—from fervent believers who followed our forefather, to refugees displaced by the Tunisian Crusader wars. To maximise the fighting power of this vast host, we reorganised the ancient nine-corps Fatimid military system. By integrating soldiers of different ethnicities and backgrounds into specialised corps that complement one another's strengths, we have forged an invincible composite army."
EDG_FDM_enhanced_ideas_7_desc: "In the face of the Crusader kingdoms entrenched in Tunisia, and the unending stream of infidel merchant ships upon the seas, our jihad shall never cease. The seafaring Berbers, skilled in navigation, command fleets that cruise the Barbary coast, plundering Western churches and estates. The spoils and white slaves are shipped to the goldfields of the Mali Empire in exchange for endless gold—this ceaseless stream of wealth shall fuel our never-ending jihad against the infidels!"


#Policies
EDG_caliph_policy_1: "Administrative Reform"
EDG_caliph_policy_1_desc: "The Caliph has combined the ancient Diwan system with modern administrative principles, refining provincial jurisdictions, clarifying official responsibilities, and streamlining document circulation—elevating the empire's governance capacity to a new level. Central decrees now reach every distant province more smoothly, and local affairs are reported back to the court with greater timeliness."
EDG_caliph_policy_2: "Faith Mobilisation"
EDG_caliph_policy_2_desc: "When the empire faces external threats, the Caliph, as religious leader, calls upon the faithful to defend their homeland. The call to prayer resounds through towns and villages; devout believers answer the summons and take up arms. The power of faith unites scattered individuals into an iron tide to protect their home."
EDG_caliph_policy_3: "Edict of Tolerance"
EDG_caliph_policy_3_desc: "The Caliph has issued a decree guaranteeing the fundamental rights of different faith communities within the empire. Christians and Jews may worship freely upon payment of the jizya; heretical sects are protected by law as long as they do not openly challenge orthodoxy. This pragmatic policy of tolerance reduces internal friction, allowing the empire to focus more of its energies on governance and development."
EDG_caliph_policy_4: "Public Works"
EDG_caliph_policy_4_desc: "The Caliph has set aside funds for repairing roads, bridges, and irrigation channels, and encourages local construction of markets and inns through favourable terms. The empire's infrastructure steadily improves under unified planning; trade and travel become more convenient, and the people's daily lives grow more stable thanks to these public projects."
EDG_caliph_policy_5: "Court Spies"
EDG_caliph_policy_5_desc: "The Caliph has established an intelligence network spanning the empire, with agents embedded in markets, mosques, and foreign courts. They monitor domestic instability while also gathering intelligence on neighbouring states' military movements. In the game of information, he who holds the advantage is he who cannot be defeated."
EDG_caliph_policy_6: "Diplomatic Mediation"
EDG_caliph_policy_6_desc: "Leveraging his exalted prestige in the Islamic world, the Caliph dispatches envoys to courts across the realms. Through mediating disputes, forging alliances, and applying diplomatic pressure, the empire extends its influence without resorting to arms—lowering the threshold of war."
EDG_caliph_policy_7: "Trade Route Protection"
EDG_caliph_policy_7_desc: "The Caliph has ordered the establishment of waystations and garrisons along the empire's major trade routes, protecting caravans from banditry. Unified weights, measures, and tax systems reduce transaction costs; a trustworthy commercial environment attracts more merchants from distant lands, making the empire's commodity trade ever more prosperous."
EDG_caliph_policy_8: "Legitimate Expansion"
EDG_caliph_policy_8_desc: "The Caliph leverages his religious authority to provide legal justification under sharia for the empire's territorial expansion. Whether reclaiming ancestral lands or punishing rebels, every war is endowed with a righteous cause—reducing international criticism and interference."
EDG_caliph_policy_9: "Cavalry Fiefs"
EDG_caliph_policy_9_desc: "The Caliph has granted portions of land as fiefs to cavalry nobles in exchange for their pledge to answer the call to arms at any time. These hereditary horsemen form the elite strike force of the imperial army; their steeds and scimitars are the strong arm of the Caliph's authority."
EDG_caliph_policy_10: "Conscription Registers"
EDG_caliph_policy_10_desc: "The Caliph has ordered the compilation of detailed conscription registers in the orthodox provinces, recording every able-bodied male in each household. When war erupts, the empire can mobilise vast numbers of troops swiftly and orderly, ensuring numerical superiority on the battlefield."
EDG_caliph_policy_11: "Quality Over Quantity"
EDG_caliph_policy_11_desc: "While maintaining the size of the army, the Caliph has focused on improving training and equipment quality. Elite guards undergo rigorous drills and are equipped with superior armour and firearms. By balancing numbers and quality, the empire's armies can both absorb casualties and deliver devastating blows on the battlefield."
EDG_caliph_policy_12: "Mercenary Contracts"
EDG_caliph_policy_12_desc: "The Caliph has contracted experienced mercenary captains with generous pay in exchange for absolute obedience from their troops. These professional soldiers fight under the Fatimid banner—disciplined, fierce, and offering the empire a flexible and efficient military force."
EDG_caliph_policy_13: "Ottoman Caliphate"
EDG_caliph_policy_13_desc: "The Caliph has rigorously purged the court of extravagance and administrative inertia. Redundant officials have been dismissed, the negligent punished, and the diligent promoted. Under iron-fisted governance, administrative efficiency has risen markedly, and the rampant corruption that once spread has been effectively curbed."

