EDG_FDM_egyptian_in_name_only_disaster: "§TA Caliphate in Name Only§!"
EDG_FDM_egyptian_in_name_only_disaster_tt: "--------------\n\"The believers are but one brotherhood. So make peace between your brothers, and fear Allah that you may receive mercy.\" — Qur'an 49:10\n\nWhen the Fatimid banner once again fluttered upon the banks of the Nile, when the Cairo that the young Prince Sulayman had gazed upon from afar finally returned to the hands of Ali's descendants, that vengeance and homecoming seemed to reach the very summit of history.\n\nBut reality is far crueller than epic poetry. Those who now rule Egypt are 'outsiders'—men accustomed to the winds of the Maghrib and the ways of the Berbers. A century of separation had carved deep cultural divides between the two lands; the native Arabs of Egypt and the remnants of the old regime looked down upon these new nobles with their North African accents and coarse manners, regarding them as nothing more than Maghribi bandits who had stolen the name of the Fatimids and exploited Crusader wars and chaos for their own gain.\n\nThough we style ourselves Caliphs, the cultural estrangement and centrifugal forces render the entire system of rule an empty shell. Taxes are obstructed, decrees go unheeded, and those Nile-dwellers who ought to submit to the bloodline of the Prophet are now brewing schemes to drive us back into the western desert."
EDG_FDM_egyptian_in_name_only_disaster_can_end_tt: "Restored absolute rule over Egypt"
EDG_FDM_egyptian_in_name_only_disaster_ended_tt: "The disaster §TA Caliphate in Name Only§! has ended"
