EDG_FDM_sword_of_despair_disaster: "§RThe Sword of Despair§!"
EDG_FDM_sword_of_despair_disaster_tt: "--------------\n\"Did We not expand your breast for you, and remove from you your burden, which weighed down your back?\" — Qur'an 94:1-3\n\nThe forebears of the Fatimids once carved out life from desperate straits with unwavering courage, but now, with the failure of the Path of Rebirth, the entire nation seems once again driven into an abyss darker than any before.\n\nProlonged war and internal turmoil have drained the treasury of its last gold; Berber tribes have begun to resist conscription; the fleets and elite cavalry that once struck fear into the hearts of Western Mediterranean Christians and Crusader states alike are now demoralised. National debt towers, rebellions erupt on all sides, provincial governors have begun to build up their own armed forces, and even the ulama in the mosques have begun to cast veiled doubts upon the legitimacy of the Caliph's rule in their sermons.\n\nLike those exiles who were once forced to take up the sword and pillage the estates of infidels, despair now spreads through the ruling class and the army alike. When the sword in our hands is no longer wielded for the glory of God and the pride of the Prophet's bloodline, but merely to survive by a thread in this hellish age of chaos—it becomes a heavy blade of despair that turns back upon its wielder.\n\n§RThis disaster is punitive—avoid triggering it at all costs!§!"
EDG_FDM_sword_of_despair_disaster_can_end_tt: "Own and control all of our core provinces"

EDG_FDM_scale_of_imam_disaster: "§TThe Scales of the Imam§!"
EDG_FDM_scale_of_imam_disaster_tt: "--------------\n\"He raised the heaven and set the balance. Do not transgress in the balance. And observe the weight with equity, and do not skimp the measure.\" — Qur'an 55:7-9\n\nAs the direct descendants of Fatimah, daughter of the Prophet, and of Ali, the Caliph is not merely a temporal ruler, but the supreme embodiment of the Imam in the hearts of the Ismaili faithful.\n\nWhen Prince Sulayman opened the gates of Kabylia and welcomed all suffering Muslims who sought refuge, that tolerance was the wellspring of our nation's strength. Yet with the establishment of a vast empire and the proliferation of sects, the contradictions between orthodox Shi'a praetorians, Sunni Berber tribes, conquered infidels, and marginalised groups flowing in through the slave trade have grown ever more acute in matters of religion and law.\n\nAt court, extremist religious scholars demand that the Caliph, in the name of the 'Imam,' launch a great purge and establish a purely Shi'a realm; while pragmatic bureaucrats warn that such a move would instantly tear apart the empire's economic and military foundations.\n\nThe Scales of the Imam are swaying violently. Once the balance is shattered, the flames of religious zealotry will burn down the order and prosperity that our forefathers spent two centuries building in North Africa.\n\n§YDuring the disaster, mechanics related to §MFatimid Religious Tolerance§! are disabled§!\n\n§RFormer enemies will return in force! Be prepared!§!"
EDG_FDM_scale_of_imam_disaster_can_start_tt: "§TThe Scales of the Imam§! have tipped completely out of balance"
EDG_FDM_scale_of_imam_disaster_can_end_tt: "Re-balanced the interests of all factions"
