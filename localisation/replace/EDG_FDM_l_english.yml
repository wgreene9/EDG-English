#Local Organisations
EDG_FDM_holy_order_1: "§TWilayah§!"
EDG_FDM_holy_order_1_short: "§TWilayah§!"
EDG_FDM_holy_order_1_full: "§TWilayah§!"
EDG_FDM_holy_order_1_desc: "Wilayah is the term for provinces in the Islamic world, derived from the Arabic word for 'governance.' Since the Abbasid Caliphate, Caliphs and Sultans have divided their vast territories into multiple wilayahs, governed by centrally appointed Wali governors. The Wali administers taxation, justice, and military levies within his jurisdiction, but his authority is strictly supervised by the central Diwan. In Mamluk Syria and the outlying territories of Egypt, the Wilayah system sustained the vast empire's control over distant lands."
EDG_FDM_holy_order_2: "§TSouq§!"
EDG_FDM_holy_order_2_short: "§TSouq§!"
EDG_FDM_holy_order_2_full: "§TSouq§!"
EDG_FDM_holy_order_2_desc: "The Souq is the heart of the Islamic city—a dusty open-air market, or a vaulted covered caravanserai. Here, spice merchants, weavers, goldsmiths, and booksellers each occupy their own quarters, organised by guilds. The Muhtasib patrols among them, checking scales, exposing fraud, and upholding the fair trade commanded by God. From Fes to Samarkand, the Souq connects the camel caravans of the Silk Road to the sailing ships of the Indian Ocean; it is the hub for gold and silk. To control a thriving Souq is to hold the city's lifeline."
EDG_FDM_holy_order_3: "§TGhazi§!"
EDG_FDM_holy_order_3_short: "§TGhazi§!"
EDG_FDM_holy_order_3_full: "§TGhazi§!"
EDG_FDM_holy_order_3_desc: "Ghazi, meaning 'raider,' is an honorific title for warriors who sally forth for the faith. On the frontier marches of Anatolia, the Ghazis are both pious holy warriors and adventurers hungry for spoils and fiefs. They storm Byzantine strongholds, raid Christian caravans, and bring the lands of infidels into the fold of Islam. The Ghazi spirit is both religious zeal and pragmatic frontier expansion."

