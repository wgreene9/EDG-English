rigaExpandDisaster.0.name:0 "The Dawn War"
rigaExpandDisaster.0.desc:0 "After [riga_rebel_target.GetName] declared control over Riga, loyalists to the Archbishopric both within and beyond the city repeatedly protested this treason—but all were purged and silenced.\n\nYet such actions did not extinguish opposition; they only allowed it to spread and grow in the light of ever-clearer truths. The bishopric subjects each took their own stance—some opposed the new order, others waited to see which way the wind would blow. All acted only to maximize their own interests.\n\nBut the surface turmoil was but a ripple above a deep current. After two great disasters, the administrative efficiency of the Archbishopric had collapsed. The subject states now faced not only the sword of sovereignty hanging over their heads, but also fires of economic collapse and political chaos burning within their own borders.\n\nAs months passed, the problems facing the subject states grew ever more acute. Violent incidents erupted everywhere. Every class, faction, or individual seeking to advance their own cause began to act, hoping to seize the greatest share from this catastrophe. And the most expedient way to legitimize their gains was to join the struggle for the sovereignty of the Archbishopric of Riga.\n\nThus, a great melee began. Loyalists and puppet soldiers, nobles and merchants, pious monks and greedy mercenaries—all these forces, complex and tangled, fell upon one another beneath a single banner. Riga's entire vassal system, like a powder keg set alight, finally exploded."
rigaExpandDisaster.0.aa:0 "This is a trial"
rigaExpandDisaster.0.aa.tt:0 "All our subjects will also begin the disaster §YThe Dawn War§!"

rigaExpandDisaster.1.name:0 "Riots"
rigaExpandDisaster.1.desc:0 "A group of [riga_rebel_target.GetName] loyalists have incited rebellion in [riga_dawn_of_war_unrstprovince_target.GetName], aiming to sway the government toward [riga_rebel_target.GetName]. We must take necessary measures."
rigaExpandDisaster.1.aa:0 "Crush them"

rigaExpandDisaster.2.name:0 "Clashes"
rigaExpandDisaster.2.desc:0 "The turbulent times have led various class factions to seek profit from the chaos. Such conflicts are often ultimately expressed through violence, and the victors will continue the methods they once employed."
rigaExpandDisaster.2.aa:0 "Crush them"

