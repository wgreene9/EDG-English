l_english:
rigaExpand.0.name:0 "Ante Bellum" # The Eve of War
rigaExpand.0.desc:0 "The current situation of the Archbishopric of Riga is far from optimistic. Although we are surrounded by the Livonian Order and have long enjoyed its protection, the Order's past battlefield performances have left [Root.Monarch.GetTitle][Root.Monarch.GetName] concerned about whether they can continue to defend the bishopric—whether at the Battle of Saule in 1236 or the Battle on the Ice in 1242, the Order's performance was less than satisfactory.\n\nTherefore, [Root.Monarch.GetName] hopes to unite the Livonian Order and the Teutonic Order. Although the Livonian Order was nominally dissolved and absorbed into the Teutonic Order after the Battle of Saule, it has now gained significant autonomy and is effectively independent from the Teutonic Order. The Teutonic Order, on the other hand, has consistently sought expansion toward Poland and Lithuania, which has left it increasingly isolated diplomatically and made it less likely to heed [Root.Monarch.GetName]'s advice. Still, we may attempt to make our request."
rigaExpand.0.aa:0 "Send our request to the Grand Masters of both Orders"

rigaExpand.1.name:0 "The Archbishop's Invitation"
rigaExpand.1.desc:0 "The Archbishop of Riga wishes for us to unite under his banner to defend the Baltic region. This would undoubtedly cost us our sovereignty, but such a union would greatly enhance our influence in the Baltic and even Eastern Europe."
rigaExpand.1.aa:0 "We accept."
rigaExpand.1.bb:0 "Preposterous!"
rigaExpand.1.cc:0 "Perhaps there is another way?"

rigaExpand.2.name:0 "The Response"
rigaExpand.2.desc:0 "[From.GetName] has accepted our request!"
rigaExpand.2.aa:0 "Excellent."

rigaExpand.3.name:0 "The Response"
rigaExpand.3.desc:0 "[From.GetName] has rejected our request!"
rigaExpand.3.aa:0 "How dare they!"

rigaExpand.4.name:0 "Dealing with the Prussian Confederation"
rigaExpand.4.desc:0 "The Prussian Confederation has always been a major problem for the Teutonic Order. The First Prussian Uprising, triggered after the defeat at the Battle on the Ice, shook the foundation of the Teutonic Order. If we grant this organization a degree of autonomy by separating Danzig from the Teutonic Order as their self-governing territory, this issue could be resolved. However, this would clearly provoke the Teutonic Order's discontent and further weaken their strength."
rigaExpand.4.aa:0 "Grant Autonomy to the Prussian Confederation"
rigaExpand.4.bb:0 "Maintain the Status Quo"

rigaExpand.10.name:0 "Strategic Direction"
rigaExpand.10.desc:0 "After a comprehensive review of Riga's political, economic, and military systems, the [Root.Monarch.GetTitle] [Root.Monarch.GetName] deliberated at length. Today, [Root.Monarch.GetTitle] has gathered elites from all estates to chart the next strategic direction and discuss the future of Riga.\n\nTo the north, Sweden's grip on the Baltic Sea is tightening. If we are to monopolize Baltic trade, Sweden will be our primary adversary. Defeating Sweden will not be easy, but perhaps we can make use of the Norwegian crown and the County of Skåne.\n\nAlthough the Baltic region is already under our control, the initiative in Baltic trade is not in our hands. Downstream, the Hanseatic League—represented by Lübeck—is gradually declining, forcing us to seek alternative routes. The league of commercial cities born from the Danish revolt of 1439 may present an excellent opportunity; they compete with Lübeck, and perhaps we can draw them into our own commercial league. Upstream, trade is controlled by the Novgorodian heretics. Given the rising Grand Duchy of Tver in the east, which seems intent on unifying northeastern Rus', we should act sooner rather than later.\n\nTo the south, the fragmentation of the Polish crown and the civil war in Kievan Rus' have created a power vacuum, though this situation will not last. As another upstream node of Baltic trade, we must secure control over Kraków and eliminate the legacy of Jan Hus. As for the Kiev region, whether the sudden rise of the Bogomils or the long-established Orthodox Church, both will be adversaries we must face. The civil war in Kievan Rus' will not last long; we must achieve our objectives before another power rises.\n\nNow, let us make our choice."
rigaExpand.10.aa:0 "Advance North to Counter the Swedish Threat"
rigaExpand.10.bb:0 "Protect the Baltic Trade Routes"
rigaExpand.10.cc:0 "Head South to Stabilize the Polish and Ruthenian Situations"
rigaExpand.10.dd:0 "Now, We Should Focus on Ourselves"

rigaExpand.11.name:0 "New Strategic Direction"
rigaExpand.11.desc:0 "We have completed one strategic direction; now it is time to choose a new objective."

rigaExpand.12.name:0 "Making Contact with Gotland"
rigaExpand.12.desc:0 "Gotland—an island standing in the heart of the Baltic—has long been a haven for pirates and privateers. They bow to no king, salute no banner, and recognize only the law of wind and wave. For this very reason, they have long been a thorn in the side of neighboring states.\n\nThe [Root.Monarch.GetTitle][Root.Monarch.GetName] proposes a deal they cannot refuse: so long as Riga's interests are not harmed, the Gotlanders may continue their piratical ways—plunder enemy ships, cut enemy cables, and haul the wealth of the Baltic back to their own docks. In exchange, we will provide them protection and become their nominal suzerain. Of course, we might also consider more traditional methods..."
rigaExpand.12.aa:0 "Present our proposal to Gotland"
rigaExpand.12.bb:0 "I prefer the traditional approach"

rigaExpand.13.name:0 "The Proposal from the Archbishop of Riga"
rigaExpand.13.desc:0 "A messenger from the Archbishopric of Riga has arrived, offering the following terms: if we become their vassal in name, without harming Riga's interests, they will guarantee our safety and provide financial support, and we may continue our raiding ways.\n\nThis is clearly a mutually beneficial proposal, but we have the right to refuse—provided we are prepared to bear the consequences."
rigaExpand.13.aa:0 "A win-win arrangement, is it not?"
rigaExpand.13.bb:0 "Pirates bow to no one!"

rigaExpand.14.name:0 "The Response"
rigaExpand.14.desc:0 "Gotland has accepted our proposal. Now we can proceed to the next phase of our plans."
rigaExpand.14.aa:0 "Excellent!"

rigaExpand.15.name:0 "The Response"
rigaExpand.15.desc:0 "Gotland has rejected our proposal. It seems we must resort to arms."
rigaExpand.15.aa:0 "Outrageous!"

rigaExpand.16.name:0 "The Shattered Crown"
rigaExpand.16.desc:0 "Though the name of the Kingdom of Denmark still lingers in the chronicles, its body has been torn apart by the merchants of the free cities and the swords of Swedish soldiers. Yet, for the sake of long-term trade interests, we shall attempt to reunite this shattered realm—and the County of Skåne, currently a Swedish subject, is precisely the target we seek. Years ago, the Swedes seized this narrowest stretch of the Øresund from Denmark by force; now the county has become the most fitting candidate to reforge the Danish crown. But under the present circumstances, all of this remains but a fantasy. How can a small nation with Sweden's iron heel on its neck hope to raise its banner in defiance?\n\nA secret meeting may reveal their resolve—if they dare to openly defy Sweden, we will offer them our support. Of course, this will not come without cost: we shall demand commercial privileges in the Øresund to secure our trade advantage in the Baltic and the Lübeck region, which may also lay the foundation for our future advance into Scandinavia. And if their so-called resolve proves hollow, then we shall "help" them achieve their goal by our own means."
rigaExpand.16.aa:0 "Await the Good News"

rigaExpand.17.name:0 "A Proposal from the Archbishop of Riga"
rigaExpand.17.desc:0 "Perhaps due to their struggle with Sweden for Baltic trade, a messenger from the Bishopric of Riga has approached us. In a secret location, they brought a promise: if we openly declare opposition to Sweden and announce our independence, the Bishopric of Riga will fully support our independence and, thereafter, form a military alliance with us.\n\nBeneath such tempting conditions lies a corresponding cost. The treaty stipulates that Riga will thereafter receive commercial privileges within our nation. However, compared to independence, the terms proposed by Riga remain highly attractive.\n\nIf we gain the support of the Bishopric of Riga, our path to independence will be smooth. Most importantly, we retain the freedom to choose whether to honor the promises, for we have the right to reconsider."
rigaExpand.17.aa:0 "Let us first escape our current predicament"

rigaExpand.18.name:0 "The Response"
rigaExpand.18.desc:0 "The County of Skåne has agreed to sign a treaty with us. The [RIG.Monarch.GetTitle][RIG.Monarch.GetName] will assist them in achieving independence and form an alliance with them. In return, they will grant us commercial privileges in the Lübeck trade node and provide full support for our trade operations."
rigaExpand.18.aa:0 "Another deal is sealed"

rigaExpand.19.name:0 "On the Brink"
rigaExpand.19.desc:0 "All is in readiness. The forces of the Archbishopric of Riga await the signal to advance. According to the plan, we will bypass the Swedish garrisons in the county and launch a surprise assault on the fortress at Kalmar, preparing the way for the Rigan landing forces."
rigaExpand.19.aa:0 "Commence the Operation"

rigaExpand.20.name:0 "The Scanian Uprising"
rigaExpand.20.desc:0 "The Scanian region, forcibly seized by Sweden years ago, has never truly submitted to Swedish rule. The escalating conflict of interest between the Bishopric of Riga and Sweden in the Baltic has led the former to support the independence of the County of Skåne.\n\nFinally, amidst the roar of cannons at Kalmar, war has arrived."
rigaExpand.20.aa:0 "The First Step in Restoring the Danish Kingdom!"
rigaExpand.20.bb:0 "We Must Not Act Rashly!"

rigaExpand.21.name:0 "The Norwegian Crown"
rigaExpand.21.desc:0 "Since Denmark established a personal union with Norway in 1380, the Norwegian crown has passed between Swedish and Danish hands. With the outbreak of the Scanian War of Independence, Norway realizes it should not fight for Swedish hegemony in the Baltic. This time, Norway will defend its rights through independence. If the Swedes wish to place the Norwegian crown upon their heads again, they must pay in blood."
rigaExpand.21.aa:0 "The Norwegian Crown Shall Shine Once More!"

rigaExpand.22.name:0 "The Great Northern War"
rigaExpand.22.desc:0 "By the year [GetYear], the strategic advance of the Archbishopric of Riga into Scandinavia has far exceeded expectations—progressing with remarkable, even overwhelming, success. This has given the [Root.Monarch.GetTitle][Root.Monarch.GetName] a grander vision: to shift the objective from merely assisting the independence of the County of Skåne to the complete subjugation of the Scandinavian Peninsula.\n\nSuch a move will inevitably provoke fierce resistance from the peoples of the peninsula. We must also personally tear up the treaty made with the Count of Skåne. If we succeed, all of Scandinavia shall bow to the cross of the Archbishopric. If we fail, every shred of prestige, every ally, and every foothold that Riga has built in the peninsula over the years will shatter like morning frost under the sun."
rigaExpand.22.aa:0 "By God's will, the path is clear!"
rigaExpand.22.aa.tt:0 "§YIf we fail to complete the mission §RThe Great Northern War§! within five years, §Rour Scandinavian strategy will end in total failure§!."
rigaExpand.22.bb:0 "Proceed steadily; haste is unnecessary"

rigaExpand.23.name:0 "The Blizzard Ultimatum"
rigaExpand.23.desc:0 "Riga's ambitions are no longer satisfied with merely controlling Baltic trade. They demand that we either submit at once—or be made to submit by their swords. The situation for the peninsular nations is dire. Whatever differences may lie between us, the primary task now is to first drive out the invaders who threaten us all."
rigaExpand.23.aa:0 "Put aside grievances and unite the front!"
rigaExpand.23.bb:0 "We cannot do this..."

rigaExpand.24.name:0 "The Blizzard Ultimatum"
rigaExpand.24.desc:0 "The Bishopric of Riga has torn up the treaty they had with us. Now we must make a choice: submit to them or fight for our freedom."
rigaExpand.24.aa:0 "We have no choice..."
rigaExpand.24.bb:0 "They shall have to step over my corpse!"

rigaExpand.100.name:0 "A Sudden Downturn"
rigaExpand.100.desc:0 "As we failed to achieve our objectives, all social classes within our nation, as well as our subject states, have lost patience with this war and have forcibly halted all military operations. Perhaps the [Root.Monarch.GetTitle]'s vision is about to vanish like a bubble..."
rigaExpand.100.aa:0 "A grave miscalculation..."

rigaExpand.30.name:0 "Hanseatic Strategy"
rigaExpand.30.desc:0 "The name 'Hanseatic League' first appeared in 1344, initially as a commercial alliance of shared privileges. By 1356, the merchant Hansa had evolved into a city Hansa, with members including most North German coastal cities, with Lübeck, Hamburg, and Bremen at its core, later joined by Cologne, Danzig, and Königsberg. In 1358, cities on the eastern Baltic coast, including Riga, also joined the League. The League monopolized the intermediary trade between Eastern Europe, Northern Europe, and Western Europe, and also dealt in Eastern goods—spices and fine textiles—via Italian merchants. In 1367, representatives from 77 member cities held their first meeting in Cologne. The League established a supreme council and a supreme court; member cities were bound by its decisions, and the cities shared public finances and a navy, with the authority to independently conduct diplomacy—declaring war, making peace, and signing treaties.\n\nBy the mid-14th century, the Hanseatic League had expanded to encompass all German port cities along the southern and eastern Baltic coasts, and extended its reach across Europe. For all its immense influence, however, for Riga, this was not a sustainable long-term strategy. The League's long-standing principle of 'procuring only from the cheapest regions' meant that agriculture and handicrafts in its core territories never developed—a fatal flaw. Although the League faced no significant commercial competition at the time, as regional consolidation continued and new powers rose, pure mercantilism and protectionism would become increasingly untenable.\n\nNow, Riga urgently needs a new form of commerce, distinct from the traditional model. We will reduce our heavy reliance on trade and instead encourage handicrafts and agriculture to improve both the quantity and quality of goods, achieving commercial 'self-sufficiency' rather than relying solely on buying low and selling high. This will also ensure that our commercial activities can remain resilient during times of war."
rigaExpand.30.aa:0 "Let it begin!"

rigaExpand.31.name:0 "The Future of the Hanseatic League"
rigaExpand.31.desc:0 "Because the Hanseatic League is a loose confederation of autonomous cities, its members prioritize their own interests above the collective good. Therefore, as complex conflicts of interest and military pressures emerge, internal divisions begin to surface, with some member cities seeking advantage at the expense of others. Now that Riga has formally declared its bid to challenge the League's trade hegemony in the Baltic, this tendency is certain to accelerate. Other League members are already stirring, and some have expressed concern that matters may develop unfavorably for us. The Hanseatic League must reunite to counter the influence of Riga."
rigaExpand.31.aa:0 "The Hanseatic League's trade position shall not be challenged!"
rigaExpand.31.aa.tt:0 "This will escalate the Riga-Hansa trade dispute"
rigaExpand.31.bb:0 "We should not further escalate the situation"

rigaExpand.32.name:0 "The Danish-Rigan Trade Alliance"
rigaExpand.32.desc:0 "Riga has recently engaged in a fierce trade war with the Hanseatic League, employing nearly every means short of war to contest trade in the Lübeck and Baltic regions. Now, Riga has reached out to us, hoping to form a new trade alliance to jointly oppose Lübeck and expand the trade sphere for both parties."
rigaExpand.32.aa:0 "We support the establishment of this alliance"
rigaExpand.32.aa.tt:0 "This will escalate the Riga-Hansa trade dispute"
rigaExpand.32.bb:0 "We have our own plans"

rigaExpand.33.name:0 "The Riga-Hansa Trade War"
rigaExpand.33.desc:0 "In recent days, the new trade alliance formed by the Archbishopric of Riga has further escalated its trade war with the Hanseatic League, plunging the commercial situation in North Germany into murky and treacherous waters. If we choose to support one side, we may seize a share of the spoils—but this will inevitably intensify the scale of the North German trade war."
rigaExpand.33.aa:0 "We support the Riga-Danish alliance"
rigaExpand.33.bb:0 "We support the Hanseatic League"
rigaExpand.33.cc:0 "We remain neutral"

rigaExpand.34.name:0 "Imperial Decree"
rigaExpand.34.desc:0 "The protracted North German trade war has compelled the Emperor to make a decision to address the grievances of the Imperial Estates. After some deliberation, the Emperor has chosen to demand that the Bishopric of Riga immediately and unconditionally cease this trade war. Otherwise, the Emperor will resort to military means to end the North German trade dispute."
rigaExpand.34.aa:0 "The answer lies with sword and steel!"
rigaExpand.34.aa.tooltip:0 "The Emperor will lead the Hanseatic League in launching an attack\n\nAll North German princes who supported us in the trade dispute will join our side, while those who opposed will join the opposing side\n\nMembers of both trade alliances will also join the war"
rigaExpand.34.bb:0 "We must not provoke the Emperor..."
rigaExpand.34.bb.tt:0 "This will immediately halt our trade war with the Hanseatic League, and all related modifiers will be removed"

rigaExpandIncident.0.name:0 "The North German Trade War"
rigaExpandIncident.0.desc:0 "For a long time, commerce in Northern Germany had been largely dominated by the Wendish and Saxon circles of the Hanseatic League. The secular princes within the Empire, whose economies were mostly based on the manorial system with limited production and low efficiency, gained considerable commercial benefits through the activities of Hanseatic merchants. After joining the League, the raw materials produced in their own lands could be sold at higher prices in foreign markets, while they could obtain higher-quality imported goods. The import and export duties collected by Hanseatic merchants also provided the princely treasuries with a stable and reliable source of income. Thus, the various princes generally welcomed the League's establishment of trading posts in their domains.\n\nWith the rise of another Baltic city—Riga—the Hanseatic League's commercial dominance in the Baltic began to waver, and competition between the two sides gradually intensified. The Archbishopric of Riga and Lübeck, the leader of the Hanseatic League, had already been embroiled in a series of commercial conflicts over the past period. Recently, the newly formed trade alliance between the Bishopric of Riga and various Danish city-states has pushed this dispute to new heights. The North German princes, seeking to protect their own interests, began to lean toward one side or the other, implementing supportive policies and concrete actions in pursuit of greater profits. However, this alignment further fractured the already strained relations among the princes, each with their own grievances. Small-scale skirmishes between mercenary forces occurred frequently; economic instability triggered increasingly frequent peasant uprisings. As the trade war dragged on, the entire Holy Roman Empire felt the effects of the North German trade dispute—rebellion, famine, and war loomed over the Empire constantly."
rigaExpandIncident.0.aa:0 "Only war can end the dispute"
rigaExpandIncident.0.bb:0 "The Emperor should mediate the conflict"
rigaExpandIncident.0.cc:0 "This dispute will settle on its own"

rigaExpand.35.name:0 "Dust Settles"
rigaExpand.35.desc:0 "During the campaign against the combined forces of the Emperor and the Hanseatic League, we gradually gained the upper hand. Our fleet's blockade of the League sapped their will to continue fighting. At the same time, the Emperor's declaration of war met resistance from many North German princes who supported Riga. Recognizing that victory was beyond his grasp, the Emperor began negotiations with the Bishopric of Riga.\n\nThough we held the advantage, the economic toll of the war was severe. Continuing the conflict would bring no benefit—only further deterioration of North Germany's economy, which ran counter to our original intentions. Therefore, Riga presented the Emperor with a peace treaty. This treaty confirmed the absolute dominance of the Bishopric of Riga over the Hanseatic League. All Hanseatic members except Lübeck would become trade zones of Riga—nominal vassals under Riga's suzerainty."
rigaExpand.35.aa:0 "Excellent!"
rigaExpand.35.aa.tt:0 "The protracted trade war now comes to an end"

rigaExpand.36.name:0 "The Zealand Agreement"
rigaExpand.36.desc:0 "The masts of Lübeck snapped against the crests of the Baltic waves. The old banners of the Hanseatic League were lowered from the towers of one city after another, replaced by the flags of Riga. The free cities that had once stood in the ruins of the Danish kingdom sent envoys to Riga, their mouths full of praise: 'Warriors of the Land of Mary, your will is stronger than steel. We shall cast our anchors in your harbors, so long as you shield us from the northern storms with your swords.'\n\nThe [Root.Monarch.GetTitle][Root.Monarch.GetName] did not turn them away. The agreement was passed with almost no opposition. From that day forward, the trade of North Germany lay entirely in Riga's hands."
rigaExpand.36.aa:0 "Excellent"

rigaExpand.37.name:0 "North-Eastern Rus' Strategy"
rigaExpand.37.desc:0 "The civil wars of Northeastern Rus' could not stop their rise. We must act swiftly in this region—to bring Novgorod, the key upstream node of Baltic trade, under our control, and to curb the emergence of any powerful Grand Prince of Rus'.\n\nFirst, we must seize Pskov, east of the Livonian Order. The Northern Crusades once shattered against its walls. This city is the gateway to Novgorod, and we must take it with a §Ymeticulous plan§!. Let us not strike before our strategic deployment is complete.\n\nOnce the gates of Pskov open to our banners, the road to Novgorod lies clear. Then we will march east without delay, striking while they still gasp for breath from their civil wars. Let us settle this eastern menace once and for all, so that the upper reaches of Baltic trade remain forever in Riga's grasp."
rigaExpand.37.aa:0 "Begin our plans"

rigaExpand.38.name:0 "A Meticulous Plan"
rigaExpand.38.desc:0 "We must lay the groundwork for the coming offensive. For now, our operations in Northeastern Rus' will focus on reconnaissance and infiltration. Over the course of a year, we will learn which cities are well-stocked, which rivers are fordable, which princes nurse grudges against their neighbors—and we will trace every hidden path leading to Pskov."
rigaExpand.38.aa:0 "Gather the supplies!"
rigaExpand.38.aa.tt:0 "We need time for war preparations; launching an attack during this period would be most unwise"

rigaExpand.39.name:0 "An Unexpected Complication"
rigaExpand.39.desc:0 "Though our plans were not yet complete, we took Pskov nonetheless. But this haste has forced us to adjust our entire strategic framework to ensure the smooth progress of subsequent operations."
rigaExpand.39.aa:0 "We still need to wait"

rigaExpand.40.name:0 "Storm Clouds Gather"
rigaExpand.40.desc:0 "The fall of Pskov has forced us to reconsider our strategic direction—whether to first drive out the infidels who have invaded our lands. The other Rus' states will also react. Should they agree to our plans, we shall join forces with them for the coming battle."
rigaExpand.40.aa:0 "Let them remember the lesson of 1242"
rigaExpand.40.bb:0 "We are not concerned with such matters"

rigaExpand.41.name:0 "War Doctrine"
rigaExpand.41.desc:0 "Based on our current preparations, we can choose our preferred method of warfare: a war of attrition or a war of raids.\n\nThe former will prolong the conflict but reduce supply attrition for large army operations. The latter focuses on small elite units for swift strikes—effective, but it will increase our army's attrition."
rigaExpand.41.aa:0 "Wage a war of attrition"
rigaExpand.41.bb:0 "A war of raids is preferable"

rigaExpand.43.name:0 "The Pskov Uprising"
rigaExpand.43.desc:0 "Despite the Bishopric of Riga's successful campaigns in Pskov, its control over the city has always been tenuous. Today, Pskov has officially broken free from the Bishopric's control and is attempting to garner support from surrounding Rus' states for their rebellion."
rigaExpand.43.aa:0 "Drive the heretics from our city!"
rigaExpand.43.bb:0 "We are not ready..."

rigaExpand.44.name:0 "Pskov's Betrayal"
rigaExpand.44.desc:0 "Word has come from Pskov: they have broken free from our control and declared war on us. This has thrown our carefully laid plans into disarray. We must urgently coordinate with the armies of our subject states—or our strategy will grind to a halt."
rigaExpand.44.aa:0 "Immediately begin restoring military order"

rigaExpand.45.name:0 "The Pskov Uprising"
rigaExpand.45.desc:0 "Pskov has risen in revolt. We must decide whether to support their actions to undermine the Bishopric of Riga's influence in the Rus' region."
rigaExpand.45.aa:0 "We will support Pskov"
rigaExpand.45.bb:0 "The risks are too great"

rigaExpand.46.name:0 "Avenging the Ice"
rigaExpand.46.desc:0 "On 15 April 1242, the ice of Lake Peipus shattered beneath the clash of swords and hooves. On that day, the banners of the Northern Crusades sank into the dark waters, and the elite of the Livonian Order fell before the Rus' cavalry of Alexander Nevsky. But today, after careful preparation and planning, Riga's war banners have finally been raised over the walls of Pskov. More than two centuries later, we have once again set foot on the path of conquest."
rigaExpand.46.aa:0 "A major victory!"
rigaExpand.46.bb:0 "Stay vigilant; the enemy is not yet broken"

rigaExpand.47.name:0 "The Neva Agreement"
rigaExpand.47.desc:0 "The war drums fade. The swords return to their scabbards. Novgorod, the ancient city on the banks of the Volkhov River, has bowed its head to us. From this day forward, the furs of the Volga, the grain and livestock of Rus' heartlands, will pass no longer through infidel markets, but will be shipped directly to Riga's docks. The Rus' nobles who once barred our caravans now either repent in monasteries or press their seals upon the new treaties. Yet let us not hoard gold and forget the spirit's wealth. Remember: it is the Lord who grants us these riches, to steward for the expansion of His kingdom."
rigaExpand.47.aa:0 "On to the next plan"

rigaExpand.50.name:0 "Polish-Ruthenian Strategy"
rigaExpand.50.desc:0 "The Polish crown shattered into three pieces after the fall of Władysław III. Among them, Sandomierz fell into the hands of the Hussites—those heretics from Bohemia—while the Duke of Greater Poland maintains close ties with the Holy Roman Empire and may well seek imperial protection. Polish unification will not proceed swiftly or smoothly. Moreover, the Teutonic Order has long been at odds with the Polish states, making it difficult to win their trust. Fortunately, we may use the pretext of purging heresy to intervene in the region, strengthening our trade position in the Baltic and expanding our influence.\n\nThough Kievan Rus' descended into civil war after the death of its Grand Prince in 1443, this state of affairs will not last long. As heirs to the Northern Crusades, we can make no compromise with the infidels. Only war can secure what we seek. We must defend our southern frontier."
rigaExpand.50.aa:0 "Begin the planning"

rigaExpand.51.name:0 "Advance Slowly, Attack Swiftly"
rigaExpand.51.desc:0 "We have chosen to slow our march—to reinforce our armor, to sharpen our assault formations. We move slowly, but our impact and protection will be greatly enhanced: the steppe nomad cavalry will find it hard to break our iron wall, while our charge will be more than enough to shatter their ranks."
rigaExpand.51.aa:0 "Slow to conquer, heavy to break."

rigaExpand.60.name:0 "The Heart of the Baltic"
rigaExpand.60.desc:0 "At the confluence of the Daugava River and the Gulf of Riga stands a magnificent city. From its beginnings in 1150 with Gotlandic merchants developing the mouth of the Western Dvina, to the arrival of the first crusaders in Livonia and the building of a fortress in 1201, through the end of the Northern Crusades, and to the archbishopric becoming a free city in 1366, arriving now in the year [GetYear]...\n\nThe [Root.Monarch.GetTitle] [Root.Monarch.GetName] gazes upon this prosperous city—ablaze with lights, teeming with merchants, its towers reaching for the sky. Whether in Stockholm, Danzig, or even the distant Neva, one can glimpse this city, seeming both far away and yet so close, the city that rules the entire Baltic Sea. Constantinople, Paris, Vienna, Lübeck, Milan... any city you can imagine pales before it. Perhaps only the distant, mysterious kingdoms of the East can compare.\n\nWithin this city, all are united under the [Root.Religion.GetName] and the [Root.Monarch.GetTitle] [Root.Monarch.GetName]. Cultures converge and blend here; people of all classes meet as equals. And all of the Land of Mary dances, sings, and raves for it! This is the heart of the Land of Mary—Riga!\n\nJust as the [Root.Monarch.GetTitle] [Root.Monarch.GetName] is lost in admiration and awe at this vision, a faint, ethereal voice echoes in their mind. It floats, barely there, yet clear, calling them to look upon the entire Land of Mary..."
rigaExpand.60.aa:0 "The story is not over..."

rigaExpand.61.name:0 "Divine Revelation"
rigaExpand.61.desc:0 "At an emergency council of the Bishopric of Riga, the [Root.Monarch.GetTitle][Root.Monarch.GetName] announced that he had received a divine mandate to spread the Gospel to all corners and to bring prosperity and peace to the entire Baltic region.\n\nNo one questioned the [Root.Monarch.GetTitle]'s words. The representatives then deliberated on how to realize this plan. After several days, a project called the "Universal City" was conceived—a plan to promote the development of every city in the Baltic by every means possible. This would be a long and arduous undertaking, requiring far-sighted planning. How long it could be sustained, no one knew."
rigaExpand.61.aa:0 "Let us begin"

rigaExpand.70.name:0 "The Journey Begins"
rigaExpand.70.desc:0 "The long-prepared Universal City project was now officially launched. The Land of Mary—this soil watered by the blood of the Livonian knights, soaked by the sweat of merchants, and lifted by the prayers of countless nameless missionaries—was now to become a beacon to the world. Barns would no longer stand empty; the sick would find shelter in hospitals; children would learn their letters in schools; merchants would travel on safe roads. All peoples, all tongues, would be blessed by Riga's great plan.\n\nOf course, the project's implementation would take time, and the [Root.Monarch.GetTitle][Root.Monarch.GetName] would have ample opportunity, amid the slow unfolding of this grand design, to ponder matters beyond the Universal City itself..."
rigaExpand.70.aa:0 "Raise the Curtain"
rig_terra_mariana.tt:0 "§YWe will officially commence the Universal City Project§!"
rigaExpand.70.aa.tt:0 "We can now construct buildings for our §Ysubject nations§! through a §TSpecial Interaction§! in the §YProvince Interface§!\n\nThis interaction consumes §YManpower§!£manpower£ instead of §YDucats§!¤ and §GIgnores technology level§! for construction\n\nIt allows the construction of §Yhigher-tier§! buildings via this §Tinteraction§! and unlocks some §Yunique buildings§!\n\nIf we have §Ynot§! unlocked the §TInfrastructure§! idea group, we immediately and §Yunconditionally§! unlock the §TInfrastructure§! idea group\n\nUnlocks the §YGovernment Reform§!: §TUniversal City Ideal§!\n\nThe §YArchbishop requires further time for contemplation§!"

rigaExpand.71.name:0 "Interlude"
rigaExpand.71.desc:0 "Riga's vast episcopal administrative system appears to be functioning well on the surface. But only the [Root.Monarch.GetTitle][Root.Monarch.GetName] knows that beneath the polished surface, things are far less bright.\n\nFor now, the paperwork still flows, and the tax silver still arrives on time. But this is temporary. As time passes, the power and development of each bishopric grow inexorably—the Administrative Regions hold armies and vast lands, yet they lean on Riga's governance; the Economic Regions are rich in coin but depend on Riga's fleets for protection; the Military Districts, the shields of the frontier, command the finest soldiers, yet their grain and pay come from the center. It is a fragile equilibrium, like three stones propping each other up. If any one shifts, the whole edifice may collapse. And the first to fall will be the one we entrusted with purely military purpose—the Military District. When they no longer need Riga's grain, and no longer fear Riga's authority, the hammer will turn back on our own hands.\n\nThe Archbishopric of Riga stands as the firmest pillar of Catholicism in the North. But around that pillar, heresies grow like weeds in every crack of Europe: the whispers of the Devotio Moderna, the torches of the Hussites, the spread of Catharism in Provence—all of these have already made the Holy See tremble. Yet the [Root.Monarch.GetTitle] is even more concerned with the currents not yet written on parchment. The failure of the two Albigensian Crusades and the rise of secular power have allowed the crown to overshadow the tiara. The Italian Renaissance spreads like a plague, from Florence to Paris, London, and Berlin—the jingle of merchant coin drowning out the monks' evening prayers. In Germany, the common folk look at the papal tax collectors and offer curses rather than praise. A storm is gathering on the horizon—a Reformation that will shake the Catholic world. When that day comes, Riga must choose: hold fast to the old faith, or ride the rising gale across Europe?\n\nYet compared to the religious storms to come, the rot within our military is far more tangible. For too long, Riga has relied on the independent forces of its bishoprics, the allied orders, and the military districts to fight its wars. Victories have come so often that no one has bothered to inspect the true state of Riga's own troops. But the [Root.Monarch.GetTitle] knows full well that those forces are like dry, rotting timber. A single city's manpower has its limits. If we conscript only within Riga's walls, the population will plummet and resentment will rise. So we have long recruited across the bishoprics, mixing together men of different tongues, customs, and allegiances. This is fatal to any army that must fight in unison. Worse still, our generals have been spoiled by victory. They have learned that even if they stay off the field, the orders and military districts will still win the war. Thus our armor rusts, our drills fall slack, and from general to foot soldier, a shared conviction spreads: training is pointless. For now, the bishoprics have not yet questioned our strength. As long as Riga can field a large enough army, they will continue to bow. But the paper tiger will one day be pierced. §RWhen that time comes, we shall surely crumble from within.§!"
rigaExpand.71.aa:0 "The path ahead is unknown..."
rigaExpand.71.aa.tt:0 "§YYet the Land of Mary remains prosperous, and Riga shall march on towards the future§!"
rig_riga_religious_dilemma.tt:0 "Due to Riga's current religious predicament, all our §Ybishopric§! and §Oknightly order§! subjects will be unable to convert provinces and will receive a penalty to religious unity.\n"

rigaExpand.72.name:0 "The Second Council of Riga"
rigaExpand.72.desc:0 "The First Council of Riga is long past. Now, this Second Council will bring sweeping reforms to all of Riga. The [Root.Monarch.GetTitle][Root.Monarch.GetName] has proposed two major reforms—one administrative, one military. Due to Riga's institutional inertia, we can focus on only one at a time.\n\nThe question is which to prioritize: the urgent military overhaul or the proactive administrative restructuring? The [Root.Monarch.GetTitle][Root.Monarch.GetName] shall make the choice."
rigaExpand.72.aa:0 "We will focus on military reform"
rigaExpand.72.bb:0 "We will focus on administrative reform"

rigaExpand.73.name:0 "The State of the Rigan Army"
rigaExpand.73.desc:0 "Riga's army was once an iron wall that held the heathen at bay across the frozen lake. But now, that wall is rotting from within. Corruption gnaws like a worm through every warhorse and every sack of grain. The [Root.Monarch.GetTitle][Root.Monarch.GetName] has pounded the council table time and again, demanding reform. The first time, the generals bowed and scraped, then applied a fresh coat of paint. The second time, they gave their word and promptly forgot. The third time, some even changed the subject—to Polish wheat and French wine.\n\n'What are you doing?' demanded the [Root.Monarch.GetTitle].\n\n'Reforming,' they replied, with innocent smiles plastered across their faces.\n\nThe [Root.Monarch.GetTitle] tried a gentle hand, tried words of persuasion, tried giving them opportunities to repent. But they mistook leniency for weakness. This time, the [Root.Monarch.GetTitle] will use every means necessary to drive military reform.\n\n§RMay the Lord forgive the blood I am about to shed. But I would rather wash this army clean with blood than watch it rot to bone in comfort.§!"
rigaExpand.73.aa:0 "We shall see"

rigaExpand.74.name:0 "A Flawless Plan"
rigaExpand.74.desc:0 "The [Root.Monarch.GetTitle] has devised a scheme. Our [Root.Mil_Advisor.GetTitle] [Root.Mil_Advisor.GetName] will organize and execute a covert operation targeting key Rigan army commanders. The [Root.Monarch.GetTitle] demands utmost secrecy and that no vital military leaders come to harm—though some 'unfortunate accidents' may be permissible."
rigaExpand.74.aa:0 "Proceed with caution"
rigaExpand.74.aa.tt:0 "We require time to prepare the operation"

rigaExpand.75.name:0 "Under Cover of Night"
rigaExpand.75.desc:0 "The night was black as ink, crawling from the Daugava River across the city walls and swallowing every street of Riga. The generals' mansions blazed with lamplight—some were dead drunk, having traded cups deep into the night; others lay with mistresses in their chambers, deaf to the footsteps outside their windows. Now, our plan is but one step from completion: to drag these slumbering worms from their warm beds and lock them in the irons that await them."
rigaExpand.75.aa:0 "Let us hope they sleep soundly tonight"

rigaExpand.76.name:0 "Dawn"
rigaExpand.76.desc:0 "The first light of dawn pierced the mist over the Daugava, and our operation was complete. Nearly every high-ranking military commander in Riga was now in custody. A few who resisted fell in 'accidents' and were carried out of the city that very night, buried in unmarked graves. The [Root.Monarch.GetTitle][Root.Monarch.GetName] summoned all the city's bishops, order commanders, and magistrates, and publicly proclaimed the generals guilty of treason: embezzlement of pay, obstruction of reform, collusion with foreign powers, sedition—charges, each more damning than the last, were read aloud in full.\n\nSuch actions will undoubtedly lead the people to question whether their army can still protect them—and will strike a heavy blow to our standing among our subjects. But these sacrifices are necessary for reform. Now, Riga's military apparatus lies fully in the hands of the [Root.Monarch.GetTitle][Root.Monarch.GetName], and the military reform of Riga can at last begin in earnest."
rigaExpand.76.aa:0 "Short-term pain for long-term gain"
rigaExpand.76.aa.tt:0 "Liberty desire of all our subjects §R+10%§!\n\n§YRiga's military reform officially begins§!"

rigaExpand.77.name:0 "Emergency Conscription Act"
rigaExpand.77.desc:0 "All previous armies have been disbanded. Our diplomats will fan out across our subject states to steady the waters, while the [Root.Monarch.GetTitle][Root.Monarch.GetName] today issued an emergency conscription act to prevent the collapse of Riga's defensive system.\n\nAt the same time, the first regiment of our reorganized army has completed its formation and stands ready to march into battle at a moment's notice."
rigaExpand.77.aa:0 "The first step"
rigaExpand.77.aa.tt:0 "We will deploy a force consisting of §Y35§! infantry and §Y15§! cavalry regiments in our capital"

rigaExpand.78.name:0 "Military Doctrine Guidance"
rigaExpand.78.desc:0 "Riga's tradition has always been to summon the generals and strategists of its subject states before any war, to meticulously plan every campaign. We study the enemy's formations, plot the march routes, assess weather and terrain, and dissect the opponent's tactics. In this way, we gain advantages on the battlefield, coordinate effectively with our subjects' forces, and remain prepared for contingencies.\n\nOf course, this approach has its clear drawbacks: we are ill-equipped to respond to sudden outbreaks of war. A surprise assault could find us unable to muster an effective resistance on short notice. Thus, reverting to the traditional declaration-of-war mechanism remains a viable alternative."
rigaExpand.78.aa:0 "Resolutely follow our nation's unique strategic system path"
rigaExpand.78.aa.tt:0 "Upon completion of the reform, we will activate the §YGreat Rigan Campaign§! mechanism"
rigaExpand.78.bb:0 "We should return to traditional warfare methods!"
rigaExpand.78.bb.tt:0 "Continue using the original declaration of war mechanics, with no unique features (though perhaps that itself is a feature?)\n§RNote: This option may lead to some strange issues§!"

rigaExpand.79.name:0 "Military Organization Guidance"
rigaExpand.79.desc:0 "Among the officers, two main schools of thought have emerged on the army's organizational scale. One faction holds that we should prioritize reforming the supply system for large-scale forces; the other argues that we should focus on training small, elite units."
rigaExpand.79.aa:0 "We need to improve our supply system first"
rigaExpand.79.aa.tt:0 "After the reform concludes, we will field larger and more coordinated armies"
rigaExpand.79.bb:0 "We need to prioritize training elite troops"
rigaExpand.79.bb.tt:0 "After the reform concludes, we will field smaller and more elite armies"

rigaExpand.80.name:0 "Joint Military Drills"
rigaExpand.80.desc:0 "In the year [GetYear], by the command of the [Root.Monarch.GetTitle][Root.Monarch.GetName], the Archbishopric of Riga and all its subject bishoprics dispatched their finest troops to gather on the parade grounds beside the Daugava. This joint exercise was a full exchange of military knowledge: strategy, tactics, operational methods, weaponry, siege equipment—all were shared and debated. Veterans of the Teutonic Order demonstrated to the Rus' recruits the proper way to raise siege ladders against a wall; Livonian engineers argued with Kiev's gunners over how to make cannons shoot farther; Polish staff officers and Scandinavian generals clashed over sand tables.\n\nThrough this process, we have thoroughly overhauled our military system and forged a far deeper understanding with our subjects' forces, influencing their military development in many ways. This gathering also marks the conclusion of Riga's military reforms—a new Rigan army is about to be born!"
rigaExpand.80.aa:0 "One final push"

rigaExpand.81.name:0 "On Strategy"
rigaExpand.81.desc:0 "Military action cannot solve all problems, but it is a necessary condition for solving any of them. Current methods of war are lamentably inefficient—slow mobilization, chaotic coordination, sluggish deployment—no longer sufficient for Riga's expanding military system and ever-greater ambitions. We shall establish a dedicated War Planning Department, to break free from the constraints of traditional declaration-of-war mechanisms.\n\nThe War Planning Department will allow us to declare a §YGreat Campaign§! against all sovereign states in a region. However, declaring war on any nation without adequate preparation will severely impact our government's stability.\n\nRegardless, the age of Riga is at hand. For the Lord is with those who plan, and He shall be with those who prevail."
rigaExpand.81.aa:0 "War is the continuation of politics"
rigaExpand.81.aa.tt.1:0 "Our §YBishoprics§! and §OKnightly Orders§!, will receive the above modifiers, as well as §G+25%§! National Supply Limit\n"
rigaExpand.81.aa.tt.2:0 "Our §YBishoprics§! and §OKnightly Orders§!, will receive the above modifier, as well as §G+10%§! Army Movement Speed\n"
# rigaExpand.81.aa.tt.1:0 "Our §Ybishopric§! and §Oknightly order§! subjects, while receiving the aforementioned modifiers, will also gain §G+25%§! national supply limit\n"
# rigaExpand.81.aa.tt.2:0 "Our §Ybishopric§! and §Oknightly order§! subjects, while receiving the aforementioned modifiers, will also gain §G+10%§! army movement speed\n"

rigaExpand.82.name:0 "The State of the Rigan Administrative System"
rigaExpand.82.desc:0 "Riga's administrative system can fairly be called irreproachable: it maintains the flow of documents, tax silver, and legal decrees across a great number of bishoprics—a blessing from the Lord. But Riga is far from content with the status quo. The demands of expansion call for administrative reform. Governing a larger state requires a more robust system, especially for a nation like Riga, built upon control over individual bishoprics. The prosperity and stability of these subjects are paramount—perhaps even more vital than the development of Riga city itself.\n\nWith the continued growth of Baltic commerce, the outer districts of Riga are steadily expanding into the territory of the Livonian Order. However, such commercial and productive expansion does nothing to improve our administrative system; on the contrary, it forces Riga's limited administrative capacity to bear the weight of an ever-growing trade and production network. The expansion of the inner-city administrative system has barely kept pace with our current needs. We must find ways to enhance the city's administrative capacity—whether by streamlining the inner-city bureaucracy or by direct expansion. The immediate priority is to increase paper production, for parchment is too costly and memory too short. Riga's future must be written in ink across a thousand thousand pages."
rigaExpand.82.aa:0 "Paper is the future!"

rigaExpand.83.name:0 "Calm Waters"
rigaExpand.83.desc:0 "In the labyrinthine streets of Riga's inner city, clerical administrators in robes are a common sight, rushing with scrolls between the cathedral and the liaison offices of the various subject states. The process of managing the bishoprics is, in principle, straightforward: if the [Root.Monarch.GetTitle] wishes to send an order to a subject, the command is relayed to the specific department responsible for that state, where scribes copy, seal, and dispatch messengers. Communications from subjects merely reverse the process.\n\nTo remain informed of each subject's condition, every bishopric is required to periodically report its finances, active forces, population, and other data to Riga. Riga then coordinates trade and economic distribution among its subjects, guiding their developmental priorities. Though the subjects enjoy considerable policy autonomy, they lack Riga's vast administrative apparatus and information networks. They may manage their own affairs well enough and respond to crises on their own, but they can only alleviate pressure through their own means. Intervention by the Archbishopric of Riga can mobilize other subjects to share strengths, compensate for weaknesses, and cooperate to weather crises together.\n\nYet the shortcomings of this system are plain. Corruption is a perennial blight; figures often require verification by dispatched inspectors, and delays in information can lead to erroneous orders. More critically, as the bishoprics grow and new cities are built, the administrative bodies of subjects expand, forcing Riga's own administration to expand in turn. The increase in subjects will further inflate Riga's administrative expenditures—like building floor after floor upon an old foundation, until the foundation can bear no more."
rigaExpand.83.aa:0 "We need a plan"

rigaExpand.84.name:0 "Dawn"
rigaExpand.84.desc:0 "Reform is never easy, especially when faced with this deeply rooted, sprawling administrative system. The [Root.Adm_Advisor.GetTitle] [Root.Adm_Advisor.GetName] has proposed a bottom-up reform plan: at the lower level, we will streamline the administrative systems of subject states, merge those with overlapping functions, reduce the number of nodes for document transmission, and compress the layers of reporting. At the upper level, we must expand Riga's administrative apparatus to ensure its capacity can support the ever-growing network of subjects.\n\nHowever, this consolidation of subject administrations will demand both time and effort, meaning we will face greater administrative strain in the short term. Yet the long-term benefits, once completed, are self-evident."
rigaExpand.84.aa:0 "Let the reform begin now"

rigaExpand.85.name:0 "Administrative Restructuring"
rigaExpand.85.desc:0 "Unlike reforms in other nations, Riga's administrative reform is far more complex and difficult. It involves not only the interests of our own estates but also those of the various classes within our subject states. Large-scale restructuring of the administrative structure will inevitably generate conflicts of interest across all parties. This will lead to problems: administrative inefficiency due to poor inter-departmental coordination, and unrest caused by dissatisfaction with how policies are implemented. But such outcomes are not inevitable—opposition will never cease beneath the shadow of change. If we possess sufficient strength, applying a mix of persuasion and coercion, we can make them recognize their proper place.\n\nCompared to a radical, one-step approach, a gradual pace may be better suited to Riga's current situation. We do not need to reform all subject states at once. Instead, we can select one suitable subject for a pilot reform, and once completed, move on to the next. This will prolong the overall reform timeline, but it will help maintain stability within the Archbishopric throughout the process."
rigaExpand.85.aa:0 "We do not have much time; we must push the reforms swiftly"
rigaExpand.85.bb:0 "Haste makes waste; we should proceed steadily"

rigaExpand.87.name:0 "Unrest"
rigaExpand.87.desc:0 "The recent reform measures by the Rigan government have stirred unrest among classes discontented with Riga's rule across various districts of the city. The temporary disarray in the central administration during the reform period has given these radical elements an opportunity.\n\nSome rebels claim that Riga has accumulated immense wealth during its rule without using it to improve conditions in the outer districts, decrying the disparities between inner and outer areas and demanding fairer treatment. Meanwhile, upon hearing rumours of unrest in the outer districts, disturbances have also broken out in the middle districts—nothing serious at first, until a ship laden with gold and silver bound for Riga was seized by a group of insurgents. The wealth amassed through Riga's long prosperity has become yet another spark for rebellion.\n\nThe government, already thrown into temporary chaos by the reforms, is buried in backlogged documents and muddled commands. By the time the [Root.Monarch.GetTitle] finally issued orders to restore order, the flames had spread across much of the city. Equal distribution cannot quell greed; and when faced with a fortune almost within reach, desire becomes the driving force of all action.\n\nGiven Riga's immense urban scale, deploying the army to suppress the unrest would cause severe damage. Therefore, we can only rely on Riga's city guard to quell this disturbance quickly."
rigaExpand.87.aa:0 "A storm is brewing"

rigaExpand.88.name:0 "Mutiny"
rigaExpand.88.desc:0 "With the unrest still ongoing, the [Root.Monarch.GetTitle] considered that involving subject states in suppression would severely damage Riga's prestige and could lead to unforeseeable consequences. Thus, we chose not to call for aid, keeping the outside world—and our subjects—unaware of what was truly happening within Riga's walls. Though no word was sent to the subject states, such a massive event could not be hidden forever.\n\nThis morning, a force led by [riga_rebel_target.GetName][riga_rebel_target.Monarch.GetTitle][riga_rebel_target.Monarch.GetName] appeared suddenly outside Riga's gates, claiming to be coming to 'purge the rebels.' The [Root.Monarch.GetTitle] strictly forbade this overreach, but the order was ignored. The troops marched straight through the city gates, their hooves splashing through the rain and ash of the night before."
rigaExpand.88.aa:0 "Traitors!"

rigaExpand.89.name:0 "The Dust Settles"
rigaExpand.89.desc:0 "Clearly, the mutinous forces of [riga_rebel_target.GetName] did not anticipate the complexity of the situation within the city. After assisting the city guard in quelling the urban riots, they were left with no strength for further action and withdrew from the city.\n\nThe [Root.Monarch.GetTitle] reprimanded this behavior. However, since their actions were publicly portrayed in a positive light, the [Root.Monarch.GetTitle] does not intend to formally respond to this transgression."
rigaExpand.89.aa:0 "Bring them down!"

rigaExpand.90.name:0 "Bishopric Reforms"
rigaExpand.90.desc:0 "The traditional functions of the various bishoprics can no longer meet our current administrative needs. Whether they are economic zones, military districts, or administrative regions, all require transformation—a more efficient administrative system is needed, demanding sweeping reforms.\n\nAfter a period of administrative adaptation and government restructuring, we have established a more efficient administrative network. This will significantly enhance the administrative efficiency of our bishoprics and allocate them more administrative functions to handle increasingly demanding tasks."
rigaExpand.90.aa:0 "Proceed"

rigaExpand.91.name:0 "Knightly Order Reorganization"
rigaExpand.91.desc:0 "The knightly orders have long existed as Riga's most important military organizations. Yet for too long, we have failed to clearly define their territorial rights and responsibilities. Another aspect of the reforms, then, is to establish what each order is expected to do—and what they are entitled to.\n\nTypically, the orders have followed the example of secular lords: establishing estates on the lands they hold, working the peasants, and supporting their knights with the produce. This system, however, tends to grind down the peasantry and yields low efficiency. A change is overdue.\n\nAfter careful deliberation, the [Root.Monarch.GetTitle] declared that knights' fiefs would be limited to property, not land. The Archbishopric would take over all manors and establish a new system—'military merit'—by which all knights would receive additional income to compensate for their losses."
rigaExpand.91.aa:0 "The next step is..."

rigaExpand.110.name:0 "The Third Council of Riga"
rigaExpand.110.desc:0 "Unlike the calm between the First and Second Councils of Riga, the aftermath of the Second Council's reforms remains vivid—a constant reminder to the [Root.Monarch.GetTitle][Root.Monarch.GetName] that nothing can be taken lightly. Now, Riga's vast vassal system has gradually taken shape. Reborn through military and political reform, Riga sets out once more, ready to face new challenges. With the increase in subject bishoprics, the number of representatives has grown considerably. To prepare for this council, the [Root.Monarch.GetTitle] has been compelled to place the expansion of the congressional hall high on the agenda.\n\nThe First Council dealt with the very survival of Riga. The Second Council addressed the long-standing ills of its administration, faith, and military. This Third Council will turn Riga's gaze toward far greater ambitions.\n\nThe failure of the Northern Crusades left Riga struggling for survival for generations. But after centuries of development, Riga is no longer as weak as it once was. It now possesses both the strength and the opportunity to resume its abandoned mission. Thus the [Root.Monarch.GetTitle][Root.Monarch.GetName] announced at the council that Riga would prepare for a new crusade in the coming years.\n\nUnlike the crusades of old, this campaign will be planned with meticulous care, managed entirely by the [Root.Monarch.GetTitle] and Riga's various bishopric subjects, free from outside interference. The crusade is divided into two great thrusts: the first will march south from Podolia, crossing the mud of Moldavia and Wallachia to Constantinople, then cross the Bosporus to besiege Ankara and Karaman, proceed south along the Gulf of Cyprus to Antioch, and finally take the Holy City of Jerusalem. The second will set out from Kiev and Tver, purging heresies from the steppe and the Urals, then pushing on into Central Asia and Siberia. Unlike the first crusade, which follows a fixed route, the second is guided only by a broad directive: to expand Riga's influence across Central Asia and Siberia, and to spread the Gospel of Christ to the East.\n\nSuch a vast war plan would have seemed a fantasy in ages past. But today, Riga has the strength to realize it—and the [Root.Monarch.GetTitle][Root.Monarch.GetName] will see it done. Now, both plans demand more detailed preparation and military readiness."
rigaExpand.110.aa:0 "With that, the council is adjourned"

rigaExpand.111.name:0 "United in Purpose"
rigaExpand.111.desc:0 "Riga's most persistent administrative challenges continue to trouble us. The administrative burden of executing two crusades simultaneously would exceed Riga's capacity. Therefore, the [Root.Monarch.GetTitle] [Root.Monarch.GetName] must choose which crusade to prioritize.\n\nIf we choose the first crusade, we must establish a Black Sea fleet to secure naval dominance in the Aegean and Eastern Mediterranean. Adhering strictly to the original overland route would severely prolong the war. If we can land at Antioch, Jaffa, and other ports, it would greatly accelerate our progress toward the objective.\n\nIf we choose the second crusade, we must develop tactics to counter nomadic forces. Before fully understanding our adversaries, we need a more measured approach, advancing step by step towards Central Asia.\n\nThe [Root.Monarch.GetTitle] [Root.Monarch.GetName] shall make the choice."
rigaExpand.111.aa:0 "The East takes priority"
rigaExpand.111.bb:0 "The South takes priority"

rigaExpand.112.name:0 "In the Name of the Sword"
rigaExpand.112.desc:0 "After a series of preparations, all armies are assembled and ready, awaiting the call to march.\n\nThe vast steppe shall soon echo with the call of war..."
rigaExpand.112.aa:0 "And blood shall once again soak its soil"
rigaExpand.112.aa.tt:0 "We will also declare war on nations holding §YTyumen§!, §YSamarqand§!, §YAstrakhan§!, §YKazan§!, and §YYerevan§!"

rigaExpand.113.name:0 "Armed Pilgrimage"
rigaExpand.113.desc:0 "After a series of preparations, all armies are assembled and ready, awaiting the call to march.\n\nCenturies after the fall of Jerusalem, the banner of Christ shall once again fly over the Holy Land."
rigaExpand.113.aa:0 "The path of pilgrimage shall be paved with sword and steel"
rigaExpand.113.aa.tt:0 "We will also declare war on nations holding §YConstantinople§!, §YAntioch§!, §YJerusalem§!, §YAlexandria§!, and §YBaghdad§!"

rigaExpandGlobal.0.name:0 "Impact of the Trade War"
rigaExpandGlobal.0.desc:0 "The Riga-Hansa trade war has stimulated productivity in Northern Germany, particularly fostering a boom in the shipbuilding industry. Consequently, timber prices continue to rise, and the demand for naval supplies is increasing daily."
rigaExpandGlobal.0.aa:0 "This will have long-term effects"
rigaExpandGlobal.0.bb:0 "We shall profit from this"

rigaExpandGlobal.1.name:0 "City of a Thousand Cities"
rigaExpandGlobal.1.desc:0 "Whatever glories other nations may boast of their cities, before the Riga of today they pale—like fireflies beside the full moon. Any who see this city for the first time will exhaust all words in wonder. On both banks of the Daugava, the domes of cathedrals and towers of knightly orders shine in turn; the docks are thick with merchant ships, cranes standing like a forest; beyond the walls, new districts stretch in every direction. This is the heart of the Baltic. This is the city that stands above all cities—the City of a Thousand Cities!\n\nWhat once seemed an unattainable ideal—to let justice roll down like waters, commerce flow like a river, and the Gospel reach the ends of the earth—now stands close at hand.\n\nSo let the curtain fall softly. When it rises again, the whole world will dance."
rigaExpandGlobal.1.aa:0 "The curtain rises"
rigaExpandGlobal.1.tt:0 "\nAwaiting good news\n"

rigaExpandGlobal.2.name:0 "A Choice of Fate"
rigaExpandGlobal.2.desc:0 "This country possesses two playable TAGs. Please choose at game start which nation you wish to play."
rigaExpandGlobal.2.aa:0 "Play as Riga"
rigaExpandGlobal.2.aa.tt:0 "This will begin our campaign as @RIG§Y[RIG.GetName]§!\n\n@RIG§Y[RIG.GetName]§! aims, through its unique §Yvassal system§! and the §YUniversal City Project§!, to bring §Ythe entire world§! under its rule\n\nIn the §Yfuture§!, we may also play as @RGL§Y[RGL.GetName]§! through certain means\n"
rigaExpandGlobal.2.bb:0 "Play as Rigaeria"
rigaExpandGlobal.2.bb.tt:0 "This will begin our campaign as @RGL§Y[RGL.GetName]§!\n\n@RGL§Y[RGL.GetName]§! aims to spread the faith to the New World, liberating and civilizing its peoples\n"

RigaExpandSupplement.0.name:0 "The Council of Riga"
RigaExpandSupplement.0.desc:0 "In the year [GetYear], Riga has effectively unified the entire Baltic region. However, Riga currently lacks a well-defined administrative, economic, and military system. Therefore, the [Root.Monarch.GetTitle] [Root.Monarch.GetName] has convened a council to determine Riga's future path."
RigaExpandSupplement.0.aa:0 "Administration is the primary agenda"
RigaExpandSupplement.0.aa.tt:0 "The council will make progress after some time"


RigaExpandSupplement.1.name:0 "The Rigan Administrative System"
RigaExpandSupplement.1.desc:0 "After extensive discussion, Riga has established a new political system: the Archbishop will focus solely on directly ruling the city of Riga itself. This greatly enhances Riga's developmental capacity while also limiting its potential for direct territorial expansion.\n\nFollowing reorganization, the knightly orders will be fully subordinate to the Archbishop. They possess highly elite military capabilities, serving as garrison territories to protect the bishopric. However, due to their limited numbers, the orders cannot efficiently manage large areas of land; therefore, their territorial scope should be kept at a reasonable level.\n\nThe other subsidiary bishoprics represent extensions of the Archbishopric's administration, each with relatively independent political and military systems. Yet each also has a distinct functional tendency: Administrative Regions focus on planning and maintaining stability, allowing them to manage large territories efficiently but with limitations in military and economic affairs. Economic Regions prioritize development, reducing taxes and encouraging agriculture and handicrafts to boost production. However, their focus on economic matters leaves them deficient in military and administrative capacity, making it difficult to manage large areas or maintain local stability. Military Districts possess high military potential, directly reflecting Riga's military strength alongside the knightly orders. The larger the district, the greater its military power—but the risk of secession grows with it.\n\n§ONote: We will unlock a province interaction allowing us to help subjects core provinces.§!"
RigaExpandSupplement.1.aa:0 "Next, the economy"
rig_can_assisted_core_for_subject.tt:0 "\nUnlocks a province interaction allowing us to help subjects core provinces\n"

RigaExpandSupplement.2.name:0 "The Rigan Economic System"
RigaExpandSupplement.2.desc:0 "Unlike the great estate system under feudal monarchies and other feudal theocracies, Riga does collect taxes and levy military service from its administrative extensions (vassal states). However, except for regions specializing in economic development, such taxes are largely symbolic—a mere drop in Riga's bucket.\n\nThanks to its natural geographic position, commerce has become Riga's primary source of income. Joining the Hanseatic League brought considerable profits. But an economic model so dependent on trade cannot last without control over the means of production. Thus, Riga has forged a unique economic system: subject states will cede their trade rights to the Archbishopric, retaining only a portion—or even no independent trade system at all—while Riga centralizes and profits from the goods their subjects produce.\n\nCoordinating such vast trade is clearly beyond the capacity of a single city. Thus, Trade Zones were established to ease the burden. These specialized trading cities focus primarily on commerce. Though dependent on Riga, they are excluded from offensive wars to ensure they can continue operating even in wartime."
RigaExpandSupplement.2.aa:0 "Next, the military"

RigaExpandSupplement.3.name:0 "The Rigan Military System"
RigaExpandSupplement.3.desc:0 "Under the current administrative system, Riga's wars rely heavily on the participation of its subjects. The military experience the knightly orders gained during the Northern Crusades may now seem somewhat dated, and the two orders had been in decline before their union. But united, they have once again proven their formidable martial prowess.\n\nThanks to the orders' guidance, Riga's own forces—though not their equal—remain battle-worthy. However, since recruitment must largely take place in subject cities, hiring mercenaries is also a viable option. In sum, Riga's military strength is built primarily on the forces of its subjects—the knightly orders and military districts—while the state itself retains both the potential and the economic capacity for significant military development."
RigaExpandSupplement.3.aa:0 "Finally, the strategic aspect"

RigaExpandSupplement.4.name:0 "In the Name of the Sword"
RigaExpandSupplement.4.desc:0 "In 1236, the Battle of Saule shattered the Livonian Order, bringing its existence as an independent military brotherhood to an end. In the year [GetYear], the Archbishop has declared a renewed march into Lithuania to stabilize the Baltic region.\n\nThis time, our arms are ready, our supplies are ample, and the eyes of the knights blaze with righteous fury. The shadow of Saule shall be swept away by the winds of this war—and shall remain no more!"
RigaExpandSupplement.4.aa:0 "The call of the Land of Mary!"

RigaExpandSupplement.5.name:0 "Romanian Strategy"
RigaExpandSupplement.5.desc:0 "We have secured full control over Ruthenia, and the road to the Balkans is now firmly in our hands. If we wish to intervene more freely in the Balkans in the future, a stable bridgehead is essential—and the long-divided Romanian lands offer an excellent opportunity. With sufficient time and patience, we can extend our southern strategy into Romania, establishing a firm foothold in the Balkans."
RigaExpandSupplement.5.aa:0 "We shall advance into Romania"
RigaExpandSupplement.5.bb:0 "I have no interest in this region"

RigaExpandSupplement.6.name:0 "Wildfire"
RigaExpandSupplement.6.desc:0 "No one knows where the first flame was kindled—from which alley, or from which trembling hand. Perhaps the outcome was already written the day Riga, the city the Lord Himself lifted up, first nurtured greed for wealth and envy among its own walls.\n\nChaotic government, disorganized command, terrified citizens, and enraged mobs—all were stirred into a bubbling cauldron of hell. Any attempt to quench such a fire was but a cup of water thrown upon an inferno.\n\nThe [Root.Monarch.GetTitle][Root.Monarch.GetName] stood alone before the great cathedral, watching the burning city. His shadow was cast long by the flames, stretching across the rubble-strewn courtyard. The fire consumed not only the cloth in the warehouses, the timber of the docks, and the dead in the lanes—but perhaps also the ideal the [Root.Monarch.GetTitle] had woven over a lifetime: the dream of a Universal City, of the Land of Mary, of turning the Baltic into a sea of justice and prosperity..."
RigaExpandSupplement.6.aa:0 "Everything is crumbling..."
RigaExpandSupplement.6.aa.tt.1:0 "§YRiga's§! development is §Yhalved§!"
RigaExpandSupplement.6.aa.tt.2:0 "§RIf rebirth is hopeless, then let it burn to ashes§!"

RigaExpandSupplement.7.name:0 "Betrayal"
RigaExpandSupplement.7.desc:0 "The worst has come to pass. [riga_rebel_target.GetName][riga_rebel_target.Monarch.GetTitle][riga_rebel_target.Monarch.GetName] has declared that, due to the massive rebellion, Riga is incapable of maintaining control over its subjects. They will send troops to "assist" Riga in rebuilding its government and, in the meantime, take full control of the city.\n\nFor the first few days, the soldiers of [riga_rebel_target.GetName] did indeed strike down the remaining rioters with sword and iron. But within days, they revealed their true nature, beginning to loot across Riga's districts, further crippling an economy already shattered by fire and uprising.\n\nTo secure control over the Archbishopric and legitimize their actions, [riga_rebel_target.GetName][riga_rebel_target.Monarch.GetTitle][riga_rebel_target.Monarch.GetName] swiftly installed a new Archbishop, publicly claiming that the previous one had died in the riots. Riga has clearly fallen into a deep crisis."
RigaExpandSupplement.7.aa:0 "This is blatant treason!"

RigaExpandSupplement.8.name:0 "The Rigan Mutiny"
RigaExpandSupplement.8.desc:0 ""
RigaExpandSupplement.8.aa:0 "We recognize only the authority of the Archbishopric of Riga!"
RigaExpandSupplement.8.bb:0 "The current situation suits us just fine"

RigaExpandSupplement.9.name:0 "Claim on Fennoscandia"
RigaExpandSupplement.9.desc:0 ""
RigaExpandSupplement.9.aa:0 "We shall embrace a new future!"
RigaExpandSupplement.9.bb:0 "It is not yet time..."

RigaExpandSupplement.10.name:0 "The Knights Hospitaller"
RigaExpandSupplement.10.desc:0 "The full name of the Knights Hospitaller is the 'Order of Knights of the Hospital of Saint John of Jerusalem,' also known as the Knights of Saint John. It was founded in 1099. In 1113, the Papacy recognized its status as an independent order and granted it a series of economic and political privileges, such as exemption from tithes and from the authority of any secular power, answering only to the Pope.\n\nIn its early years, it was merely a charitable organization. It was not until around 1120 that the Knights Hospitaller began to operate as a military order, using force to protect pilgrims from attacks by infidels. It evolved into a significant military force within the Kingdom of Jerusalem and exerted considerable influence on its politics.\n\nDuring the Battle of Hattin in 1187, the Knights Hospitaller also committed its main forces. Due to command errors, the Christian army, including the Hospitallers and Templars, was nearly annihilated. With the end of the 'Crusade of France' in 1222, the Hospitallers received no reinforcements. Finally, in 1291, the Order abandoned Palestine, moving to Cyprus, and then to Rhodes in 1309, where they eventually lost their last territorial holdings.\n\nAccording to the terms offered by the [Root.Monarch.GetTitle] [Root.Monarch.GetName], the Knights Hospitaller will receive territorial rights to the island of Gotland and will pledge fealty to the [Root.Monarch.GetTitle]. The transfer of territory does not mean the abandonment of their duties. The Knights Hospitaller shall continue their traditional mission: to protect pilgrims from infidel attacks through armed force, provide medical assistance, and safeguard trade vessels in the Baltic Sea from privateers."
RigaExpandSupplement.10.aa:0 "Excellent"
RigaExpandSupplement.10.aa.tt:0 "We will unlock a decision to settle the §YKnights Hospitaller§!"

RigaExpandSupplement.11.name:0 "The Knights Templar"
RigaExpandSupplement.11.desc:0 "The Knights Templar, officially known as 'The Poor Fellow-Soldiers of Christ and of the Temple of Solomon,' were founded in 1119 by the French noblemen Hugues de Payens and Godfrey de Saint-Omer. They established a monastic order based at the Al-Aqsa Mosque on the Temple Mount to protect pilgrims and attack infidels. The mosque was built on the ruins of the ancient Temple of Solomon, hence the order's name. Initially, it had nine members.\n\nIn 1129, the Roman Church convened the Council of Troyes in France, where the Pope formally recognized their status. This council was a milestone, establishing the Rule for the Knights Templar and confirming their legitimate position throughout Christendom and the supreme authority of the Papacy over them. Papal recognition further expanded the Templars' influence in Europe and legitimized their receipt of donations from Christians.\n\nThe Battle of Hattin in 1187 saw the Templars besieged by Saladin's forces, with most members either killed or wounded. That same year, Saladin captured Jerusalem. The Templars retreated, eventually reaching Cyprus and finally returning to France.\n\nIn 1221, the Templars supported a new 'French Crusade' initiated by the Dauphin, Count Louis of Artois. Although this crusade did not achieve its initial objectives, Christians still gained a foothold in North Africa. Following a series of military and diplomatic failures, the Kingdom of Tunisia ultimately fell, and the Templars lost their lands in North Africa, returning once more to France.\n\nDespite accumulating considerable wealth in the past, a stark reality is that the Templars currently hold no actual territory, rendering their actions subject to the will of others. The [Root.Monarch.GetTitle] [Root.Monarch.GetName] has offered the Grand Master of the Knights Templar a proposition: to grant them territories in the Eastern European steppes in exchange for their fealty to the [Root.Monarch.GetTitle]. There, the Knights Templar can continue their mission."
RigaExpandSupplement.11.aa:0 "Excellent"
RigaExpandSupplement.11.aa.tt:0 "We will unlock a decision to settle the §YKnights Templar§!"

RigaExpandSupplement.12.name:0 "Another Reform"
RigaExpandSupplement.12.desc:0 "We have completed one reform. Now we should promptly embark on another."

RigaExpandSupplement.13.name:0 "The Great Campaign"
RigaExpandSupplement.13.desc:0 "The Great Campaign aims to achieve dominance over all nations in a region through a single, meticulously prepared military operation—whether by conquest, disintegration, or subjugation. This war model places extremely high demands on a nation's overall military strength, and Riga's military system is exceptionally well-suited for such war models requiring ample pre-war preparation.\nWe will sequentially select the target region and the conquest objective. When final preparations are complete, we will §Rdeclare war on all nations whose capitals are located within the campaign region, based on our chosen war goals§!. However, nations that §Ymeet any of the following conditions§! will not be declared war upon:\n\n§RIn a military alliance with you§!;\n§RGuaranteed independence by you§!;\n§RIn the same trade league as you§!;\n§RA subject nation§!;\n\nPlease choose your target carefully. §ROnce war begins, it cannot easily be stopped§!"
RigaExpandSupplement.13.aa:0 "Begin planning"

RigaExpandSupplement.14.name:0 "Plan Confirmation"
RigaExpandSupplement.14.desc:0 "The current §YGreat Campaign§! plan is as follows:\n\nTarget Region: §R[Root.GetGreateWarArea]§!\nCampaign Requirement: §R[Root.GetGreateWarTarget]§!\n\nOnce confirmed, we can begin preparations for the impending war."
RigaExpandSupplement.14.aa:0 "Let it begin!"

RigaExpandSupplement.16.name:0 "The Protestant League"
RigaExpandSupplement.16.desc:0 "§Y"I will send the sword, the famine, and the pestilence among them, till they be consumed from off the land that I gave unto them and to their fathers."§! The words of the Lord's prophet have come to pass across the lands of Europa. The rift between Catholics and Protestants has spread from the desks of theologians and church walls to the council chambers of kings and the trenches of battlefields. Monarchs no longer wage war merely for territory, but align themselves by faith—northern princes incline to the new doctrines; the southern Emperor holds fast to the old. From Ruthenia in the east to Britain in the west, from the Maghreb in the south to Scandinavia in the north, every city, every fortress, every principality may become a battlefield of faith overnight. A religious war sweeping across Europe has begun.\n\nThe [Root.Monarch.GetTitle][Root.Monarch.GetName] suddenly realizes that the Holy Roman Emperor, once our opponent in the North German trade conflicts and territorial disputes, may now stand alongside Riga in the same trench. For our common enemy is tearing down the thousand-year foundations of the Church. Now is the time to set aside past quarrels and together defend the authority of the Catholic faith."
RigaExpandSupplement.16.aa:0 "Take up arms!"

RigaExpandSupplement.17.name:0 "Overseas Mission"
RigaExpandSupplement.17.desc:0 "News of the discovery of the New World swept like windborne flame from the ports of Iberia across all of Europa. Monarchs of every realm opened their coffers, recruited sailors, built ships—all eager to plant their own banners on that unknown soil and claim a share of its wealth.\n\nCurrent navigational arts could not yet allow mariners to measure longitude reliably; thin wooden hulls could not repel the shipworm's bite; salted meat and hardtack grew moldy after weeks at sea; holds were crowded, damp, and plagued by disease—all enough to deter the faint of heart. Yet driven by the twin forces of economic gain and political ambition, expeditions continued without end.\n\nIn 1474, a group of impassioned explorers petitioned the [Root.Monarch.GetTitle][Root.Monarch.GetName] for support to venture across the ocean and spread the Gospel of Christ in the New World. Their company was a motley one: sailors, fishermen, priests—different trades, different classes, all gathered under one purpose, aiming for the shores of that land of promise.\n\nThe [Root.Monarch.GetTitle] knew that, despite the wealth Riga had accumulated through long commercial prosperity, such an expedition would still be a staggering expense. Ships, crews, provisions, route planning—each demanded ducats, and all might end in shipwreck or a single report: "No land sighted." A thousand good reasons existed to refuse them.\n\nBut if they succeeded—if Riga's banner were raised on a New World cape, if merchants of the Land of Mary could establish trading posts across the sea, if the Gospel could take root among the heathens through bishops sent by Riga—then what a glorious return that would be! Riga's influence would stretch far beyond the Baltic; established routes could carry supplies and men, spreading Christ's name across that vast continent.\n\nAll depended on how much support the [Root.Monarch.GetTitle] would grant. He could quietly fund a small fleet—or proclaim this sacred cause to the entire city and muster all possible ships and men.\n\nThe [Root.Monarch.GetTitle][Root.Monarch.GetName] would make his choice."
RigaExpandSupplement.17.aa:0 "It is God's will. We shall support them to the best of our ability!"
RigaExpandSupplement.17.bb:0 "We will provide substantial support"
RigaExpandSupplement.17.cc:0 "We can offer only limited support"

RigaExpandSupplement.18.name:0 "Rigaeria"
RigaExpandSupplement.18.desc:0 "That day, at the limit where sea meets sky, there was no longer only water and cloud. A fleet flying the banner of the Bishopric of Riga sailed into a bay of the New World.\n\nThe sails had been bleached white by salt, the hulls still bore the marks of shipworms, and the sailors' faces were gaunt from scurvy. Years of preparation and voyage—storms, loss, sickness, death—all the suffering, in that moment, dissolved into the crackling of campfires on the shore. The explorers knelt in prayer as they set foot upon the sand, planting the cross in the damp soil. A stronghold was quickly raised, which would grow over time into a thriving city. Missionaries entered native villages with goodwill and the Gospel, learning local tongues, baptizing infants, praying for the sick. Knights patrolled the perimeter, vigilant against beasts and hostile tribes.\n\nAfter a series of deliberations, a nation called "Rigaeria" was born on this distant land. Its governance was vested in a council of clergy and representatives elected every ten years—a structure named the "Holy Republic." Its mission was singular: to spread the Gospel of Christ across the entire New World, so that souls who had never heard the Lord's name might yet be bathed in the light of salvation.\n\nTime would determine the future of this young nation. But for now, the opportunities of this land were theirs."
RigaExpandSupplement.18.aa:0 "Await good news"
RigaExpandSupplement.18.bb:0 "This is our mission!"

RigaExpandSupplement.19.name:0 "Tactical Selection"
RigaExpandSupplement.19.desc:0 "By custom, the War Planning Department has drawn up two tactical frameworks to guide the crusades. Though the unpredictability of war will inevitably shape events on the ground, an overarching strategic orientation remains indispensable."
RigaExpandSupplement.19.aa:0 "We will focus on offense"
RigaExpandSupplement.19.aa.tt:0 "When both crusades are launched, we and our subjects will gain a certain amount of §Ysige efficiency§! and other modifiers"
RigaExpandSupplement.19.bb:0 "We will focus on defense"
RigaExpandSupplement.19.bb.tt:0 "When both crusades are launched, we and our subjects will gain a certain amount of §Ydefensiveness§! and other modifiers"

RigaExpandSupplement.20.name:0 "Logistics Planning"
RigaExpandSupplement.20.desc:0 "In any war, logistics are paramount. The War Planning Department has prepared two logistical plans, each designed to optimize our existing supply system from a different angle."
RigaExpandSupplement.20.aa:0 "We will focus on large-scale army operations"
RigaExpandSupplement.20.aa.tt:0 "When both crusades are launched, we and our subjects will gain a certain amount of §Ynational supply limit§! and other modifiers"
RigaExpandSupplement.20.bb:0 "We will focus on troop replenishment"
RigaExpandSupplement.20.bb.tt:0 "When both crusades are launched, we and our subjects will gain a certain amount of §Yreinforce speed§! and other modifiers"

RigaExpandSupplement.21.name:0 "Crossing the Vast Ocean"
RigaExpandSupplement.21.desc:0 "Fallen leaves carry news:\n\nBeyond the ocean, the ships that crossed the great sea have arrived in the New World.\n\nOur investment has clearly exceeded expectations. Those passionate explorers have settled in the New World and are expanding toward distant lands.\n\nYet, for now, we lack the transoceanic capacity to send further support. We can only guarantee their independence in diplomatic matters, letting the nations know that this outpost enjoys the protection of the Land of Mary.\n\nPerhaps one day, when our shipyards can build larger vessels and our charts can mark safer routes, we will change this."
RigaExpandSupplement.21.aa:0 "May our brothers and sisters in Rigaeria continue to thrive"

RigaExpandSupplement.22.name:0 "Overseas Affairs"
RigaExpandSupplement.22.desc:0 "With the advancement of navigational technology and the charting of sea routes, we have finally acquired the capacity to project our influence across the ocean to the New World. Rigaeria, established under our patronage, has now secured a foothold in those distant lands. It is time to consider our relationship with them.\n\nIn accordance with past agreements, we have dispatched a letter to Rigaeria: they may retain their current governmental structure and enjoy autonomy over most affairs. In return, Rigaeria need only remain our nominal vassal to receive economic support from the Archbishopric for their missionary work.\n\nRigaeria accepted without delay. The [Root.Monarch.GetTitle] must now decide whether to extend further economic support to accelerate Rigaeria's development and missionary efforts in the New World."
RigaExpandSupplement.22.aa:0 "We will spare some effort to assist them"
RigaExpandSupplement.22.bb:0 "We have more pressing matters"

RigaExpandSupplement.23.name:0 "The Crown of Rome"
RigaExpandSupplement.23.desc:0 "On May 11, 330 AD, the Roman Emperor Constantine I established a new capital at Byzantium, naming it Nova Roma. But the city came to be known by its founder's name: Constantinople. From the mid-4th century to the early 13th century, it was the largest and most magnificent city in all Europe—its dome hanging over the world like heaven's own vault, its Theodosian Walls standing as God's hedge, holding back the tides of heathen hordes. In time, the Roman Empire withered, its territory shrinking to the city and its immediate environs, until in the mid-14th century that once-great empire drew its final breath.\n\nNow, Constantinople is under Riga's control. The dome of Hagia Sophia resounds once more with the Latin Mass, and the Golden Gate stands open again for Catholic missionaries. But without a legitimate crown, the mountain peoples of the Balkans and the farmers of Anatolia will not readily submit to the Archbishop's rule. We need a title—an authority capable of commanding the allegiance and awe of Greeks, Bulgarians, Serbs, and Armenians alike. That title is the Latin Empire, the dynasty born of the Fourth Crusade in the storm of blood and iron."
RigaExpandSupplement.23.aa:0 "The Latin Empire shall be reborn here"

RigaExpandSupplement.24.name:0 "The Liberation of Jerusalem"
RigaExpandSupplement.24.desc:0 "Since the Crusaders fell to Saladin's scimitars at Hattin in 1187, the Christian banner in the Holy Land had flickered like a dying flame in the wind of heathen power. In 1291, the last Crusaders sailed west from Acre, and the gates of Jerusalem closed to the Catholic world for good.\n\nThen came [GetYear]. The iron hooves of Riga shattered all that had stood before. The [Root.Monarch.GetTitle][Root.Monarch.GetName] rode through the Gate of David and drew rein in the square before the Holy Sepulchre. He said nothing, but took from his saddlebag an old banner embroidered with a sword and a cross—said to be the very flag used by the Livonian Order at the Battle on the Ice, its corner still scorched by the firebrands of heretics. The Archbishop spread that ancient flag upon the stone of the Sepulchre, and then laid a new Rigan banner over it with his own hands. Centuries had passed since the fall of the Kingdom of Jerusalem—but on that day, the banner of Christ flew once more over the Holy City."
RigaExpandSupplement.24.aa:0 "Jerusalem deserves to be rebuilt"

RigaExpandSupplement.25.name:0 "On Government"
RigaExpandSupplement.25.desc:0 "With the final administrative council's adjournment, Riga's administrative reforms have reached their end. Whatever twists and turns the path may have held, we have broadly achieved our intended objectives: administrative efficiency has improved, the ties between the center and its subjects have tightened, the roots of corruption have been pulled up, the swords of the knightly orders have been tempered anew, and the voices of the people have found a hearing.\n\nYet reform is never a one-time task. Only by continually reviewing, adjusting, and perfecting the system in step with the times can Riga maintain the most efficient and stable governance. Perhaps one day, when new problems have accumulated and old laws no longer fit new frontiers, our descendants will be compelled to convene again for a more thorough reform than even this. That will be their task. For now, we must turn our attention to other matters."
RigaExpandSupplement.25.aa:0 "Let us proceed to the next step"

RigaExpandSupplement.26.name:0 "The Combined Fleet of All Riga and Its Bishoprics"
RigaExpandSupplement.26.desc:0 "Historically, Riga's fleets have primarily consisted of merchant vessels for trade, with less focus on the development of heavy warships and galleys. With the dawn of the Age of Discovery, advancements in shipbuilding and growing demands for overseas exploration have prompted Riga to vigorously develop ocean-going fleets. As transoceanic trade rises, Riga's naval development must also adapt.\n\nSimilar to Riga's past army situation, each bishopric subject state maintains a relatively independent navy, with vessels of varying specifications and types built and owned locally. However, the scale of these bishopric fleets is clearly not as extensive as Riga's. Therefore, we only need to spend a certain amount of time to standardize the construction and management of all subject vessels, subsequently placing them under Riga's direct command. This will significantly enhance the overall strength of the Rigan fleet."
RigaExpandSupplement.26.aa:0 "We shall rule the seas!"

RigaExpandSupplement.27.name:0 "The Place Where the Schism Began"
RigaExpandSupplement.27.desc:0 "In 858, the Eastern Roman Emperor elevated Photios to the Patriarchate of Constantinople. The Pope in Rome refused to recognize him and excommunicated him. Photios retaliated in 867, excommunicating Pope Nicholas I in turn. Thus the rupture began.\n\nIn the 6th century, the Spanish Church, after its submission to Rome, unilaterally inserted into the Nicene Creed the phrase that the Holy Spirit proceeds "from the Father and the Son" rather than "from the Father." The Orthodox Church condemned this as a violation of the faith established by the seven Ecumenical Councils. The two sides argued for centuries; a reconciliation was once reached, but in 1014, the Pope formally incorporated the "Filioque" clause into the Creed, reviving the dispute like a thorn lodged between East and West.\n\nIn 1054, Patriarch Michael Cerularius of Constantinople accused the Western Church of using unleavened bread for the Eucharist. Pope Leo IX dispatched Cardinal Humbert with a strongly worded letter to the East. The Pope died in April, and Humbert's delegation was coldly received in Constantinople. Enraged, on July 16, Humbert marched into Hagia Sophia and placed a bull of excommunication upon the altar, condemning the Eastern Church and deposing its Patriarch, then departed. Backed by the Emperor, Cerularius retaliated on July 20 by convening a synod, burning the papal letters, excommunicating the Pope and his legates, and declaring himself head of the Eastern Church.\n\nNow, Riga's cross stands upon the walls of Constantinople, and the Patriarch of the Orthodox Church bows beneath the Archbishop's staff. But while the crack may be covered, the wound needs time to heal. We have taken the city where the schism began, yet we have not yet arrived at the season of reunion. We must wait for a more opportune moment to complete this great task."
RigaExpandSupplement.27.aa:0 "We have other matters to attend to"

RigaExpandSupplement.28.name:0 "Journey to Jerusalem"
RigaExpandSupplement.28.desc:0 "I am a blacksmith of Riga. I have spent my life hammering horseshoes and ploughshares on the banks of the Daugava. The day I heard that the Holy City had been reclaimed by brave iron warriors, I set down my hammer, handed it to my apprentice, hoisted my cross and a bag of provisions, and set out from Riga's southern gate with a company of merchants, monks, and pilgrims bound for Jerusalem.\n\nWe crossed the wheatfields of Polish-Ruthenia, where the villages no longer paid tribute to the Tatars. New Catholic churches stood among the fields; the shadows of their wooden bell towers fell upon the black earth, and priests preached the Gospel to the farmers. I prayed at the altar and asked for safe passage. We followed the Danube into the Balkans; in the passes of Bulgaria, torches of Rigan guards were lit; in the monasteries of Serbia, Latin grammar teachers sent from Riga were at work.\n\nIn Constantinople, I stood beneath the Theodosian Walls, tracing with my fingers the cracks left by the Turks in their final assault. Hagia Sophia's dome was higher than the legends told; I looked up from the floor as the light poured through the windows like flakes of gold upon the penitent's head.\n\nCrossing the Bosporus, we entered Anatolia. From Nicaea to Ankara, from Ankara to Adana, the roads were smooth, and every waystation was stocked with herbs and ink sent from Riga. In Optimatoi, a crusader returning from Samarkand shared his tales with us. In Karaman, a scribe told me the road would be extended still further, to the edge of the desert and the sea.\n\nThree weeks later, we sighted Antioch. Its walls were half-mud brick, half-new stone laid by Rigan engineers. The steps of the Cave Church of St. Peter had been polished smooth by pilgrims' feet. I removed my sandals at the entrance and walked barefoot inside, knelt, and prayed to the Almighty. That evening, I watched the sunset from the walls; the Orontes River ran like a golden thread from the mountains of the Mashriq down to the sea.\n\nThe final leg was long. We passed through the valleys of Lebanon, rested on the northern shore of the Sea of Galilee, then climbed the hills of Judea along the old road. When the Holy City appeared on the horizon, no one in the company spoke. The only sound was the crunch of boots on gravel. A cool wind rushed from the city gates, carrying the dust of a thousand years. I had no horse, no retinue, no costly offering. I was only a blacksmith who had swung a heavy hammer for decades. Yet I had done what kings, princes, and merchants had dreamed of but failed to achieve for centuries—I knelt at the door of the Church of the Holy Sepulchre and pressed my forehead to its stone. The stone was cold, but my eyes burned hot. I fastened the iron cross I had brought from Riga to the railing of the Sepulchre, where it hung amid a host of others—crosses, ribbons, and cloth tokens.\n\nNow I am on my way back to Riga. My pack holds a handful of red earth scooped from the foot of Golgotha. I will keep it by my bedside. But even without that handful of soil, the bells of Jerusalem will echo in my heart forever."
RigaExpandSupplement.28.aa:0 "Anno Domini [GetYear], written in the city of Damascus"

RigaExpandSupplement.29.name:0 "City Log: Antioch"
RigaExpandSupplement.29.desc:0 "Antioch's history began in 300 BC. Seleucus I Nicator, after seizing Syria following the Battle of Ipsus, selected a fertile plain along the Orontes River to found a new city. He named it after his father, Antiochus, and made it the western capital of his empire. Its courtly splendor rivaled Alexandria, and its walls were second only to Rome and Constantinople.\n\nDuring the Roman era, Antioch rose to become the greatest city of the East. Emperors such as Caesar, Tiberius, Trajan, and Hadrian built forums, aqueducts, and public baths here, and the city's population once exceeded half a million. Yet this great metropolis was also cursed by frequent disasters. In 115 AD, a massive earthquake nearly leveled Antioch, nearly crushing Emperor Trajan, who was wintering in the city; in 526 AD, another earthquake claimed 250,000 lives.\n\nAntioch holds profound significance for Christians. The Apostles Paul and Barnabas preached here for a full year, and it was in this city's synagogue that Gentiles were first welcomed into the Church. In 637 AD, however, Arab cavalry conquered Antioch, incorporating it into the Umayyad Caliphate. The Byzantine Empire recovered it in 969, and during the First Crusade, Bohemond I captured the city and established the Principality of Antioch. Latin rule lasted nearly two centuries, until 1268, when the Mamluk Sultan Baybars took Antioch, sacked it, and demolished its walls and churches. Thereafter, Antioch fell into decline, reduced to a small town of only a few thousand inhabitants.\n\nBy 1444, this once-"Eye of the East" lay in ruins. The Cave Church of St. Peter was choked with rubble, the stone bridge over the Orontes had broken in half, and the arches of the hippodrome had been dismantled by nearby farmers for sheep pens. Yet Antioch still appeared on the maps of pilgrims as a required stop, for the route from Europe to Jerusalem crossed the Orontes here. May this flowing river one day reflect once more the spires of St. Peter's Cathedral, and may the songs silenced by infidels be sung again for a world of sinners."
RigaExpandSupplement.29.aa:0 "This city's past is worth remembering"

RigaExpandSupplement.30.name:0 "City Log: Alexandria"
RigaExpandSupplement.30.desc:0 "Alexandria was founded in 332 BC, named after its founder, Alexander the Great, and established as the seat of the governor of the Macedonian Empire's Egyptian province. After Alexander's death, the Egyptian governor Ptolemy established the Ptolemaic Dynasty here, crowning himself as Ptolemy I, and Alexandria became the capital of the Egyptian kingdom. The Ptolemies constructed the legendary Pharos Lighthouse, over a hundred meters tall in three tiers, with a bronze mirror at its summit that reflected firelight visible for tens of miles across the sea. They also founded the Library of Alexandria, the largest of its era, housing—according to legend—as many as 700,000 papyrus and parchment scrolls, encompassing virtually all Greek literature and countless Eastern texts.\n\nYet even the greatest cities cannot escape the vicissitudes of history. In 48 BC, Julius Caesar arrived in Alexandria in pursuit of Pompey, became embroiled in Ptolemaic dynastic struggles, and set fire to the harbor—the flames allegedly destroyed a portion of the Library's collection. In 641 AD, Arab armies reached the city's gates. After a long siege, Alexandria surrendered to the Arab general Amr ibn al-As. It then passed under the Umayyad, Abbasid, and Fatimid dynasties, maintaining its commercial status. Yet when Egypt's Islamic rulers founded Cairo in 969 and moved the capital there, Alexandria's importance steadily declined. The millennium-old lighthouse, gradually damaged by earthquakes, finally collapsed in the 14th century after a major tremor.\n\nWe have no reason to let this once-glorious city continue to decay. This port shall be rebuilt even more splendidly."
RigaExpandSupplement.30.aa:0 "This city's past is worth remembering"

