rigExpandAction.9.name:0 "Select Campaign Objective"
rigExpandAction.9.desc:0 "We need to select an objective for our campaign.\n\nConquest of provinces is the most traditional objective, allowing us to annex all target provinces.\n\nSubjugation of nations provides a peace treaty option to vassalize the target country, but if the target's development exceeds 350, it will be replaced by Conquest of provinces.\n\nDisintegration of regions grants a 'Dismantle Nation' peace treaty, which will release all possible nations from the target country. If the target's development is below 350, it will be replaced by Conquest of provinces."
