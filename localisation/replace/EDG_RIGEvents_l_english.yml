RigaExpandSupplement.32.name:0 "Resource Consolidation"
RigaExpandSupplement.32.desc:0 "We brought the toughest oak from the fjords of Norway to frame the great hall; we transported tons of gold from the highlands of Ethiopia to gild the altar walls; we hauled vast tapestries from the Indus Valley to adorn the cathedral's ceilings; we carried white bear pelts from the Siberian tundra to line the benches of the council chamber. Every caravan, every ship, every oxcart followed the converging roads to the same gate—as if the whole world were offering its final tribute to this soon-to-be-completed City of a Thousand Cities.\n\nBehold how this New Jerusalem, rising from the shores of the Baltic, shall reshape the world's horizon."
RigaExpandSupplement.32.aa:0 "Let us await the outcome"

RigaExpandSupplement.33.name:0 "Intermezzo"
RigaExpandSupplement.33.desc:0 "Built brick by brick over centuries, Riga has today completed its final expansion plan. Its walls now stretch beyond sight; its avenues unfold like an unfurled map beneath the feet of walkers; its docks can berth a hundred carracks at once; its warehouses can hold an entire year's harvest from the East European plain; its sanctuaries stand shoulder to shoulder—Latin crosses, Byzantine domes, Islamic arcades—as though the very roofs of Europe and Asia had found their final resting place within this one city.\n\nUnprecedented. Nero could build the Golden House of Rome, but his marble came only from Carrara and his craftsmen never set foot beyond the Mediterranean. Timur could raise the blue domes of Samarkand, but his models were borrowed from Persia and Khwarezm; he could not fuse the forms of both Eastern and Western historical capitals in a single plan.\n\nUnmatched. For any future builder to surpass this city, they would first need to conquer all the lands this city conquered, dismantle all the histories it dismantled, and reassemble them with the same patience and craftsmanship—and for that, the world would first have to fall back into isolated fragments, only to be reconquered and rejoined by a single hand. But that moment, we may proudly say, lies beyond history's expectation.\n\nThe curtain does not fall here. As the stage expands to encompass the entire earth, everyone is both spectator and actor. Riga has opened a door at the heart of the world, and all who pass through it will add their own tongue and memory to this never-ending epic. All nations will come to Riga—or rather, Riga has become the name that all nations utter when they gather. And this city, built by the hands of the world, will continue to extend beyond the horizon in the name of the world."
RigaExpandSupplement.33.aa:0 "And Riga is ready"
RigaExpandSupplement.33.aa.tt:0 "§RThe performance now reaches its climax§!"

RigaExpandSupplement.34.name:0 "Heavenly Offensive"
RigaExpandSupplement.34.desc:0 "The world has its limits, and we have come to know them. They are the blank spaces on the edges of sea charts, the deserts uncharted by caravans, the unfamiliar syllables not yet translated into Latin by missionaries. But to know the limits is not yet to reach them. Beyond the maps we have drawn, countless peoples still dwell in the shadow of idols, lifting their prayers in valleys that have never heard the name of Christ, using only their native tongues to speak to silent wood and stone. Their suffering is the suffering of those not yet liberated; their ignorance is the ignorance of those not yet enlightened. And Riga—this empire that straddles continents, unites nations, and has conquered half the world with both sword and stone—its mission does not end with filling the blanks on the map. Its mission is to sow the seeds of the Gospel into every untilled soil, so that the peoples forgotten in the darkness may one day lift their faces to the light of dawn.\n\nThis is our final and most sacred mission: to carry the freedom we have received to those who still await it. Across oceans, over highlands, up unfamiliar rivers—the missionaries, merchants, and knights of Riga shall journey together, translating Scripture into new syllables, breaking the bread of Eucharist for those who have never communed, raising the cross in valleys never woken by any church bell. When the world is fully illumined, its edges will become new centers, and its ends new beginnings. We do not seek to turn the world into a canvas of a single color, but to let every color find its place within the same light—and thereby, to make that light itself more vast."
RigaExpandSupplement.34.aa:0 "What has been will be again, what has been done will be done again."
RigaExpandSupplement.34.aa.tt:0 "All our non-§GRigan Chartered Trade Zone§! subjects will receive the §YHeavenly Onslaught§! modifier for §G5§! years\n"

RigaExpandSupplement.35.name:0 "Entrance to the Desolate Ground"
RigaExpandSupplement.35.desc:0 "The tide of history surges onward; all rivers and streams flow toward the same abyss.\n\nFrom the opening of 1444 to the present, Riga has journeyed across centuries, and the history before remains vivid: After Fernando III's death, the Christian kingdoms failed to unite, the Reconquista stalled, and Iberia remains fractured; the Golden Horde disintegrated, the Black Sea steppes were carved up by wolves, and Orthodox believers reclaimed the vast grasslands; Kievan Rus' gained freedom from Mongol rule, but internal contradictions sharpened, civil war looming—smoke will rise over that land once more; the aftershocks of Stephen the Great's era have yet to subside in Asia Minor; the great crusade was once again dismantled by the Turks, and the ruler of Edirne, like an arrow loosed from the bow, vows to restore the glory of the Ottoman Empire; the Serbian Empire, like a centipede that dies but does not stiffen, failed to secure lasting peace after betraying the crusade, and the Balkans burn once more; the Albigensian Crusade ended in failure, the Cathars established the Kingdom of Arles, joining with the northern Kingdom of Lotharingia and the rising Kingdom of England to besiege the Capetian dynasty of France; the Mamluk bloc ultimately fragmented, the Burji dynasty holds Cairo like a tiger, perhaps able to reunite Egypt and push north into Syria...\n\nIn the relentless flow of time, we cannot change the past. So we must continue forward to write our own chapter. Perhaps one day, all peoples will stand united, gazing toward distant horizons—just as we do now—striving for a better tomorrow and answering a greater calling. Perhaps then, those who come after will name the origin of it all: Shared Destiny.\n\nThe great wheel of history rolls onward—and we step at last through the Gate of the Abyss."
RigaExpandSupplement.35.aa:0 "And the river of time shall continue to flow"
RigaExpandSupplement.35.aa.tt:0 "@RIG §Y[RIG.GetName]§!'s content concludes here. §YThank you for playing§!\n\nSpecial thanks to fellow player §OWinter Rain§! for mission descriptions and some event texts."

