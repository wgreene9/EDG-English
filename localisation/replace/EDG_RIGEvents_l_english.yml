rigaExpandDisaster.100.name:0 "End Point"
rigaExpandDisaster.100.desc:0 "The banners of [riga_rebel_target.GetName]'s capital burned in the flames, and the great catastrophe that had swept across Northern and Eastern Europe finally drew to a close.\n\nYet there were no victors in this war. The rebel general perished; the loyalist knights fell beside him. The puppet archbishop they had installed was hanged from the gibbet, and even the [Root.Monarch.GetTitle] was left with barely half a life remaining. The prosperous cities along the Baltic shore now lay plundered, reduced to smoldering ruins, the air thick with choking smoke. Unburied corpses littered the streets, crows pecking at their eyes. Merchants were bankrupted; peasants abandoned their fields; church bells were melted down into arrowheads; confessionals became infirmaries for wounded soldiers. In the end, it was the common people who bore the full weight of all this suffering.\n\nNow, the instigators and perpetrators of the disaster are locked in Riga's dungeons. Their fate hangs like an unsheathed blade in the hands of the [Root.Monarch.GetTitle][Root.Monarch.GetName]. Should we make an example of them, we can display our authority and deter future treachery. Yet given the devastation we have just endured, there is also ample reason for clemency.\n\nRiga's reforms remain unfinished. Whatever the [Root.Monarch.GetTitle] decides, the past is past. The Land of Mary must continue its journey—our performance has not yet reached its final act."
rigaExpandDisaster.100.aa:0 "No more blood needs to be shed"
rigaExpandDisaster.100.bb:0 "Make an example of them!"

rigaExpandDisaster.200.name:0 "War in Heaven"
rigaExpandDisaster.200.desc:0 "Throughout history, no empire has stood unshaken for a thousand years. Even the Eastern Roman Empire, which endured repeated devastation and clung to life for centuries, ultimately crumbled to dust.\n\nWhatever measures the [Root.Monarch.GetTitle][Root.Monarch.GetName] may have taken to prevent decline, whatever efforts were made to soothe disputes among the bishoprics, we now face an inescapable truth—Riga's vast state machinery has developed a fatal malfunction.\n\nWhen Riga's vassal system was still small, centralized authority over its subjects remained feasible. But as the system expanded, information from distant subject states traveled more slowly, and the cost of verifying and screening such information grew increasingly burdensome. Thus, decentralization became a necessity. While other European powers tightened their central control, Riga could only expand its vassal network by continually devolving power.\n\nEarlier reforms may have curtailed the possibility of "inferiors overthrowing superiors," but they did not once and for all secure the stability of the entire vassal system. As the military and economic strength of each bishopric grew, the various classes within them began maneuvering for greater advantages by any means possible—and among these actors were no shortage of "rabble."\n\nWhen Riga was smaller, it could still regulate the internal affairs of its subjects. But as the borders expanded, separatists and religious rebels grew bolder and more numerous. Violence in the distant bishoprics flared without cease, spreading like a prairie fire; rebel groups from different jurisdictions colluded with one another, disrupting the operation of the bishoprics. Beneath it all, the estates of each subject state remained restless, eager to extract every last drop of profit from the collapsing machine.\n\nThe problems of overexpansion went far beyond internal strife. Foreign powers had already noticed that Riga was mired in a crisis of governance. They waited in silence for the great edifice to collapse, ready to pick over its ruins. For our enemies, war was never an unwelcome solution.\n\nBeset by internal decay and external threats, Riga must now make its choice."
rigaExpandDisaster.200.aa:0 "Which path to take?"
rigaExpandDisaster.200.aa.tt:0 "During the §RWar in Heaven§!, if our §Ybishopric§! subjects' liberty desire exceeds §Y50%§!, they will §Rbreak free§! from our control and seek independence\n\nAs we must currently focus on our internal turmoil, §YRigaeria§! will be left without support, leading to §Rextremely severe§! consequences\n\nPlease ensure §Y[riga_authority_of_the_diocese.GetName]§! remains at a high level; if it falls too low, §Runforeseeable§! consequences may occur\n"

rigaExpandDisaster.201.name:0 "War in Heaven"
rigaExpandDisaster.201.desc:0 "As our overlord's control weakens day by day, unrest within our bishopric is intensifying. We must unite immediately to confront this disaster!"
rigaExpandDisaster.201.aa:0 "War and peace, the eternal topics"

rigaExpandDisaster.210.name:0 "Levantine Counterattack"
rigaExpandDisaster.210.desc:0 "Since its conquest, separatist movements in the Mashriq region have been severe, continuously harassing normal productive activities and demanding independence.\n\nRecently, with external support, they have seized several cities and fortresses and declared independence."
rigaExpandDisaster.210.aa:0 "We cannot tolerate such actions"

rigaExpandDisaster.251.name:0 "Collapse of the [rig_subject_unrest_target.GetName] Bishopric"
rigaExpandDisaster.251.desc:0 "Due to various reasons, internal conflicts within the [rig_subject_unrest_target.GetName] bishopric have escalated to a point where the government could no longer bear them and collapsed. State institutions have largely ceased functioning, and various separatists have occupied cities and fortresses, declaring independence.\n\nThis action severely challenges the authority of the [Root.Monarch.GetTitle] [Root.Monarch.GetName]. If we cannot reclaim these territories, our prestige among the bishoprics will greatly diminish."
rigaExpandDisaster.251.aa:0 "Crush the rebels"
rigaExpandDisaster.251.aa.tt:0 "We will declare war on all seceded nations with §Yannexation§! as the casus belli"
rigaExpandDisaster.251.bb:0 "We currently lack the resources..."


rigaExpandDisaster.300.name:0 "War in Hell"
rigaExpandDisaster.300.desc:0 "Our overlord, Riga, is engulfed in a great calamity. Rebellion has swept through Riga's entire vassal system, with conquered regions continuously declaring independence. Unrest and riots pervade all bishoprics. Exhausted by domestic turmoil, Riga can no longer provide us with any form of support. We must now rely on ourselves to overcome the coming difficulties.\n\nSince its founding, Rigaeria has established a highly autonomous republican system where each region possesses considerable military and economic self-governance, not vastly different from Riga. However, the distinction lies in how Rigaeria unites the entire nation through a 'confederation' rather than a hierarchical vassal relationship like Riga's. This has its pros and cons: the advantage is the highly efficient speed of colonization and missionary activities in unexplored territories; the disadvantage, however, is now being demonstrated 'vividly'.\n\nJust a few months ago, when news arrived that distant Riga could no longer spare any resources to support Rigaeria, domestic unrest began. Rigaeria had to cut expenses and open new revenue streams to maintain normal state operations. However, it became clear that various regions were unwilling to implement cost-cutting policies on themselves. Simultaneously, they gradually realized that seceding from the nation better served their interests, marking the beginning of Rigaeria's collapse.\n\nWithin a few short weeks, regions across Rigaeria ceased obeying the central government's control and recently declared independence. More egregiously, unsatisfied with the status quo, they turned their gaze toward Rigaeria, seeking wealth from its directly controlled areas. Under the banner of 'liberation,' they demanded the [Root.Monarch.GetTitle] [Root.Monarch.GetName] immediately dissolve the Holy Republic and return all power to the people, thereby plundering the wealth of Rigaeria's churches.\n\nIn this critical moment, the [Root.Monarch.GetTitle] [Root.Monarch.GetName] must make a choice."
rigaExpandDisaster.300.aa:0 "This is our path!"
rigaExpandDisaster.300.bb:0 "Only death marks the end of duty"
rigaExpandDisaster.300.bb.tt:0 "§RThis is not a request but a declaration§!\n\nAll seceded nations will jointly declare war on §YRigaeria§!"

RigaExpandFlavour.0.name:0 "City Log: Königsberg"
RigaExpandFlavour.0.desc:0 "In its earliest days, the site of Königsberg was home to several settlements of the Old Prussians, known collectively as Twangste. In 1255, the Teutonic Order conquered the Prussian Sambian tribe, destroyed Twangste, and built a new fortress on the site, naming it Königsberg—"King's Mountain"—in honor of King Ottokar II Premysl of Bohemia. It was King Ottokar who funded the construction of the first castle there, Königsberg Castle. Around this fortress, three towns gradually developed along the Pregolya River: Altstadt, Kneiphof, and Löbenicht, about 4.5 miles from the Vistula Lagoon. The Teutonic Order used Königsberg as a base for conquering the Sambian Peninsula and for campaigns against the Grand Duchy of Lithuania. From 1262 to 1263, the Prussians rose in rebellion against the Order's forced conversion policies, besieging Königsberg. The fortress was ultimately relieved with the help of the Livonian Order.\n\nIn 1340, Königsberg joined the Hanseatic League and quickly grew into a major port in the southeastern Baltic, trading goods from Prussia, the Kingdom of Poland, and the Grand Duchy of Lithuania. Between 1324 and 1330, the chronicler Peter of Dusburg likely composed his masterwork, the Chronicon terrae Prussiae, in Königsberg.\n\nThough the Order suffered a catastrophic defeat at Grunwald, Königsberg remained in Teutonic hands throughout the Polish-Lithuanian-Teutonic War. Afterward, the Livonian Order took over its defense and participated in the reconstruction of towns that had been occupied by the forces of Władysław II Jagiełło.\n\nAs military campaigns in the Teutonic heartland became less frequent, Königsberg began to expand its urban areas outward, seeking faster development, and the surrounding economy grew in its wake."
RigaExpandFlavour.0.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.1.name:0 "City Log: Marienburg"
RigaExpandFlavour.1.desc:0 "In 1274, after suppressing the 'Great Prussian Uprising,' the Teutonic Order began constructing the High Castle, a project that continued into the early 14th century. When completed, the castle served as both a religious center and a formidable fortress—unique among contemporary European castles, and a model for future Order strongholds. In 1309, the Grand Master relocated the Order's headquarters from Venice to Marienburg, ushering in a new phase of construction. Gradually, a Middle Castle was built around it, roughly square in shape, formed by three interconnected wings surrounding a courtyard: to the northwest stood the Grand Master's Palace and the Knights' Hall; to the northeast, the entrance and guest reception; to the southeast, guest quarters; and the fourth side opened toward the High Castle via a passageway. The castle itself underwent extensive renovation, with both its area and height increased.\n\nToday, the castle covers an area four times that of Windsor Castle and could house some 3,000 members of the Order. By area, Marienburg ranks among the largest European-style castles in the world, and is Europe's largest brick-built structure. Though still a military installation at heart, as the Order grew and local conflicts became less frequent, industries began to sprout around its walls. With merchants arriving through the port of Danzig, the Marienburg region gradually flourished."
RigaExpandFlavour.1.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.2.name:0 "City Log: Livland"
RigaExpandFlavour.2.desc:0 "The city of Livland (known today as Viljandi) lies on the shores of Lake Viljandi, connected by a navigable waterway between the Baltic Sea and Lake Peipus, with a land route linking southern and northern Estonia. Its favorable geography made it an important prehistoric settlement as early as the Viking Age, with a hillfort standing on the site. The city was first mentioned in writing in 1154, when the Arab geographer Al-Idrisi referred to it as "Falamus" in his map annotations. But Livland entered the stage of history proper during the Northern Crusades.\n\nIn 1211, a coalition of Germans, Latvians, and Livs besieged the hillfort. In August 1223, the Livonian Order captured the city from a Rus' garrison. The following year, Grand Master Volquin ordered the construction of §YFellin Castle§! on the hillfort's site. This castle was the largest and strongest stronghold of the Livonian Order in southern Estonia, and one of the most formidable in the entire Baltic region. Soon, a medieval town grew up before its walls. In 1238, Grand Master Wilhelm von Schurborch granted the city its charter; in 1283, it received full municipal rights.\n\nIn the early 14th century, Livland joined the §YHanseatic League§!, becoming one of Estonia's four Hanseatic cities. As a League member, Livland developed into a major commercial center in southern Estonia through the Baltic trade network. By 1444, Livland was an important castle town in the southern Livonian Confederation, directly under the Livonian Order and an active Hanseatic city. Its strong fortifications and thriving trade gave it a prominent place in the political landscape of Livonia."
RigaExpandFlavour.2.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.3.name:0 "City Log: Vilnius"
RigaExpandFlavour.3.desc:0 "The Vilnius region has been inhabited since ancient times, located at the confluence of the Vilnia and Neris rivers. The city's name is believed to derive from the Vilnia River that flows through it. In 1323, the Grand Duchy of Lithuania established its capital at Vilnius; that same year, Grand Duke Gediminas wrote to the cities of Germany, inviting Germans and Jews to settle here—this marks the first recorded mention of the city.\n\nAfter Riga established its government here, the city quickly built walls and developed rapidly, leveraging Riga's influence in Baltic trade. The Jesuit Academy of Vilnius was founded. The city became a hub of political, economic, and social activity. Due to its location at the crossroads of Eastern Europe and the Baltic, the relaxation of immigration policies brought a large influx of settlers, each contributing uniquely to the city's life, fostering prosperity in crafts, trade, and learning.\n\nThough under the rule of a theocratic government, Vilnius was remarkably tolerant toward different faiths. It was not only a multicultural city but also a multi-religious one, earning the well-known epithet: 'the Jerusalem of Lithuania.' Other religious communities thrived within the city, and it offered refuge to religious exiles from elsewhere."
RigaExpandFlavour.3.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.4.name:0 "City Log: Danzig"
RigaExpandFlavour.4.desc:0 "The city's name was established only after the investiture of Saint Adalbert in 997 AD. In the local Kashubian language, it is called Gduńsk, but due to the predominance of Germans in the city, the German name Danzig was also widely used.\n\nDanzig lies to the north, bordering the Gulf of Danzig, a semi-circular bay in the southeastern Baltic Sea, partly separated from the main Baltic by the Hel Peninsula. The Vistula River flows into the gulf, branching into many distributaries at its mouth. The city of Danzig is situated on both banks of one such distributary, the Motława River, on the left bank of the main Vistula channel. The riverbanks were the birthplace of this port city.\n\nSome scholars believe Danzig Fortress was established by Polish King Mieszko I in the 980s, while others consider 997 as the city's founding date because that year, Polish King Bolesław I the Brave sent Saint Adalbert of Prague to baptize the inhabitants of Danzig. The Duke of Pomerania's coat of arms subsequently marked Danzig as a major center under the rule of the Pomeranian dukes, a Polish fragmented duchy. The most notable duke was Swiętopełk II, who granted Danzig its municipal charter around 1235 when the city had 2,000 inhabitants. By 1308, Danzig had developed into a prosperous trading city with 10,000 residents—a population size few cities could match at the time. On November 13, 1308, the Teutonic Order conquered and destroyed this thriving city, perpetrating the Danzig Massacre. This massacre led to the city's decline and sparked a series of wars between the Teutonic Knights and Poland until the Treaty of Kalisz in 1343, where the Teutonic Order acknowledged that the Pomeranian lands they occupied were held as a 'fief' from the Polish king. Despite lingering legal disputes over territorial ownership, this agreement ultimately confirmed Danzig's municipal status in 1343 and developed the trade route for Polish grain imports via the Vistula River. During the period of Teutonic control, the city's size and trade recovered and expanded, and German influence increased. In 1361, Danzig became a member of the Hanseatic League and served as the chief city of the Prussian and Livonian circles within the League, trading with Prussia, the Teutonic Order's territories along the eastern Baltic coast, Poland, and Sweden.\n\nSubsequently, Danzig changed hands repeatedly between the Kingdom of Poland and the Teutonic Order until the complete fragmentation of the Polish kingdom ended the century-long conflict over Danzig. For centuries since the Hanseatic era, Danzig has remained a vital shipping and trading center along the Baltic coast. Although it declined several times during various wars, it has always leveraged its geographical advantages to restore its former prosperity shortly after each decline. We should continue to develop and improve this city."
RigaExpandFlavour.4.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.5.name:0 "City Log: Stockholm"
RigaExpandFlavour.5.desc:0 "Stockholm—in Swedish, 'the island of logs'—stands at the strategic strait between Lake Mälaren and the Baltic Sea, surrounded by islands and interlaced waterways. The city's founding year is generally dated to 1252, when the Swedish regent Birger Jarl built a fortification here to secure Sweden's eastern communications and defenses. By the late 13th century, Stockholm was no longer merely a checkpoint at the lake's outlet, but a key node linking Sweden's interior, Finland's coast, and the Baltic trade network. In 1397, under Queen Margaret I of Denmark, Sweden, Norway, and Denmark formed the Kalmar Union, sharing a single monarch. Stockholm, as Sweden's largest city, became the Union's political center in the Swedish realm.\n\nEconomically, Stockholm's prosperity was inseparable from the Hanseatic League. Trade agreements between Sweden and the League ensured Hanseatic merchants enjoyed tariff-free trade and settlement rights in Sweden. Thanks to these ties, Stockholm rapidly became a hub connecting Eastern and Western commerce. High-quality iron and copper from central Sweden were shipped from Stockholm's docks to Hanseatic cities such as Lübeck and Danzig, and from there to the rest of Europe. Though Stockholm never formally joined the Hanseatic League, German merchants exercised considerable influence in the city.\n\nBy 1444, Stockholm was the core city of the Swedish realm within the Kalmar Union. The Tre Kronor Castle, expanded several times, now stood as a powerful symbol of Swedish royal authority. Through Stockholm's streets, Swedish and Low German echoed side by side, and the trade in copper and iron poured steady wealth into this ancient city."
RigaExpandFlavour.5.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.6.name:0 "City Log: Lund"
RigaExpandFlavour.6.desc:0 "Lund's name derives from the Old Danish word for 'grove,' for the city was first built in a wooded area. Situated on the richest plain of Skåne, about eight miles from the Øresund, Lund is one of northern Europe's oldest cities.\n\nLund's founding can be traced to around 990 AD, when the region was still part of the Danish kingdom. Sweyn Forkbeard relocated the inhabitants of Uppåkra to a defensible height—this marks the city's beginning. Shortly thereafter, his son Cnut the Great established a mint here in 1019, further elevating its importance. In 1060, Henry, an English priest at Cnut's court, was appointed the first bishop of the diocese of Lund, though the Danish Church at that time still belonged to the Archbishopric of Hamburg-Bremen. In 1103, King Eric I of Denmark persuaded Pope Paschal II to elevate Lund to an archbishopric, overseeing the church affairs of Denmark, Norway, and Sweden, thereby freeing the northern Church from German control. In 1104, the first archbishop was consecrated in Lund, making it the Christian center of Scandinavia.\n\nAt the height of the Middle Ages, Lund had twenty-seven churches within its walls, including several monasteries—more than any other Nordic city. The cathedral school, founded in 1085, is one of the oldest in Scandinavia. Lund Cathedral was the first large Romanesque stone church in Scandinavia, and its architectural style influenced church building across the region for centuries.\n\nBetween 1332 and 1360, Skåne was briefly under Swedish rule, and Lund was controlled by Sweden during that period, before being reclaimed by Denmark. With the establishment of the Kalmar Union in 1397, Lund, as Denmark's most important religious and political center in Skåne, retained its status within the Union. By 1444, Lund's towers still stood firm upon the plain, recounting past glories and silently watching the shifting tides of the Baltic."
RigaExpandFlavour.6.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.7.name:0 "City Log: Poznań"
RigaExpandFlavour.7.desc:0 "The name Poznań is said to derive from the Old Polish word 'poznac' (meaning 'to know' or 'to remember'), rooted in the early Piast political and religious center established here. The city lies at the heart of the Greater Poland plain on the Warta River, at the confluence of the Warta and its tributary the Cybina—a strategic crossroads of land and water routes since ancient times. In the 10th century, Poland's first documented ruler, Mieszko I, built a fortified ducal stronghold on Ostrów Tumski (Cathedral Island) and made it his capital. In 966, he received Christian baptism here, formally bringing Poland into Christendom and laying the religious and political foundations of the Polish state. Shortly thereafter, construction began on Poland's first cathedral—the Archcathedral Basilica of St. Peter and St. Paul—which still holds the stone sarcophagi of Mieszko I and his successor, Bolesław I the Brave, Poland's first crowned king.\n\nIn the mid-11th century, Poznań was sacked by Duke Bretislav I of Bohemia; the ducal stronghold was destroyed, and King Casimir I moved the capital to Kraków. Poznań lost its status as capital, but remained the administrative and political center of Greater Poland.\n\nIn 1253, Duke Przemysł I of Greater Poland and his brother Bolesław jointly issued a municipal charter, establishing a new 'charter town' on the left bank of the Warta River under German law. A new castle was built beside the new district, and the city was granted extensive trade and judicial privileges. The new Poznań quickly rose to prominence. Meanwhile, positioned at the center of the Greater Poland plain and connected via the Warta-Oder waterway to the wider trade network, Poznań grew into a major center for trade in grain, furs, and forest products, attracting merchants from Silesia, Bohemia, and the German states.\n\nBy 1444, Poznań was one of Poland's most important cities. It had witnessed the rise and fall of the Piast dynasty, the ascent of the Jagiellons, and the fragmentation of Poland. The prayers of the cathedral had echoed across the plain for centuries, and would continue to echo long after."
RigaExpandFlavour.7.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.8.name:0 "City Log: Warsaw"
RigaExpandFlavour.8.desc:0 "Warsaw sits on the elevated banks of the middle Vistula, on the Mazovian plain—a crossroads of trade routes between Central and Eastern Europe. The earliest settlements on the site date to the 9th century, but the city's true origins lie in the 13th century, when the Dukes of Mazovia built a castle here to control the Vistula crossing. The first written record of Warsaw appears in 1339, in a document concerning a territorial dispute over the Duchy of Mazovia. In 1344, Warsaw became the capital of the Duchy of Mazovia, and successive dukes resided here, rapidly expanding the city's functions and political status. During the 14th century, religious buildings—including the Augustinian church and monastery, St. Mary's Church, and St. John's Archcathedral—were erected, leaving the city its first Gothic landmarks.\n\nBy 1444, Warsaw had not yet achieved the glory it would later attain as the Polish capital, but it was already a steadily growing town of river, castle, and market. It had witnessed the reign of the Mazovian dukes and the resilience of its people through centuries of fragmentation—and was destined to become the heart and soul of the land in the centuries to come."
RigaExpandFlavour.8.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.9.name:0 "City Log: Smolensk"
RigaExpandFlavour.9.desc:0 "Smolensk lies among the hills of the upper Dnieper River, guarding the strategic crossroads of ancient trade routes linking the Baltic and the Black Seas. The forests around Smolensk are rich in resin and tar used for shipbuilding and repair, and the city's name is said to derive from the Old East Slavic word for 'tar.'\n\nSmolensk's history dates to 863 AD, when it was already a key fortress controlling the overland portage between the Dnieper and the Western Dvina, guarding the trade route between Moscow and Western Europe. In 882, Oleg of Novgorod captured Smolensk and incorporated it into Kievan Rus'. After the collapse of Kievan Rus' in the 12th century, Smolensk emerged as an independent principality. When the Mongols swept through the Rus' lands in the 13th century, Smolensk was spared total destruction—though forced to pay tribute to the Golden Horde, it retained a considerable degree of autonomy. Yet as the old order crumbled, new neighbors grew powerful. After the Battle of the Vikhra River in 1386, Smolensk fell under Lithuanian suzerainty. In 1407, the local merchant veche overthrew the Rurikid prince and established a veche republic, which was in turn overthrown by yeomen and townsmen, creating a government that excluded the nobility.\n\nBy 1444, though scarred by countless wars, Smolensk remained a major trade and handicraft center. Amid growing conflicts between its governor and the lower classes, the city kept watch over the waters of the Dnieper, awaiting the next turn of fate."
RigaExpandFlavour.9.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.10.name:0 "City Log: Moscow"
RigaExpandFlavour.10.desc:0 "Moscow derives its name from the Moscow River that flows through it. In Old Slavonic, the word also carries a sense of dampness, fittingly describing this land of interlaced waterways. The earliest written record of Moscow dates to 1147, when Prince Yuri Dolgorukiy of Suzdal wrote to an ally: 'Come to me, brother, to Moscow.' In 1156, Yuri built a wooden and earthen fortress on a hill at the confluence of the Moscow and Yauza rivers—the first Kremlin.\n\nIn the early 13th century, Moscow became an independent principality, unremarkable among the many heirs of Vladimir-Suzdal. But when the Mongol hordes swept across the steppe like a storm, the small town of Moscow was sacked; the Kremlin's wooden walls were reduced to ash. The old order of the Rus' was shattered by Mongol hooves, and Moscow became a vassal of the Golden Horde.\n\nIn 1276, Alexander Nevsky's youngest son, Daniel of Moscow, received the appanage of Moscow. He took Kolomna and inherited Pereslavl-Zalessky—the first steps of expansion. Subsequent grand princes expanded through bribes, marriages, and conquests, accumulating wealth and prestige in their dealings with the Horde. In 1320, Ivan I—known as 'the Moneybag'—began rebuilding the Kremlin in oak and limestone; in 1325, he moved the Orthodox metropolitanate from Vladimir to Moscow, making it not only the prince's seat but also the religious heart of Rus'. In 1380, Grand Prince Dmitry Donskoy defeated Mamai of the Golden Horde at Kulikovo Field. Though Moscow was sacked by the Mongols again soon after, the victory at Kulikovo lit a ray of hope for liberation. Moscow's leadership among the Rus' principalities was now secured.\n\nBy 1444, Moscow—though still under the shadow of the Muscovite-Tverian War—had become one of the most powerful cities among all Rus' principalities. The wooden walls of the Kremlin were being replaced with white stone; the Dormition Cathedral and the Archangel Cathedral stood within; commercial and craft settlements spread beyond the walls. Furs from the north, spices from the south, metalware from the west, silk from the east—all found their way to Moscow's markets."
RigaExpandFlavour.10.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.11.name:0 "City Log: Volhynia"
RigaExpandFlavour.11.desc:0 "Volhynia (now known as Volodymyr-Volynskyi) lies on the Volhynian plain between the Western Bug and Luga rivers, at a key node connecting the Rus' heartland, Poland, and the Carpathian trade routes. The city was named after Grand Prince Vladimir I of Kiev—'Saint Vladimir'—who ordered its construction around 988 after subjugating the Volhynian region, and named it after himself.\n\nIn 988, Vladimir I enfeoffed his son Vsevolod Vladimirovich here, making it the center of the Principality of Volhynia. In 1124, a severe earthquake damaged the city, but its favorable location and fertile lands allowed it to recover quickly and maintain dominance. In 1199, Prince Roman Mstislavich of Volhynia conquered neighboring Galicia and merged both into the Kingdom of Galicia–Volhynia, later crowning himself King of Rus'. Volhynia thus became one of the most important cities of the southwestern Rus'.\n\nIn 1240, Batu Khan's Mongol armies swept through Kievan Rus'; Volhynia fell. Though sacked, it was not utterly destroyed like Kiev. Under Mongol rule it retained considerable autonomy and gradually recovered over the next century—until the Kievan Rus' civil war of 1443 swept the city back into the storm. Yet through all the turbulence, the great white-stone Dormition Cathedral still rose above the city skyline, as it had for three centuries past and would for ages to come."
RigaExpandFlavour.11.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.12.name:0 "City Log: Podolia"
RigaExpandFlavour.12.desc:0 "Podolia (also known as Kamianets) is cradled in the bend of the Smotrych River, which over millennia has carved a winding canyon through this plateau on the left bank of the Dniester. The city's founders laid its first stone on a natural island of rock within the canyon, making the sheer cliffs on three sides its unfailing walls.\n\nThe city was founded in 1062, as recorded in the Hypatian Codex. In the time of Kievan Rus', Podolia was an important fortress of the Principality of Galicia–Volhynia, drawing merchants traveling between the Black Sea and the Baltic. Its castle on the heights not only guarded the vast plains of southwestern Rus' but also served as a cultural stronghold of Orthodox faith. Its stone walls, high towers, and winding fortifications were unmatched among the Rus' cities. In the mid-14th century, Grand Duke Algirdas of Lithuania, after defeating the Mongols at the Battle of Blue Waters, brought Podolia under Lithuanian influence. The Koryatovich family received Podolia and made it their capital, building stone walls, expanding fortifications, and encouraging settlers from Rus', Armenia, Poland, and Germany, turning it into a multi-ethnic trade center. In 1395, Polish King Jogaila took control of Podolia and incorporated it into the kingdom's frontier defenses. As a frontier settlement between Christendom and the steppe nomads, the city's importance grew steadily.\n\nBy 1444, Podolia had passed through over a century of shifting control between Polish and Ruthenian powers. The castle on the Smotrych, with its eleven towers and long walls, was linked to the outer world by a drawbridge over the deep canyon. It was not only a military stronghold guarding the southeastern borders of Volhynia but also a trade hub linking the Black Sea coast with Central and Eastern Europe. This city of stone—named for stone, built of stone, defended by stone—stood at the crossroads of the East European plain and the Black Sea coast, guarding the eastern gate of Ruthenia."
RigaExpandFlavour.12.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.13.name:0 "City Log: Tver"
RigaExpandFlavour.13.desc:0 "Tver takes its name from the Tvertsa River that flows through it. The city lies on the upper Volga, where its tributaries the Tvertsa and Tmaka join the main river. It stands at the crossroads of routes connecting Moscow, Novgorod, and the middle Volga, and has been a transport hub of the northern East European plain since ancient times. The city was founded in 1135 at the mouth of the Tmaka, initially as a trading post and fortress along the Novgorod–Volga trade route.\n\nIn 1247, Grand Prince Yaroslav Vsevolodovich of Vladimir granted the Tver region to his son Alexander Nevsky, establishing the Principality of Tver. After 1247, the region passed to another of Alexander's sons, Yaroslav Yaroslavich, and his descendants. Because of its remote location, Tver suffered relatively little from the Mongol invasions; large numbers of refugees poured in from the devastated southern Rus', and the city's economy and politics developed rapidly in the latter half of the 13th century. In 1305, Mikhail of Tver was appointed Grand Prince of Vladimir by the Golden Horde—the nominal supreme ruler of all Rus'—making Tver one of the region's political centers.\n\nIn 1327, a Tatar commander, Chol Khan, entered Tver with his troops. Mongol soldiers oppressed and abused the populace until a citywide uprising erupted. The enraged townsfolk surrounded the garrison and slaughtered the Mongol soldiers; Chol Khan himself was burned alive. Enraged by the news, the Khan ordered Grand Prince Ivan I of Moscow to lead a punitive expedition. To gain Mongol favor and secure his position, Ivan I did not hesitate to turn his sword against Tver. The city fell; the rebellion was crushed; Grand Prince Alexander Mikhailovich was forced into exile.\n\nIn the century that followed, despite many trials, Tver remained one of the foremost centers of craftsmanship and trade among the northeastern Rus' cities—until the Muscovite-Tverian War once again cast the city's future into uncertainty."
RigaExpandFlavour.13.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.14.name:0 "City Log: Kraków"
RigaExpandFlavour.14.desc:0 "Legend has it that long ago, a fire-breathing dragon dwelled in a cave on Wawel Hill beside the Vistula. Duke Krak, worried for his daughter, offered a reward for its slaying. At last, a shoemaker named Krakus stepped forward and tricked the dragon into swallowing a sheepskin stuffed with sulfur and pitch. The dragon's throat burned; it staggered and fell into the Vistula. After the dragon's death, a new city was built on Wawel Hill and named after the dragon-slayer: Kraków. The city sits on both banks of the upper Vistula, at the crossroads between Silesia and Ruthenia, the Baltic and Hungary—a hub of overland and riverine trade across Europe since ancient times. At the city's eastern end, Wawel Hill rises, providing an unrivalled defensive position for its earliest settlers.\n\nAround 700 AD, the West Slavic Vistulans built the first defensive fortifications here—the origins of Kraków. By the mid-9th century, Kraków had become the heart of the Vistulan tribe. Though the tribe was briefly absorbed into Great Moravia, after being reintegrated into Poland in the late 10th century, Kraków—with its strategic position and rich lands—quickly became the favored residence of Polish monarchs. In 1038, Casimir I the Restorer decided to leave Poznań, which had suffered in the chaos of war, and moved Poland's political center to Kraków. From then on, Wawel Castle became the official residence of Polish kings, and Kraków became the true capital of the Polish kingdom.\n\nYet in 1241, Batu Khan's Mongol army shattered the Polish forces at Legnica and swept toward Kraków. The wooden buildings of the city were nearly all burned; only Wawel Castle, with its stone walls, held out. In 1257, Duke Bolesław V issued a far-reaching municipal charter, reorganizing the city under German law. In 1287, the Mongols returned; this time, Kraków, with its stone walls and unified municipal council, repelled the siege, ending Tatar threats to Lesser Poland for good. In 1335, Casimir III founded Kazimierz, a new city on an island in the Vistula, as a southern extension of Kraków; and in 1364, he established the Academy of Kraków, the second university in Central-Eastern Europe after Prague.\n\nBy 1444, Kraków was the undisputed political heart, economic engine, and academic center of the Polish kingdom. The eagle banner snapped in the wind from Wawel's high towers. Before the Cloth Hall in the market square, merchants spoke in low tones of future hopes; and in the Academy of Kraków, scholars still bent over their manuscripts."
RigaExpandFlavour.14.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.15.name:0 "City Log: Thessaloniki"
RigaExpandFlavour.15.desc:0 "The name Thessaloniki derives from the Greek for 'victory in Thessaly.' In 315 BC, the Macedonian king Cassander founded the city and named it after his wife, Thessalonike, the half-sister of Alexander the Great—who was born on the very day her father Philip II won the Battle of Thessaly. Thessaloniki stands at the northern end of the Thermaic Gulf, commanding the route into the Balkan interior. The city was built on a promontory with natural hot springs; Cassander merged the inhabitants of Therma with those of 26 surrounding villages to form the new city.\n\nAfter Rome's conquest of Macedonia, Thessaloniki became the capital of the Roman province of Macedonia in 146 BC. The Via Egnatia, which linked the Adriatic to the Bosporus, passed through the city, making Thessaloniki a commercial, cultural, and military hub between East and West. Around 50 AD, the Apostle Paul visited Thessaloniki during his second missionary journey, preaching for three days in the city's synagogue.\n\nDuring the Byzantine era, Thessaloniki grew into the empire's second city, often called the 'co-capital.' In the 4th and 5th centuries, the Church of St. Demetrius was built; in the 9th century, the brothers Cyril and Methodius—natives of Thessaloniki—departed from the city's harbor to carry Christianity and the Slavonic script to the lands of Eastern Europe.\n\nYet beneath its splendor, armies gathered. In 904, Saracen pirates raided Thessaloniki; in 1185, Normans from Sicily captured and sacked it. After the Fourth Crusade's sack of Constantinople in 1204, Thessaloniki fell to the Crusader Kingdom of Thessalonica, ruled by Latin nobles, until the Empire of Nicaea recovered it two decades later. In 1387, Thessaloniki surrendered to Sultan Murad I after a long siege, falling to the Ottomans. Thereafter, the city passed between Byzantine, Serbian, and Ottoman hands. After the Battle of Ankara in 1402, the Byzantines briefly recovered it, then sold it to the Republic of Venice in 1423. Finally, on 29 March 1430, after an eight-year siege, Sultan Murad II broke through the city's walls; 1,400 Venetian defenders and countless civilians perished in the sack.\n\nBy 1444, Thessaloniki was under Ottoman rule. Once the royal city of Macedon, the Roman provincial capital, the Byzantine co-capital, the witness of St. Paul's preaching—it had become an Ottoman military outpost in the northern Balkans. Frescoes from the Latin conquerors still clung to the walls of St. Demetrius, while the shadows of Islamic minarets fell across its steps. Yet Thessaloniki had never died. It survived every conquest, rebuilt after every sack. Its harbor still received merchant ships from the Aegean, and in its markets, Greek, Slavic, Venetian, and Ottoman Turkish voices echoed together."
RigaExpandFlavour.15.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.16.name:0 "City Log: Athens"
RigaExpandFlavour.16.desc:0 "Athens—the cradle of Western civilization, birthplace of philosophy, drama, and democracy. Though centuries of war have scarred its hills, the columns of the Parthenon still stand like a broken lyre, singing ancient hymns beneath the blue sky of Attica. Located at the heart of the Attic peninsula, Athens lies only a few miles from the Saronic Gulf. The city's heart is the Acropolis, a natural fortress atop a limestone hill inhabited since the Mycenaean age. Beneath the Acropolis, among the rubble of the ancient Agora, the foundations of colonnades and altars can still be traced.\n\nAthens' glory belonged to the classical age. In the 5th century BC, after the great Persian Wars, Athens rose to become the naval hegemon and cultural center of the Greek world. In 478 BC, the treasury of the Delian League was moved from Delos to Athens; democracy flourished under Pericles. The Assembly convened on the rocky slopes of the Pnyx, the Council of Five Hundred—chosen by lot from Athenian freeborn households—held executive power, and ostracism guarded against would-be tyrants. Herodotus recited his Histories here; Thucydides chronicled the fall of Athens in the Peloponnesian War. Anaxagoras explored the cosmic reason of Nous; Socrates walked the streets, exposing ignorance with his elenchus. Aristophanes staged Clouds and Frogs at the Theatre of Dionysus, mocking gods and generals with raucous laughter; Sophocles and Euripides wrote Oedipus Rex and Medea, bringing art to its tragic peak.\n\nThe Peloponnesian War ended Athens' golden age, yet Plato took up the soul of Socrates to found the Academy, and Aristotle walked the Lyceum's shaded paths. Athens was no longer a naval power, but remained the world's intellectual heart. In the Middle Ages, Athens was reduced to a provincial city of the Byzantine Empire. Its population shrank, but the Acropolis remained a strong fortress.\n\nIn 1204, after the Fourth Crusade captured Constantinople, the Burgundian knight Othon de la Roche was awarded the Duchy of Athens. The Latins built a palace on the Acropolis. The Duchy of Athens endured for a century under Frankish rule. In 1311, Catalan mercenaries shattered the Franks at the Battle of Halmyros and seized the duchy. In 1379, the Navarrese Company drove out the Catalans, and the duchy passed to the Navarrese. In 1388, Nerio I Acciaioli, a Florentine banker, bought the title of Duke of Athens from the Navarrese through a combination of marriage and purchase.\n\nBy 1444, Athens had not yet been formally annexed by the Ottomans, but with a flick of the Sultan's finger, this ancient city that gave birth to Socrates, Plato, and Aristotle would fall like a ripe fig. Behind it lay the splendor of the classical age; before it, the dust raised by Ottoman cavalry. Yet even in its darkest years, the standing columns of the Acropolis could still steal the breath of any traveler—because this was where human thought first rose. May Athens' olive trees never wither, reminding future ages that wisdom does not vanish beneath the conqueror's blade—it only sleeps, waiting for the next dawn."
RigaExpandFlavour.16.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.17.name:0 "City Log: Ankara"
RigaExpandFlavour.17.desc:0 "Ankara lies at the heart of the Anatolian plateau, some 900 meters above sea level, surrounded by hills on three sides, with the Ankara River—a tributary of the Sakarya—running through it. It has been a crossroads between East and West since ancient times. As early as the 13th century BC, the Hittites had already built a fortress called 'Ankuwa' on this plateau, making it an important center of their civilization.\n\nAccording to legend, Ankara was named after a lost anchor—in Greek, ankyra—found by King Midas of Phrygia in the mountains, where he then founded a new city. In the Hellenistic period, Ankara became the capital of the Galatians, known as Ancyra. In 25 BC, Augustus incorporated Galatia into Rome, raising Ancyra to the capital of a Roman province. The Romans built the Temple of Augustus, the Column of Julian, and public baths. On the walls of the Temple of Augustus, the Res Gestae Divi Augusti is still inscribed in Latin and Greek, chronicling the deeds of the first Roman emperor.\n\nDuring the Byzantine period, Ankara enjoyed relative peace until the 7th century, when it began to suffer repeated Arab raids. In 1071, Sultan Alp Arslan shattered the Byzantine army at Manzikert. Two years later, Seljuk hooves trod the streets of Ankara; the city was renamed Engürü. Ankara entered the Turkic era. Between 1124 and 1127, the city changed hands several times, eventually falling to the Danishmends; in 1142, Sultan Mas'ud of the Seljuks brought Ankara and other cities back into the Sultanate of Rûm.\n\nIn 1243, Mongol armies swept across Anatolia; Ankara fell under Mongol rule. Thereafter, the city was governed by local leaders called Ahi beys, who served as Mongol provincial governors while also engaging in trade, leaving behind several mosques and caravanserais. It was during this period of Mongol rule that the city's name gradually evolved from Engürü to Angora. The names of Angora goats, Angora cats, and Angora rabbits all derive from this city.\n\nIn 1356, the rising Ottoman beylik took Ankara from the Mongols; Orhan Bey incorporated it into his domain. In July 1402, Timur's Central Asian cavalry met Ottoman Sultan Bayezid I—known as 'the Thunderbolt'—on the plain of Çubuk outside Ankara. The battle ended in the total destruction of the Ottoman army; Bayezid himself was captured and imprisoned until his death.\n\nBy 1444, Ankara, recovering from the trauma of Timur's conquest and governed by the Ahi brotherhoods, remained a jewel on the Anatolian stage, a city that had journeyed all the way from its Hittite fortress origins."
RigaExpandFlavour.17.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.18.name:0 "City Log: Adana"
RigaExpandFlavour.18.desc:0 "Legend has it that Adanus, son of the sky god Uranus, accompanied his father on a journey across the earth. Arriving at the banks of the Seyhan River, he found the land rich and fertile, and founded a city, naming it after himself. This is the legendary origin of Adana. Yet long before Greek colonists crossed the Aegean, the city was already recorded as 'Adaniya' or 'Ataniya' on Hittite cuneiform tablets, dating its history to at least 3000 BC.\n\nAdana lies at the center of the Cilician plain, commanding the Seyhan River, backed by the Taurus Mountains and only 45 kilometers from the Mediterranean. From ancient times, it was the gateway connecting the Anatolian plateau with Mesopotamia. After the fall of the Hittite Empire, Adana fell successively to the Assyrians, Persians, and Macedonian Greeks. In 333 BC, Alexander the Great's cavalry conquered Cilicia, and Adana entered the Hellenistic age. In 63 BC, after suppressing the pirates, Pompey settled large numbers of captured pirates here, setting them to cultivate the land and build defenses; Adana's expansion began. In the 2nd century AD, Emperor Hadrian visited the city and built the great stone bridge over the Seyhan, still in use today.\n\nUnder Byzantine rule, Adana became one of the military and administrative centers of Cilicia; Emperor Justinian extensively restored its walls and bridges. In the 7th century, the Arab Islamic armies swept in, and Adana fell to the Abbasids. The renowned Abbasid general—later Caliph—Harun al-Rashid built a strong fortress on the right bank of the Seyhan in 782, whose ruins remain. In the autumn of 1097, the First Crusade marched through Cilicia; Adana was captured and fell under Baldwin of Edessa's control. For over two centuries, it became an important city of the Armenian Kingdom of Cilicia.\n\nAround 1352, a Turkish chieftain named Ramazan, of the Yüregir tribe, migrated from Khorasan into Anatolia and declared himself Emir in Adana. Under Mamluk protection, the Ramadanid dynasty expanded rapidly, finally ending the Armenian Kingdom of Cilicia in 1375. By 1444, Adana was under the Beylik of Karaman, walking a careful line between the rising Ottoman Empire, the powerful Mamluks to the south, and the Aq Qoyunlu to the west. The ancient Roman bridge over the Seyhan still bustled with traffic; at the foot of Harun al-Rashid's fortress, caravans from Persia and India unloaded spices and silk into Adana's markets, while timber, wool, and copper ore from the Anatolian plateau were loaded onto carts bound for Aleppo and Damascus."
RigaExpandFlavour.18.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.19.name:0 "City Log: Cairo"
RigaExpandFlavour.19.desc:0 "In 969 AD, the Fatimid general Jawhar al-Siqilli marched east from Tunisia, captured the old Egyptian capital of Fustat, and chose a site northeast of it to build a new capital. At the time of groundbreaking, the planet Mars was at its zenith. In Arabic, Mars is called 'Al-Qahir,' meaning 'the Victorious' or 'the Conquering Star.' The city was thus named 'Al-Qahirah'—'the City of Victory.' European traders later rendered it as 'Cairo.' Caliph al-Mu'izz then moved his capital from Mahdia in Tunisia to Cairo, making Egypt—rather than the Maghreb—the heart of the Shi'a dynasty.\n\nThe Fatimid rule lasted two centuries, with caliphs gradually eclipsed by their generals. Saladin, a Kurd from Tikrit, became vizier in 1169 and abolished the last Fatimid caliph in 1171, establishing the Sunni Ayyubid dynasty. In 1176, Saladin began building the great Citadel on the Muqattam Hills—today known as the Citadel of Saladin. Perched on a limestone cliff overlooking the entire city and the Nile Valley, it remained the seat of Egypt's rulers for over seven centuries. Saladin's descendants ruled the Ayyubid dynasty for nearly sixty years. By the mid-13th century, sultans began purchasing large numbers of Turkic slaves from Central Asia and the Caucasus as palace guards. These slave-soldiers—the Mamluks—ultimately overthrew their masters in 1250 and founded the Mamluk Sultanate. Caravans brought silk and spices from India and Yemen, selling them in Cairo's markets to Italian traders, then shipped from the mouth of the Nile to all of Europe. Cairo became the trade hub linking the Indian Ocean with the Mediterranean, the East with the West.\n\nYet in 1347, a merchant ship carrying over three hundred infected slaves arrived at an Egyptian port from the Black Sea—the Black Death struck Cairo like an arrow to its heart. Before the plague could recede, Timur marched west from Samarkand; Cairo escaped direct conquest, but its treasury was drained by war costs and the loss of its provinces, while refugees flooded in from Syria.\n\nBy 1444, the Burji dynasty's rule was flickering. Cairo, though still the largest and most prosperous city in the Islamic world—the banners of the Burji Mamluk sultans flying from the Citadel's battlements, scholars thronging the courtyards of al-Azhar Mosque, foreign merchants crowding the lanes of the Khan el-Khalili market—nonetheless, deep within its brightly lit alleyways, the scent of an empire's twilight was already in the air. Cairo—may the crescent above its minarets and the waves of the Nile bear witness to its infinite days to come."
RigaExpandFlavour.19.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.20.name:0 "City Log: Damascus"
RigaExpandFlavour.20.desc:0 "Damascus' founding dates to at least 2000 BC, making it one of the world's oldest continuously inhabited cities. In the 11th century BC, it became the capital of the Aramean kingdom; in 732 BC, the Assyrian Empire conquered it, and over the following millennium it served as a frontier city of the Neo-Babylonian, Persian, Greek, and Roman empires. Lying between the eastern desert and the Lebanon Mountains, Damascus has been a crossroads between East and West since antiquity.\n\nIn 636 AD, the second Islamic caliph, Umar, conquered Damascus. In 661, Muawiya I made Damascus the capital of the Umayyad Caliphate—which stretched across three continents—and the city's power and prestige reached their zenith. Caliphs built palaces and gardens outside the city walls, earning it the epithet 'the Garden of the Earth.' The Great Mosque of Damascus, completed in 705, remains the city's most iconic landmark.\n\nIn 750, the Abbasids overthrew the Umayyads and made Baghdad their capital; Damascus' political status declined, but its prosperity as a trade hub never waned. Through the following centuries, it passed through the hands of the Seljuks, the Khwarazmians, and the Ayyubids. In 1260, Mongol armies captured Damascus—but their rule lasted only months. That same year, the rising Mamluk Sultanate retook the city. In 1401, the Central Asian conqueror Timur swept through Damascus again, stripping it of scholars, artisans, and wealth, and burning the Great Mosque. The ancient city, once called 'the Heavenly City,' suffered unprecedented devastation.\n\nBy 1444, Damascus was still struggling to recover. The ruins of Timur's sack were gradually being cleared, but much of its former imperial grandeur had vanished. Yet it remained an important commercial center; old markets still echoed with the bells of eastern caravans and western voices. It was still that ancient city of the Fertile Crescent, burdened with memories. May the Lord have mercy on this war-torn city, granting it peace, so that the 'Garden of the Earth' may no longer be shrouded in conflict and fear."
RigaExpandFlavour.20.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.21.name:0 "City Log: Tehran"
RigaExpandFlavour.21.desc:0 "The name 'Tehran' is said to derive from Persian roots meaning 'warm slope,' 'foot of the mountain,' or 'clean city.' True to its name, the city lies at the foot of the Alborz Mountains, its southern side opening onto the Iranian plateau, built on an alluvial fan where the climate is mild and water from mountain springs runs clear. As early as 8000 BC, human settlements existed at Ray, eight kilometers south of modern Tehran. This ancient city was listed in the Zoroastrian Avesta as the 12th sacred site created by Ahura Mazda, among the earliest settlements of the Medes and Achaemenids. In Darius I's Behistun Inscription, Tehran is mentioned by name. Parthian and Sasanian kings stationed troops here and summered in the city, extending its walls time and again.\n\nWhen the Arab cavalry swept across the plateau in the 7th century, the last Sasanian king, Yazdegerd III, made a final appeal to his people in Tehran before fleeing east. The Arabs captured and destroyed the ancient city, but soon rebuilt it. In the 9th century, the shrine of Abd al-Azim al-Hasani—a holy site of Shia Islam—was built in Tehran, making it a religious center of northern Iran. In 1043, Sultan Toghril Beg made Tehran his capital; Silk Road caravans stopped here; workshops produced renowned pottery; its markets rivaled Baghdad's in size. After Toghril Beg's death, his descendants built a 20-meter-tall brick tomb tower—Toghril Tower—on the city's outskirts; it still stands on Tehran's southern edge.\n\nIn 1220, Genghis Khan's cavalry swept through Tehran. As the city offered little resistance, the Mongols did not sack it. In the late 14th century, Timur swept across the plateau; Tehran, commanding a strategic crossroads, was incorporated into his empire. In July 1404, the Spanish envoy Ruy González de Clavijo passed through Tehran on his way to Samarkand to meet Timur. In his account, Tehran was described as a garden city of trees and streams, filled with orchards and gardens, famous for its variety of fruits.\n\nBy 1444, the old lion of the Timurids, Shah Rukh, lay ill in Herat. In Tehran, clay-brick houses and caravanserais lined the lanes around the bazaar. To the north lay several noble gardens, thick with peach, plum, apricot, and pomegranate trees, each blooming in its season. Streams from the Alborz flowed through the lanes, filling every courtyard pool. May the waters of the Alborz continue to irrigate this clean land at the mountain's foot, so that Tehran may, after all its trials, shine once more in its due glory."
RigaExpandFlavour.21.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.22.name:0 "City Log: Isfahan"
RigaExpandFlavour.22.desc:0 "The name Isfahan derives from the Old Persian 'Spahan,' meaning 'army.' Isfahan lies deep in the Iranian heartland, enclosed by hills on three sides—the outlying ranges of the Zagros and Kuhru mountains embrace it. At an altitude of some 1,600 meters, the Zayandeh River runs through the city, watering it with snowmelt and springs, making it the largest oasis on the Iranian plateau. As early as the Median and Achaemenid periods, Isfahan was already a strategic crossroads between East and West. Zoroastrian fire temples burned on the high hills; ruins from the Sasanian era can still be seen. The Seleucids renamed it 'Aspadana'; Parthian and Sasanian kings stationed troops and summered here. Jews deported from Jerusalem to Babylon migrated to this region, building a village called 'Yahudiyya,' living alongside the Zoroastrians.\n\nWhen Arab cavalry swept across the plateau in the 7th century, Isfahan surrendered peacefully and was spared destruction. The Arabs preserved its Judeo-Persian cultural traditions, making it the capital of Isfahan province. In 1051, Toghril Beg's horsemen broke open its gates, moving his capital from Nishapur to Isfahan. From then on, the empire's heart beat in this highland oasis.\n\nYet the empire's glory faded at the end of the 12th century. The Khwarazmians sacked Isfahan, burning the remnants of Seljuk rule. In the 13th century, Mongol hooves swept across West Asia like a storm. In 1236, the Mongols captured Isfahan; after the Ilkhanate was established, the city was incorporated into Mongol domains. In 1387, Timur marched west from Samarkand, levied heavy taxes on Isfahan, and provoked a rebellion. Timur ordered a massacre—70,000 heads were piled into at least twenty-eight towers.\n\nIsfahan—a city named for an army—was first exalted by the Seljuks as the 'half of the world,' then shattered by Mongols and Timur into ruins of blood and ash. Timur's towers of heads have long since weathered away, but the bazaars of Isfahan still echo day and night along the Zayandeh."
RigaExpandFlavour.22.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.23.name:0 "City Log: Tabriz"
RigaExpandFlavour.23.desc:0 "The name Tabriz derives from the Old Persian 'Tavrez,' meaning 'heat flow,' referring to the hot springs and underground waters that are abundant here. The city lies east of Mount Savalan and west of Lake Urmia, commanding the strategic pass from the Anatolian plateau into the Iranian heartland. Since ancient times, it has been a crossroads where military and commercial routes converged. As early as the 3rd century BC, remnants of the Achaemenid dynasty left traces of settlement here. In the 3rd century AD, Ardashir I of the Sasanian dynasty rebuilt the city walls, making it a Zoroastrian stronghold on the northwestern frontier.\n\nIn 791 AD, Queen Zubayda, wife of Caliph Harun al-Rashid, rebuilt the earthquake-damaged city walls, dug canals, and brought water into the city, revitalizing Tabriz as a city of gardens. In the following centuries, due to its location at the junction of Iran, Anatolia, and the Caucasus, Tabriz frequently changed hands among Turkic dynasties—the Rawadids, Saladin's Zengids, and the Khwarazmian Empire all stationed garrisons here, swinging between destruction and prosperity.\n\nHülegü crossed the Caucasus in 1256, marched west, and after capturing Baghdad, chose Tabriz as his capital and seat of power. In 1282, Arghun Khan succeeded and made Tabriz the primary capital of the Ilkhanate. In 1386, the Lame Conqueror Timur marched west from Samarkand and captured Tabriz. The Mongol who called himself 'Lord of the World' camped on the plain for weeks, pulling iron bars from the Ag Castle's towers to make horseshoes, and seized all the city's scholars, artisans, painters, and silk weavers.\n\nBy 1444, Tabriz was no longer the grand imperial capital of the Ilkhanate's heyday, but it remained one of the largest and most complete trading centers on the Silk Road. Indigo from India, silk from China, glassware from Venice, carpets from Anatolia, furs and slaves from the north—all met under the labyrinthine vaults of the bazaar. Persian, Mongol, Armenian, Turkish, and Latin echoes wove together under a thousand arches, forming a dense and vibrant clamor of the market."
RigaExpandFlavour.23.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.24.name:0 "City Log: Constantinople"
RigaExpandFlavour.24.desc:0 "On May 11, 330 AD, the Roman Emperor Constantine I held a grand inauguration ceremony on the site of the ancient Greek colony of Byzantium, moving the empire's center of power from the seven hills of the Tiber to the western shore of the Bosphorus. The official name of the new capital was 'Nova Roma'—but the world remembered only one name: Constantinople, the City of Constantine, the Queen of Cities.\n\nThis city was a wonder set upon the earth by God. It stood at the eastern end of the Balkan Peninsula like an emperor in purple robes, holding Europe with his left hand and Asia with his right. The Bosphorus surged at its feet, clasping the Black Sea and the Mediterranean in its grasp. The Golden Horn was its natural harbor; the Sea of Marmara was its moat, never dry. It was not merely a city, but a scale with the straits as its beam and two seas as its weights, weighing the trade and power of the medieval world. The great dome of Hagia Sophia was reflected on the sea's surface; the Imperial Avenue from the Golden Gate passed through the forums of Arcadius, Theodosius, and Constantine, lined with bronze statues and marble columns of emperors past. The entire city was an open-air museum of history; every stone sang of the Roman Empire's journey from the Tiber to the Bosphorus.\n\nYet from the 11th century onward, the empire lost its Anatolian breadbasket and manpower on the ruins of Manzikert. On April 12, 1204, the Frankish and Venetian crusaders—who should have sailed for Egypt—turned their lances against Constantinople, driven by greed and accumulated grievances. The next day, they broke through the walls, burning the city for three days and looting for a week. In July 1261, Michael VIII Palaiologos, a Greek noble in exile in Nicaea, recaptured the city while its garrison was depleted. But the recovered Constantinople was a city of ruins and some 35,000 hungry inhabitants—a century earlier, its population had numbered in the hundreds of thousands.\n\nIn 1347, the Black Death entered Constantinople from the Genoese trading posts in Crimea. The plague drained the last of the city's vitality; the empire would never recover. By 1444, Constantinople was a nearly empty husk. Most palaces lay vacant; gardens outnumbered houses within the Theodosian Walls. Emperor John VIII, in a desperate bid for military aid, signed the Union of the Churches at the Council of Florence in 1439. Beyond the walls, Sultan Murad II had shattered the Christian coalition at Varna and passed his crown to the twelve-year-old Mehmed II, who said in his accession speech: 'This city, no matter how high its walls, no matter how strong its chains, shall one day become the bride of our sword.'\n\nConstantinople—the City the World Desires, the Crown of Nations—struggled between the death of one empire and the birth of another. The bells of Hagia Sophia still rang; the silver candlesticks of its churches still burned on holy days; a few galleys still lay in the shipyards of the Golden Horn. But these were no longer the pulse of an empire—only the last shudders of a body still warm. When that body finally cooled, a new age would rise from its ashes, and the name Constantinople would be carved forever on the conqueror's medals and in the dirges of the conquered. May the city's last light shine into the eyes of all who look upon it, for what is about to perish is not only a glorious empire, but also the shared longing of all civilizations for eternity."
RigaExpandFlavour.24.aa:0 "This city's past is worth remembering"

RigaExpandFlavour.25.name:0 "City Log: Jerusalem"
RigaExpandFlavour.25.desc:0 "The name 'Jerusalem' in Hebrew means 'City of Peace.' Yet the history of this city is a long epic woven from conquest, destruction, and rebuilding. It stands at the summit of the Judaean mountains, some 800 meters above sea level, with the Kidron Valley to the east, the Hinnom Valley to the west, Mount Zion to the south, and the Temple Mount to the north. The city's founding dates to at least 4000 BC. In the Early Bronze Age, Canaanites established a settlement beside its springs. Around 1000 BC, King David captured the Jebusite fortress of Zion, making it the capital of the united Kingdom of Israel; the Ark of the Covenant was brought into the city; in 957 BC, his son Solomon built the First Temple on the Temple Mount, and Jerusalem became the heart of Jewish worship, where the sacrificial system was established.\n\nIn 586 BC, Nebuchadnezzar II of the Neo-Babylonian Empire broke through the walls; the Temple was burned to ashes; the elite of Judah were carried off to Babylon. Half a century later, Cyrus the Great allowed the Jews to return, and the Second Temple rose from the ruins. Around the turn of the era, Jerusalem came under Roman rule. Herod the Great expanded the Temple into one of the ancient world's most spectacular religious complexes. Around AD 30, Jesus of Nazareth was crucified at Golgotha outside the city walls. In AD 70, the Roman general Titus captured Jerusalem; the Temple was razed to the ground and has never been rebuilt. In AD 326, Helena, mother of Constantine the Great, visited the Holy Land, claimed to have discovered the 'True Cross' at the site of the Crucifixion, and built the Church of the Holy Sepulchre. Jerusalem once again became Christianity's ultimate pilgrimage destination. In AD 638, Caliph Umar peacefully received Jerusalem. In 691, Caliph Abd al-Malik built the Dome of the Rock; in 705, the Al-Aqsa Mosque was completed. Muslims believe that the Prophet Muhammad ascended to heaven from here—Jerusalem thus became Islam's third holiest city.\n\nIn the mid-11th century, Caliph al-Hakim ordered the destruction of the Church of the Holy Sepulchre, igniting the fury of Christendom. On July 15, 1099, the First Crusade stormed Jerusalem, sacking the city and establishing the Latin Kingdom of Jerusalem. On October 2, 1187, Saladin the Kurd crushed the Crusader army at Hattin and retook Jerusalem without bloodshed; the cross was removed from the Dome of the Rock; the call to prayer sounded again from the Temple Mount. Thereafter, Jerusalem changed hands between the Ayyubids and Crusader remnants: in 1229, Holy Roman Emperor Frederick II briefly recovered the city through diplomacy; in 1244, Khwarezmian mercenaries captured and sacked the Old City, ending effective Latin Christian control over Jerusalem. By the late 13th century, the Egyptian Mamluks had driven the last Crusaders from Syria, and Jerusalem entered a long, slow decline.\n\nBy 1444, Jerusalem was a somewhat quiet hill town under Mamluk rule. Its population was barely 10,000. Jews lived in cramped quarters outside the Zion Gate; Christians lived scattered around the Holy Sepulchre; Muslims ran their markets and pottery workshops in the shadow of the Temple Mount. Pilgrims from Europe made the long journey, paid heavy entry taxes to Mamluk officials, and then, guided by Franciscan friars, could kiss the rock of Golgotha and light the lamps of the Sepulchre.\n\nJerusalem—the Foundation Stone, the Sanctuary, the altar shared by three faiths. It shrank under the conqueror's sword, and swelled with the pilgrim's prayer. From David's harp to the Crusader's hammer, from the muezzin's call to the synagogue's lament, every wall is inscribed with one faith's fervor and another's pain. May Jerusalem's sanctuaries rest in slumber amid the wars, until the day when swords are beaten into ploughshares, and no more are lifted against its walls."
RigaExpandFlavour.25.aa:0 "This city's past is worth remembering"

