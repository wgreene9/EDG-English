rigExpandAction.10.desc:0 "After years of preparation, we have completed everything necessary for war. Now it is time to formally declare war on our enemies!"
rigExpandAction.10.aa:0 "Begin our great conquest!"

rigExpandAction.50.name:0 "Rigan Religious Reform"
rigExpandAction.50.desc:0 "The dawn of the Renaissance pierced the mists of the Middle Ages like the morning star, and the tides of humanism challenged the old and crumbling authority.\n\nHumanists like Erasmus devoted themselves to education, publishing the Bible and the works of the Church Fathers, hoping to renew society and restore the unity of the Church through new learning. Though they did not question the fundamental doctrines of the faith—indeed, they even opposed schism from the orthodox Church—yet as they brushed away the dust of history and studied the original texts of early Christianity, they were astonished to discover that the hierarchy of the contemporary Church, the secularization of clergy, and the endless scholastic debates had all strayed from the original teachings of Christ—signs that Christianity itself was on the brink of collapse.\n\nOthers were bolder still. The biblical scholar Wessel Gansfort was the first to declare that the authority of Scripture stood above the Pope, that only God could forgive sins, and that salvation came through faith alone—through direct communion with the Lord. In this theological view, the status of the Church's hierarchy and visible organization was greatly diminished. Martin Luther would later praise Wessel's teachings and publish them in 1522, using them as the blueprint for his own Reformation doctrines.\n\nBy the 14th and 15th centuries, the Bible had been translated into several languages, and the invention of the printing press ensured that it was no longer the privilege of a few. More and more people across Europe could read the Scriptures for themselves, deepening their understanding of religion.\n\nIn the year [GetYear], the many churches and theologians of Riga engaged in fierce debate over the current state of the faith. At the final session, presided over by the [Root.Monarch.GetTitle][Root.Monarch.GetName], it was confirmed that Catholicism would remain the sole and unquestioned faith of Riga, with the promise that—provided its core doctrines remained unshaken—some practical concessions could be made on matters of practice and discipline. Though this course would certainly displease the Pope, the progress of the age demanded change; to cling to the old ways would bring nothing but harm."
rigExpandAction.50.aa:0 "We must begin to address this"

