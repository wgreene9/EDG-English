l_english:

EDG_SICDisasterEvents.1.name:0 "The Vespers"
EDG_SICDisasterEvents.1.desc:0 "Of course, strictly speaking, the mastermind behind this event, known as the "Sicilian Expedition," was Andrea di Savoia, a Genoese mercenary leader in the service of Constantinople.\n\nEver since the Roman Empire crumbled after the Fourth Crusade, multitudes of Greeks seeking to escape the tumult of war landed on the shores of Sicily via the Strait of Otranto, chiefly in major coastal cities such as [2982.GetName] and [124.GetName], establishing sizeable Greek communities.\n\nThe Hohenstaufen dynasty always had its focus on Germany; though Sicily was important to them, it was ultimately too far to govern effectively, so they long entrusted its rule to viceroys, thereby neglecting the threat of these heretics.\n\nIn 1254, Conrad IV, Holy Roman Emperor and King of Sicily, passed away, and his brother, the "bastard" Manfred, usurped the Sicilian throne from his nephew Conradin. Yet this also cost Sicily any support from Germany, and the Hohenstaufen grip on Sicily began to loosen, with the Greek communities becoming a ticking time bomb within the Kingdom of Sicily.\n\nIn 1266, through the mediation of the Genoese, the Greeks of [124.GetName] and [2982.GetName] took up their longswords, using the vesper bells of Sicily's churches as their signal. In an instant, the eastern and western coasts of Sicily fell into Greek hands; the Catholic cathedral of [2982.GetName] was consumed by flames. The prepared Genoese mercenary captain, General Andrea di Savoia, spotting the beacon fires, led his army ashore onto Sicilian beaches. As for King Manfred, he vanished without a trace—some say he hid in a village amidst Sicily's mountains, others that he perished in a shipwreck while fleeing the island by sea. In any case, after the "War of the Vespers," the Hohenstaufen rule over Sicily came to an end."
EDG_SICDisasterEvents.1.aa:0 "And the shores of Sicily, since the death of Archimedes, belong once more to the Greeks."

EDG_SICDisasterEvents.2.name:0 "The Remnant"
EDG_SICDisasterEvents.2.desc:0 "Sicily's coasts were thronged by Greeks arriving in droves, fleeing Latin dominion to seek refuge in Latin lands; thus, after the Fourth Crusade, the trumpet of Greek victory sounded in the western isle of Sicily.\n\nFollowing the war, the Genoese Republic's agent Andrea di Savoia lost no time in styling himself "Protector of the Sicilian Greeks," yet beyond Sicily's shores, the general was known as the "Tyrant" of Sicily, and from the very start he never fully controlled the island.\n\nIn Sicily's rugged mountains, families steadfast in their Catholic faith held fast to their lands. Called the Mountain Folk, they styled themselves "true Sicilians," while in their mouths the Greeks were dubbed "Syracusans"—like the ancient Syracusan city-state of a thousand years past, they were Greek colonists, enemies of the true Sicilians.\n\nIn [2982.GetName], the tyrants appointed by Genoa struggled to balance the endless squabbles among representatives of the various Greek cities. They and their successors, generation after generation of Sicilian tyrants, guarded this beating heart. Yet how could this isolated, solitary island truly stand apart from the tides of history?\n\nThis strange system persisted for over a hundred years: Greeks and Sicilians lived as adversaries on the same soil. The tyrants' authority gradually waned, the Protector's voice on Sicilian affairs faded, and the sole consensus among the Greek cities was to resist any renewed Catholic penetration of Sicily. But since Manfred's passing, the Hohenstaufen bloodline in Germany had likewise died out, no longer able to reach this sun-drenched isle. Little did they imagine that their greatest threat would come from their fractured Balkan homeland."
EDG_SICDisasterEvents.2.aa:0 "I fear the Greeks, even when they bear gifts."

EDG_SICDisasterEvents.3.name:0 "Betrayal"
EDG_SICDisasterEvents.3.desc:0 "In 1411, after fleeing to Italy following a failed coup in Constantinople, the Epirote dynastic prince Michael Angelos became the son-in-law of the Duke of Venice. He gained great renown in Venice for his superb diplomatic oratory and bold courage.\n\nVenice was a peculiar state—in an age of dynastic hereditary rule, she shone as the most brilliant republic, out of step with her neighbours; at the zenith of her prestige, when called the "Serene Republic," she was transformed by her finest doge into a de facto monarchy, retaining only the republic's empty name. Internally, the struggle between the descendants of the blind Dandolo and the Council of Ten became the central drama of the state's political life.\n\nExternally, Genoa had long been Venice's trade rival. From 1253 to 1381, four great wars were fought between Venice and Genoa, culminating in the Battle of Chioggia, where Genoa suffered a decisive defeat and fell into decline. Yet a centipede does not die even when trodden on; after succumbing to the Golden Lion of Saint Mark, Genoa still held key trading ports across the Mediterranean, threatening Venetian trade routes. And Andrea's legacy—the island of Sicily—was the most crucial stronghold of all.\n\nTo counter Genoese influence on the Mediterranean's vital sea lanes, and to expand the influence of the Dandolo family, the Duke of Venice dispatched Michael with a fleet core of Swiss and Lombard mercenaries to land at [2982.GetName]. Prior to this, to ensure a smooth landing, Michael's deputy, Paolo Nosati, had infiltrated Sicily's mountainous regions, claiming to be a Catholic crusader come to save them from the Greeks. The Sicilian mountain clans believed him, providing Michael's army with detailed maps and garrison intelligence, and after Michael landed, they even supplied his forces with provisions.\n\nYet in a sense, they were betrayed from the very start—Michael had not come to save them; his purpose was to overthrow the Genoese masters and install Venice as Sicily's new overlord. After seizing control of Trinacria, Michael concluded numerous agreements with Venice, effectively handing over most trading privileges to the Venetians, and appointing Venetian merchants and exiled Byzantine Greek bureaucrats as municipal magistrates. The promised autonomy for the Sicilians was never mentioned again.\n\nThough Michael repeatedly stated after consolidating power that, when the time was right, Catholics would be granted the same rights as Greeks, the Sicilians had grown deeply resentful of Michael's duplicity and the treacherous cunning of the Angelos dynasty. The Catholic clans once more retreated into the mountains, refusing imperial decrees, and the Angelos rule over Sicily was scorned from the outset. Sicily's crown seemed cursed, and the Angelos dynasty's reign proved equally short-lived.\n\nAfter Emperor Isaac III, the Sicilian "throne" passed to his son Isaac IV. Isaac IV was a ambitious and capable sovereign of grand vision. He governed with vigour, using masterful diplomacy and good personal relations to revise some of the trade agreements signed by his predecessor with Venice, supported native Greek merchants in competing with the Latins, revived Sicily's silk industry, and greatly restored the chaotic state economy left by the tyrants. Moreover, he encouraged Greeks to enlist, rebuilt Sicily's military structure, and in 1442 launched an expedition against the decrepit Byzantine Empire, swiftly advancing into the Morea with the aim of seizing the Constantinopolitan throne.\n\nBut fate denied him time—the emperor fell suddenly ill and was forced to return home by forced marches. Until his dying day, he remained fixated on the Greek homeland, even conspiring with the Duke of Venice to incite the Despot Theodore of Morea to rebel against Andronikos V. In late 1443, Isaac IV, his ambitions unfulfilled, answered his Maker's call, leaving his sole son, the nine-year-old Isaac V, to succeed him. State power fell into the hands of General Theodoulos Vatatzes, a scion of the Nicaean imperial line—young, talented, and, more importantly, an ambitious military man backed by the majority of the military aristocracy. In January 1444, Theodoulos presented Isaac V with a most exquisite gift—he deposed the boy and, with the military nobles' support, became "Lord Protector," assuming full command of the state's military and political affairs. Theodoulos established a Protectorate Council, composed of military aristocratic commanders, appointed by the Lord Protector himself, to oversee regional governance."
EDG_SICDisasterEvents.3.aa:0 "He who sows thorns, let him first prepare for a barefoot future."

EDG_SICDisasterEvents.4.name:0 "Undercurrents"
EDG_SICDisasterEvents.4.desc:0 "Though Theodoulos Vatatzes enjoyed the backing of most military men, he was not without opponents among the old nobility. Theodoulos was a military leader of grand strategy, but at this juncture he was by no means a skilled politician. Absorbed in reforming the military structure, he neglected to keep a tight rein on certain great clans discontented with the status quo. These disenfranchised old aristocrats quietly gathered around Isaac V, once again pledging "loyalty" to the Angelos dynasty, eager to wrest power back from the military faction. Theodoulos's militaristic rule also displeased several civil officials who had come from the Greek world, and they too began to collude clandestinely with Isaac V. After all, the Angelos dynasty had ruled Sicily for decades, and the political legacy they left behind was enough to make the Lord Protector taste the bitterness of miscalculation.\n\nMeanwhile, ever since King Manfred vanished without a trace, the "most legitimate Hohenstaufen king" remained unaccounted for. The collateral branches carrying Hohenstaufen blood had long been embroiled in fierce struggles within the power vacuum of Sicily's inland mountain ranges. These clans, on one hand to counterbalance the coastal Greek descendants, and on the other to reinforce their own identity as "true Sicilians," began to raise private armed retainers bound by blood ties, forming the embryonic prototypes of the later Mafia families. Among them, a minor branch that held the island of Malta was deemed the most legitimate heir to the Hohenstaufen line—yet this tiny islet could scarcely project its power onto Sicily itself. Still, that did not prevent the "true Sicilians" from finding a "true Hohenstaufen king" to lead them against Greek tyranny.\n\nMoreover, after his reforms, Theodoulos, in order to consolidate state revenues, abrogated most of the trade agreements with Venice, greatly damaging the prestige of the Dandolo family. The Duke of Venice, already chafing at Theodoulos's usurpation of power from his own kinsman, began to stir as well.\n\nBeyond this, the Norman dukes of Naples cast covetous eyes upon Roger's legacy, eager to don the crown of Trinacria; and the House of Savoy in Genoa, after seizing power in the republic, urgently needed to claim "Andrea's legacy" to prove their legitimacy both at home and abroad."
EDG_SICDisasterEvents.4.aa:0 "Trinacria, like the Tunisian Strait, is forever churning with undercurrents."

EDG_SICDisasterEvents.5.name:0 "Gameplay Guide"
EDG_SICDisasterEvents.5.desc:0 "Sicily has 2 major routes: the §O£icon_EDG_catholic£ Catholic Monarchy§! route and the £icon_EDG_orthodox_icon£§P Orthodox§! §T@GRE Greek Republic§! route. The former further branches into two minor paths: @TTS§O Hohenstaufen Dynasty§! and @GK0§P Angelos Dynasty§!. Two days after the game starts, you will receive one—and only one—opportunity to choose your route via the event "Forked Destiny."\n\n§R Currently, only the Republic route has been implemented; please do not mistakenly select the other.§!\n\nIn single-player mode, the Republican Sicily can trigger the disaster "Embers of Kings" via decision, to resist the Latin invasion. In this anti-aggression war, we must fight to the death. Yet we are not alone—our Greek brethren in the East, and even mysterious forces from the South, may well lend us aid. Greece has never lacked loyal and valiant men; in times of national crisis, champions will arise. Our navy is our greatest weakness; however, the Greeks' long maritime tradition will show us a way out. When the time comes, please use the decision to seek means to break the Latin blockade.\n\nAdditionally, be sure to read your missions carefully; completing as many missions as possible will reduce the number of negative events you may suffer during the disaster."
EDG_SICDisasterEvents.5.aa:0 "Enjoy your game! You may review this event at any time via the decision menu."

EDG_SICDisasterEvents.6.name:0 "Lone Star"
EDG_SICDisasterEvents.6.desc:0 "If Barbarossa was the most dazzling crimson star of the 12th century, and Frederick II the brilliant golden star glowing eerily in the 13th-century night sky, then Frederick "the Pious" is the morning star flying solitary through our own century.\n\nAfter the War of the Vespers in 1266, Hohenstaufen rule over Sicily was overthrown. Yet the last Sicilian king, Manfred, did not flee Trinacria; instead, with the help of loyal Catholic clans, he vanished into Sicily's rugged mountains. Later, Manfred attempted to sail to Venice and return to Germany to humble himself before the Hohenstaufen main line in search of aid, but the 35-year-old king perished in an unexpected shipwreck en route.\n\nWhile the Catholics were still immersed in the aftershocks of the Vespers war and mourning the king's death, joyful news came from the palace—the queen was with child, the late king's posthumous heir. The Hohenstaufen bloodline in Sicily was not yet extinguished.\n\nThe birth of this prince was truly an act of fate. Manfred's posthumous son was embraced by the "true Sicilians." After the tyrant of [2982.GetName] tightened his grip over the Catholics, they transferred the posthumous line to the distant island of Malta for protection and built fortresses for defence. When the Angelos invaded, ever more Catholic clans felt the pressure, and in the end they all chose to swear secret allegiance to the Hohenstaufen bloodline.\n\nNow the time came to the 15th century: an infant named Frederick was born in the Hohenstaufen stronghold on Malta. He was the sole heir of Henry VII, the "legitimate King of Sicily," now nearly sixty years old—the last heir of the Staufen line. Truly this was a miracle of life, all the more so when the average lifespan of nobles was less than forty years. Henry VII, in his sixties, still brimmed with vigour, and from his tender embraces with his young and beautiful Greek wife, he obtained an heir.\n\nThe king's late-life fatherhood only strengthened the Sicilians' conviction that the House of Hohenstaufen remained favoured by Heaven. A Sicilian hermit of the time even took the arduous journey to the Maltese fortress to present a congratulatory poem to the king:\n\n"The majestic king rests from his armour, and he has a son,\nA warrior of the future to bear shield and spear.\nPraise be to the happy father, made happier still by his child:\nThey have received the people's blessing,\nFate decrees the father shall share happiness with all Sicilians through his victorious spear.\nBoth past and future,\nOh! You are a boy so long desired,\nYou can reclaim the glorious years of yore,\nRoger and Frederick—they both live in you.\nPeace be with you; your birth makes all things whole,\nYour birth is blessed with our most devout prayers.""
EDG_SICDisasterEvents.6.aa:0 "\"The righteous man has many troubles, but the Lord delivers him from them all.\""

EDG_SICDisasterEvents.7.name:0 "The Hawk of Malta"
EDG_SICDisasterEvents.7.desc:0 "Frederick's paternal line came from the towering, unbroken mountains beneath the blue sky, the dense black forests rising high into the clouds, and the brilliant flowers scattered across the hills—the glory of the Hohenstaufen sprang from the sublime grandeur of the Swabian highlands. His mother, however, belonged to a world utterly different—the clear, cerulean Aegean Sea.\n\nOver a hundred years ago, during the civil wars of the two Andronikoi in the Eastern Empire, beneath a darkened sky and amid the raging waves of the cold sea, refugee ships from the Greek world set course for Sicily's villages and cities. The unceasing dynastic strife of the Palaiologoi not only doomed the East Roman state but also scattered countless people into exile. Frederick's maternal line was precisely such a down-and-out noble family that had fled from Byzantium.\n\nAs a product of three civilisations—Germanic, Latin, and Greek—young Frederick received an excellent education. Sicilian priests taught him to read and write, courtiers of German tradition schooled him in arms and chivalry, and Greek attendants instructed him in poetry and the customs of diverse lands. By an early age, Frederick had mastered multiple languages, including German, Latin, and Greek. He became a steadfast and resolute Catholic, as well as a scholar and poet, and above all a commander of strategic vision. In his youth, he joined the Crusader campaigns in North Africa, leading mercenary companies of Greeks and Sicilians to help the Crusaders fend off Muslim raids. These years earned him the epithet "Stellette"—"the Pillar-Bearer," the man of unyielding will. Not until his father Henry VII was called to the Lord in 1442 did he return to the Maltese fortress to inherit the "throne." Noble of character, handsome in countenance, and cheerful in disposition, he could hunt and sport with his courtiers, yet also seclude himself to study scripture and law. He was also known as the "Black Hawk of Malta." His North African sojourn not only honed his military abilities but also exposed him to the infidel threats facing Christendom, and forged deep friendships with members of the Knights Templar and the dignitaries of the Sultanate of Tunis.\n\nIn November 1443, the "Emperor of Sicily," Isaac V, was deposed by Theodoulos Vatatzes of the Laskaris line. Yet that mere soldier Theodoulos showed a woman's softness, failing to purge the political forces of the Angelos dynasty. The military government in [2982.GetName] and the old nobility in [125.GetName] thus drifted into mutual estrangement, outwardly united but inwardly divided—Sicily's situation grew treacherous and opaque. Frederick perceived that Sicily's history had reached a turning point, and that the Hohenstaufen family's last chance to reverse their fate was now.\n\nAnd so, Frederick overrode all objections, resolved to personally take a merchant ship to [125.GetName] to secretly visit the deposed "emperor" Isaac and forge an alliance with him against the Lord Protector [Root.Monarch.GetName]."
EDG_SICDisasterEvents.7.aa:0 "\"If you are pure and upright, He will surely come to guard you and restore your righteous dwelling.\""

EDG_SICDisasterEvents.8.name:0 "Secret Letter"
EDG_SICDisasterEvents.8.desc:0 "The Lord Protector of Sicily has lately sent a secret letter to our Imam [Root.Monarch.GetName], its tone almost pleading. The archon of the Syracusans briefly laid out the internal contradictions and external crises facing the Sicilian state, and analysed the similarities between the diplomatic situation of the Caliphate and that of Sicily, pointing out that our two nations share a common enemy—the Catholic world—and that Sicily and North Africa have always been closely intertwined, with the fates of Trinacria and the Maghreb suspended from the same thread. For this reason, he proposed to the Caliph that our two states should conclude an alliance: Sicily would relieve the Caliphate of pressure from Christendom, providing future staging grounds and military ports for our advance into Italy, while the Caliphate need only steady Sicily's lonely bark in the coming storm."
EDG_SICDisasterEvents.8.aa:0 "Interesting."
EDG_SICDisasterEvents.8.aa.tt:0 "§GWe will intervene in the Sicilian disaster, and afterward extort their submission as tributaries.§!"
EDG_SICDisasterEvents.8.bb:0 "Uninteresting."
EDG_SICDisasterEvents.8.bb.tt:0 "§RWe will miss the opportunity to vassalise Sicily§!, and the mission §R'Night of Palermo'§! will be much harder to complete."

EDG_SICDisasterEvents.9.name:0 "Pact with the Devil"
EDG_SICDisasterEvents.9.desc:0 "Sicily's tangled political situation and imminent external crises left the Lord Protector sleepless and anxious. According to secret intelligence, the Duke of Apulia was lobbying the Neapolitan princes to launch an expedition against them. How could the coastal Greeks alone carve out a path to survival amid such chaos? A North African peddler, while in audience with the Lord Protector, glimpsed the anxiety in his eyes and guessed his thoughts. He promptly offered his services, and after the Protector dismissed his attendants, the merchant claimed he could contact the Fatimid Caliph—a ruler who shared Sicily's enemies. This heretical notion initially shocked the Protector, but after much deliberation on its feasibility, he resolved to give it a try—Sicily's back was to the Mediterranean; the Greeks had no retreat left and must resort to every means to preserve their homeland."
EDG_SICDisasterEvents.9.aa:0 "\"If God will not save us, I shall make a pact with the devil.\""
EDG_SICDisasterEvents.9.aa.tt:0 "We will have the chance to §Ggain military aid from @FDM Fatimids§!, but they may also §Rdemand repayment with interest§!."
EDG_SICDisasterEvents.9.bb:0 "Let us forgo this."
EDG_SICDisasterEvents.9.bb.tt:0 "We will §Rmiss out on military aid from @FDM Fatimids§!."

EDG_SICDisasterEvents.10.name:0 "Golden Opportunity"
EDG_SICDisasterEvents.10.desc:0 "The expedition launched by His Majesty to aid the Greeks has now achieved total victory. The swords of the Muslim faithful have once more swept across southern Itaniyah after centuries, striking fear into Christendom. His Majesty [Root.Monarch.GetName] rests content in the court of [FDM.Capital.GetName], quietly savouring the glory and prestige won by war. With the fighting temporarily concluded, our advisors pointed out to the Imam that although the Greeks have successfully defeated the Normans and even seized their lands in return, they are now in a post-war weakened state and largely unprepared against our Muslim forces. Therefore, we could seize this golden opportunity to coerce Sicily into becoming a tributary of the Caliphate. After brief reflection, [Root.Monarch.GetName] nodded and said to his subjects:"
EDG_SICDisasterEvents.10.aa:0 "\"Convey my greetings to the valleys of Syracusae.\""

EDG_SICDisasterEvents.11.name:0 "Fatimid Demand for Submission"
EDG_SICDisasterEvents.11.desc:0 "The envoy from [FDM.Capital.GetName] has arrived at the Lord Protector's court. He produced the secret treaty we had previously signed with the Fatimids, along with a personal letter from the Fatimid Caliph, and declared haughtily that our victory was owed entirely to Berber contributions. He even went so far as to command our lord [Root.Monarch.GetName] to repay the favour without delay and swear fealty to their master."
EDG_SICDisasterEvents.11.aa:0 "We are powerless to resist..."
EDG_SICDisasterEvents.11.bb:0 "Who is this Fatimid Caliph? Never heard of him."
EDG_SICDisasterEvents.11.bb.tt:0 "§RThis act will provoke the @FDM Fatimid Caliphate.§!"

EDG_SICDisasterEvents.12.name:0 "The Greek Bastard Breaks the Pact!"
EDG_SICDisasterEvents.12.desc:0 "The accursed Greeks have refused to acknowledge our contribution, expelled the Caliph's envoy, torn up our previous agreement, rendered all our efforts futile, and even insulted our sovereign [Root.Monarch.GetName]!"
EDG_SICDisasterEvents.12.aa:0 "Greek villain! Treacherous dog! Wretched knave! Traitor—"

EDG_SICDisasterEvents.13.name:0 "Sicily's Submission"
EDG_SICDisasterEvents.13.desc:0 "Before the supreme glory of [Root.Monarch.GetName], the Greek ruler of Sicily at last bowed his proud head. The emirs have planted the Imam's banners atop the walls of Saragusa and Balarm, and a steady stream of tribute and soldiers shall once again flow from the heart of the Mediterranean into the Caliphate. The return of Sicily—once a vital stronghold—undoubtedly marks the irresistible resurgence of the Caliphate."
EDG_SICDisasterEvents.13.aa:0 "And this is not the end of the Caliphate's conquests."

EDG_SICDisasterEvents.14.name:0 "Appeal for Aid"
EDG_SICDisasterEvents.14.desc:0 "War has broken out. The Neapolitan army, led by the Duke of Apulia, has crossed the Strait of Messina and launched an expedition against Trinacria. The Lord Protector of Sicily, in great distress, has sent us an urgent plea for help, begging the Caliph to lend a hand."
EDG_SICDisasterEvents.14.aa:0 "Our swords shall sweep across southern Itaniyah!"
EDG_SICDisasterEvents.14.bb:0 "Oh no, my friend, this time we truly cannot..."

EDG_SICDisasterEvents.15.name:0 "Rushing to Aid"
EDG_SICDisasterEvents.15.desc:0 "Though the Fatimids are infidels, they have kept their word. Even in the face of the Normans' ferocious onslaught, they honoured their earlier oath, crossed the sea to assist our army, and provided us with other invaluable material support."
EDG_SICDisasterEvents.15.aa:0 "Brothers..."

EDG_SICDisasterEvents.16.name:0 "Great Victory"
EDG_SICDisasterEvents.16.desc:0 "As the commander of the Neapolitan coalition and the instigator of this unjust war, the Duke of Apulia [APU.Monarch.GetName] grew deeply anxious at the reversal of fortunes on the battlefield. At last, unable to contain his worry, he came to the front lines with only a few attendants to observe the fighting in person. Yet his party was soon spotted by our forces. The frontline commander, upon receiving word, led a cavalry charge and captured [APU.Monarch.GetName]. The coalition's morale swiftly crumbled; the Apulian soldiers fled in panic, and their commander had no choice but to offer us surrender. With the fall of the House of Hauteville, the long Norman dominion over the Two Sicilies has come to an end."
EDG_SICDisasterEvents.16.aa:0 "The chief criminal must be executed!"

EDG_SICDisasterEvents.17.name:0 "Defeat"
EDG_SICDisasterEvents.17.desc:0 "Though the faithful's armies poured unceasingly onto the Itaniyan battlefield, the tide was already set—the Greeks could not turn the tide in the end. In a skirmish, the Lord Protector's small force encountered the main army of the Duke of Apulia. The Greeks fought bravely, but to no avail. At last, a stray arrow ended the Greek warlord's not-so-long life. With their leader fallen, the coalition government—held together only by his personal prestige and military talent—soon scattered. The Norman army advanced unopposed and easily breached the city of Syracusae. In the end, the Pope of Rome invested the Duke of Apulia as King of Sicily, and the House of Hauteville once again, after 200 years, rose to be the supreme lord of peninsular Sicily and the island of Sicily. Because the Greeks collapsed so quickly, the Caliph's warriors, though they tried to change the outcome, ultimately could not salvage the situation and had to withdraw under naval cover. The Caliphate's plan to advance into Itaniyah was thus shattered."
EDG_SICDisasterEvents.17.aa:0 "Alas, disgraceful..."
EDG_SICDisasterEvents.17.aa.tt:0 "We have §Rmissed§! a §Rprime opportunity§! to complete the mission §R'Night of Palermo'§!."

EDG_SICDisasterEvents.18.name:0 "Great Victory"
EDG_SICDisasterEvents.18.desc:0 "Out of responsibility for the campaign and concern over the front lines, our [Root.Monarch.GetName] personally led elite troops to the front for reconnaissance. At a corner of the battlefield, the Duke unexpectedly encountered the Sicilian Lord Protector and his bodyguard. A fierce fight ensued. Our forces held the numerical advantage and swept forward irresistibly. At last, a stray arrow ended the Greek warlord's not-so-long life. After his fall, the coalition government—held together only by his personal prestige and military talent—soon scattered. The Norman army advanced unopposed and easily broke through the city of Syracusae. Upon hearing of Duke [Root.Monarch.GetName]'s achievements, the Pope of Rome praised his martial prowess and holy valour, agreeing to re-crown the House of Hauteville as Kings of Sicily. We shall soon stand alongside the great Roger II!"
EDG_SICDisasterEvents.18.aa:0 "Excellent!"

EDG_SICDisasterEvents.19.name:0 "The Treaty of Florence"
EDG_SICDisasterEvents.19.desc:0 "In the year $YEAR$, the Sicilian delegation and the Venetian delegation met in Florence. Under the auspices of the Medici family, the two sides held diplomatic negotiations at the Palazzo dei Fiori. The talks lasted a month, during which the Greek army continued to battle fiercely against the stubborn Latin forces. Steadily, good news arrived from the Sicilian front, until at last the Greeks even menaced Venice's proudest lagoon. The reverses on the battlefield forced the Venetians to make concession after concession. Finally, before the eyes of Florence's municipal officers, both sides signed the Treaty of Florence. According to its terms, to compensate for the wounds inflicted upon Sicily in this unjust war, the Republic of Venice was to cede her overseas possessions of Dalmatia and Dyrrhachium, and return to the Greek leader—the Lord Protector of Sicily—the islands of Corfu, Crete, Naxos, Euboea, and other lands seized by the Latins from the Greeks. Moreover, the Duke of Venice was to compensate Greek war losses from his own family coffers, and henceforth all Venetian trade activities would require permission from the Sicilian fleet; otherwise, they could not cross the Adriatic. Thus, the sufferings endured by the Greeks since the Fourth Crusade of 1204 gradually drew to a close, with the triumphant Syracusan War of Independence and the decline of Venice, one of its chief culprits. The rise of Greece became unstoppable."
EDG_SICDisasterEvents.19.aa:0 "Holy! Holy! Holy! Victory belongs to Greece, victory belongs to Christ!"

EDG_SICDisasterEvents.20.name:0 "Reflections of the Roman Heart"
EDG_SICDisasterEvents.20.desc:0 "TODO: Constantine Laskaris, the idler"
EDG_SICDisasterEvents.20.aa:0 ""

EDG_SICDisasterEvents.21.name:0 "Courting Favour"
EDG_SICDisasterEvents.21.desc:0 "Isaac IV was indeed a sagacious and martial "Roman Emperor." He keenly perceived that the Eastern Empire's fortunes had waned, and that the centre of the Greek world was slowly shifting from Constantinople towards the western isle of Trinacria. Accordingly, he extended an olive branch to the great houses of the Greek world. One by one, illustrious families that had held sway in the Roman cabinet and the themes crossed the sea westwards to establish new fortunes on Sicily's warm shores.\n\nNow, these trusted Eastern magnates have become an integral part of Sicily's political landscape—a formidable faction able to rival the old nobility inherited from the Norman-Hohenstaufen era and the Genoese tyrants, as well as the original followers of Isaac III. Compared to the latter, these "new men" and the military were undoubtedly the Lord Protector's bedrock, sharing with him far more common interests; both were eager to wrest power and resources from the old aristocracy and strengthen themselves. Thus, [Root.Monarch.GetName] carefully arranged a grand banquet in his Syracusan court, selecting representatives of the most worthy great houses to attend. After rounds of toasts, the two sides held private talks in a genial atmosphere. The exchanges proceeded very smoothly; the Protector successfully won the recognition and investment of the new magnates, consolidating his hold on governance."
EDG_SICDisasterEvents.21.aa:0 "\"The citizens of a city-state must share one heart and one mind.\""

EDG_SICDisasterEvents.22.name:0 "Shattered"
EDG_SICDisasterEvents.22.desc:0 "It is all over.\n\nThe republican ideal, the Savoyard dream—all of it is over.\n\nThe distant Lanterna casts its shadow; the gates of Genoa at last swing open for the Sicilian army. Leo Nosati rides tall at the centre of the column, flanked by his trusted aides and the captive former Genoese "Doge," Carlo di Savoia. The procession proceeds in grand array towards the Doge's Palace.\n\nSoon, they arrive. "How do you find it, Your Grace?" Leo Nosati gazes at the magnificent palazzo before him, without turning his head. His cold voice, filtered through the silver-white visor, drips with mockery.\n\n"..." Carlo dares not even raise his head. He dreads seeing the disappointed stares of the citizens lining the streets, the cracks and scars upon the walls, the palace his father laboured so hard to build. All his former ambitions, plans, and dreams now lie buried in the Tyrrhenian Sea, vanished without a trace.\n\nWith a contemptuous snort, the marshal pays him no further heed. He dismounts in one swift motion, hand resting on the sword gifted by the Lord Protector, and strides into the hall. The Greek general walks across the clean, gleaming marble floor. A whiff of bloody wind brushes past his ear; flames flicker in the distance, cries of battle sound behind him—yet all he sees is the mosaic icon of a saint on the wall, smiling at him."
EDG_SICDisasterEvents.22.aa:0 "The Perfect City smiles upon me."

EDG_SICDisasterEvents.23.name:0 "Pursuit and Rout"
EDG_SICDisasterEvents.23.desc:0 "The Genoese army was encamped beside the Apulian duke's camp. For days prior, both had been locked in fierce combat against the Sicilian forces, until a few days ago, when the Duke of Apulia was struck by a Greek stray arrow and fell. Panicked stragglers returned to camp, and the dire news spread swiftly through the entire army; the Norman ranks dissolved into mass flight. At the same time, the contagion of despair affected the Genoese as well. After 1439, Filiberto di Savoia had gained control of the army—composed of mercenaries and Genoese citizens—through military exploits, prestige, bribery, and other means. In 1443, his son Carlo proclaimed himself "Duke," triggering a sweeping republican revolt. Carlo's disgraceful performance nearly squandered the legacy his father had built; the arrogant mercenary captains were also deeply discontented with his repeated defaults on pay. After the Duke of Apulia launched his Sicilian expedition, Carlo, eager to prove himself, responded at once, gambling almost all his chips and pouring every resource into this unjust war. Yet the resilience and solidarity of the Greeks caught the haughty Latins completely off guard; the Catholic battle line fell back step by step, until they found themselves on the defensive. Now, under the ripple effect of Apulia's collapse—with the stalemate dragging on, the Sicilian Lord Protector's heavy bribes, and Carlo's grand ambitions outstripping his meagre talents—the mercenaries finally could no longer endure his rule. That very day they mutinied, seized Carlo di Savoia, and delivered this isolated "Duke," abandoned by all, straight to the Greek camp, where he was made to kneel before the Lord Protector and forced to present a prepared instrument of surrender.\n\nAfter "capturing two kings in one battle," the Lord Protector divided his forces and marched north, dispatching one army under Grand Marshal Leo Nosati to cross the sea and campaign against Liguria. Leaderless, Genoa's defeat was now inevitable; Sicily stood ready to claim the beautiful Ligurian coast."
EDG_SICDisasterEvents.23.aa:0 "Syracusae no longer needs a Ligurian tyrant."
EDG_SICDisasterEvents.23.aa.tt:0 "Unlock §TDecision§!: §YExpedition to Genoa§!"

EDG_SICDisasterEvents.24.name:0 "The Crown of Old"
EDG_SICDisasterEvents.24.desc:0 "After the last legitimate monarch of the unified Kingdom of Sicily, the "Good King" William II, died without issue, Tancred of Lecce—illegitimate son of Roger III—and Henry VI, Holy Roman Emperor and son-in-law of Roger II, fought bitterly over the throne. Both sides emerged battered, and after long negotiations under papal supervision, they signed the Treaty of Amalfi, which satisfied neither party. The treaty stipulated that the Kingdom of Sicily would be divided: the Hauteville family would retain their holdings on the Italian peninsula, known as "Peninsular Sicily," while the Hohenstaufen would hold the island of Sicily, also called "Trinacria," after its three-legged emblem.\n\nYet neither crown endured for long. On the peninsula, the greatly weakened Hautevilles faced challenges from other Norman nobles, who claimed that the main Hauteville line had died out and that Tancred, as a bastard, had no right to the inheritance. Tancred himself crushed four or five such revolts, but when he passed away and his son William III ascended, the Hohenstaufen once again fomented civil strife in Peninsular Sicily, aiming to fragment it and pave the way for invasion. This time, the Hautevilles could not win the final victory; the Peninsular Sicilian throne was overthrown. In 1260, the aged William III was permitted only to retain the titles of Duke of Apulia and Lecce, and the Norman dynasty of southern Italy was declared dissolved.\n\nYet he who sows injustice reaps destruction. The Hohenstaufen, on the verge of their own invasion, met their nemesis—a wholly unexpected foe, the Byzantine Empire. Through Genoese mediation, the Greeks of Messina and Syracusae took up their longswords, used the vesper bells of Sicily's churches as their signal, and rose in revolt, overthrowing the king's rule. In the two centuries that followed, Sicily's sovereignty changed hands several times, eventually falling to the House of Laskaris, when Theodoulos Vatatzes deposed the Angelos monarch and shattered the island's fragile political balance. Our [Root.Monarch.GetName] holds that Trinacria is about to be swallowed by the surging tides of the Mediterranean, and that now is the perfect moment to reclaim the dynasty's heritage. The Duchy of Apulia shall devote itself wholly to war preparations, while the royal court shall focus on diplomatic alliances, using its "legitimate" status to call upon the Neapolitan Norman princes to march south against the Sicilian heretics and liberate the "true Sicilians" of the mountains. After years of effort, our sincerity and the king's majesty have finally won over the Dukes of Calabria and Capua. The hour has come—it is time to cross the Strait of Messina and return to Sicily!"
EDG_SICDisasterEvents.24.aa:0 "O former kings, grant me your protection."
EDG_SICDisasterEvents.24.bb:0 "The hour has not yet come."

EDG_SICDisasterEvents.25.name:0 "Divide and Subdue"
EDG_SICDisasterEvents.25.desc:0 "Leo Nosati was the only son of Paul Nosati, deputy to Isaac III in his day. As a scion of a distinguished military house, he was recognized as the leading figure of the original retinue faction. From childhood, he received an excellent education, not only memorizing Orthodox scriptures and Greco-Roman classics by heart, but also distinguishing himself as a valiant commander. Due to the neglect of state affairs under Isaac III and his father's influence, Leo Nosati, well-versed in Roman history, had nurtured ambitions beyond his station from an early age, yet he cloaked them in humility and precociousness. In his early years, he was promoted by Isaac IV and, alongside Theodoulos Vatatzes—who rose at the same time—served at the emperor's side. He was so awed by Isaac's sagacity and martial prowess that he knew he could never surpass his master, and resigned himself to serving this young and heroic emperor for all his days.\n\nYet fortune proved fickle. Isaac IV fell ill during the Morean expedition, ending his reign prematurely and leaving only a frail child to succeed. Leo Nosati and Theodoulos Vatatzes were both summoned to act as regents. Cautious by nature, Leo did not immediately assume authority, allowing the more opportunistic Theodoulos to use his Laskaris connections to expand his power network, swiftly consolidating control over the new nobles and military officers, and sidelining Leo from the centre of power.\n\nAfter Theodoulos deposed Isaac V, Leo maintained his cautious stance, preferring to observe whether Theodoulos's position was stable before acting. He thus declined various overtures from the original retinue and old aristocratic factions, gradually creating a rift between himself and them. Theodoulos, noting their growing estrangement, devised a scheme. He invited Leo to a banquet and presented him with the sword that Isaac IV had once bestowed upon him. Amidst rounds of toasts and warm revelry, the Lord Protector took the opportunity to hand Leo a letter of appointment, declaring on the spot that he would confer upon Leo the highest military rank of the Sicilian state—Grand Marshal—and that he needed Leo's political acumen as his political deputy and successor; the sword thus given would henceforth symbolize that office. Thoroughly intoxicated, Leo momentarily forgot all political calculations, overwhelmed by the joy of recovering lost favour, and signed the appointment on the spot. Only after returning home did he sober up and break out in a cold sweat at what he had done. By the next morning, word had spread that Leo Nosati had pledged himself to the Lord Protector; the original retinue faction, already strained in their relations with him, severed all ties. Invisibly, Leo's influence had been fractured, and the signed document left him with no choice but to uphold the Protector's authority, hoping that one day he too might ascend to Sicily's seat of power."
EDG_SICDisasterEvents.25.aa:0 "You will not regret today's decision."

EDG_SICDisasterEvents.26.name:0 "The Southern Expedition"
EDG_SICDisasterEvents.26.desc:0 "The Duke of Apulia [APU.Monarch.GetName] has sent us a secret letter, inviting us to join him in a campaign against the Greek heretics of Sicily. For years past, he has been active in the courts of Italy, engaged in political lobbying. Now the time has come to give him our formal answer."
EDG_SICDisasterEvents.26.aa:0 "Let us go together!"
EDG_SICDisasterEvents.26.bb:0 "The development of our domains must remain our priority."

EDG_SICDisasterEvents.27.name:0 "Infiltration"
EDG_SICDisasterEvents.27.desc:0 "\"Friend, are you satisfied with this gift this time?\"Panos Severos handed a large bag of gold coins to old Antonio, speaking with a grin. Behind him stood several Sicilian soldiers in civilian dress, unloading chests of treasure from the ship together.\n\nThe Genoese licked his lips and eagerly took the bag from the Greek. \"...Fifty, fifty-one, fifty-two...\"The mercenary captain greedily counted coin after coin. Only after a long while did he look up, fixing his gaze on a large wooden crate stacked high aboard Panos's ship.\n\n\"My friend, all of this shall be yours.\"Panos stepped forward at just the right moment, slinging an arm around Antonio's shoulder, his expression resembling that of a tempting fiend from a painting.\n\nAntonio averted his gaze from the treasure chest and grinned at the young Greek: \"You should know that that wretched boy Carlo owes us a great deal of money, but old Filiberto left him no shortage of loyal men. If you want us to risk our necks for you, this little trinket is far from enough.\"\n\n\"Rest assured, my friend—we don't need you to strike first; we only need you to help fan the flames. If you agree to that, we certainly won't treat you as shabbily as the Savoyards have!\"Panos laughed heartily, slapped old Antonio on the shoulder in farewell, then returned to his ship and set sail. \"Friend, same place next week!\"\n\nOnly after the silhouettes of the others had faded over the horizon did he turn away, a trace of mockery curling at the corner of his mouth, murmuring in a voice barely audible to himself:"
EDG_SICDisasterEvents.27.aa:0 "\"Gold can pierce walls and chambers, shatter stone fortresses, and strike swifter than lightning......\""

EDG_SICDisasterEvents.28.name:0 "A Breach in the Dam"
EDG_SICDisasterEvents.28.desc:0 "The Duke of Capua [PUA.Monarch.GetName] was by nature arrogant toward his superiors and contemptuous of his inferiors. He possessed the wealthy region of Naples and was a favourite of the Pope of Rome, maintaining close ties with the King of Arles as well, which fostered in him a haughty and overbearing disposition. He habitually abused and berated his officials and servants, and imposed heavy exactions on his lands, earning little popular support. After being handsomely bribed by the Duke of Apulia to join this expedition, he led the flower of his realm's troops to Sicily, leaving his rear exposed. Those he had once maltreated now saw their chance for revenge. Our intelligence agents have already made contact with some of them, including the chief constable of Capua itself. He told us that he commands the city watches of Capua and Naples, and that the guilds and the Eight-Man Council have long been discontented with Duke [PUA.Monarch.GetName]. If we could demonstrate sufficient sincerity, then Capua—and even Naples itself—would open its gates to the Greeks."
EDG_SICDisasterEvents.28.aa:0 "His character has already determined his end."

EDG_SICDisasterEvents.29.name:0 "When Rivals Meet —"
EDG_SICDisasterEvents.29.desc:0 "The Duke of Calabria [CBI.Monarch.GetName] possessed the smallest domains among the three Norman princes, yet commanded the finest army. Thus, though the Duke of Apulia had launched this unjust war, the Duke of Calabria served as the de facto commander-in-chief of the coalition, responsible for formulating battle plans and personally overseeing the front lines.\n\nAfter thoroughly scouting the Norman coalition's dispositions, the Lord Protector resolved to defeat them in detail, beginning with the Calabrian forces. The Protector personally devised the strategy: small detachments would hold Messina as a decoy to pin down the Normans. Meanwhile, he lobbied the great houses and persuaded them to donate precious transport ships and confidential nautical charts to the Republic. While the Normans laboured to force the Strait of Messina, the Protector had already found several hidden sea routes and, seizing the opportune moment, stealthily bypassed their navy to land behind the Calabrian court, cutting the coalition's line of retreat."
EDG_SICDisasterEvents.29.aa:0 "— The Wise Prevail."

EDG_SICDisasterEvents.30.name:0 "Embers of Kings in Chaos"
EDG_SICDisasterEvents.30.desc:0 "The ashes of the old age are rekindled by the wind. Apulia, Capua, Calabria—the three Norman duchies of Peninsular Sicily—under the leadership of the Duke of Hauteville, who claims inheritance over the island of Sicily, have crossed the Strait of Messina. Genoa and Venice, lured by trade interests, have set aside a century of enmity and sailed their galleys together into Trinacrian waters; the Cross of Saint George and the Winged Lion of Saint Mark fly side by side in the wind, like vultures circling in tandem over the sea. The deposed young Angelos emperor, meanwhile, whispers with his partisans in Palermo, brewing some conspiracy.\n\nWithin the Sicilian Protectorate Council, which has bickered since its founding, the councillors have at last ceased their quarrels and agreed to unite under the Protector's leadership to face the national crisis together. In the wheat fields outside Messina, Greek infantry collide with Norman knights—spears snap, hooves trample corpses, and the grain is dyed a dark red with blood. Along the coast of Catania, Greek fire sets Venetian grain ships ablaze, and smoke shrouds half the bay. The fire of war has swept across nearly all of Italia, and the fate of southern Europe stands on the brink of a momentous upheaval."
EDG_SICDisasterEvents.30.aa:0 "They came by the thousands, like flourishing flowers and tender leaves in spring—only to be swept away in an instant by the bloody rain of war."

EDG_SICDisasterEvents.31.name:0 "The Loosed Arrow"
EDG_SICDisasterEvents.31.desc:0 "If Syracusae was a torrent in classical times, surging and magnificent, now she stands nearly dry, leaving only a river valley behind; then Palermo is like a great river fed by many tributaries, converging in the medieval age and flowing on to become the mainstream today.\n\nIn the 9th century, the Saracens, sweeping across the sea, captured Sicily's cities one after another. They made Palermo their administrative centre, while subjecting Syracusae—the Roman seat of governance in Sicily—to great slaughter, thus turning the fortunes of these two cities. Thereafter, the Normans and the Hohenstaufen both established their capitals in Palermo. Though Isaac III made Syracusae his capital, he lingered in Palermo's palaces; it was only when Theodoulos Vatatzes deposed Isaac V that the heart of Trinacria was definitively returned to Syracusae.\n\nNaturally, Palermo's guilds and entrenched nobility were deeply discontented with the Protector's "reversal." A change of capital signified a shift of power, inevitably infringing upon the interests of the old factions. And after prolonged agitation by Frederick of Malta, almost simultaneously with the Norman invasion southward, the long-discontented Palermitans finally declared their revolt against the Protector's rule, rallying once more around Isaac V as the true master of Sicily, setting themselves in implacable opposition to Syracusae."
EDG_SICDisasterEvents.31.aa:0 "No!"

EDG_SICDisasterEvents.32.name:0 "Mountains Crumble, Earth Splits"
EDG_SICDisasterEvents.32.desc:0 "For nearly two hundred years after the War of the Vespers, no ruler of Sicily had ever fully controlled the island. In the mountains, Catholic clans held fast to their lands. They were called the Mountain Folk, styling themselves "true Sicilians," and nursed deep enmity against the "Syracusans" of the coast. The masters of Syracusae laboured to balance the antagonism between Greeks and Sicilians; they and their successors, generation after generation of Sicilian rulers, guarded this beating heart. Yet could this isolated, solitary island truly stand apart from the tides of history?\n\nThe answer was no. On this sun-drenched land of the Two Sicilies, from illiterate peasants to regional lords, all subscribed to one creed: "an eye for an eye, a tooth for a tooth." Poison and dagger were ever the perennial protagonists of the Two Sicilies, and the multitude who wielded them were but fleeting players on that stage. After nearly two hundred years of waiting, Syracusae's authority had gradually waned, the Greek voice in Sicilian affairs had faded, and the Sicilians' patience had reached its limit. Seizing pitchforks, hatchets, and whatever could serve as a weapon, led by the enforcers of the various Hohenstaufen cadet branches, they stormed out of their villages in fury and descended upon the nearest Greek cities."
EDG_SICDisasterEvents.32.aa:0 "No!"

EDG_SICDisasterEvents.33.name:0 "A Dagger in the Back"
EDG_SICDisasterEvents.33.desc:0 "Conspiracy and betrayal have long been a vital part of Greek history, not mere political pathology. Personal ambition and factional strife drove countless Greeks to wage silent, deadly struggles in the shadows—deciding at the least the outcome of battles, and at most altering the course of history itself. The Greeks' lack of peaceful mechanisms for transferring power, combined with a culture that exalted "honour-competition," provided the most fertile soil for intrigue.\n\nSicily's political landscape was exceedingly complex: old nobles rooted since the Norman era, the original retinue of Isaac III, the new magnates who crossed west during Isaac IV's reign, and the military meritocrats who commanded the armies—all vied in secret for power over Trinacria. Theodoulos Vatatzes's usurpation shattered the fragile political balance, and his failure to promptly establish a new order allowed conspiracies to flourish in corners unseen. The Norman invasion offered the perfect opportunity for the ambitious. One night, while the Protector was inspecting the camp, a poison arrow struck him in a vital spot; he collapsed on the spot and died by dawn the next day. Leaderless, the army fell into chaos, and the Greek magnates plunged into an unprecedented struggle over the Protector's mantle."
EDG_SICDisasterEvents.33.aa:0 "No!"

EDG_SICDisasterEvents.34.name:0 "The Brown-Boot Army"
EDG_SICDisasterEvents.34.desc:0 "The long war proved an opportunity for [CBI.Monarch.GetName] of Calabria. With the support of the other two dukes, the Venetians, the Genoese, and even the Pope of Rome, he forged a battle-hardened, disciplined, loyal, and resolute army, known as the "Brown-Boot Army." Their frontline commanders have grown accustomed to our tactics, and it is said they have even devised ways to counter them."
EDG_SICDisasterEvents.34.aa:0 "Damn it!"

EDG_SICDisasterEvents.35.name:0 "The Golden Chain"
EDG_SICDisasterEvents.35.desc:0 "The Latin fleet appeared on a moonless night. First, a few mast lights like will-o'-the-wisps, then the entire Strait of Messina was nearly filled with the shadows of galleys. The golden-bordered Winged Lion standard hung from the flagship's mast, billowing stiffly in the sea wind. By the time the blockade order reached Syracusae, the fishermen at the docks were still mending their nets, and the harbour tax collectors were still counting the day's copper coins. No one had time to react.\n\nOn the first day, splintered planks and broken oars drifted outside the harbour—remnants of merchant ships that had tried to run the blockade. On the second day, the docks were crowded with shipowners with nowhere to unload, their cargo trapped in port. On the third day, the price of bread quintupled, yet supply still could not meet demand.\n\nIn the Protectorate Council, councillors reported shortages daily. At sea, Venetian warships patrolled day and night, turning back or even sinking every vessel that approached Trinacria. All understood that the golden chain clasped in the Winged Lion's claws had not only locked the Republic's ports, but also the cooking pots on every household's hearth."
EDG_SICDisasterEvents.35.aa:0 "Damn it!"

EDG_SICDisasterEvents.36.name:0 "Expel the Greeks?"
EDG_SICDisasterEvents.36.desc:0 "As early as the 8th century BC, the Greeks founded numerous colonial cities in what was then called "Magna Graecia" in present-day southern Italy, such as Syracusae, Taranto, and Croton. During the Byzantine period, Greek culture gradually revived in the Two Sicilies under Constantinople's rule. Though Saracens and Normans followed in turn, they did not eradicate the flourishing Greek communities there. After the War of the Vespers, the Greeks ruled Sicily for nearly two hundred years, gradually merging with the locals to form a distinctive Greco-Sicilian culture. Greek immigrants brought their language, architecture, and legal traditions; they served as physicians, astrologers, tax officials, and diplomatic interpreters, infusing the court with Byzantine administrative wisdom, and their maritime expertise became key to controlling Mediterranean trade routes. Yet after we capture a southern city, our court advisers point out that these Greeks once betrayed the Hohenstaufen kings of Sicily, proving themselves faithless and unworthy of trust. They urge us to uproot all Greek settlements under our rule, confiscate their wealth, and compel them to return to their Aegean homeland."
EDG_SICDisasterEvents.36.aa:0 "Uproot these settlements—Greeks, get out of Italy!"
EDG_SICDisasterEvents.36.bb:0 "Allow them to remain; after all, I am no tyrant."

EDG_SICDisasterEvents.37.name:0 "Bristling with Rage"
EDG_SICDisasterEvents.37.desc:0 "Decades ago, our former duke—two reigns removed—sent troops to aid his son-in-law Michael Angelos in seizing the Sicilian throne. The worthy King Michael, after taking Sicily, remained mindful of past favours and maintained good relations with the Republic, helping us spread our trade network across the central Mediterranean, blockading our old rivals the Genoese, and consolidating our commercial influence in the Greek world.\n\nYet after Michael's death, his successors grew restless, always scheming to undermine our interests and breaking the Republic's heart. They brought in magnates from the Byzantine Empire to compete with us and seize our markets. At the same time, they deliberately or inadvertently encouraged their citizens to ostracise our merchants, directly causing us trouble. In the past, Isaac IV used his cunning tricks and personal ties to sway the previous duke's judgment, greatly diminishing our grip on Sicily. Now, with both him and the old duke deceased, reasserting our trade privileges over Sicily has once again become the latest agenda of the Council. However, the Sicilian Greeks are no longer docile; they have pulled the Dandolo bloodline from the throne and elevated a scion of the Laskaris in its place, abandoning sentimental appeals to openly humiliate the Republic, casting the pride of three-eighths of Rome to the ground and declaring all our trade privileges abolished. At this, our sovereign [Root.Monarch.GetName] has become incandescent with rage, vowing to personally liberate Syracusae and Palermo and rescue his distant kinsmen."
EDG_SICDisasterEvents.37.aa:0 "The mongrel Laskaris deserves only to kneel before me and repent of his betrayal!"

EDG_SICDisasterEvents.38.name:0 "Symphony of Ambition"
EDG_SICDisasterEvents.38.desc:0 "Ever since his father's death, Carlo di Savoia had been unable to sleep soundly.\n\nOld Filiberto had indeed seized the highest power of the Republic, yet he did not live long enough to complete the transformation of Genoa into a monarchy, passing away prematurely. The hot-headed young Carlo inherited his father's authority and army, hastily assuming the hereditary title of "Duke," but the republicans at home would not accept it, and the arrogant mercenary captains repeatedly paid lip service while defying him. As a result, while struggling to contain internal strife, he lost Corsica, and one by one the eastern territories fell to the Greeks.\n\nGenoa had without doubt fallen into a trough. Carlo desperately needed a war to prove himself, to silence his opponents, and to compel his father's old subordinates into submission. The Sicilian turmoil offered him an opportunity. In the family archives, he found records of his ancestor General Andrea di Savoia, who had waged the War of the Vespers and received the title "Protector of the Sicilian Greeks," ruling over Trinacria's shores. Seizing upon this precedent as his claim, he announced his response to the Duke of Apulia's call and declared that he too would launch a crusade against the island of Sicily."
EDG_SICDisasterEvents.38.aa:0 "I must prove myself!"

EDG_SICDisasterEvents.39.name:0 "The Book of the Holy See"
EDG_SICDisasterEvents.39.desc:0 "TODO: The Pope meddles and directs"
EDG_SICDisasterEvents.39.aa:0 "Surely you cannot be serious at a time like this?"
EDG_SICDisasterEvents.39.bb:0 "We are willing to heed the Pope's will."

EDG_SICDisasterEvents.40.name:0 "Quenching the Embers"
EDG_SICDisasterEvents.40.desc:0 "Frederick of Malta and the disgraced nobles of Palermo fancied their plot flawless and foolproof, little knowing that from the very moment Frederick set foot on Trinacria, the Lord Protector had the entire political conspiracy under his watchful eye. Anticipating that the deposed Angelos emperor and the fallen Hohenstaufen scion were bound to fail, [Root.Monarch.GetName] initially made no move, instead observing quietly, waiting for them to drop their guard before sweeping them all into the net. At last, the opportunity came. One day in early 1449, Frederick Hohenstaufen, having just finished a preliminary conspiracy with the Angelos partisans, resolved to sail to Tunisia to visit old comrades from his Crusader days. After he and his trusted kinsmen, disguised as merchants, departed Palermo by ship, the Protector immediately and secretly sealed off the area where Isaac V and the Angelos partisans were based. Using the surveillance lists compiled earlier, he had his men arrest the conspiring nobles one by one and placed Isaac V under thorough house arrest. Having ensured all was secure, the Protector personally took a warship in pursuit of the Hohenstaufen vessel, intercepted the unsuspecting Frederick and his party, and escorted them all back to Syracusae. At the same time, the Sicilian navy landed on Malta, stormed the Hohenstaufen fortress, and ended the island's near-two-hundred-year autonomy since the War of the Vespers."
EDG_SICDisasterEvents.40.aa:0 "Old relics belong back in their graves, not smouldering anew in a new age!"

EDG_SICDisasterEvents.41.name:0 "Boundless Blue Sky"
EDG_SICDisasterEvents.41.desc:0 "One year after the war's end, [Root.Monarch.GetName] rode out with a single attendant to the countryside outside [124.GetName] for some respite. He wore plain clothes and an old cloak, his hat brim pulled low. The attendant led the horse ahead, and the two followed a newly laid gravel road through groves of olive trees. Water murmured in the irrigation ditches alongside, spring water channeled down from the hills.\n\nThey came to a small village, its wheat fields at the village entrance already golden. Several farmers bent over, harvesting wheat with sickles that swished with each stroke. The Protector dismounted, crouched by the ridge, and scooped up a handful of soil—black, heavy, and moist with vapour. A few years earlier, this had been scorched wasteland, the wheat trampled into mud by Norman hooves before it could ripen. Now, the grains were so plump they burst their husks. An old Greek farmer passed by on a mule cart stacked high with newly cut wheat, the cart boards creaking under the load. Taking the Protector for a leisurely country squire, the old man nodded to him with a gap-toothed grin. [Root.Monarch.GetName] smiled and nodded back.\n\nTurning his head, [Root.Monarch.GetName] saw that the village olive trees had sprouted new branches—tender green shoots pushing out from old wood. A village woman crouched beneath a tree gathering fallen fruit; behind her stood a row of newly built stone walls, the mortar still white and gleaming. Children's laughter reached his ears: a barefoot boy ran out of a house, stopping right beside [Root.Monarch.GetName], his innocent eyes wide with curiosity, holding up a paper boat. The Protector bent down, thanked him, examined the boat for a moment, and returned it. The boy ran off again, the paper boat swaying in the wind.\n\nThe sun had climbed to its zenith. [Root.Monarch.GetName] sat on a stone at the village entrance, took the waterskin handed by his attendant, and took a sip. He looked up—the sky was utterly cloudless, a blue as clean as if freshly washed, stretching from overhead to the sea, to the horizon beyond. In those days, this sky had been veiled by beacon smoke, scored by arrows, stained grey by cannon fire and battle smoke. Now, there was nothing left but pure blue. [Root.Monarch.GetName] hung the waterskin at his waist, rose, and brushed the dust from his trousers. The attendant brought the horse; he mounted and looked back at the village. Chimney smoke rose straight and thin from several cottages, drifting upward into the boundless blue. He smiled softly, gazing with quiet affection at the people he had striven to protect."
EDG_SICDisasterEvents.41.aa:0 "\"We shall always, always have tomorrow.\""

EDG_SICDisasterEvents.42.name:0 "Patriotic Zeal"
EDG_SICDisasterEvents.42.desc:0 "\"In prosperity, kindness is not always seen; in peace, courage is not always proven; only in hardship is steadfastness attested; only in war is valour tested.\"Now, with Sicily facing national calamity, countless brave Greeks have stepped forward of their own accord, volunteering to join this great war of national salvation."
EDG_SICDisasterEvents.42.aa:0 "Salute!"

EDG_SICDisasterEvents.43.name:0 "Waves of the Aegean"
EDG_SICDisasterEvents.43.desc:0 "At the harbour of Chania on the western tip of Crete, the sea wind blew from the northwest, snapping the Lion standard taut. Panos came ashore at dusk. His merchant ship carried furs from the Black Sea, and the cargo manifest bore the seal of the Venetian customs house. No one searched his hold. The harbour tax collector took the silver coins he offered and waved him through with a gesture.\n\nHe crossed the market, turned into a narrow alley, and stopped before a tavern with no signboard. The wooden door stood ajar, and a dim yellow candlelight seeped through the crack. He pushed the door open; inside, only one table was occupied. The man wore the half-armour of a Stradiot mercenary, his cloak dust-covered, a short sword at his belt. His leather helm rested on the table.\n\nPanos removed his hat, revealing a face weathered dark and rough by the sea wind, and sat down beside him. He greeted him: "Yiannis Drako-Alvanitakis, good day."\n\n"Panos Severos," Yiannis set down his cup and replied in a northern Epirote-accented Greek. "I saw you in Dyrrhachium. You were collecting wheat for the Venetians then."\n\n"Still collecting. Just with a different buyer." Panos took an unsigned letter from his sleeve and slid it across the table. "The Lord Protector sends his regards."\n\nYiannis did not open the letter. He rubbed his thumb over the wax seal—a double-headed eagle, without any inscription. "You work for the Laskaris family."\n\n"More precisely, for all Greeks."\n\nThe tavern keeper brought two glasses of wine and retreated to the kitchen. Panos raised his cup, took a sip, his eyes fixed on the other man. "The Venetians have blockaded the Strait of Messina. But the Protector refuses to wait for death."\n\n"But I am a Venetian-commissioned commander." "Your men are all Albanian Greeks or Cretans."\n\n"My lads draw Dandolo pay." "Their fathers and grandfathers drew Constantinople's pay." Panos set down his cup. "Your uncle died in prison because he could not pay the Duke of Naxos his taxes. I checked."\n\nYiannis's expression darkened. He grabbed his cup and drained half of it in one gulp. Wine ran down his chin into his stubble. "What do you want?" "Your blade," Panos said. "I don't need you to raise a banner in revolt; there are partisans everywhere across the Aegean. Your men need only lend a hand on the night of the uprising."\n\n"And then?" "The name Alvanitakis will enter the annals as a glorious Greek lineage. The Protectorate Council will recognise you as General of the Cretan Theme."\n\nYiannis was silent for a moment, then reached out and tucked the unopened letter into the lining of his cuirass. "One night?" "One night."\n\nPanos finished the remaining wine, counted out a few copper coins and pressed them under the cup, then rose to leave. The moment he stepped out, the sea wind rushed into his face, billowing the hem of his coat. Far off on the sea, the moon had just emerged from behind the clouds, spilling silver light across the crests of the waves."
EDG_SICDisasterEvents.43.aa:0 "The sea breeze gently pushes open the window..."

EDG_SICDisasterEvents.44.name:0 "The Valour of Ancestors"
EDG_SICDisasterEvents.44.desc:0 "On the eve of the recapture of Constantinople, the despicable Palaiologoi usurped the throne that belonged to the House of Laskaris and ruthlessly suppressed them. Yet the bloodline of Nicaea never ceased to cultivate its networks of influence, biding its time and planning a resurgence.\n\nAs the Empire decayed, many Greeks chose to emigrate to the Latin Republics; though they had to pay considerable sums to meet their heavy taxes, at least they were free from the perils of imperial civil wars and foreign invasions. Seizing this opportunity, the House of Laskaris planted numerous agents within the Republic of Venice. Disguised as Venetian citizens, they secretly served the Laskaris family for generations.\n\nNow that the Lord Protector [Root.Monarch.GetName] holds power over Sicily, he has gained access to the family's greater resources. The intelligence network, meticulously built by several generations, is about to play a pivotal role in the coming war."
EDG_SICDisasterEvents.44.aa:0 "The family's long investment has finally borne fruit."

EDG_SICDisasterEvents.45.name:0 "Naval Expedition"
EDG_SICDisasterEvents.45.desc:0 "The Duke of Apulia's defeat altered the entire course of the war, leading not only to the total collapse of the Norman coalition but also, through its butterfly effect, to the mutiny against the Genoese duke. The once-haughty Latins, like frightened dogs, surrendered at the mere sight of the Sicilian army; only the Republic of Venice chose to hold out stubbornly. Thus, after briefly settling the prisoners and consolidating the front, the Lord Protector resolved to personally lead an expedition against the lagoon city of Venice, compelling the Latins to submit once and for all."
EDG_SICDisasterEvents.45.aa:0 "Hatred shall be repaid with blood!"

EDG_SICDisasterEvents.46.name:0 "Treaty at the Gates?"
EDG_SICDisasterEvents.46.desc:0 "The Republic's recent string of victories had struck terror into the Duke of Venice; the Protector's army had all but fought its way to the very gates of Venice. At the same time, widespread republican revolts within Venice forced the Duke to bow his head and sue for peace, offering to abandon Venetian interests in Greece and pay a huge indemnity for Sicily's war losses. The bankers of Florence also offered to mediate the peace talks."
EDG_SICDisasterEvents.46.aa:0 "Accept his offer; Syracusae also needs time to recover."
EDG_SICDisasterEvents.46.bb:0 "Reject him—I wish to hang the Venetian doge as well!"

EDG_SICDisasterEvents.47.name:0 "Goodwill"
EDG_SICDisasterEvents.47.desc:0 "The Latin host bore down upon us, yet our friend [From.GetName] stood fearless, resolutely choosing to stand with Greece and justice, and came to our aid."
EDG_SICDisasterEvents.47.aa:0 "\"A companion of good heart is closer than a brother!\""

EDG_SICDisasterEvents.48.name:0 "Urgent Dispatch"
EDG_SICDisasterEvents.48.desc:0 "My Lord [Root.Monarch.GetTitle], yesterday the Duke of Apulia [APU.Monarch.GetName], together with the Dukes of Calabria and Capua, crossed the Strait of Messina to launch a surprise attack on our ally, the Sicilian Republic. Venice and Genoa have also joined the fray. According to our sworn alliance, we are now bound to enter the war and aid them. Shall we honour our pledge?"
EDG_SICDisasterEvents.48.aa:0 "Rush to our brothers' aid at all costs!"
EDG_SICDisasterEvents.48.bb:0 "Let us stand aside."

EDG_SICDisasterEvents.49.name:0 "Unexpected Catch"
EDG_SICDisasterEvents.49.desc:0 "Though the Normans were the chief instigators of this unjust war, there was no doubt that the Republic of Venice was our foremost enemy. The Lord Protector's daily councils with his generals focused chiefly on how to overcome Venice. One evening, while patrolling the coast of Syracusae, the Sicilian navy suddenly spotted a lone Venetian warship. After confirming there was no ambush, the Sicilian fleet swiftly engaged and sank the vessel, capturing its crew. Upon interrogation, we were astonished to learn that the officers aboard were almost all scions of Venice's great patrician families—men who had spent their time drinking and feasting aboard, with no one minding the course, until they had drifted off course to the Syracusan coast and fell into our hands. With such a windfall, we would undoubtedly pry open their mouths and extract valuable intelligence."
EDG_SICDisasterEvents.49.aa:0 "Excellent!"

EDG_SICDisasterEvents.50.name:0 "The Hand of the Phaeacians"
EDG_SICDisasterEvents.50.desc:0 "The island of Corfu—called "Scheria" in ancient times and known today as "Kerkyra"—lies like a mermaid across the Ionian Sea, tranquil and exquisite. In Homer's epic, the wandering Odysseus was cast by storms onto the shores of Scheria, where the Phaeacians welcomed him with warmth, gave him clothing, wine, and a ship, and sent him homeward in a deep sleep.\n\nThe island's inhabitants were largely Greek; even after nearly half a century of Venetian rule, the Greek presence remained dominant. Among the garrison, too, were many Greek soldiers—some locally conscripted, others refugees from the surrounding lands. They were stationed on a promontory on the eastern coast, with cliffs on three sides and landward approach on the fourth. The Latins had renovated and expanded a fortress first built in the 6th century, adding bastions at strategic points; batteries jutted from the cliff faces, commanding the sea and locking the gateway to the Adriatic—a position easy to defend and hard to storm.\n\nThus, after much deliberation, the Lord Protector chose not to assault this stronghold directly, but to employ subtler means.\n\nOne night, the Greek officer on guard at the city gate ordered the drawbridge chains lowered and signalled the fleet with torches. The islanders then swarmed the walls and seized the batteries. The fighting did not last long. Several Latin officers who refused to surrender were trapped in the passageways, their swords still in their scabbards. The naval squadron in the harbour tried to weigh anchor and flee, but their rudder boards had already been bored through by Greek sailors. The Venetian garrison commander was cornered in his quarters and captured before he could even pull on his boots. Before dawn, the Sicilian fleet sailed across from the opposite shore and entered the harbour unopposed, one ship after another. The Republic's flag was already flying from the fortress's flagpole, snapping in the sea breeze. Thus, the golden chain with which Venice had locked the Adriatic was melted by Sicily; the Greeks' path to the northern seas lay wide open.\n\nA thousand years ago, the wandering hero was returned to his homeland by the Phaeacians; a thousand years later, the Phaeacians once more lent a hand to the Sicilian Odysseus, opening for them the gates of the enemy's city and the window to the Greek world beyond."
EDG_SICDisasterEvents.50.aa:0 "\"Now, my beloved homeland is indeed clearly in sight.\""

EDG_SICDisasterEvents.51.name:0 "Citizens Offer Warships"
EDG_SICDisasterEvents.51.desc:0 "The Sicilian army under the Lord Protector fought valiantly and defeated all invaders, yet the weakness of the navy gave the enemy opportunities to harass Trinacria's coasts. Far-sighted citizens recognised this flaw in the Republic and selflessly donated precious warships to the state."
EDG_SICDisasterEvents.51.aa:0 "Excellent!"

EDG_SICDisasterEvents.52.name:0 "Fire in the Rear"
EDG_SICDisasterEvents.52.desc:0 "My Lord Duke, disaster! Our royal court was breached by the Greeks the day before yesterday. That accursed city guard commander took fifty thousand ducats from the Greeks and let them into Naples. Our rear has completely collapsed—all now in Greek hands. The realm is in peril!"
EDG_SICDisasterEvents.52.aa:0 "This is terrible!"

EDG_SICDisasterEvents.53.name:0 "Seek Peace?"
EDG_SICDisasterEvents.53.desc:0 "We miscalculated Sicily's strength and the situation at home. Now, the combined pressure of the republicans, the Ziani family, and the Greeks threatens to topple the Dandolo dynasty's throne; the crown passed down from our ancestor Enrico Dandolo is hanging by a thread. Some counsellors have therefore proposed to our sovereign [Root.Monarch.GetName] that to secure the realm, we must first pacify within—that we must temporarily relinquish overseas interests and focus on dealing with the traitors at home to ensure our rule."
EDG_SICDisasterEvents.53.aa:0 "Quite right—let us go and apologise to the Greeks at once!"
EDG_SICDisasterEvents.53.bb:0 "My brethren, fight to the last, and fall on our swords!"

EDG_SICDisasterEvents.54.name:0 "Like a Hot Knife Through Butter"
EDG_SICDisasterEvents.54.desc:0 "After we successfully stormed the Capuan court, the chief constable of Capua, who had been in secret contact with us, came forward to the frontline commander and offered his submission. With Capua's rear defences wide open, we swept forward like a breaking wave, taking city after city."
EDG_SICDisasterEvents.54.aa:0 "Excellent!"
 
EDG_SICDisasterEvents.55.name:0 "Perilous as Piled Eggs"
EDG_SICDisasterEvents.55.desc:0 "After the War of the Vespers, Hohenstaufen rule over Sicily was overthrown. Yet the last Sicilian king, Manfred, did not flee Trinacria; instead, with the help of loyal Catholics, he vanished into a village amidst Sicily's rugged mountains. Later, the king attempted to sail to Venice and return to Germany to humble himself before the main Hohenstaufen line in search of aid, but the 35-year-old king perished in an unexpected shipwreck en route. While the loyalists were still immersed in mourning the king's death and the aftershocks of the Vespers war, joyful news came from the palace—the queen was with child, the late king's posthumous heir. The main Hohenstaufen bloodline was not yet extinguished.\n\nBy then, the collateral branches carrying Hohenstaufen blood had long been embroiled in fierce struggles within the power vacuum of Sicily's inland mountain ranges. The favoured posthumous son of Manfred was transferred by the "true Sicilians" to the island of Malta for protection, where they built a strong fortress. Amid the political chaos, the Genoese tyrants of Syracusae took no notice of changes on that tiny islet, allowing the last Hohenstaufen scion to survive.\n\nNow the time came to the 15th century: Henry VII, the "legitimate King of Sicily" on Malta, now past sixty, wed a noble lady from the Byzantine Palaiologos house and fathered an only son, Frederick. Frederick received an excellent education, becoming a steadfast Catholic, as well as a scholar and poet, and above all a commander of strategic vision. In his youth, he joined the Crusader campaigns in North Africa, helping the Crusaders fend off Muslim raids, and forged deep friendships with members of the Knights Templar and the dignitaries of the Sultanate of Tunis. In 1442, he returned to Malta to inherit the "throne." The following year, the Sicilian Emperor Isaac IV passed away suddenly, and his young son Isaac V was deposed by Theodoulos Vatatzes. Yet the then Protector showed a woman's softness, failing to purge the Angelos faction; the military government in [2982.GetName] and the old nobility in [125.GetName] drifted into mutual estrangement, outwardly united but inwardly divided—Sicily's situation grew treacherous and opaque. Frederick perceived that Sicily's history had reached a turning point, and that the Hohenstaufen family's last chance to reverse their fate was now. And so, Frederick took a merchant ship in secret to [125.GetName], determined to stir the winds and tides of Trinacria with his own talents."
EDG_SICDisasterEvents.55.aa:0 "Imminent."
EDG_SICDisasterEvents.55.aa.tt:0 "§RWe must complete the mission in time to thwart Frederick Hohenstaufen's conspiracy.§!"

EDG_SICDisasterEvents.56.name:0 "Storm Clouds Gathering"
EDG_SICDisasterEvents.56.desc:0 "The War of the Vespers in 1266 utterly rewrote Trinacria's fate, breaking the momentum toward a united Two Sicilies and carving a new chasm between the Latin and Greek peoples. Over the nearly two centuries that followed, rulers on the southern island of Sicily came and went like figures on a revolving stage, while the northern Peninsular Sicily licked its wounds, waiting for an opportunity to invade. With Sicily's political turmoil persisting, the Normans of Peninsular Sicily and the mercenary lords of Genoa at last saw a golden chance to seize power. Thus, through the combined efforts of merchants and nobles, the Duke of Apulia had assembled a military league against Sicily—a great war loomed on the horizon."
EDG_SICDisasterEvents.56.aa:0 "War is imminent."
EDG_SICDisasterEvents.56.aa.tt:0 "§RWar is about to break out—make all preparations!§!"

EDG_SICDisasterEvents.57.name:0 "New Life from Ashes"
EDG_SICDisasterEvents.57.desc:0 "By the grace of God, the enemy forces that invaded Trinacria have been utterly destroyed. In the cities of the north, the blue-and-white eagle banner of the Lord Protector has been raised high in victory processions, forever ending the two-century-long division of the Two Sicilies, and propelling the revival of the Greek nation and the Orthodox faith to new heights. The banners of Apulia, Genoa, and others have been dragged through the dust. Those invaders who once preyed upon our weakness have now lost everything in this war, and the sufferings inflicted upon Sicily have been repaid a hundredfold.\n\nToday, to the solemn strains of sacred music, the Lord Protector—one hand resting upon his sword Paliengeneios, the other holding a parchment scroll, accompanied by the Grand Marshal and the Patriarch—strides with head held high into the hall of the Protectorate Council. He ascends to the principal seat and proclaims to all the councillors that the last enemy, Venice, has ceased its futile resistance; the Republic has brought this Latin calamity to a final end. From the ashes of the old age, a new Sicily, bathed in the glory of Christ and the radiance of Greece, now declares to Europe that her era is about to begin."
EDG_SICDisasterEvents.57.aa:0 "\"Freedom! We hail you!\""
EDG_SICDisasterEvents.57.aa.tt:0 "The disaster §REmbers of Kings in Chaos§! will come to an end."

EDG_SICDisasterEvents.58.name:0 "Northern Conquest"
EDG_SICDisasterEvents.58.desc:0 "With his entire rear fallen and his army scattered, the Duke of Capua has lost all means to resist us and can only surrender. Naples—ancient Neapolis, the city of sun and joy—has finally fallen into our hands, serving as our forward base for the march into northern Italy."
EDG_SICDisasterEvents.58.aa:0 "Revel in victory!"

EDG_SICDisasterEvents.59.name:0 "Southern Campaign"
EDG_SICDisasterEvents.59.desc:0 "With his entire rear fallen and his army annihilated, the Duke of Calabria has lost all means to resist us and can only surrender. Calabria—ancient bulwark of "Italia"—has finally fallen into our hands, serving as the starting point of our conquest of the Apennine peninsula."
EDG_SICDisasterEvents.59.aa:0 "Revel in victory!"

EDG_SICDisasterEvents.60.name:0 "The "Loophole of the Holy See""
EDG_SICDisasterEvents.60.desc:0 "TODO: Lateran Treaty"
EDG_SICDisasterEvents.60.aa:0 ""

EDG_SICDisasterEvents.61.name:0 "Strife"
EDG_SICDisasterEvents.61.desc:0 "Sicily was the first colony of the Roman Empire, and the most brilliant jewel of the Mediterranean—the beating heart of that sea—the only dominion of the Roman Empire still functioning, though it bowed neither to Constantinople nor to Rome.\n\nIf we turn the clock back to 1189, when the last king of a united Two Sicilies, William II, died unexpectedly, the two great claimants to the Sicilian throne—Tancred of Lecce, bastard son of Roger III, and the Holy Roman Emperor Henry VI—began years of bitter struggle over the Sicilian crown. After both sides were exhausted, they were forced to sign the Treaty of Amalfi, which satisfied neither party: the Hautevilles retained the Neapolitan territories, while Henry VI's Hohenstaufen took the island of Sicily, also called "Trinacria," after its three-legged emblem.\n\nYet neither crown endured for long. After Tancred's death, the Neapolitan kingdom was eventually overthrown; the ambitious lords of Capua and Calabria shattered Roger's crown, and the Hautevilles retreated to the Duchy of Apulia. The Hohenstaufen, however, had no time to seize the Norman pearl amid the chaos—Trinacria was suddenly struck by an unexpected foe, the Eastern Empire."
EDG_SICDisasterEvents.61.aa:0 "\"The vesper bell shattered the imperial dream, and all the roses turned to crimson gore.\""

EDG_SICDisasterEvents.62.name:0 "Noble Support"
EDG_SICDisasterEvents.62.desc:0 "TODO: Theodoulos Vatatzes has managed to secure the support of the nobility."
EDG_SICDisasterEvents.62.aa:0 "Good!"

EDG_SICDisasterEvents.63.name:0 "The Fatimids Break Their Oath"
EDG_SICDisasterEvents.63.desc:0 "The Normans descended upon us in full fury, yet the Fatimids, when Sicily faced this calamity, proved timid and hesitant, speaking in vague and evasive terms to our envoys seeking aid. Without a doubt, they have torn up their former oath and are no longer worthy of our trust."
EDG_SICDisasterEvents.63.aa:0 "I should never have trusted those accursed infidels!"

EDG_SICDisasterEvents.99.name:0 "Forked Destiny"
EDG_SICDisasterEvents.99.desc:0 "The old quarrels of Trinacria have all been swallowed by the Mediterranean, save for the lighthouse of Syracusae, which still shines on in silence. By the shore, the Lord Protector Theodoulos Vatatzes labours to maintain the Greek state; amidst the inland mountains, the Catholic clans who call themselves "true Sicilians" continue their generational enmity with the Syracusans of the coast; in Palermo, the remnants of the Angelos faction whisper in the shadows; on Malta, the last scion of the Hohenstaufen royal line struggles for breath; and beyond the island, the Norman princes lie in wait, the Genoese tyrants harbour swelling ambitions, and the Duke of Venice grows ever more discontent.\n\nSicily once possessed an ancient history to be proud of—she was the sword and shield of the Greek world, the dream of Pyrrhus, the trophy of Scipio. She was the crown of the Normans, the throne of the Hohenstaufen, the jewel of the Genoese Republic.\n\nShe also possesses a recent history of blood and betrayal—the blades of Hauteville, the decrees of Rome, the ringing vesper bells, and countless dawns sold away.\n\nAt the same time, she now possesses a future history yet to be written—one destined to be utterly rewritten in the storms of the Mediterranean. The storm has already formed at sea; the clouds are pressing down upon Mount Etna. Whether the ship emerges from the tempest depends on the helmsman.\n\nSo what shall Sicily's path ahead be?\n\nShe may hold her course, strengthen military leadership, and restore the ancient name of "Syracuse"—taking as her mission the rebuilding of the Hellenic world, so that Plato's third voyage may, on the fourth, reach its destined shore.\n\nShe may rekindle the dying flame, let the last ember of the Angelos burn away the shame history has laid upon their house—to pursue a dream beyond compare.\n\nShe may restore the monarchy, let the black hawk of the Hohenstaufen spread its wings once more—taking flight from Sicily's peaks, soaring over the Apennines, casting its shadow over Germany, and seizing the supreme laurel crown.\n\nThe path ahead is uncertain. Sicily's future shall be decided by you."
EDG_SICDisasterEvents.99.aa:0 "The sovereign's will is supreme!"
EDG_SICDisasterEvents.99.aa.tt:0 "§OWe will have the opportunity to enthrone the Hohenstaufen or the Angelos dynasty.§!"
EDG_SIC_WIP_tt:0 "§RUnder development—please do not select. If chosen, you assume all consequences!§!"
EDG_SICDisasterEvents.99.bb:0 "The glory of the Republic must not be ignored!"
EDG_SICDisasterEvents.99.bb.tt:0 "§TWe shall uphold the Protector's leadership and restore the glory of Greece.§!"

EDG_SICDisasterEvents.100.name:0 "Dust to the Old Winds"
EDG_SICDisasterEvents.100.desc:0 "\"If not today, then surely tomorrow!\"\n\nThe Greek eagle was meant to soar on high, yet time and again has been shackled by adversity. Without doubt, this is the fault of those who have placed the Greeks in chains. From [321.GetName] to [2982.GetName], from Byzantion to [163.GetName], from [320.GetName] to [146.GetName], the Greek people have never known true freedom. But now, as the Grand Protector [Root.Monarch.GetName] proclaims the founding of the Syracusan Republic, a thunderous cry rises from the shores and mountains of Trinacria, echoing through the dark alleys of [125.GetName], until even Graecia joins this flourishing chorus: Greece still lives!\n\nThe dreams of the victors of the Syracusan War of Independence shall never fade. The decline of the Crusader states and the Roman successor realms is stirring the awakening of a new Greek nation, and its reverberations ripple across the whole of Europe. Bureaucrats begin to debate new systems; clergymen marvel at the works of God; nobles scoff at the commands of [151.GetName] or the Vatican; and old banners, long thought buried in the river of time, once again flutter in the wind."
EDG_SICDisasterEvents.100.aa:0 "\"Arise, Greece—your sons are calling you!\""
EDG_form_Syracusae_tooltip:0 "Form §YSyracusae§!."
EDG_SICDisasterEvents.100.bb:0 "A fine plan, though I would make some adjustments."

EDG_SICDisasterEvents.101.name:0 "Spreading Wings Anew"
EDG_SICDisasterEvents.101.desc:0 ""
EDG_SICDisasterEvents.101.aa:0 "\"Whoever calls upon the Lord's name shall triumph over death.\""
EDG_form_TwoSicily_tooltip:0 "Form §YThe Two Sicilies§!."

EDG_SICDisasterEvents.102.name:0 "A Moth to the Flame"
EDG_SICDisasterEvents.102.desc:0 ""
EDG_SICDisasterEvents.102.aa:0 "\"Whoever rushes toward the light and the flame shall be reborn from the ashes.\""
EDG_form_Angelos_tooltip:0 "Form §YRome§!."