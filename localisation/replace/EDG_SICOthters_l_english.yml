#Ideas
Syracusae_ideas:0 "Syracusan Ideas"
Syracusae_ideas_bonus:0 "Syracusan Ambition"
Syracusae_ideas_start:0 "Syracusan Traditions"
Syracusae_plus_ideas:0 "Syracusan Ideas"
Syracusae_plus_ideas_bonus:0 "Syracusan Ambition"
Syracusae_plus_ideas_start:0 "Syracusan Traditions"
Syracusae_Military_Government:0 "Syracusan Military Government"
Syracusae_Military_Government_desc:0 "After the "Syracusan War of Independence," Theodoulos Vatatzes thwarted the restoration conspiracies of the Angelos royal house and the Catholics. Yet he did not crown himself and follow the old Roman path, but instead chose to reach an accord with the magnates, establishing a united military government. He actively revived Greek traditions, cast off Roman influence, and rebuilt the Syracusan Republic on the shores of Trinacria."
Syracusae_rejuvenation_of_civilization:0 "Rejuvenation of Civilisation"
Syracusae_rejuvenation_of_civilization_desc:0 "The catastrophe of 1204 nearly dragged the Orthodox world and Greek civilisation into utter ruin, yet by God's grace, we have endured. The ashes of ancient Greek wisdom have been rekindled on the shores of Syracuse. We take up the scrolls of Plato, recite the epics of Homer, restore the theatres of Syracuse, rebuild the columns of Corinth, refurbish the academies of Athens, and reorganise the battle arrays of Macedon. An ancient and vibrant civilisation is reviving—stronger than at any point in its history."
Syracusae_control_the_Ecumenical_Patriarch:0 "Protector of the Ecumenical Patriarch"
Syracusae_control_the_Ecumenical_Patriarch_desc:0 "The Bishop of Constantinople, the Ecumenical Patriarch—spiritual leader of the Greek world—had long been controlled by the Roman emperors, reduced to a mere tool of the Basileus rather than holding his due station. But Syracuse has liberated Byzantion; the Greek Patriarch is no longer shadowed by Romans or infidels. The Lord Protector is his new guardian."
Syracusae_Come_form_Syracusae:0 "From Athens to Syracuse"
Syracusae_Come_form_Syracusae_desc:0 "Plato made three voyages to Syracuse, all ending in bitter failure. The newborn Syracuse was once little more than a coalition of aristocratic interests, teetering on the brink of military tyranny. Yet through the efforts of successive Lord Protectors, we have proven to the world that the tyrant's oppression is but a bygone dream. The ideal that the ancient philosopher confined to his dialogues has now taken shape in the morning light of the Mediterranean, drawing its first true breath in law codes and councils. From Athens, to Syracuse—the unfulfilled shore that Plato sought now stands before us."
Syracusae_Meagali_Idea:0 "The Great Ideal"
Syracusae_Meagali_Idea_desc:0 "Before the Romans usurped our heritage and demeaned our culture, the Greek nation wielded even greater influence over the civilised world than Rome—far beyond our own borders. From the Pillars of Hercules to India, from the Scythian steppe to the ends of the Nile, Syracuse must realise the Great Ideal of its founding father Theodoulos: to restore the Hellenic world once more and soar together toward a glorious tomorrow."
Syracusae_Greek_Fire_Revolution:0 "Greek Fire Revolution"
Syracusae_Greek_Fire_Revolution_desc:0 "Greek civilisation is built upon the sea and ships. From ancient Hellas to the Eastern Roman Empire, our mighty fleets have won us countless honours. To restore the vast Hellenic world from the Atlantic to the Indian Ocean, a powerful navy is indispensable—and to overcome the centuries of decline since the 1204 catastrophe, a technological revolution is imperative. "Greek Fire," that once-fearsome naval weapon, shall soon re-enter the stage of war in a new guise."
Syracusae_Second_Hellenistic_Age:0 "The Second Hellenistic Age"
Syracusae_Second_Hellenistic_Age_desc:0 "The First Hellenistic Age spanned from Alexander the Great's eastern campaign (334 BC) to Rome's absorption of the last Hellenistic kingdom—Ptolemaic Egypt (30 BC). During this era, Greek classical civilisation deeply intermingled with the native cultures of Western Asia and North Africa, giving rise to a transregional cultural sphere with Greek as the lingua franca and Greek-style cities as its nodes—a richly hybrid civilisation that produced pioneering achievements in politics, science, art, and religion. Now, once again under powerful military leadership, the Greek nation has vanquished all its foes and stands at the dawn of a Second Hellenistic Age!"

Syracusae_Hellenic_Military_Government:0 "Hellenic Military Government"
Syracusae_Hellenic_Military_Government_desc:0 "After the "Syracusan War of Independence," Theodoulos Vatatzes reached an accord with the magnates, establishing a united military government. He actively revived Greek traditions, cast off Roman influence, and rebuilt the Syracusan Republic on the shores of Trinacria—an act that profoundly shaped the history of our nation and the world. Now, the military government has liberated the entire Greek world. We are no longer merely the "Military Government of Syracuse," but the "Military Government of All Greeks." The discipline of the Dorians, the wisdom of the Ionians, and the valour of the Macedonians are all at the Republic's service."

Syracusae_Restore_World:0 "Rebuilding the World"
Syracusae_Restore_World_desc:0 "In the eyes of many, the Syracusan War of Independence is already a thing of the past; the catastrophe of 1204 is a wound two centuries old; and the memory of Corinth sown with salt and Archimedes falling beneath the sword seems to belong to another age. Now, the Republic's fleet sails into Byzantion; the merchant ships of the Corinthian guild bustle in and out of the port of Thessaloniki; Syracusan scholars work day and night in the Library of Athens, collating ancient manuscripts. We were once brought to the brink of ruin, yet by God's great grace we have rebuilt the Greek world, healed the wounds accumulated over millennia, and stand more prosperous, flourishing, and magnificent than at any time in history."

Syracusae_control_the_Ecumenical_Patriarch_plus:0 "The Holy Church Authorises the Republic"
Syracusae_control_the_Ecumenical_Patriarch_plus_desc:0 "The old Roman emperors were powerless to protect the Orthodox Church before the shadows of infidels and blasphemers—but the Syracusan Lord Protector can, and the warriors of Greece can. With Byzantion liberated by the Republic, the Ecumenical Patriarch no longer bows to the sceptre of the Basileus, but offers his blessing to this Republic established by Greeks and for Greeks. The Holy Church recognises the Syracusan Republic as the lawful defender of the Orthodox faith and the temporal leader of all Greeks. In return, the Republic guarantees the Church's independence and dignity: the Patriarch may convoke ecumenical councils, appoint bishops, and participate in all matters of faith. This is not the Roman Emperor lording over the Church, nor the Catholic heretics' Church lording over the state—it is the Cross and the blue-and-white banner bearing mutual witness, a sacred covenant between the Holy Church and the Syracusan Republic."

Syracusae_Come_form_Syracusae_plus:0 "From Athens to Syracuse"
Syracusae_Come_form_Syracusae_plus_desc:0 "Plato made three voyages to Syracuse, all ending in bitter failure. The newborn Syracuse was once little more than a coalition of aristocratic interests, teetering on the brink of military tyranny. Yet through the efforts of successive Lord Protectors, we have proven to the world that the tyrant's oppression is but a bygone dream. The ideal that the ancient philosopher confined to his dialogues has now taken shape in the morning light of the Mediterranean, drawing its first true breath in law codes and councils. From Athens, to Syracuse—the unfulfilled shore that Plato sought now stands before us."

Syracusae_Meagali_Idea_plus:0 "The Great Ideal"
Syracusae_Meagali_Idea_plus_desc:0 "Before the Romans usurped our heritage and demeaned our culture, the Greek nation wielded even greater influence over the civilised world than Rome—far beyond our own borders. From the Pillars of Hercules to India, from the Scythian steppe to the ends of the Nile, Syracuse must realise the Great Ideal of its founding father Theodoulos: to restore the Hellenic world once more and soar together toward a glorious tomorrow."

Syracusae_Greek_Fire_Revolution_plus:0 "Greek Fire Revolution"
Syracusae_Greek_Fire_Revolution_plus_desc:0 "Greek civilisation is built upon the sea and ships. From ancient Hellas to the Eastern Roman Empire, our mighty fleets have won us countless honours. To restore the vast Hellenic world from the Atlantic to the Indian Ocean, a powerful navy is indispensable—and to overcome the centuries of decline since the 1204 catastrophe, a technological revolution is imperative. "Greek Fire," that once-fearsome naval weapon, shall soon re-enter the stage of war in a new guise."

Syracusae_Second_Hellenistic_Age_plus:0 "The Second Hellenistic Age"
Syracusae_Second_Hellenistic_Age_plus_desc:0 "The First Hellenistic Age spanned from Alexander the Great's eastern campaign (334 BC) to Rome's absorption of the last Hellenistic kingdom—Ptolemaic Egypt (30 BC). During this era, Greek classical civilisation deeply intermingled with the native cultures of Western Asia and North Africa, giving rise to a transregional cultural sphere with Greek as the lingua franca and Greek-style cities as its nodes—a richly hybrid civilisation that produced pioneering achievements in politics, science, art, and religion. Now, once again under powerful military leadership, the Greek nation has vanquished all its foes and stands at the dawn of a Second Hellenistic Age!"

Hohenstaufen_ideas:0 "Hohenstaufen Sicilian Ideas"
Hohenstaufen_ideas_bonus:0 "The Eternal Legend of the Hohenstaufen"
Hohenstaufen_ideas_start:0 "Hohenstaufen Sicilian Traditions"
Hohenstaufen_eagle_of_Malta:0 "The Hawk of Malta"
Hohenstaufen_eagle_of_Malta_desc:0 "The essence of three civilisations—Greek, Germanic, and Latin—has forged our sovereign, Frederick "Stellette," into greatness.\nHis longsword is sharp, his spear keen, his helm bright and gleaming, his silver shield reflecting the boundless starry firmament.\nHe is the lone star of the Staufen, the black hawk of Malta, the sovereign of a new age."
Hohenstaufen_Barbarossa_ambition:0 "Barbarossa's Ambition"
Hohenstaufen_Barbarossa_ambition_desc:0 "The great Hohenstaufen Emperor Frederick "Barbarossa" rose from Swabia, was crowned Emperor of the Romans, and seized the crowns of Germany, Italy, and Burgundy, fighting all his life for Christ and the Empire. The memory he left behind still inspires our soldiers and generals—our soldiers yearn for greater battles, our generals envy his martial and holy prowess, and all are willing to devote their lives to realising his unfinished ambition."
Hohenstaufen_Kaiserreich:0 "Caesar of Italy and Germany"
Hohenstaufen_Kaiserreich_desc:0 "To rule all Italy and Germany—the unfinished work of the first two Fredericks—now rests firmly in the hands of the third Frederick. A new, true Roman Empire has returned to the world. The glory of Caesar now covers all Italy and Germany, and indeed the entire West. Europe has entered a new age—the Hohenstaufen's "Iron Century.""
Hohenstaufen_University_of_Fredrich:0 "Frederick University"
Hohenstaufen_University_of_Fredrich_desc:0 "During his reign, Frederick II founded Sicily's first university, established a school of poetry, and drew upon the wisdom of the Arabic and Greek worlds, making Sicily the first gleam of the "pre-Renaissance dawn." What a nation needs most is always talent. Let the third Frederick take up the torch from Frederick II and expand his legacy into a university system for Sicily."
Hohenstaufen_Norman_ammiratus:0 "Norman Grand Admiral"
Hohenstaufen_Norman_ammiratus_desc:0 "King Roger II of Sicily established the first Grand Admiral in history, reforming the naval system and thereby laying the foundation for Norman hegemony.\n\nTrinacria lies at the heart of the Mediterranean. If Sicily is to become a great European power, learning from the Normans' example and reforming the navy as Roger did will be an unavoidable path."
Hohenstaufen_Papal_controller:0 "Protector of the Triple Crown"
Hohenstaufen_Papal_controller_desc:0 "The great struggle between the House of Hohenstaufen and the decadent Roman Curia has at last come to an end. We have taken control of the heart of the universal Church, enabling us to make grand plans for the salvation of Catholic civilisation. Meanwhile, the Holy See need no longer be troubled by worldly affairs, and may retire to the monasteries of Malta to devote itself to the study of the scriptures and contribute to the reform of the Catholic Church—truly a solution that benefits both sides."
Hohenstaufen_the_Constitutions_of_Melfi:0 "The New Constitutions of Melfi"
Hohenstaufen_the_Constitutions_of_Melfi_desc:0 "In 1231, Frederick II promulgated the Constitutions of Melfi, embodying his vision of a centralised state and mercantilist policy. Now, facing the dawn of a new age, we should stand on the shoulders of this giant, revise the Constitutions of Melfi, and further promote absolute royal authority and centralisation."

Angelos_ideas:0 "Angelos New Roman Ideas"
Angelos_ideas_bonus:0 "Angelos New Roman Ambition"
Angelos_ideas_start:0 "Angelos New Roman Traditions"
Angelos_Porphyrogennetos:0 "Born in the Purple"
Angelos_Porphyrogennetos_desc:0 "We are Romans. Our sovereign is a Porphyrogennetos, the rightful heir to the Eastern Empire; our dynasty is the legitimate ruling house of Constantinople. All the nations of Europe shall admire our imperial majesty."
Angelos_Issac_reforms:0 "Isaac's Fiscal Reforms"
Angelos_Issac_reforms_desc:0 "The Sicilian civil war left behind a devastated realm—within, the newly subjugated Latins were restless; without, the Pope and Venice pressed hard. Isaac V carried out a series of fiscal reforms to ensure the Sicilian state machinery could function properly and that his ambitions might be realised."
Angelos_Roman_league:0 "The Roman League Charter"
Angelos_Roman_league_desc:0 "A Sicily beset by internal and external troubles cannot sustain the Angelos dynasty's Roman dream. Why not, then, consolidate our strength, rally all who admire Rome to our cause, and promise them rewards—so long as they pledge their loyalty?"
Angelos_Learn_from_the_west:0 "Learning from Western Institutions"
Angelos_Learn_from_the_west_desc:0 "As the legitimate dynasty of the Eastern Empire, no one knows better than we how utterly decrepit the Byzantine bureaucratic machinery is. Our New Roman court flourishes in the West; we may invite Western counsellors, merchants, and bureaucrats to further enhance our administrative capacity and maintain a stable bureaucracy."
Angelos_Romance_Hellen_friendship:0 "Romance-Hellenic Brotherhood"
Angelos_Romance_Hellen_friendship_desc:0 "Cooperation with the Germans is, in the end, merely feigned diplomacy; friendship with our Romance brothers can bring the greatest benefit to the Empire. The Romance peoples possess a more advanced civilisation than the Germans, stronger armies, more glorious royal houses—and, like us, are more faithful to Rome and the Supreme Pontiff."
Angelos_decentralization:0 "Regional Decentralisation"
Angelos_decentralization_desc:0 "For centuries since the Fourth Crusade, the Empire's territories have been fragmented to an unprecedented degree. Though we have largely restored the imperial frontiers, local autonomy has become a tradition—and the great men who helped us achieve reunification are unwilling to yield their power. Very well, then—let us delegate authority to the provinces. Provided, of course, that they pledge their very hearts to New Rome."
Angelos_Imperator:0 "Caesar of East and West"
Angelos_Imperator_desc:0 "The Germans call themselves heirs of Rome, yet plainly they are not. New Rome rises like a phoenix from the ashes, marching toward its glorious destiny, proclaiming the supreme authority of the Caesar of East and West. The soul of the Angelos breaks forth from the ruins, quietly savouring the glory of the universal Empire."

EDG_Ducate_ideas:0 "Greek Theme Ideas"
EDG_Ducate_ideas_bonus:0 "Greek Theme Ambition"
EDG_Ducate_ideas_start:0 "Greek Theme Traditions"
EDG_Ducate_1:0 "Border Legions"
EDG_Ducate_2:0 "Greek Bureaucracy"
EDG_Ducate_3:0 "Servants of Syracusae"
EDG_Ducate_4:0 "Mounting the World on Horseback"
EDG_Ducate_5:0 "Hellenisation"
EDG_Ducate_6:0 "Orthodox Zeal"
EDG_Ducate_7:0 "The Peace of Syracuse"
EDG_Ducate_1_desc:0 "The Akritai were originally border guards established by the Eastern Empire to defend the Asian frontiers. They built fortresses in the mountains, set up checkpoints on vital routes, relayed enemy movements by beacon, and guarded the Greek villages behind them with spears and crossbows. In the 9th and 10th centuries, the Akritai were integrated into the regular military system, enjoying land tax exemptions, shares of booty, and border autonomy. After the Seljuk invasions and the feckless rule of the Palaiologoi, the Akritai system gradually decayed. Now, the Greek military government has revived the Akritai system once more, to restore the frontiers of civilisation."
EDG_Ducate_2_desc:0 "The bureaucrats of the themes are directly appointed by Syracusae—the most experienced administrative corps in the civilised world. This Greek bureaucratic system, inherited from the Eastern Empire and reformed by the Republic, is undoubtedly efficient and incorruptible."
EDG_Ducate_3_desc:0 "The existence of the themes is not to share power with the Protectorate Council, but to enable the Lord Protector of Syracusae to better control the provinces. The generals of the themes govern by the grace of the Father of the Fatherland, strengthening the rule of the Archon over all lands."
EDG_Ducate_4_desc:0 "We follow the invincible Lord Protector, believing that he shall mount his steed and conquer the world, fulfilling the unfinished prophecy of Alexander the Great. We keep pace with his conquest of the globe, ready to shed our last drop of blood and brave any fire for his cause."
EDG_Ducate_5_desc:0 "The influence of Greek civilisation once stretched from Iberia in the west to the Indus Valley in the east, yet now it has withdrawn to a corner of the Aegean. To realise the "Great Ideal" of the Father of the Greeks, the themes are not merely a branch of the central government, but sowers of Greek civilisation—actively promoting assimilation in the provinces, absorbing the beneficial values of local cultures, and integrating them into the Greek world."
EDG_Ducate_6_desc:0 "The spiritual world of today's Greeks is built upon the foundations of Orthodox civilisation, and the Syracusans' fervour for Orthodoxy has deeply influenced us as well. Faith binds soldiers from diverse regions together as brothers, inspiring them to hold fast on frontiers beset by pagans on every side. The monasteries serve simultaneously as hospitals, granaries, and beacon towers; the monks grasp both the Bible and the sword, forming the most resilient backbone of the themes."
EDG_Ducate_7_desc:0 "We live under the protection of the Greek Federation, enjoying a long and stable peace. The Lord Protector of Syracusae has reformed the finances, restored tax order, disciplined the military, built infrastructure, promoted the Greek language, and codified Greek law—bringing peace and order to the Hellenic world. Contemporaries call this the "Peace of Syracuse.""

#Idea Groups
EDG_Firepower_basic_ideas:0 "Firepower Ideas"
EDG_Firepower_basic_ideas_start:0 "Firepower Ideas Ambition"
EDG_Firepower_basic_ideas_bonus:0 "Complete Firepower Ideas"
EDG_Firepower_basic_ideas_1:0 "Standing Army Reform"
EDG_Firepower_basic_ideas_2:0 "Royal Artillery Academy"
EDG_Firepower_basic_ideas_3:0 "The Bronze Age"
EDG_Firepower_basic_ideas_4:0 "Fire of the Sea"
EDG_Firepower_basic_ideas_5:0 "Independent Field Artillery"
EDG_Firepower_basic_ideas_6:0 "Linear Maneuver and Combined Tactics"
EDG_Firepower_basic_ideas_7:0 "Grand Battery Tactics"
EDG_Firepower_basic_ideas_1_desc:0 "The standing army is a product of social productive forces reaching a certain stage of development—a regular active-duty military force maintained in peacetime by a state or political entity. Standing armies typically adopt unified organisational structures, standardised equipment, specific rank systems, uniform clothing, specialised insignia and symbols, systematic training and education, and strict regulations to maintain high combat effectiveness and readiness. Moving toward a standing army is an essential path of military reform, marking the state's commitment of greater resources to the army and laying the foundation for the development of new weaponry."
EDG_Firepower_basic_ideas_2_desc:0 "The Royal Artillery Academy is one of the nation's most important military institutions. Founded in the 15th century, it was the earliest professional military education academy for training artillery officers in our country, later becoming the pre-appointment educational institution for the entire artillery corps. Each year, the Academy selects talented young recruits; those admitted study all knowledge related to military logistics, troop deployment, and the construction of siege engines."
EDG_Firepower_basic_ideas_3_desc:0 "The period from 1450 to 1540 is known as Europe's "Second Bronze Age," when nations vied to cast bronze cannon barrels on a scale and across regions unprecedented before or since. A classification system for artillery gradually took shape: long-barrelled guns for range, shorter cannons for power, and mortars for high-angle trajectory. The Greek mathematician Nikolaos Krinis discovered that projectiles achieve maximum range when fired at a 45-degree angle in a vacuum, laying the theoretical foundation for artillery science. In this era, the state standardised calibres and established an artillery ranking system, making artillery a permanent branch of the military."
EDG_Firepower_basic_ideas_4_desc:0 "Greek Fire is an ancient weapon passed down from the Eastern Roman Empire. Its formula, based on petroleum mixed with sulphur, resin, and pitch, was projected through bronze siphons and could burn continuously on water. Now, driven by the needs of war, Greek craftsmen have combined the ancient Greek Fire with Eastern gunpowder and saltpetre, giving rise to even more devastating explosive weapons—potent tools for destroying enemy supplies, burning provisions, and breaching fortified cities."
EDG_Firepower_basic_ideas_5_desc:0 "Gustavus Adolphus was a renowned military reformer who granted artillery unprecedented mobility. His core idea was to enable artillery to keep pace with the main army: by lightening the barrels, shortening their length, and reducing powder charges, he created "leather cannons" that could be pulled by just two men or one horse, and 3-pounder "regimental guns" that served as "mobile firing points" accompanying infantry charges. He elevated artillery from a "support" role to an independent branch on par with infantry and cavalry, establishing dedicated command structures and training standards, granting it independent tactical status."
EDG_Firepower_basic_ideas_6_desc:0 "Gustavus Adolphus pioneered the lightening of artillery, using leather barrels and lighter carriages to enable cannons to manoeuvre alongside infantry. He abolished cumbersome siege guns in favour of standardised 3-pounder, 6-pounder, and 12-pounder regimental guns, coordinating artillery with infantry and cavalry. In the age of linear tactics, artillery was deployed at the centre of the battle line, using crossfire to tear apart enemy formations. The tactical core was to distribute artillery in pairs, moving with the line of advance to provide fire support—achieving combined arms coordination among infantry, cavalry, and artillery."
EDG_Firepower_basic_ideas_7_desc:0 "Napoleon Bonaparte, himself an artillery officer, brought artillery tactics to their zenith on the battlefield. He pioneered "Grand Battery" tactics—concentrating hundreds of guns to deliver devastating bombardment against a single enemy flank at the decisive point, then plunging in cavalry and infantry columns once the enemy formation wavered. He established a dedicated "Artillery Reserve" under the direct command of the sovereign, ensuring overwhelming firepower at the critical moment of battle."

EDG_Firepower_Act_0:0 "Gunpowder Regulation Act"
EDG_Firepower_Act_1:0 "Military-Industrial System Act"
EDG_Firepower_Act_2:0 "Gunboat Diplomacy Act"
EDG_Firepower_Act_3:0 "Divine Punishment Flames"
EDG_Firepower_Act_4:0 "Carpet Bombardment"
EDG_Firepower_Act_5:0 "Sword of the Fire Abyss"
EDG_Firepower_Act_6:0 "World Empire"
EDG_Firepower_Act_7:0 "The People's Artillery"
EDG_Firepower_Act_8:0 "New Order Reforms"
EDG_Firepower_Act_9:0 "Royal Institute of Fortifications, Artillery, and Design"
EDG_Firepower_Act_10:0 "Naryad Corps"
EDG_Firepower_Act_11:0 "The Liechtenstein System"
EDG_Firepower_Act_12:0 "The Path to Victory"
EDG_Firepower_Act_13:0 "Purification Ordinance"

EDG_Firepower_Act_0_desc:0 "Gunpowder is the lifeblood of the state's armies, and the fuse of social unrest. Nationalise saltpetre mines, sulphur mines, and powder mills—standardise the formula, standardise stockpiles, standardise issuance. Every barrel of powder has a serial number; every cannonball is registered in the ledgers. The seal of the Regulatory Bureau is stamped on the shell casings, and also upon the throat of rebellion. The treasury swells through monopoly, society finds stability through control."
EDG_Firepower_Act_1_desc:0 "Casting cannons requires copper and tin; making powder requires saltpetre; transport requires wagons and horses. From mines to workshops, from workshops to ports, from ports to the front—through a series of efforts, our country has established a complete military-industrial chain, capable of autonomously converting raw materials into firepower. Every cannon barrel bears the mark of the miner's sweat, the craftsman's skill, and the merchant's capital. When military industry thrives, all industries thrive; when all industries thrive, the treasury overflows."
EDG_Firepower_Act_2_desc:0 "Behind diplomatic rhetoric lie the gun barrels protruding from warship gunports. Warships armed with heavy cannons patrol the high seas. Whenever trade disputes or territorial conflicts arise, the thunder of naval guns is the most concise language of negotiation. Peace comes from deterrence; concessions are born of fear. Enemies dread the muzzles; allies respect the power. The day the gunboats arrive is the day negotiations begin."
EDG_Firepower_Act_3_desc:0 "Clergy consecrate the artillery; soldiers inscribe the will of faith upon the shells. Sacred mission grants war its legitimacy; flames become the blade that punishes the enemy. Every roar is a judgment upon the blasphemers; every explosion is a manifestation of divine wrath. Where the holy banner points, the fire follows; where faith endures, the flames never die."
EDG_Firepower_Act_4_desc:0 "Concentrate all artillery at the decisive point, expend ammunition without regard to cost, alter the course of a battle in an instant, and tear open the enemy's line with thunderous force. Integrate army field artillery into the assault echelons, expending ammunition without counting the cost in offensive operations. When the density of the barrage exceeds the enemy's endurance, walls crack, formations shatter, and defences collapse as ruin descends from above. First blast, then charge—leave no survivors; scourge the ground with fire, leaving nothing alive. Overwhelming fire itself is the trumpet of the assault."
EDG_Firepower_Act_5_desc:0 "The Fire Abyss is the afterlife punishment repeatedly described in the Quran for the disbelieving, the wicked, and the unjust—a place consumed by all-devouring flames, filled with scalding water, toxic winds, and unremitting torment, the ultimate abyss for those cast out from God's mercy. The Prophet Muhammad (peace be upon him) bestowed upon Ali the legendary sword Zulfiqar, which in just wars represents the sacred power of judgment to defend the true path and strike the rebellious enemy into the Fire Abyss. Yet when believers, driven by selfish desires or factional strife, turn their blades—meant for external foes—upon their own brethren, that sword twists from an instrument of Jihad into a "guide to punishment" that drags the wielder himself into the Fire Abyss. Now, the jurists hold that Allah has granted the Sword of the Fire Abyss to our Caliph, impelling our state toward a new Jihad and the unification of Dar al-Islam."
EDG_Firepower_Act_6_desc:0 "The bow-chasers of expeditionary fleets point toward uncharted coastlines. Artillery is used not only to bombard native fortresses, but also to assert sovereignty and drive out competitors. Colonies take root under the protection of gun batteries; trading posts flourish within range of naval guns. Every cannon roar is a signal that the frontier of civilisation is expanding outward."
EDG_Firepower_Act_7_desc:0 "Our artillery units possess not only the most advanced weapons, but also the most advanced ideas and concepts, employing the most advanced tactics. All artillerists come from the free citizenry; they fight not for feudal lords great or small, but single-mindedly for their peasant brethren—truly the people's artillery."
EDG_Firepower_Act_8_desc:0 "To curb the rising momentum of rival states, Padishah Selim III resolved to begin with the military, training a new-model army to replace the Empire's janissary corps. He procured a shipment of rifles and Western-style artillery, and invited foreign military advisors to train the new troops. Selim III established a new standing army loyal to the monarch. He founded various new military schools—for the army, the navy, and others—and hired foreign instructors to teach. To accommodate the work of the foreign advisors, he also established several military academies with instruction in foreign languages, each with a newly built library stocked mostly with foreign books."
EDG_Firepower_Act_9_desc:0 "Cannon fire tears down the walls of the old age; fortifications withstand the tides of the new. To safeguard the crown's overseas interests, the monarchs of Iberia, from the unification onward, have eagerly recruited Europe's finest military engineers, founding in Lisbon this Royal Institute that combines mathematics, cartography, fortification, and artillery science. Here, noble scions and common geniuses alike study Vauban-style defences, ballistic calculations, and coastal battery design. It is these graduates who have kept bastion after bastion standing through countless sieges, and who have let Iberian artillery roar with the peninsula's fury in every volley."
EDG_Firepower_Act_10_desc:0 "To advance the Tsardom's imperial ambitions, Ivan the "Terrible" greatly strengthened centralisation and pushed military reforms. He established the "Naryad"—meaning "dispatch" or "detachment"—a mission-oriented temporary artillery unit, not a fixed establishment but a provisional formation assembled according to specific operational needs. Personnel were mainly drawn from gunners and early arquebusiers. The Naryad Corps became synonymous with heavy firepower in its time, rendering outstanding service in breaching fortifications, and its operational model laid the foundations for the subsequent regularisation of Russian artillery."
EDG_Firepower_Act_11_desc:0 "In response to the severe artillery deficiencies exposed during the War of the Austrian Succession, Prince Liechtenstein was commissioned to undertake a comprehensive reform of the Imperial Artillery. He personally developed and popularised an elevation screw-adjustment mechanism for gun barrels, greatly improving rate of fire and accuracy; and abolished the dangerous practice of loading loose powder in the open, replacing it with safer and more efficient cartridge bags. Through the "Liechtenstein System," he established new standards for Austria in weapon manufacturing, ammunition supply, and personnel training, elevating the Imperial Artillery to become the "most powerful tool" among Europe's military powers."
EDG_Firepower_Act_12_desc:0 "The coat of arms of the House of Lancaster is a red rose—yet to cast such a rose requires enough blood, and blood is born of war.\n\nForge our legend with the enemy's blood; proclaim our victory with the enemy's blood. Before absolute firepower, the path to victory lies wide open!"
EDG_Firepower_Act_13_desc:0 "The knights of the Blessed Virgin rally beneath the banner of holy war. In the name of the Immaculate Conception, the Crusaders wash away the sins of the blasphemers. Guided by Saint Peter and the Archbishop of Riga, we shall teach the unbelievers with the sacred compassion of Our Lady, and impart to them the doctrine of Christ."

