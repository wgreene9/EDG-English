#Traits
EDG_personality_Grand_LordProtector:0 "Grand Lord Protector"
EDG_personality_Grand_LordProtector_desc:0 "Theodoulos Vatatzes sprang from a cadet branch of the Laskaris lineage, rose through the military ranks, and distinguished himself in the army by his early thirties. After the death of the Sicilian Emperor Isaac IV, he seized power, deposed the feeble young emperor, and—with the backing of the great houses—established the Republic. In the face of Latin invasions, plots between the deposed emperor and Catholic remnants, Theodoulos defeated every enemy, winning national independence and renewal for the Syracusans. Now, he stands ready to lead Syracuse—a nation both ancient and newborn—toward an even greater destiny."
EDG_personality_Grand_LordProtector_die_desc:0 "Theodoulos Vatatzes was the proudest son of Greece. He rebuilt the Syracusan state, saved Orthodox civilisation, revived the republican traditions of the Greek world, and—taking up the mantle of Alexander the Great—launched a new conquest that heralded the Second Hellenistic Age. His tenure in office was flawless, worthy of the title Grand Lord Protector bestowed by the Protectorate Council and all the Greek people. He steered the Syracusan ark, the Noah's vessel of the Greeks, toward distant horizons—undoubtedly the most divinely gifted and martial leader in our nation's history. At this moment, the breath of every Greek is suspended in mourning for his loss."

EDG_personality_LordProtector:0 "Lord Protector"
EDG_personality_LordProtector_desc:0 "This ruler is virtuous in character, resolute in spirit, and exceptional in ability—elected by the Protectorate Council and all the Greek people as the Federal Archon, invested with the same title of "Lord Protector" as the founding father Theodoulos Vatatzes, and sworn to lead the Republic steadily forward along the path of the ancients."
EDG_personality_LordProtector_die_desc:0 "His achievements and virtue are fondly remembered by all who knew him; his deeds shall be recorded in the annals of world history; his bier shall be carried by the Greek people into the Pantheon of Athens."

EDG_personality_Therios:0 "Therios "the Ephesian""
EDG_personality_Therios_desc:0 "Therios Papas was born into a political family in Ephesus, a house that had long held power in the Republic of Smyrna. He received an excellent education, travelling widely along the Aegean coast, even to Pontus and Sicily, to study music, political theory, and philosophy. Born of noble lineage yet never accustomed to ease, he was upright, incorruptible, far-sighted, eloquent, resolute, calm, dignified, and approachable to the common people. He rose to prominence on Smyrna's political stage at a young age, and was appointed Archon of Smyrna in the face of the advancing Turks. He wholeheartedly embraced the Greek nationalism envisioned by the Lord Protector Theodoulos, and pledged his life to that cause. After the Protector departed this world, Therios was elected the new Archon. Compared to Theodoulos, he was more reserved and contemplative, focusing on administrative reform and domestic development—often compared to the ancient Athenian statesman Pericles."
EDG_personality_Therios_die_desc:0 ""

EDG_personality_Andreas:0 "Andreas "Antigonus""
EDG_personality_Andreas_desc:0 "Andreas Gibran was born in a small village outside Antioch. Nearly all his fellow villagers were descendants of Orthodox Christians who had been forced to convert to Islam under duress. Thus, when the federal army approached Antioch, they welcomed the imperial troops with food and drink. It was at this moment that Andreas joined the Syracusan army. From his very first campaigns, he displayed astonishing military talent, rising from the ranks through repeated feats of valour to become commander of the Seleucid Theme. With the Republic's deliberate encouragement, he became a model for former infidels and foreigners, rallying a vast constituency that had long stood outside Syracuse's mainstream political stage. Some of his political adversaries call him "Antigonus"—after the Diadoch warlord who nearly united the Hellenistic world. Though he personally preferred to compare himself to Alexander the Great, his magnanimity led him to accept the epithet; in one speech, he even declared his ambition to surpass Antigonus and rebuild the Hellenistic world."
EDG_personality_Andreas_die_desc:0 ""

EDG_personality_Ignatios:0 "Ignatios "the Saint""
EDG_personality_Ignatios_desc:0 "Ignatios was a virtuous and humble priest, born in the province of Western Colchis. He rose from a lowly clerical post to become abbot of the Glat Monastery, and later entered politics, where he gathered a circle of like-minded individuals through his natural gifts, playing a key role in the Federal-Concordat agreement with the Holy Church. Amid the political storms of the Federation, the military government—under pressure—put forward Ignatios, who had never served in the military, as Archon. While his character was beyond reproach, his profound piety, his inexperience in wielding power, and especially his naïve understanding of the military, left many wondering where he would lead the nation..."
EDG_personality_Ignatios_die_desc:0 ""

EDG_personality_Sotirios:0 "Sotirios "Mithridates""
EDG_personality_Sotirios_desc:0 "Sotirios Komnenos was said to be a scion of the Komnenian dynasty, born into a military family in the province of Pontus. His ancestors had won the epithet "Mithridates" for their role in a revolt that captured the city during the Trebizond campaign. Upon coming of age, Sotirios joined the Federal Defence Forces, serving in the Asian Theme, the Aegyptus Special Region, the Bactrian March, the Indian front, and even spending time in the Elysian territories—his career was immaculate. At the time of the Federal upheaval, Sotirios had been recalled to Syracusae as commander of the Lord Protector's Guard. He swiftly brought the chaos under control, won the trust of both the military and the bureaucracy, and was subsequently elected Lord Protector. Leading his armies into the field, he quickly pacified the disorder. His very name—derived from Christ's title "Saviour"—carried profound pious resonance, and truly, like his namesake, he saved the storm-tossed ship of Syracuse."
EDG_personality_Sotirios_die_desc:0 ""

EDG_personality_Constantinus:0 "Constantinus "the Lawgiver""
EDG_personality_Constantinus_desc:0 "Constantinus Athenios was born into a common family in Attica. He served long years in the Federal Defence Forces, and after his discharge became an administrator, rising to Chief of the Cabinet during the government of Sotirios. By the time Constantinus took office, the Federal administrative machinery was in dire need of reform; the new era's structure had shifted far from the days of Theodoulos and Therios. Thus, he actively responded to the demands of the age, carrying out a comprehensive overhaul of the Federal administrative apparatus and bureaucracy. If Sotirios's martial achievements bore comparison to "Restorer of the World" Aurelian, then Constantinus's civil governance surpassed even Emperor Justinian the Great. He reshaped the Greek spirit and gave the Greek state a living soul."
EDG_personality_Constantinus_die_desc:0 ""

#Leader Traits
edg_sic_grand_lordprotector_personality:0 "§TGrand Lord Protector§!"
desc_edg_sic_grand_lordprotector_personality:0 "This commander is the leader elected by the Protectorate Council and all the Syracusan people. Under his command, we have marched from victory to victory."
edg_sic_grand_lordprotector_personality_die_desc:1 "Before he took up arms, the Greek world still languished under the yoke of foreign peoples; when he passed, all of Greece flourished united beneath the eagle banner of Syracuse."

edg_gre_sword_of_alexandar_personality:0 "§TSword of Alexander§!"
desc_edg_gre_sword_of_alexandar_personality:0 "This commander is held to be the heir of Alexander the Great, renowned for swift conquests and merciless, fiery offensives."
edg_gre_sword_of_alexandar_personality_die_desc:1 "The vast domains he won for the Greek nation shall never be forgotten by any citizen."

#Flagships
EDG_GRE_mass_load_greek_fire:0 "§T@GRE Mass Greek Fire Loadout§!"
EDG_GRE_mass_load_greek_fire_desc:0 "Long before the enemy can take notice, the powerful naval guns of our fleet will have already poured their fire upon their feeble vessels by the most effective means."

#Naval Doctrines
EDG_GRE_greek_fire_fleet:0 "§TGreek Fire Fleet§!"
EDG_GRE_greek_fire_fleet_desc:0 "Greek Fire is a liquid incendiary compound, primarily used in naval warfare. Its base component is petroleum, mixed with sulphur and other substances, enabling it to burn continuously on water and be extremely difficult to extinguish. It is the unique naval art of our fleet."

