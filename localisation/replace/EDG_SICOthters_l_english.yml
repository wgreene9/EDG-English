#Factions
EDG_SIC_MIL_faction:0 "Germanic Faction"
EDG_SIC_MIL_faction_influence:0 "Germanic Faction Influence"
EDG_SIC_MIL_faction_FACTION_DESC:0 "The Germanic Faction originated from the "Mountain Folk" guard formed by Frederick of Malta. Adhering to the Catholic faith with loyalty and resilience, they form the core of the state's military might, controlling the army and leading campaigns with martial prowess.\n§YInfluence grows when we have high army tradition or are at war.§!"

EDG_SIC_ADM_faction:0 "Roman Faction"
EDG_SIC_ADM_faction_influence:0 "Roman Faction Influence"
EDG_SIC_ADM_faction_FACTION_DESC:0 "The Roman Faction—also known as the Greek Faction—traces its origins to the Greek bureaucrats whom Isaac Angelos brought to Sicily. With a long history in the Eastern Empire, they are renowned for their administrative excellence.\n§YInfluence grows when we have high stability and are at peace.§!"

EDG_SIC_DIP_faction:0 "Latin Faction"
EDG_SIC_DIP_faction_influence:0 "Latin Faction Influence"
EDG_SIC_DIP_faction_FACTION_DESC:0 "The Latin Faction represents the native powers of Italia. Long positioned between several great powers, they have honed their skills in diplomacy and trade, playing a pivotal role in our foreign strategy and commercial policy.\n§YInfluence grows when we have high diplomatic reputation.§!"

EDG_Syracusae_MIL_faction:0 "Macedonian Faction"
EDG_Syracusae_MIL_faction_influence:0 "Macedonian Faction Influence"
EDG_Syracusae_MIL_faction_FACTION_DESC:0 "The Macedonian Faction is chiefly composed of federal military elites who graduated from the Macedonian Military Academy, founded by the founding father Theodoulos Vatatzes. They serve directly under the Archon, dominate the war council, and form Syracuse's war party.\n§YInfluence grows when we have high army tradition or are at war.§!"

EDG_Syracusae_ADM_faction:0 "Antiochene Faction"
EDG_Syracusae_ADM_faction_influence:0 "Antiochene Faction Influence"
EDG_Syracusae_ADM_faction_FACTION_DESC:0 "The Antiochene Faction is held to have been founded by Marshal Gibran, an Antiochene who converted from Islam to Orthodoxy. Inheriting his political legacy, they focus on domestic governance, administrative integration, uniting diverse peoples and faiths, and promoting Orthodox belief and a new Hellenic identity.\n§YInfluence grows when we have high stability and are at peace.§!"

