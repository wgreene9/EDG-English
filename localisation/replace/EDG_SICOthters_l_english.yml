#Characters
EDG_GRE_Glasorvsky_effect_tt:0 "A Rus' ambassador will arrive at our court."
EDG_Konstantinos_name:0 "Konstantinos"

#Estates
EDG_Syracusae_estate_burghers_name:0 "Citizens"
EDG_Syracusae_estate_burghers_desc:0 "The concept of "Citizen" originated during the Syracusan War of Independence and, with the rise of Greek nationalism, was established by the Protectorate Council as the legal subject status of the Republic. Bound to the state through shared national identity, Citizens enjoy specific rights—equality, political participation, personal liberty, and socio-economic and cultural entitlements—while bearing corresponding duties: obedience to the law, military service, and taxation. Above all, they owe the Federation their highest political loyalty."

estate_EDG_GRE_Hellenic_Nationalism:0 "§TGreek Nationalism§!"
estate_EDG_GRE_Hellenic_Nationalism_desc:0 "Nationalism is an ideology and social movement that places the nation at the centre of political life, emphasising national identity, loyalty, and solidarity, and typically pursuing national autonomy, unification, or independence. Greek nationalism emerged from the Syracusan War of Independence, drawing upon the dual heritage of ancient Greek civilisation (democracy, philosophy, art) and Orthodox tradition to construct a narrative of "continuity.""
estate_EDG_GRE_Hellenic_Nationalism_tt:0 "All provinces under our rule with the §THellenic§! §Tculture group§! will gain:"
EDG_GRE_Hellenic_Nationalism_modifier:0 "Greek Nationalism"
EDG_GRE_Hellenic_Nationalism_modifier_desc:"§TLet me climb the cliffs of Sounion,\nThat I may hear the whispers passing between us,\nAnd sing my swan-song before I die;\nI want no slave's country for my own—\nBreak that Samian wine-cup now!§!"

estate_EDG_GRE_Elysium_Dream:0 "§TDream of Elysium§!"
estate_EDG_GRE_Elysium_Dream_desc:0 "You are not destined to die in horse-pasturing Argos,\nNor there to receive the end of your fate.\nThe gods shall send you to the Elysian Plain,\nTo the ends of the earth, to golden-haired Rhadamanthys—\nWhere life is easiest, where mortals need no toil,\nNo snow, no winter rain, no long months of cold,\nBut ever the warm west wind that Oceanus sends,\nGently soothing all heroes who have grown old."

EDG_SIC_estate_interracial_name:0 "Greeks"
EDG_SIC_estate_interracial_desc:0 "The Greeks are among Sicily's most ancient civilisational memories. As early as three thousand years ago, they crossed the seas, weathered the winds, and founded city-states, planting olive branches and philosophical thought in the island's fertile soil. Though Romans, Saracens, and Normans followed in turn, the Greeks remained a vital force in Trinacria. From the "Sicilian Vespers" to the "Palermo Incident," the Greeks ruled Sicily for nearly two hundred years, gradually merging with the local population to form a distinctive Greco-Sicilian culture. Greek immigrants brought their language, architecture, and legal traditions, serving as physicians, astrologers, tax officials, and diplomatic interpreters, infusing the court with Byzantine administrative wisdom, while their maritime expertise became key to the kingdom's control over Mediterranean trade routes. Even with the return of the Hohenstaufen royal house, they remain an indispensable part of the realm."

estate_EDG_SIC_interracial_Girko_Community:0 "§OGriko Community§!"
estate_EDG_SIC_interracial_Girko_Community_desc:0 "The "Griko Community" originally referred to the Greek-speaking cultural groups of southern Italy. As early as the 8th century BC, the Greeks founded numerous colonial cities in what was then called "Magna Graecia" in present-day southern Italy—Syracuse, Taranto, Croton, and others. During the Byzantine period, Greek culture gradually revived in the south under Constantinople's rule. Though the Normans later came to rule the Two Sicilies, they did not eradicate the flourishing Greek communities. To this day, we have restored Catholic rule in Sicily without confronting the Greeks head-on, choosing instead cooperation and inclusion. Under our dynasty, the air and sunlight belong equally to all."

estate_EDG_SIC_interracial_Girko_Community_tt:0 "All provinces under our rule located in §OSouthern Italy§! or with the §OByzantine§! §Oculture group§! will gain:"
EDG_SIC_interracial_Girko_Community_modifier:0 "Griko Community"
EDG_SIC_interracial_Girko_Community_modifier_desc:"§OI give the Greeks their due honour,\nNor do I strip the Latins of their wealth,\nShield in hand,\nI protect both sides,\nAnd let neither win unjustly.§!"

EDG_Syracusae_estate_interracial_name:0 "Parochoi"
EDG_Syracusae_estate_interracial_desc:0 "The Parochoi (Perioikoi)—"borderland citizens"—is the collective term for the non-Greek free population incorporated into the Syracusan Republic during its expansion. They come from newly conquered territories or the Federation's margins (initially Italia and Anatolia, later Persia and Iberia), retaining a degree of local autonomy and engaging in commerce, industry, and auxiliary military service, while often excluded from core political power. Their personal liberty is protected by imperial law, and their property rights are equal to those of Greek citizens; they enjoy broad self-governance in local affairs. All this comes at the cost of two obligations: paying higher land and trade taxes than citizens, and providing auxiliary troops proportionally in wartime. Yet this boundary is not fixed. As the state continues to expand, it is foreseeable that ever more Parochoi will ultimately embrace the identity of "Greek Citizen.""

estate_EDG_SIC_interracial_Mercenary:0 "§TEstablish Integrated Legions§!"
estate_EDG_SIC_interracial_Mercenary_desc:0 "The Greek world has only just recovered from the brink of collapse; our people need rest and cannot support large-scale warfare for the Republic. Thus, Lord Protector Theodoulos concluded that we could learn from the military organisation of the Hellenistic states, which also suffered from population shortages: with Greek soldiers as the core, we would widely adopt local military traditions and raise integrated legions from foreign troops."
estate_EDG_SIC_interracial_Mercenary_tt:0 "We will unlock a series of §TIntegrated Legions§! upon completing certain conquest missions."

estate_EDG_SIC_interracial_Generals:0 "§TPromote Foreign Generals§!"
estate_EDG_SIC_interracial_Generals_desc:0 "Since the time of the founding father Theodoulos, the martial tradition has gradually revived among the Greek people. The ancient Greeks honoured the strong and valued ability far above birthplace and bloodline. We should continue this glorious tradition, prioritising merit and welcoming the capable."
estate_EDG_SIC_interracial_Generals_tt:0 "§YRecruiting a general§! will now increase §TParochoi§! loyalty by §Y5 points§!."

estate_EDG_SIC_interracial_Marshal:0 "§TAppoint Grand Marshal§!"
estate_EDG_SIC_interracial_Marshal_desc:0 "The Archon serves simultaneously as leader of the Federal Government, the Protectorate Council, and the National Defence Forces, with a heavy burden of affairs. Perhaps we could promote a capable figure from the military to share the Archon's responsibilities."

estate_EDG_GRE_Illyrian_Hussars:0 "§TIllyrian Dragoon Regiments§!"
estate_EDG_GRE_Illyrian_Hussars_desc:0 "Though the concept of light cavalry formations originated in ancient Rome, it is generally held that the Balkan Hussars first appeared on the historical stage as auxiliary troops of the Eastern Empire, recruited primarily from the Serbian territories under imperial control in the 10th and 11th centuries. Even after Rome's fall, this tradition continued, further refined and perfected over the following centuries, eventually giving rise to the present Illyrian Dragoon Regiments."

EDG_Syracusae_estate_cossacks_name:0 "Rus' People"
EDG_Syracusae_estate_cossacks_desc:0 "The East Slavs originated along the Dnieper River, thriving on the East European Plain, and later merged with the Varangians to form the present Rus' people. From the Baptism of Rus' onward, they gradually integrated into the Orthodox world under Greek leadership, forging an indissoluble bond with us: the Rus' regard the Greeks as elder brothers; the Cyrillic script was created by Greek missionaries; Slavic liturgy was translated directly from Greek, sharing the same sacramental validity. The Greeks, in turn, see the Rus' as close friends; both share the memory of a "suffering people" under foreign rule, maintaining close ties through the Route from the Varangians to the Greeks. This "brotherly peoples" relationship, forged under a common faith, transcends mere cultural exchange and lies at the heart of Orthodox civilisation's inner vitality and dynamism."

estate_EDG_GRE_restore_Varangian_Route:0 "§TRestore the Route from the Varangians to the Greeks§!"
estate_EDG_GRE_restore_Varangian_Route_desc:0 "The Route from the Varangians to the Greeks was a transnational waterborne trade network connecting Scandinavia, Eastern Europe, and the Greek world. It underpinned the economic foundations of Kievan Rus', facilitated the Christianisation of Rus' civilisation, and profoundly shaped the historical trajectory of Eastern Europe. After the 13th century, multiple factors—the rise of the Latin Republics, the fragmentation of Kievan Rus', the collapse of the Roman Empire, and the Mongol invasions—led to the decline of the route, severing the connection between Greeks and Rus' for a time. Now that both our peoples have slowly recovered, it is time to reopen the Route."

estate_EDG_GRE_establish_embassy_in_Russia:0 "§TEstablish an Embassy in Rus'§!"
estate_EDG_GRE_establish_embassy_in_Russia_desc:0 "The importance of the Route from the Varangians to the Greeks is growing daily, and exchanges between the Greek and Rus' peoples have become ever more frequent and close. Some diplomats wish to travel to Rus' to establish an embassy in our name, thereby strengthening relations between our two countries. Our friends have gladly accepted this proposal and have sent their own diplomats in return."

estate_EDG_GRE_study_Siberian_Frontiers:0 "§TAbsorb Rus' Frontier Settlers§!"
estate_EDG_GRE_study_Siberian_Frontiers_desc:0 "The Siberian frontier settlers were armed colonial groups that emerged after the unification of Rus', led by Cossack explorers and driven by the Rus' state's support. Through conquest, fort-building, and fur trade, they brought Siberia into the Rus' fold and shaped the region's Slavisation and economic structure. The Greeks share the Rus' love of exploration, having embarked on their own great voyages as early as antiquity—though with the passage of time, that memory has grown faint. But no matter: our friends will help us relive those pioneering days."

estate_EDG_GRE_joint_military_drill:0 "§TGreco-Rus' Military Integration§!"
estate_EDG_GRE_joint_military_drill_desc:0 "The Streltsy were a standing infantry force created and developed by Rus' monarchs during the mid-15th century civil wars, characterised by fire-armed tactics and a closed communal life combining military and commercial-industrial functions. They were established with the support of the minor and middle nobility who championed unification and centralisation. Divided into two main branches—the capital troops, responsible for Kremlin defence, guard duty, and firefighting; and the municipal troops, garrisoning towns across the realm for border defence and local tasks—their tactics relied on defensive formations, employing volley fire and rotating reloading techniques, earning them the reputation of "movable fortresses." Syracuse is a martial state, eager to learn from the military traditions of all nations and adapt them to our own system. Let us conduct a military exchange with our Rus' brothers and learn their craft."

estate_EDG_GRE_Vodka:0 "§TIntroduce Rus' Spirits§!"
estate_EDG_GRE_Vodka_desc:0 "Vodka is a transparent distilled liquor that originated in Rus' in recent times. Initially circulating in small quantities among monasteries and nobles as a medicine or "water of life," it gradually spread, leading to widespread private distilling among the common folk, becoming a winter staple for warmth and a festive drink. As the Rus' unification progressed and royal power strengthened, Ivan the Terrible established the first "Royal Taverns"; subsequent tsars made vodka production and sale a pillar of state finance under a strict monopoly. Our citizens have also shown keen interest in this spirit beloved by the Rus'. Whether for fiscal reasons or to please the populace, the Lord Protector may consider introducing this special craft."

estate_EDG_GRE_Vodka_tt:0 "\n§TGrain-producing provinces under our rule will adopt vodka production.§!\n"
estate_EDG_GRE_Vodka_INCOME_DESC:0 "From the production of §YAlcohol§! and §YGrain§!"

estate_EDG_GRE_Russian_absolutism:0 "§TStudy Rus' Absolutism§!"
estate_EDG_GRE_Russian_absolutism_desc:0 "Rus' absolutism originated from Mongol rule concepts, germinating in the long night after the fall of Kievan Rus', tempered through the Rus' unification wars, and strengthened by Mikhail III and Ivan the Terrible. Its core is the absolute and sacred inviolability of the Tsar's power, with the state exercising total control over society, economy, and ideology, combined with a distinct centralised political tradition of expansionist drive and messianic mission. In an age when central governments are seizing absolute power from other forces, that the Lord Protector may devote himself undistractedly to building the nation, it would serve us well to study the Rus' model."
 
EDG_Syracusae_estate_nobles_name:0 "Magnates"
EDG_Syracusae_estate_nobles_desc:0 "In the old Eastern Roman Empire—especially in the provinces—magnates were the local elite classes who wielded real power through land wealth, military resources, family networks, or bureaucratic status. They stood between the central imperial authority and the common populace, serving both as pillars of imperial rule and potential sources of centrifugal force. As a militarised state born from the remnants of the Eastern Roman successor states, we must learn from past lessons and not overlook these Greek magnates who command military resources."

estate_EDG_GRE_balance_between_the_Porphyra:0 "§TBalance the§! §PPorphyrogenitoi§!"
estate_EDG_GRE_balance_between_the_Porphyra_desc:0 "The so-called "Porphyrogenitoi" families are the most exceptional among the Greek magnates. Through long and repeated intermarriage with the Roman imperial house—especially with members "born in the Purple"—they have deeply integrated into the imperial blood network, using this to monopolise high offices, control vast lands and private armed forces, and thus exert dominant influence over imperial politics. They are not merely military or landed aristocrats, but a privileged group whose legitimacy and political capital derive from "Porphyrogenite blood"—the ultimate product of the Roman Empire's fusion of dynastic kinship politics with the bureaucratic-military system. The great magnates maintain deeply intertwined interests within the Republic. To ensure the unity of the military government, we should cede some benefits and rally the great Porphyrogenite houses."

estate_EDG_GRE_control_Doukas:0 "§TControl the§! §PPorphyrogenitoi§! §T: Doukas§!"
estate_EDG_GRE_control_Doukas_desc:0 "The Doukas dynasty (1059–1078) was a short-lived mid-Byzantine dynasty of bureaucratic-aristocratic origin, which suffered the catastrophic defeat at Manzikert during its reign. Yet through subsequent support of and long intermarriage with the Komnenian dynasty, the Doukas family retained considerable influence. In 1443, when Roman Emperor Andronikos V ascended the throne, Nikephoros Doukas held substantial power within the Empire. Aware that he might be targeted by the Emperor and that he could not defeat him militarily, he secretly transferred the imperial troops loyal to him and invaded Genoese territories on the Black Sea, establishing the Despotate of Azov. Now the Doukas family has submitted to the Federation; their power networks and political resources shall henceforth serve the cause of the Greek nation, rather than a tottering regime."

estate_EDG_GRE_control_Komnenos:0 "§TControl the§! §PPorphyrogenitoi§! §T: Komnenos§!"
estate_EDG_GRE_control_Komnenos_desc:0 "The Komnenian dynasty (1081–1185) was Rome's last revival dynasty, which rebuilt central authority through military-aristocratic alliances. Its innovative thematic reforms and family-network rule briefly revived the Empire, yet its over-reliance on the aristocracy and its feuds with the West sowed long-term strife. After the 1204 catastrophe, the Komnenoi established the Empire of Trebizond, eking out an existence on the Black Sea coast. By the 14th century, the indolent Grand Komnenoi spent their days in revelry, until the Afshar Turks besieged their golden fortress. Jolted awake, they fled with their treasures aboard ships, abandoning their city and subjects—but many vessels, including that of the cowardly Komnenian emperor laden with the accumulated wealth of his predecessors, were swallowed by the rolling waves of the Black Sea. Now the last scions of the Komnenoi have been found by the Federation; their former power networks and political resources shall henceforth serve the cause of the Greek nation, rather than a ridiculous memory."

estate_EDG_GRE_control_Palaiologos:0 "§TControl the§! §PPorphyrogenitoi§! §T: Palaiologos§!"
estate_EDG_GRE_control_Palaiologos_desc:0 "The Palaiologan dynasty—Rome's last imperial house—ruled during the Empire's long funeral. Though they restored the Empire in 1261, Rome had been reduced to a minor state, and the dynasty was repeatedly torn apart by devastating civil wars and religious strife, unable to hold back the advance of Slavs and Turks, eventually bowing to foreign domination. Now the Palaiologoi have submitted to the Federation; their power networks and political resources shall henceforth serve the cause of the Greek nation, rather than a fragile ideal."

estate_EDG_GRE_control_Angelos:0 "§TControl the§! §PPorphyrogenitoi§! §T: Angelos§!"
estate_EDG_GRE_control_Angelos_desc:0 "The Angelos dynasty (1185–1204) was a short-lived house that rose to power through blood ties after the Komnenian decline. During its reign, the imperial capital fell, and the Empire fractured into multiple Greek and Latin states. In 1411, the military aristocracy led by Michael Angelos launched a rebellion; though defeated by Manuel II, Michael led his forces westward across the sea, secured the support of the Republic of Venice, and conquered Sicily—then still shackled by civil war—establishing an Orthodox Greek kingdom. In 1443, the great Lord Protector Theodoulos deposed the Angelos dynasty and founded the state led by the Protectorate Council—the predecessor of our Syracuse. The Angelos house is now firmly under the Federation's control; their power networks and political resources shall henceforth serve the cause of the Greek nation, rather than an unattainable dream."

estate_EDG_GRE_control_Laskaris:0 "§TControl the§! §PPorphyrogenitoi§! §T: Laskaris§!"
estate_EDG_GRE_control_Laskaris_desc:0 "The Laskaris dynasty (1204–1261) established the Empire of Nicaea—a Roman successor state—in the aftermath of the 1204 catastrophe. By preserving Orthodox Greek culture in desperate times and organising resistance against Latin rule, they laid the foundation for the recovery of the capital. Though ultimately supplanted by Michael Palaiologos, the Laskaris family continued to serve the Basileus within the Empire. In early 1444, Andronikos V appointed Theodore Laskaris as Despot of the Morea, but with support from Venice and Sicily, he eventually rebelled, declared himself Basileus, and set himself against Andronikos. Now the Laskaris family has agreed to the deepest cooperation with the Republic; their power networks and political resources shall henceforth serve the cause of the Greek nation, rather than an evanescent ambition."

estate_EDG_GRE_control_Vatatzes:0 "§TControl the§! §PPorphyrogenitoi§! §T: Vatatzes§!"
estate_EDG_GRE_control_Vatatzes_desc:0 "The Vatatzes dynasty (1222–1261) actually ruled the Empire of Nicaea, inheriting the Laskaris regime through marriage. They pursued prudent economic policies, developed agriculture and trade, and accumulated strength for restoration. Under John III, the state reached its zenith, effectively laying the foundation for the East Roman restoration. In 1443, the Lord Protector Theodoulos—himself of the Vatatzes house—ushered in a new era of Greek history, taking firm control of the family. Their power networks and political resources shall henceforth serve the cause of the Greek nation, rather than a decrepit empire."

estate_EDG_GRE_control_Sassanid:0 "§TControl the§! §PPorphyrogenitoi§! §T: Sassanid§!"
estate_EDG_GRE_control_Sassanid_desc:0 "The Sassanid dynasty (224–651) was the Iranian Empire that coexisted and vied with Rome for 400 years. Its administrative system was highly centralised, with notable achievements in art, architecture, and scholarship, reviving traditional Persian culture—a continuation of Greek civilisation's classical rival. Yet it was eventually conquered by the Saracens. A millennium has sufficed to wash away much; old enmities are but passing clouds. Now the last Sassanid scions have attached themselves closely to the Federation; their power networks and political resources shall henceforth serve the cause of the Greek nation, rather than a fatuous goal."

estate_EDG_GRE_control_Ryurik:0 "§TControl the§! §PPorphyrogenitoi§! §T: Ryurikid§!"
estate_EDG_GRE_control_Ryurik_desc:0 "The Ryurikid dynasty—the founding house of Rus'—with six centuries of rule, has become a national symbol. From Oleg to Saint Vladimir, from Yaroslav to Mikhail III, the Ryurikids have grown ever closer to the Greek and Orthodox world. As civilisation and faith revive after the great calamities, Greece and Rus' have become increasingly inseparable. Now, some powerful Ryurikid princes have settled in the Federation, establishing a new magnate house of considerable political weight. Their power networks and political resources shall henceforth serve the cause of the Greek nation, rather than a fledgling civilisation."

EDG_Syracusae_estate_qizilbash_name:0 "Royal Companions"
EDG_Syracusae_estate_qizilbash_desc:0 ""

EDG_Syracusae_estate_ghulams_name:0 "Frontier Folk"
EDG_Syracusae_estate_ghulams_desc:0 ""

