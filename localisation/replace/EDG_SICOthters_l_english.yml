#Institutes
EDG_SIC_Girko_guild:0 "§TCorinthian Guild§!"
EDG_SIC_Girko_guild_desc:0 "The Corinthian Guild is a merchant association founded by Italiote-Greeks (the so-called "Griko") in Venetia during the latter half of the 15th century. The merchants named it after Syracuse's mother city—Corinth, renowned for its commerce and seafaring. Favoured by the Federation's rulers and drawing on lessons learned from the Latin Republics, the Guild grew rapidly. By the early 16th century, its trade network spanned the entire Mediterranean and even reached into the New World."
EDG_SIC_Girko_guild_localization:0 "Establish the §TCorinthian Guild§!"
EDG_SIC_Girko_guild_localization_short:0 "Corinthian Guild"
EDG_SIC_Girko_guild_localization_full:0 "Corinthian Guild"
EDG_SIC_Girko_guild_enable_flag_tt:0 "Unlock the local organisation '§TCorinthian Guild§!'.\n"

EDG_SIC_Macedonia_Academy:0 "§TMacedonian Academy§!"
EDG_SIC_Macedonia_Academy_desc:0 "The Macedonian Academy was founded in Thessaloniki in 1453. Its first rector and founder was the Syracusan founding father Theodoulos Vatatzes. It was established to educate common young men, focusing on military skills, cultural cultivation, and religious instruction, aiming to produce a corps of pillars of the Federation who remained free of magnate influence and loyal to the Lord Protector."
EDG_SIC_Macedonia_Academy_localization:0 "Establish the §TMacedonian Academy§!"
EDG_SIC_Macedonia_Academy_localization_short:0 "Macedonian Academy"
EDG_SIC_Macedonia_Academy_localization_full:0 "Macedonian Academy"
EDG_SIC_Macedonia_Academy_enable_flag_tt:0 "Unlock the local organisation '§TMacedonian Academy§!'.\n"

EDG_SIC_Academeia:0 "§TSyracusan Academy§!"
EDG_SIC_Academeia_desc:0 "The Syracusan Academy was founded by the renowned scholar Gemistus Pletho, a staunch champion of Greek culture, Orthodox tradition, and Platonic philosophy. The Athenian philosopher Plato once sailed thrice to Syracuse in hopes of realising his ideal republic. Now that the centre of the Greek world has shifted from Athens to Syracusae, his long-cherished wish shall be fulfilled by Syracusan scholars."
EDG_SIC_Academeia_localization:0 "Establish the §TSyracusan Academy§!"
EDG_SIC_Academeia_localization_short:0 "Syracusan Academy"
EDG_SIC_Academeia_localization_full:0 "Syracusan Academy"
EDG_SIC_Academeia_enable_flag_tt:0 "Unlock the local organisation '§TSyracusan Academy§!'.\n"

#Decisions
EDG_SIC_decision_view_tips_title:0 "@SIC§TView Gameplay Tips§!"
EDG_SIC_decision_view_tips_desc:0 "We may always use this decision to view @SIC§GSicily§! gameplay tips."
EDG_SIC_decision_stir_up_ashes_of_kings_title:0 "@SIC§TEmbers of Kings in Chaos§!"
EDG_SIC_decision_stir_up_ashes_of_kings_desc:0 "Use this decision to begin the @GRE§TGreek§! route gameplay for @SIC§GSicily§!."

EDG_SIC_decision_disaster_bonus_sicily_title:0 "The Lord Protector's Wartime Address"
EDG_SIC_decision_disaster_bonus_sicily_desc:0 "Our cause is just, and our path is bright."

EDG_SIC_decision_disaster_bonus_fatimid_title:0 "The Imam's Wartime Address"
EDG_SIC_decision_disaster_bonus_fatimid_desc:0 "Our cause is just, and our path is bright."

EDG_SIC_decision_ambush_capua_title:0 "Raid @PUA Capua"
EDG_SIC_decision_ambush_capua_desc:0 "The Duke of @PUA Capua is brutal by nature, and his subjects have suffered long. We should seize this opportunity to capture Capua swiftly; Naples will surely surrender at the mere sight of our advance."
unlock_EDG_SIC_decision_ambush_capua_tt:0 "Unlock decision: §TRaid @PUA Capua§!"
EDG_SIC_ambush_capua_decision_tt:0 "We will stealthily cross the §YStrait of Messina§! at the cost of two regiments.\n\n§RNote§!: Using mercenaries to execute this decision will convert them into regular troops."

EDG_SIC_decision_ambush_calabria_title:0 "Raid @CBI Calabria"
EDG_SIC_decision_ambush_calabria_desc:0 "The Duke of @CBI Calabria is sharp and resolute—a formidable foe. We must cut his supply lines and strike directly at his stronghold."
unlcok_EDG_SIC_decision_ambush_calabria_tt:0 "Unlock decision: §TRaid @CBI Calabria§!"

EDG_SIC_decision_ambush_genoa_title:0 "Raid @GEN Genoa"
EDG_SIC_decision_ambush_genoa_desc:0 "The capture of the @GEN Genoese duke and the mutiny of his army have left the state utterly defenceless. We should seize this golden opportunity to march straight for Liguria."
EDG_SIC_decision_ambush_aegean_title:0 "@CRT Wrath of the Aegean"
EDG_SIC_decision_ambush_aegean_desc:0 "Since the Fourth Crusade, the unjust rule of the Latins has persisted for over two hundred years across the Aegean isles. Yet the Greeks have never been tamed. If we can spare the resources to offer help, the local Greeks will rise up of their own accord and drive out their Venetian lords."
EDG_SIC_decision_ambush_corfu_title:0 "@CEP Corfu Incident"
EDG_SIC_decision_ambush_corfu_desc:0 "@CEP Corfu is the Republic of Venice's bridgehead into the Greek world, and also the obstacle barring our entry into the Adriatic. Fortunately, its people are Greek compatriots resentful of Latin rule. With but a gentle push, they will open for us the gates to Venice's heartland."
EDG_GRE_decision_Player_Form_Syracusae_title:0 "@GRE Form the Syracusan Republic."
EDG_GRE_decision_Player_Form_Syracusae_desc:0 "\"If not today, then surely tomorrow!\"\n\nSoar high, Dorian eagle!"

EDG_GRE_decision_see_province_group_title:0 "@GREView §THellenic§! Province Group"
EDG_GRE_decision_see_province_group_desc:0 "This is an auxiliary decision for viewing purposes only."
EDG_GRE_for_viewing_only_tt:0 "§TThis decision is for viewing only.§!"

EDG_GRE_decision_rename_to_Hellas_title:0 "@GREChange Country Name to §TGreece§!"
EDG_GRE_decision_rename_to_Hellas_desc:0 "The exiles of Corinth from two thousand years ago have returned to their homeland."

EDG_GRE_decision_restore_Varangian_Route_title:0 "@GRERestore the Route from the Varangians to the Greeks"
EDG_GRE_decision_restore_Varangian_Route_desc:0 "The Route from the Varangians to the Greeks was a vital trade artery between the Greeks and the Rus'. Severed by centuries of decline and war, it is now time to restore this ancient commercial path."
EDG_GRE_Varangian_Route_Nodes_Controlled_tt:0 "Our nation controls the right of passage through the §Tkey nodes of the Route from the Varangians to the Greeks§! §g(provinces highlighted by the decision)§!"
unlock_estate_EDG_GRE_restore_Varangian_Route_tt:0 "Unlock §TRus' People§! privilege: §TRestore the Route from the Varangians to the Greeks§!"
EDG_GRE_Varangian_Routes_Trade:0 "@GRE§TRestorer of the Route from the Varangians to the Greeks§!"

EDG_GRE_decision_Russian_Embassy_title:0 "@GREDispatch Embassy to Rus'"
EDG_GRE_decision_Russian_Embassy_desc:0 "As Syracusan-Rus' cooperation grows ever closer, some officials propose that our two countries establish permanent embassies in each other's capitals as a testament to our mutual friendship."
unlock_estate_EDG_GRE_establish_embassy_in_Russia_tt:0 "Unlock §TRus' People§! privilege: §TEstablish an Embassy in Rus'§!"
EDG_GRE_Russian_Alliance_add_trust_tt:0 "Our §TRus' ally§! will gain §Tmutually§! §T10§! §Yfavour§! and §Ytrust§! with us."

EDG_GRE_decision_study_Siberian_Frontiers_title:0 "@GREExchange Frontier Settlement Experiences"
EDG_GRE_decision_study_Siberian_Frontiers_desc:0 "While our expedition teams are busily launching the Elysian exploration movement, our Rus' allies are also pushing forward with frontier settlement in the icy wilderness of Siberia. Perhaps we can exchange exploration experiences to accelerate our colonial efforts."
unlock_estate_EDG_GRE_study_Siberian_Frontiers_tt:0 "Unlock §TRus' People§! privilege: §TAbsorb Rus' Frontier Settlers§!"

EDG_GRE_decision_study_Vodka_title:0 "@GREIntroduce New Distilling Techniques"
EDG_GRE_decision_study_Vodka_desc:0 "The rulers of Rus' have established a monopoly on a distilled spirit called vodka, reaping great profits through its production and distribution. Wine is an old hero—the more we drink, the bolder we become. We shall not stand on ceremony."
unlock_estate_EDG_GRE_Vodka_tt:0 "Unlock §TRus' People§! privilege: §TIntroduce Rus' Spirits§!"

EDG_GRE_decision_study_streltsy_title:0 "@GREAdopt the Streltsy System"
EDG_GRE_decision_study_streltsy_desc:0 "The Streltsy are a unique Rus' military branch whose organisation and tactics offer valuable lessons for us. Some military advisors and generals have proposed that the Lord Protector conduct a military exchange with our Rus' allies to learn from the Streltsy system."
unlock_estate_EDG_GRE_joint_military_drill_tt:0 "Unlock §TRus' People§! privilege: §TGreco-Rus' Military Integration§!"
EDG_GRE_decision_streltsy_commanders_capital_tt:0 "15 units of §TStreltsy Infantry§! will be raised in our capital."

EDG_GRE_decision_study_Russian_absolutism_title:0 "@GREEmulate Rus' Absolutism"
EDG_GRE_decision_study_Russian_absolutism_desc:0 "The Rus' have developed the ideology of absolutism, and this age belongs to the absolute authority of the ruler. To ensure the Lord Protector's commands are better enforced, we should learn from them without hesitation."
unlock_estate_EDG_GRE_Russian_absolutism_tt:0 "Unlock §TRus' People§! privilege: §TStudy Rus' Absolutism§!"

EDG_GRE_decision_befriend_Morea_title:0 "@MOECultivate Relations with §TMorea§!"
EDG_GRE_decision_befriend_Morea_desc:0 "In 1443, Andronikos V entrusted Theodore Laskaris with the defence of the Morea, appointing him Despot. Yet Theodore secretly secured the support of Venice and Sicily, rebelled against Andronikos, declared himself Basileus as Theodore III, and openly opposed Constantinople. Sicily and the Despotate of Morea share the same stance—opposition to the Constantinopolitan regime and the Latins. More importantly, Theodore's Laskaris house and the Lord Protector's Vatatzes house both spring from the Nicaean imperial line, bound by blood; the Lord Protector is in fact his cousin-uncle. Our two nations are natural allies and should unite."

EDG_GRE_decision_Contact_Smyrna_title:0 "@SUGCultivate Relations with §TSmyrna§!"
EDG_GRE_decision_Contact_Smyrna_desc:0 "In the Anatolian homeland ravaged by the Turkish wolves, a single Greek state still survives—the Republic of Smyrna. Abandoned by Constantinople, they, like us, refuse to obey the pseudo-emperor in Thrace, standing alone against the infidel. In the past, Sicily, with its eyes fixed on the Roman throne, overlooked these brothers of our own flesh. Now, we who hold Greek glory dearer should unite with her."

EDG_GRE_decision_Form_Syracusae_title:0 "@GREForm Syracuse"
EDG_GRE_decision_Form_Syracusae_desc:0 "\"If not today, then surely tomorrow!\"\n\nSoar high, Dorian eagle!"

EDG_GRE_decision_support_NOM_title:0 "@NOMSupport the §TNomes§!"
EDG_GRE_decision_support_NOM_desc:0 "After the collapse of the Sahada dynasty, Mamluk warlords once again dominated the Near Eastern order. The Malik of Egypt, determined to learn from past lessons, sought to curb Mamluk power and established multiple military districts across the realm called "Nomes," whose military governors were Greek officers directly appointed by the sovereign. Since the Arab invasions, Greek influence in Egypt had never been so high. We must seize this opportunity to support our Greek brethren in Egypt in securing greater gains."

EDG_GRE_decision_vassalize_Morea_title:0 "@MOEBlood of the Dorians"
EDG_GRE_decision_vassalize_Morea_desc:0 "The ancient Greeks were not a single people, but were divided into four main tribes (or dialect groups). This division was based primarily on the ancient Greek dialects they spoke and the genealogies of Hellen's four sons in myth. Among them, the Dorians—descendants of Dorus—were renowned for valour, strict discipline, and a militarised society. Syracuse's mother cities, Corinth and Sparta, both belonged to the Dorian tribe. The long river of history once buried the ancient Greek world, but now the time has come: both Trinacria and Lacedaemon have broken free from Roman rule, and both are even governed by the Laskaris lineage. Thus, the peoples of our two nations agree that Syracuse and Morea must stand united against any potential threat."

EDG_GRE_decision_vassalize_Smyrna_title:0 "@SUGWatch of Ephesus"
EDG_GRE_decision_vassalize_Smyrna_desc:0 "Ephesus, located on the western coast of Asia Minor, was one of the twelve Ionian cities, said to have been founded by the Athenian prince Androclus. King Croesus of Lydia donated funds to build the Temple of Artemis, making it one of the Seven Wonders of the Ancient World. After Alexander the Great's eastern campaign, Ephesus was ruled by his successors. In 133 BC, the city was incorporated into Rome and became the capital of the province of Asia, with a population of over 200,000 and magnificent buildings such as the Library of Celsus. The Apostle Paul preached here for three years; the Apostle John spent his later years here, and the Virgin Mary is also said to have lived out her old age nearby. The Third Ecumenical Council was convened here in AD 431. Yet ancient Ephesus had long since decayed and been abandoned over the centuries. Beside the ruins of old Ephesus, a group of Greeks abandoned by the Roman Empire established a "New Ephesus"—the Republic of Smyrna. Now, the onslaught of the Turks has placed it in grave danger. We must protect the Smyrnans and ensure the safety of our Greek brethren."

EDG_GRE_descion_Suez_Cannal_title:0 "@GREConstruct the §TPtolemaic Canal§!"
EDG_GRE_descion_Suez_Cannal_desc:0 "The canal connecting the Mediterranean and the Red Sea dates back to the 12th Dynasty of ancient Egypt. Senusret II and III (whose names are the origin of the word "Suez") first excavated a canal from the Gulf of Suez to the Nile in an attempt to link the Red Sea and the Mediterranean, but without success. In 600 BC, Pharaoh Necho II restarted the project, only to suspend it due to war. Under Greek rule, in 270 BC, Pharaoh Ptolemy II reopened the canal and added locks, but after a thousand years, the Ptolemaic Canal was abandoned due to silt accumulation. In recent decades, the Venetians attempted to negotiate with the Sahada dynasty—which controlled Egypt and Syria—to build a canal, but the talks ended in discord. Now, with Syracuse backing the Nomarch military government's control over Egypt, the reopening of the Ptolemaic Canal has finally been placed on the Protectorate Council's agenda. After careful deliberation and survey, the Lord Protector has decided to revive the Ptolemaic Canal between Clysma and Bubastis, connecting the Mediterranean and the Red Sea at a stroke."

EDG_GRE_descion_Cimmerian_agriculture_title:0 "@AZORevival of Black Sea Agriculture"
EDG_GRE_descion_Cimmerian_agriculture_desc:0 "In classical times, the local grain production of Greek city-states such as Athens could no longer feed their entire populations. The Black Sea's northern shores—such as the Dnieper basin and the Tauric Peninsula—where the Cimmerians had once practised extensive farming, were transformed by Greek intensive techniques into the "breadbasket" of the ancient Greek world. The grain (mainly wheat) exported from here fed the citizens of Athens and other city-states, sustaining the prosperity of the Hellenic world. Agricultural prosperity is vital to any nation. Today, after centuries of nomadic raids and pillage, the farmlands along the Black Sea coast lie abandoned and sparsely populated. We must revive Black Sea agriculture in time to ensure the Republic's food security."

EDG_GRE_decision_vassalize_Azov_title:0 "@AZODream of Tauris"
EDG_GRE_decision_vassalize_Azov_desc:0 "In 1443, upon the accession of Roman Emperor Andronikos V, Nikephoros Doukas held considerable power within the Empire. Yet he knew he might be targeted by the Basileus and that he could not defeat the young and accomplished Andronikos militarily. He therefore secretly transferred the troops loyal to him, joined forces with a mercenary company and the Gothic rulers of Theodoros, and seized Genoese territories on the Black Sea coast—thus reviving the Bosporan Kingdom in Tauris. With the fall of the Eastern Empire and the rise of Greek national consciousness, the Doukas family ultimately abandoned their pursuit of the imperial throne. We should seize this opportunity to extend an offer of union to them."

EDG_GRE_descion_Landsia_Silk_title:0 "@GREDevelop Caspian Industries"
EDG_GRE_descion_Landsia_Silk_desc:0 "As a key node on the ancient Silk Road, the Caspian coastal region has long been a hub of trade, where diverse artistic styles and weaving techniques converged. Among them, Tabaristan was renowned as the centre of Persian carpet production. Due to prolonged fragmentation and war, the carpet industry has contracted and declined. To ensure the prosperity of our Persian territories, the Lord Protector has resolved to help the Iranians revive this traditional craft."

EDG_GRE_descion_Pannonian_Methorian_title:0 "Establish the @RMN Pannonian March"
EDG_GRE_descion_Pannonian_Methorian_desc:0 "The Danube is the northern bulwark of Greek civilisation. The local Magyars and Dacians detest their German rulers. Let us exploit this sentiment to support them in establishing an @RMN Pannonian March to guard our frontiers."

EDG_GRE_descion_Rhipaion_Methorian_title:0 "Establish the @GK6 Rhipaean March"
EDG_GRE_descion_Rhipaion_Methorian_desc:0 "The Alps are the western bulwark of Greek civilisation. The local Swiss detest their German rulers. Let us exploit this sentiment to support them in establishing a @GK6 March to guard our frontiers."

EDG_GRE_descion_recontrol_Nicaea_title:0 "@GK2Return to Nicaea"
EDG_GRE_descion_recontrol_Nicaea_desc:0 "Glorious Nicaea, great Nicaea, beautiful Nicaea—the cradle of the Greek awakening, the foundation of the Laskarid emperors. After nearly two centuries of Ottoman Turkish occupation, she has at last returned to the hands of the descendants of John III."

EDG_GRE_descion_vassalize_Egypt_title:0 "@NOMUnite with the Nomarch Military Government"
EDG_GRE_descion_vassalize_Egypt_desc:0 "With our nation's vigorous support, the Greeks have once again secured a foothold in Aegyptus, establishing a military government akin to our own. The Protectorate Council unanimously agrees that the time has come to reap what we have sown. The Lord Protector shall dispatch a request for union to our southern brethren."

#Titles
EDG_GRE_LORDPROTECTOR:0 "Lord Protector"
EDG_GRE_GRAND_LORDPROTECTOR:0 "Grand Lord Protector"
EDG_GRE_GREAT_LORDPROTECTOR:0 "Great Lord Protector"

#Province Groups
Hellas_province_group:"§T@GRE Hellenic World§!"

#Modifiers
EDG_SIC_Fatimid_integrate_sicily_modifier:0 "Integrating Sicily"
desc_EDG_SIC_Fatimid_integrate_sicily_modifier:0 "Seizing Sicily and absorbing it in an instant."
EDG_SIC_loyal_Sicily_modifier:0 "Kalbid Autonomous Region"
desc_EDG_SIC_loyal_Sicily_modifier:0 "§TTo be a dog of His Majesty the Fatimid Caliph is the greatest honour I could ever wish for!§!"
EDG_SIC_Reforms_of_Issac:0 "Reforms of Isaac IV"
desc_EDG_SIC_Reforms_of_Issac:0 "Emperor Isaac IV, of martial and sagacious brilliance, was a sovereign of a generation... yet his years were cut short, and his noble aspirations unfulfilled—how sorrowful!"
EDG_SIC_Inner_Troubles:0 "§RRule Crisis§!"
desc_EDG_SIC_Inner_Troubles:0 "\"When rulers quarrel and factions arise, they cease to be guardians of the city and become its greatest bane. For they hold power, and their discord brings far greater calamity than that of the common people.\""
EDG_SIC_intervene_sicily_civil_war_modifier:0 "Intervening in the Two Sicilies Civil War"
desc_EDG_SIC_intervene_sicily_civil_war_modifier:0 "We shall ensure that we reap the greatest benefit from the Two Sicilies civil war."
EDG_SIC_Fatimid_Support_modifier:0 "Fatimid Wartime Aid"
desc_EDG_SIC_Fatimid_Support_modifier:0 "The debt of gratitude to the timid mushroom can never be fully repaid."
EDG_SIC_PUA_lose_capital_modifier:0 "Capital Lost"
desc_EDG_SIC_PUA_lose_capital_modifier:0 "All is lost..."
EDG_SIC_rebuild_country_modifier:0 "Rebuilding the Nation"
desc_EDG_SIC_rebuild_country_modifier:0 "TODO"
EDG_SIC_end_disasters_modifier:0 "Dawn of Revival"
desc_EDG_SIC_end_disasters_modifier:0 "TODO"
EDG_GRE_back_home:0 "Longing for Home"
desc_EDG_GRE_back_home:0 "§T\"Even if I have only heard of my homeland Ithaca—that land of hills and verdant groves—I would be willing to die at once.\"§!"
EDG_GRE_Byzantium_province_modifier:0 "The Second Heart of the Greek World"
desc_EDG_GRE_Byzantium_province_modifier:0 "§TByzantion, you sit amidst Poseidon's pastures,\n\nGolden shoals are your eternal crown.\n\nYou guard the throat of the Black Sea,\n\nAnd every ship that returns safely pours libations to your name.§!"
EDG_GRE_Athen_province_modifier:0 "§TClassical City§!"
desc_EDG_GRE_Athen_province_modifier:0 "§TMay this city-state forever flourish,\n\nMay she share in Zeus's justice in war,\n\nMay the gods bless this land,\n\nAnd make it the glory of the Greeks.§!"
EDG_GRE_Kill_Arta_modifier:0 "§RVengeful Fury§!"
desc_EDG_GRE_Kill_Arta_modifier:0 "§RNot out of greed for their land, nor thirst for their wealth—but because the feet of the Latins have defiled the City of God, and we must wash every bloodstained stone with fire.§!"
EDG_GRE_reconquer_North_Epirus_modifier:0 "§TGreece Will Not Forget§!"
desc_EDG_GRE_reconquer_North_Epirus_modifier:0 "§TWe shall not forget it,\n\nNorthern Epirus of Greece,\n\nWe have helped her regain her freedom.§!"
EDG_GRE_Thessaly_Stud_Farm_modifier:0 "Thessalian Horse Ranch"
desc_EDG_GRE_Thessaly_Stud_Farm_modifier:0 "§GOn the plains of Pharsalos,\n\nHorses race like the wind,\n\nTheir manes gleaming in the sunlight,\n\nLike the shimmer of the Peneios.§!"
EDG_GRE_raise_Thessaly_warhorse:0 "Thessalian Warhorses"
desc_EDG_GRE_raise_Thessaly_warhorse:0 "\"These horses are the most beautiful and majestic, whiter than snow, running swift as a whirlwind—the finest steeds of dawn and sunlight.\""

EDG_GRE_Elysium_fund:0 "Elysian Exploration Fund"
desc_EDG_GRE_Elysium_fund:0 "Wow, someone actually reads the description?"
EDG_GRE_Rejuvenate_Magna_Graecia:0 "Rebirth of Magna Graecia"
desc_EDG_GRE_Rejuvenate_Magna_Graecia:0 "§TWhere shoals of fish shimmer like silver coins,\n\nWhere harbours curve like crescent moons,\n\nThere lies the table of the Cumaeans,\n\nThere lie the pastures Apollo has bestowed.§!"
EDG_GRE_Banish_Latin_Republics:0 "Abolish the Latin Republics"
EDG_GRE_expel_crusaders:0 "Destroy the Crusaders"
desc_EDG_GRE_expel_crusaders:0 "§RMay their memory perish forever in the Eastern churches,\n\nUntil they return what they have stolen and repent what they have defiled—\n\nBut who can return a city that has been burned?§!"
EDG_GRE_Hellenic_Revenge_on_Latin_modifier:0 "§R@GRE Revenge of the Greeks§!"
desc_EDG_GRE_Hellenic_Revenge_on_Latin_modifier:0 "Our Greek bones are flint—with every strike, we spark new §Rflames§!. When the §Rflames spread across the land§!, those who once trampled us with their feet will run with their own feet, because our §Rflames§! will overtake them."
EDG_GRE_Destroy_Nova_Rome:0 "Empire Falls"
desc_EDG_GRE_Destroy_Nova_Rome:0 "They ruled for a millennium in the name of Rome; we have ended that millennium in the name of Greece."
EDG_GRE_Save_Hellas:0 "§TSaving Greece§!"
desc_EDG_GRE_Save_Hellas:0 "Time flows, cycles turn—at last, Greece is ours once more."
EDG_GRE_Bulgarian_Butcher:0 "Butcher of Odrysia"
desc_EDG_GRE_Bulgarian_Butcher:0 "§RYou ask why the mountains are so silent?\n\nBecause fourteen thousand tongues can no longer answer.\n\nYou ask why the river runs so red?\n\nBecause the blood from the Bulgars' eye sockets has dyed the source of the Aemos.§!"
EDG_GRE_Stick_to_True_Faith: "Pure Faith"
desc_EDG_GRE_Stick_to_True_Faith: "...Yet perhaps this is not the optimal path."
EDG_GRE_gift_of_Mithras:0 "Gift of Mithras"
desc_EDG_GRE_gift_of_Mithras:0 "To Mithras, the unutterable,\nLord of the Sun, Keeper of Covenants.\n\nThe names of the gods can be translated,\nBut your name,\nWe whisper only in the caves."
EDG_GRE_Ducate_of_pontus_modifier: "Pontic Theme"
desc_EDG_GRE_Ducate_of_pontus_modifier:0 "Pontus is the midpoint of the world—\n\nNot East, not West,\n\nThe place where winds from every direction blow,\n\nAnd where winds from every direction cannot be bothered to linger."
EDG_GRE_NOM_Ducate:0 "Aegyptian Theme"
desc_EDG_GRE_NOM_Ducate:0 "Rise, Nomes!"
EDG_GRE_MOE_Ducate:0 "Peloponnesian Theme"
desc_EDG_GRE_MOE_Ducate:0 "Rise, Spartans!"
EDG_GRE_AZO_Ducate:0 "Black Sea Theme"
desc_EDG_GRE_AZO_Ducate:0 "Rise, Taurians!"
EDG_GRE_BAC_Ducate:0 "Bactrian Theme"
desc_EDG_GRE_BAC_Ducate:0 "Rise, Bactrians!"
EDG_GRE_TAB_Ducate:0 "Hyrcanian Theme"
desc_EDG_GRE_TAB_Ducate:0 "Rise, Mazandaranis!"
EDG_GRE_Supprot_Noms:0 "Supporting the Nomes"
desc_EDG_GRE_Supprot_Noms:0 "\"The Malik's guard includes many men from Greece. They are called 'Juruji'—archers, swordsmen, and craftsmen who know how to make Greek Fire. They do not speak Arabic, do not intermarry with the locals, and live in a quarter outside Cairo called 'Little Byzantion.' Their church is small, yet it keeps the Greek rites.\""
EDG_GRE_Alexandar_Diadoch:0 "Successor"
desc_EDG_GRE_Alexandar_Diadoch:0 "\"When I left, I carried nothing; when I returned, I carried nothing—except what the people of this land were willing to give me.\""
EDG_GRE_Philhellenism:0 "Philhellenism"
desc_EDG_GRE_Philhellenism:0 "The name "Greek" no longer belongs to a race, but to a kind of intellect. Those who receive our education are more worthy of the name "Greek" than those who merely share our blood.\n\nIf someone asks: who is the true Greek? My answer is: those who love Greece.\n\nWherever they were born, whatever language their fathers spoke—so long as they are willing to learn our culture, emulate our institutions, and follow our gods, they are our brethren.\n\nAnd if some among them can also take up arms and fight the barbarians alongside us—those men deserve to be carved upon the most glorious stone."