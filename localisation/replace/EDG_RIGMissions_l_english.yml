rig_one_country_title:0 "One Lord, One Country" # One Sphere, One Faith
rig_one_country_desc:0 "This day has come at last. We have crossed the ruins of every kingdom, forded every river that cut the continents apart, climbed every mountain that separated the peoples. When the last enemy lowered its banners, when the last alien city handed its keys to Riga, when we stood on the cliffs at the edge of the chart and looked back upon our path, what we saw was no longer a divided land—but an entire earth stitched together by the cross.\nThis day, kings who once knelt before heathen altars laid their crowns at the feet of Riga's Archbishop; peoples who once prayed by the Quran and the Torah now received the Eucharist in the same church; tribes once hostile over colour, tongue, and custom now traded in the same market, their children learning the same lessons in the same school.\nThis day, the bells rang out. In every church, every monastery, every tower, the bronze bells were pulled at the same instant; the sound broke through every sky, shook every valley, like a thunder that had been gathering since creation and at last burst from the clouds. The north's bells were low as the earth's own heartbeat; the south's bells were clear as cracking glaciers; the east's bells were long as camel bells on the Silk Road; the west's bells were deep as the surge of the ocean. They met above the heavens, wove together beneath the vault of the sky, then swept like a storm across all the plains torn by war, all the cities scorched by hatred, all the villages buried by oblivion.\nThis day, Riga's performance has reached its final chapter. The stage no longer echoes with the clash of swords, nor with the battering of rams against gates. The final scene is a world re-stitched: all things returned to their proper places, all peoples at peace in their proper dwellings; swords beaten into ploughshares, chasms turned into thoroughfares; every tongue finding its own syllable within the same hymn. The final toll of these bells shall serve as the prelude to the first liturgy of a new heaven and a new earth, without end.\n§O'The kingdom of the world has become the kingdom of our Lord and of His Christ, and He shall reign forever and ever.'§!"
rig_one_country.tt:0 "§RThe performance reaches its final chapter§!\n\nWe will annex all subjects except §YRigaeria§! within §Y30§! days, and §YRigaeria§! will also annex all subjects under its control"

