rig_universal_declaration_title:0 "§RUniversal Declaration§!"
rig_universal_declaration_desc:0 "She was broken in the crevices of the frozen lake; she curled into ashes in the flames of her own burning; she choked in the mire of civil war. Some thought her dead, never to rise again. But now, this small town that once huddled on the banks of the Daugava has carved its name across the cliffs from the Atlantic to the Pacific. The assemblies of the nations shall be rebuilt in her squares; the proverbs of all peoples shall be copied in her schools. Those who bound her, she has thrown off; those who tormented her now bow before her; those who exiled her have returned to kneel at her gates for shelter; and those who sought to destroy her have been swept away by her thunderous wrath. When a city carries the foundation of the whole world, she is no longer merely a city, but a landmark for the entire world. May what rose from the ashes allow all brothers still deep in the ashes to lift their eyes toward the dawn."
rig_universal_declaration.tt:0 "We will be able to convert subjects into §Ybishopric§! subjects unconditionally and without cost\n\nAll §Ybishopric§! subjects will no longer occupy diplomatic relation slots\n\nUnlocks the decision §YHeavenly Offensive§!\n\n§YGreat Campaigns§! will no longer enter a §Ycooldown§! after declaring war"

