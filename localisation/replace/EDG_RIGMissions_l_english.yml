l_english:
rig_benefit_of_sword_title:0 "Edge of the Sword"
rig_benefit_of_sword_desc:0 "The Livonian Order has long protected us, building a bulwark around Riga's walls with sword and blood. Let us draw wisdom from their victories and defeats, turning these hard-won lessons to our own advantage."

rig_eve_of_war_title:0 "Ante Bellum" # The Eve of War
rig_eve_of_war_desc:0 "Riga's present state is far from secure. Though Eastern Europe currently lacks a dominant power, this state of affairs will not last. We must arm ourselves and unite every possible ally to defend what is ours."

rig_stabilze_country_title:0 "Stabilize the City Internally"
rig_stabilze_country_desc:0 "Within Riga's walls, stability is fragile. Before we reach outward, we must first steady our own foundations."

rig_baltic_union_title:0 "Baltic Union"
rig_baltic_union_desc:0 "After a season of administrative integration, we and the knightly orders have grown accustomed to one another's military and political systems. It is time to reclaim the initiative in the Baltic."

rig_furor_treatment_danzig_title:0 "Dealing with the Prussians" # Dealing with the Prussian Confederation
rig_furor_treatment_danzig_desc:0 "Due to the Teutonic Order's mismanagement of Danzig, several cities within its territory have grown discontent. Perhaps we should address this thorny issue first."

rig_furor_teutonicus_title:0 "Furor Teutonicus"
rig_furor_teutonicus_desc:0 "The Teutonic Order has earned a name for belligerence, waging wars across centuries and amassing a wealth of combat experience. If we can weave these lessons into our training, our soldiers will stand all the taller."

rig_pru_confederation_curtailed:0 "If §Ythe Teutonic Order§! is our subject, we will unlock a decision to handle the §YPrussian Confederation§!."
teu_allready_pru_confederation_curtailed:0 "We have already dealt with the Prussian Confederation issue."

rig_under_the_sword_title:0 "Under the Sword"
rig_under_the_sword_desc:0 "The Grand Duchy of Lithuania, worn down by years of infighting, is now hollowed—its armies thin, its nobles divided. This is the hour of reckoning. Strike now, and cast Lithuanian power from Aukštaitija and Samogitia!"

rig_riga_conference_title:0 "The Council of Riga"
rig_riga_conference_desc:0 "Unlike the old way of ruling where every province is drawn tight under a single crown, Riga will carve a new path—a great web of vassals bound by faith and sword. We convene this council to plot our course forward, laying the cornerstone for a Land of Mary that may one day draw all nations under its wings."

rig_city_of_faith_title:0 "City of Faith"
rig_city_of_faith_desc:0 "The Lord says: 'I am the vine, ye are the branches: He that abideth in me, and I in him, the same bringeth forth much fruit.' It is faith that sustains us. After the banners of the Northern Crusades sank beneath the ice, it was faith that lifted Riga from the ashes, pressing onward—delivering both the Gospel and the sword to far shores. The mission is not ended, for the One who calls us has not changed. May every soul who passes through Riga's gates see that its stones bear not only merchants' ledgers, but also the prayers of saints. A city built on faith will not be shaken."

rig_unruly_city_title:0 "Unruly City"
rig_unruly_city_desc:0 "Across the map of Europa, bishoprics are not rare. But a bishopric that weaves the zeal of commerce with the calling of mission—that is found only in Riga. Here, the merchants' routes are the swiftest channels for the Gospel. Monks learn their sums; the bells of the cathedral ring in rhythm with the cries of the docks. The Archbishop himself receives foreign traders at his table, and amid talks of tariffs, men also speak of John the Baptist's call to repentance. In Riga, faith does not hide behind high monastery walls—it walks into the markets, the wharves, the workshops, the fairs. In Riga, the chime of every silver coin echoes with the sound of psalms."

rig_road_to_riga_title:0 "All Roads Lead to Riga"
rig_road_to_riga_desc:0 "The age of the Hanseatic League sinks beneath the North Sea. But Riga will not let the trade-woven nets of centuries be shattered on the waves. Instead, we shall tie every broken strand anew, spinning a net wider, denser, stronger than before—and at its center, not Lübeck, but Riga. Roads to every nation will spread from Riga's piers: west to the wool-looms of England; north to the cod-wharves of Norway; south to the mines and vineyards of Germany; east to the furs and cattle of Rus'. Let the merchants of all lands say: 'To Riga—for there is both good and goods in abundance.'"

rig_heart_of_baltic_title:0 "Heart of the Baltic"
rig_heart_of_baltic_desc:0 "Decades have passed like the tides of the Baltic—rising, falling, rising again. Many ships have foundered in storms, many swords have shattered against walls, many crowns have slipped from brows. But Riga—once a small fortress on the Daugava—has grown harder and taller with each stroke of the waves, like a stone carved by the Lord's own hand. From Lübeck's market to Novgorod's wharves, from Stockholm's stores to Danzig's granaries—every port lighthouse is lit for Riga's ships; every market balance tips toward Riga's coin. Goods pump out to every quarter and flow back with wealth and glory. Riga has become the indisputable heart of the entire sea!"

rig_heart_of_baltic.tt:0 "Unlocks the diplomatic action §YChartered Trade Grant§!\nThis action allows us to convert countries in the same trade league as us into a §GRigan Chartered Trade Zone§!"

rig_sealand_agreement_title:0 "The Zealand Agreement"
rig_sealand_agreement_desc:0 "Lübeck—Queen of the Hanseatic League, key of the Baltic, the city whose gothic brick gables once overlooked the entire North Sea trade—has at last met its dirge. Years of trade disputes, wavering princes, and mercenary skirmishes converged into a storm that could not be avoided. The Archbishopric of Riga, in league with the free cities of Denmark, massed its fleets in the southern Baltic, like clouds pressing down from the east upon Lübeck's towers. The League's vaunted combined fleet scattered under cannon fire and boarding actions. Lübeck's merchant ships were towed away, its warehouses sealed, and the council chamber's long table was covered in dust shaken loose from its cracked ceiling. This treaty signed not only a ceasefire, but the death warrant of the Hanseatic League. Lübeck stepped forever from the table that governed the North Sea–Baltic trade. Her walls still stand, but her age has passed. We shall reshape the commerce of this region and hold it fast in our own hands."

rig_neva_agreement_title:0 "The Neva Agreement"
rig_neva_agreement_desc:0 "The war drums fade; the swords return to their scabbards. Novgorod—the ancient city on the banks of the Volkhov—has bowed her head to us. From this day forward, the furs of the Volga, the grain and cattle of Rus', shall pass no longer through infidel markets, but be shipped directly to the docks of Riga. The Rus' nobles who once barred our caravans now either repent in monasteries or press their seals upon new treaties. At last we have secured the trade of this upstream node, Novgorod."

rig_scandinavian_strategy_title:0 "Scandinavian Strategy"
rig_scandinavian_strategy_desc:0 "Sweden is eager to fill the power vacuum in Scandinavia. Their ships blanket the Gulf of Bothnia like crows; their infantry fill Finnish fortresses like ants. Once, the Kalmar Union's leash held their necks—now that leash is snapped, and the Swedes are tearing at every Baltic trade route with their own teeth. There is no avoiding this contest. We must either break their reach to the sea or sail forever under their shadow."

rig_gotland_bridgehead_title:0 "Gotland Bridgehead"
rig_gotland_bridgehead_desc:0 "The pirates of Gotland have lived by raiding for generations; they know every current and every cove of the Baltic as a farmer knows his furrows. Sweden has always threatened their freedom. If we allow them to continue their raids and offer them Riga's protection, then in return, Gotland's ports will open to our fleets, and grizzled old hands will join our camps—adding a heavy weight to the scales against Sweden."

rig_divede_norway_title:0 "Divide Norway"
rig_divede_norway_desc:0 "The union between Sweden and Norway is no solid block of iron. Under a shared crown, suspicion and grievance are growing. We can pry them apart, turning cracks into chasms, and ease the pressure of our war against Sweden."

rig_divede_norway.tt:0 "If, at the completion of the mission §YThe Loose Arrow§!, we have a §Gsignificant spy network§! in Sweden and maintain §Ggood relations§! with Norway—or if Norway shows signs of disloyalty—we may reap unexpected benefits."

rig_waiting_in_wings_title:0 "Waiting in the Wings"
rig_waiting_in_wings_desc:0 "The messenger has returned with the answer from Skåne's governor: they have accepted our terms. Now we need only wait for them to fire the first shot."

rig_waiting_in_wings.tt:0 "All we must do is wait..."

rig_skona_agreement_title:0 "The Skåne Agreement"
rig_skona_agreement_desc:0 "The Kingdom of Denmark—that ancient realm that once surged across the North Sea—has crumbled like a sand dune in the wind. Its lands have broken into towns and cities; behind every wall from Jutland to Zealand sits a self-styled governor. The only territory that still bears the legacy of Denmark's crown, the County of Skåne, lies under Swedish control. We shall approach them, probe whether they harbor thoughts of independence—and help them achieve it.\n\n§RNote: When completing this mission, you must not be in a truce with Sweden, or later missions will fail to load§!"

rig_administrative_integration_title:0 "Administrative Integration"
rig_administrative_integration_desc:0 "Newly conquered lands cannot be held by the sword alone. We will show mercy to their people: light taxes, respect for old customs—that is the foundation of lasting rule."

rig_plus_loin_title:0 "A Step Further"
rig_plus_loin_desc:0 "Our advance through Poland and Ruthenia has swept forward like the army of Joshua through Canaan, its walls crumbling before the Lord's wrath, its cities and fields now ours. Now it is time to cast our gaze further and unite these two regions fully. Let Riga's authority stretch from the Baltic to the shores of the Black Sea!"

rig_shield_of_south_title:0 "Shield of the South"
rig_shield_of_south_desc:0 "The fragments of Poland's crown are now gathered one by one in Riga's treasury. Kraków, Warsaw, Sandomierz, Poznań—lands once ruled by the Piasts and Jagiellons—are now held by our governors and knights. Let us raise a new Kingdom of Poland, its crown set upon the Archbishop of Riga's cross, its law issued from the Archbishop's command. Let it become the iron arm of the Land of Mary stretching toward the Carpathians.\n\nLet old bottles hold new wine; let old soil be bound by a new covenant."

rig_much_will_have_more_title:0 "§RGive an Inch, Take a Mile§!" # Give an Inch and Take a Mile
rig_much_will_have_more_desc:0 "Poland and Ruthenia stand firm under our hand. But the Lord's promised land does not end at the Carpathians—beyond those ranges, the plains of Romania unfold. They hold the throat of the lower Danube, and whoever holds that throat holds the key to the heart of the Balkans. Yet to unite this region is no small task. Are we ready to face the powers entrenched there?"

rig_hansa_league_title:0 "The Hanseatic League"
rig_hansa_league_desc:0 "From the 12th century onward, North German merchants organized the 'Cologne Hanse' and 'Hamburg Hanse' to trade with England and Flanders. From the mid-12th to the mid-13th century, trade along the Rhineland grew, and its focus gradually extended to the Baltic. By the 1280s, merchants in the Rhineland began forming cooperative alliances to protect shared interests, allying with Lübeck and other North German cities that controlled Baltic trade to guard against raiders and pirates. This was the seed of the Hanseatic League. After its founding, the League's aims soon shifted from policing pirates and tolls to expanding commercial influence, monopolizing trade, and crushing competition from non-League German cities, as well as from England, Russia, and Flanders."

rig_hansa_league.tt:0 "§YWe will begin contending with the Hanseatic League for control over Baltic trade§!"

rig_sharpen_the_sword_title:0 "Sharpen the Sword"
rig_sharpen_the_sword_desc:0 "We face the fierce and battle-hardened Northeastern Rus'. The Northern Crusades fell more than once before these heathens. This time, we must prepare ourselves down to the last spear-point for the coming campaign."

rig_rus_departments_title:0 "The Rus' Principalities"
rig_rus_departments_desc:0 "Not long ago, Northeastern Rus' fell into civil war—princes turning on each other, wearing down their cities and subjects with swords and betrayals. But this state of affairs will not last. The ambitious are already sharpening their knives: Moscow, Tver, or some other Rurikid heir rising from the blood-soaked earth will soon forge a united power. We should prepare ourselves for that day."

rig_enemy_of_enemy_title:0 "The Enemy of My Enemy"
rig_enemy_of_enemy_desc:0 "From 1368 to 1370, the combined Hanseatic fleet defeated Denmark, forcing the Treaty of Stralsund upon it. That treaty gave the League not only the character of a Nordic political alliance, but a firm hand on Baltic and North Sea trade and Scandinavian politics. Denmark's later fragmentation only tightened the League's hold. If we seek allies, then the free cities of Denmark are our natural choice. Though we once stood with the Hanseatic League against Denmark, profit can bring former enemies back to the same table—and may yet persuade these city-states to reconsider cooperation with us."
rig_enemy_of_enemy_tt:0 "All single-province states in the §YDenmark§! and §YNorth Jutland§! regions must meet at least one of the following conditions:\nHave an opinion of §YRiga§! of at least §Y150§!\n§YRiga§! has a spy network of at least §Y25§! within them\nAre in the same trade league as us\nAre our subject"
rig_enemy_of_enemy_effect:0 "We will make contact with all single-province states in the §YDenmark§! and §YNorth Jutland§! regions.\nThis will escalate the Riga-Hansa trade dispute."

rig_permeate_hansa_league_title:0 "Infiltrate the Hansa" # Infiltrate the Hanseatic League
rig_permeate_hansa_league_desc:0 "The League is loose, lacking constitution, statute, or executive apparatus; each member keeps largely independent foreign policies. We can easily expand our sources and gather the information we need within the League, gaining a strategic advantage over its ever-shifting alliances."
rig_permeate_hansa_league_tt:0 "All members of the trade league led by §YLübeck§! must have an opinion of §YRiga§! of at least §Y75§! or §YRiga§! must have a spy network of at least §Y35§! within them."

rig_whip_the_horse_title:0 "Whip the Horse"
rig_whip_the_horse_desc:0 "Pskov—the city that once broke the banners of the Northern Crusades and mired the Livonian knights in its mud—is not what it once was. The reins are taut, the spurs touch flank, and the knights surge toward its gates like a flood, to reclaim lost glories from the infidels."
rig_whip_the_horse.tt.1:0 "We will recover from the negative effects of the sudden attack."

rig_ready_for_battle_title:0 "Standing Ready for Battle"
rig_ready_for_battle_desc:0 "With intelligence in hand, we must now determine our strategy and tactics for the campaign in the Rus' lands."

rig_ready_for_battle_tt_1:0 "It is too early."
rig_ready_for_battle_tt_2:0 "We are still preparing!"

rig_disaster_of_lubeck_title:0 "The Lübeck Disaster"
rig_disaster_of_lubeck_desc:0 "The tremors in northern Germany reached the ears of the Holy Roman Emperor, who would not tolerate a Baltic upstart trampling the imperial commercial order. When Riga refused his demand to withdraw, the imperial eagle rose; the Emperor himself called for all loyal North German princes to join the Hanseatic camp. Those who had already taken sides in the trade war now drew their swords for the Empire or rallied to Riga's banner. The civil war of the Holy Roman Empire had spread from counting houses to the battlefield."

incident_north_german_trade_war_begin_tt:0 "We are awaiting responses from the North German princes."
rigaExpandIncident_option_tt:0 "We need to await the Emperor's decision regarding the situation in North Germany."

rig_advantages_and_disadvantages_title:0 "Survival of the Fittest"
rig_advantages_and_disadvantages_desc:0 "Trade is an arena in which the strong return laden with gain and the weak sink beneath the waves. Survival of the fittest was carved into creation at the beginning of time. Now that we have united the free cities of Jutland and Denmark, the Hanseatic League will not sit idle. It is time to wage war with coin and goods, rather than sword and shield, against those who threaten our commercial interests."
rig_advantages_and_disadvantages_tt:0 "All §YDanish free cities§! that sign the treaty will join our trade league.\nThis will further escalate the Riga-Hansa trade dispute, impacting trade production across the North German principalities, who will react to this over time.\n§RIf mishandled, our trade dispute with the Hanseatic League could escalate into war!§!"

rig_in_the_name_of_god_title:0 "In the Name of God"
rig_in_the_name_of_god_desc:0 "Pskov's gates have opened before Riga's horses; the eastern Rus' line melts like wax before fire. The Northern Crusades are restarted. From the Daugava River to the Volga, the Urals, and even the distant frozen forests, the trumpets of the Archbishop of Riga shall sound. Let the banners of the Land of Mary fly over every hill still darkened by the shadow of heresy."

rig_crown_of_poland_title:0 "The Polish Crown"
rig_crown_of_poland_desc:0 "The Polish crown is shattered—our advance will meet little resistance. Yet some nobles may turn their heads westward, seeking shelter under the wings of the Holy Roman Empire. If the eagle banner appears across the Oder, our task will grow far harder. We must ride swiftly and take the cities of those seeking refuge before the Emperor's edict arrives."

rig_advance_slowly_fight_quickly_title:0 "Advance Slow, Attack Swift" # Advance Slowly, Attack Swiftly
rig_advance_slowly_fight_quickly_desc:0 "The horsemen of Kievan Rus' move like wind across the steppes, honed by generations of war with eastern nomads—unlike the armored charges of Western knights. Our knightly orders are still strangers to this battlefield; we must learn quickly how to turn our own strengths to advantage on this open plain."

rig_poish_ruthenia_strategy_title:0 "Ruthenian Polish Strategy" # Polish-Ruthenian Strategy
rig_poish_ruthenia_strategy_desc:0 "The fields of Poland and Ruthenia stretch to the horizon, heavy with grain, black and fertile—enough to feed nations from Germany to Rus'. Now this bounteous land lies fractured: Poland's crown broken into pieces, Ruthenia's fields left unharvested. If we can claim Kraków's throne and Kiev's sceptre, we shall hold the grain production of all Eastern Europe in our hands. On that day, the price of bread will be set in our councils, and the granaries of kings will be filled by our command."

rig_city_of_ross_title:0 "City of the Rus'"
rig_city_of_ross_desc:0 "'Mother of Cities'—so the ancient Rus' call Kiev, where Prince Vladimir's bones lie buried and the gilded dome of St. Sophia towers above. He who rules Kiev takes up the fallen sceptre of the Rurikids. Now Riga's sword points south. When we cross the fords of the Dnieper and plant the Mary-land banner upon Kiev's walls, all the princes and peasants of Ruthenia shall know that their new master has arrived."

rig_on_the_verge_of_war_title:0 "Arrow Loose from the Bow" # The Arrow Loose from the Bow
rig_on_the_verge_of_war_desc:0 "The fires of Skåne have lit the night over the Øresund, and horns sound from the south as far as Riga's walls. Now it is time to meet the Swedes blade to blade."

not_has_rig_already_pre_for_uprising_tt:0 "The time is not yet ripe."
has_rig_already_pre_for_uprising_tt:0 "The time has come."

rig_safty_north_title:0 "Secure the North" # Secure the Northern Frontier
rig_safty_north_desc:0 "Sweden's banners have sunk into the Baltic; the straits of Skåne open to us. Shipmasters who once paid Swedish tolls now cast their silver into Riga's treasury; merchants who once feared the northern lion's fleet now sail with confidence beneath Riga's cross. We have become the undisputed, unchallengeable trade power on the Baltic shore."

rig_greate_north_war_title:0 "§RThe Great Northern War§!"
rig_greate_north_war_desc:0 "Scandinavia lies before us in all its grandeur—mountains, fjords, forests, islands, like a parchment not yet read. Sweden's lion bleeds from the wounds dealt at Skåne; Norway's snow-eagle has grown weary. The hour is now; the gate stands open. Rise, march north, until the banners of the Land of Mary snap in the wind over the eternal night of the Arctic!"

rig_expand_libran_title:0 "Develop Livonia"
rig_expand_libran_desc:0 "A city's development never happens in an instant; it must be shaped over time, gradually progressing toward prosperity."

rig_expand_vilnius_title:0 "Develop Vilnius"
rig_expand_vilnius_desc:0 "A city's development never happens in an instant; it must be shaped over time, gradually progressing toward prosperity."

rig_expand_marianburg_title:0 "Develop Marienburg"
rig_expand_marianburg_desc:0 "A city's development never happens in an instant; it must be shaped over time, gradually progressing toward prosperity."

rig_expand_koenigsberg_title:0 "Develop Königsberg"
rig_expand_koenigsberg_desc:0 "A city's development never happens in an instant; it must be shaped over time, gradually progressing toward prosperity."


rig_riga_fulcrum_title:0 "Riga Fulcrum"
rig_riga_fulcrum_desc:0 "Riga sits at the meeting of the Daugava and the Baltic—upstream to the Rus' heartland, downstream to the ports of the North Sea. Decades of toil have raised it from a market beside a cathedral to the largest, strongest, and most prosperous city on the eastern Baltic, and indeed in all of Europe. Only Riga can offer, beyond coin and steel, faith and mission. We shall make the capital a fulcrum—as the heart pumps blood to every limb."

rig_terra_mariana_title:0 "§GLand of Mary§!"
rig_terra_mariana_desc:0 "The preparations for the Universal City Project have finally reached their conclusion. We are about to officially launch this grand endeavor!"

rig_danzig_fulcrum_title:0 "Danzig Fulcrum"
rig_danzig_fulcrum_desc:0 "The Vistula winds from the Polish heartland, laden with grain, timber, copper, and iron; Danzig is the gate on that waterway. Its bay is broad and deep enough to hold Riga's largest carracks. Its wharves have seen a thousand sails; its cranes have lifted ten thousand loads. The Teutonic Order built its fortress here and signed treaties with Polish kings. We shall make Danzig a fulcrum to command the grain and cloth trade of Poland."

rig_advance_both_by_land_and_warter_title:0 "Advance by Land and Water"
rig_advance_both_by_land_and_warter_desc:0 "A port can be throttled by narrow channels, shabby berths, and old cranes. We will deepen the main channel, build stone docks, and mount more loading cranes. On land, we will repair roads, add ferries, and improve towpaths. Water and land—like the two wings of a bird or two wheels of a cart—cannot be neglected."
rig_advance_both_by_land_and_warter.tt:0 "§YThis will lay the groundwork for the subsequent plan§!"

rig_vilnius_fulcrum_title:0 "Vilnius Fulcrum"
rig_vilnius_fulcrum_desc:0 "Vilnius sits on the heights between two rivers, surrounded by forests and marshes—easy to defend and hard to assault. From Vilnius, trade routes radiate in every direction. It is a crossroads of overland commerce, a hub for furs, beeswax, amber, and iron. We shall make Vilnius a fulcrum to command the east-west trade routes."

rig_direct_planning_title:0 "Direct Planning"
rig_direct_planning_desc:0 "If clever shortcuts are unavailable, then direct expansion remains the only effective way. Gold will flow like a river from the treasury, and the shouts of laborers will sound day and night. We will trade coin for scale, and time for height. But those who laugh at its cumbersome pace will eventually crane their necks to see its new walls rise high."
rig_direct_planning.tt:0 "§YThis will lay the groundwork for the subsequent plan§!"

rig_what_must_be_done_title:0 "What Must Be Done"
rig_what_must_be_done_desc:0 "Riga's standing army is like a rusty old sword—its scabbard still engraved with past glories, but its edge already blunted. Conscripts are drawn from a dozen bishoprics, generals sleep soundly on the triumphs of the knightly orders, and the military districts stir with discontent. While administrative reform can wait, military reform is urgent—and unavoidable."

rig_religion_reformation_title:0 "Religious Reform" # Rigan Religious Reform
rig_religion_reformation_desc:0 "Riga's faith has stood since the Livonian knights raised the cross on the frozen lake—a beacon in the mist, never extinguished, never wavering. Change and progress are acceptable, but they will not deflect Riga from its path. Like a river that may change its course but still flows to the sea; like a tree that may be pruned but keeps its roots in the soil."
rig_religion_reformation.tt:0 "Removes all §Yheresy and heathen§! province modifiers from us and our subjects."

rig_ordinance_of_piety_title:0 "Ordinance of Piety"
rig_ordinance_of_piety_desc:0 "Before we proclaim the Gospel abroad, we must first unify the faith at home. We will send out itinerant friars to the remotest villages, to administer confession and communion to those who have not received them in decades—and to root out the corruption among our missionary ranks, so they truly become messengers of the Lord's good news."

rig_propaganda_act_title:0 "Propaganda Act"
rig_propaganda_act_desc:0 "The tide of Reformation spreading from Germany erodes Riga's ramparts like a subterranean current; ordinary sermons are no longer enough to hold it back. Rumors, pamphlets, and anonymous postings blaze through the streets like wildfire, stirring people to question the sacraments, disparage the clergy, and even cut ties with Rome. We must respond with stronger measures: send seasoned priests into the marketplaces to debate doctrine openly with radicals, explaining why Riga seeks reform within the Catholic fold. Should the worst come, we may even have to take more extreme measures to defend our faith..."
rig_propaganda_act.tt:0 "§RThis will escalate tensions between Protestants and Catholics§!"

rig_sword_of_god_title:0 "Sword of God"
rig_sword_of_god_desc:0 "The iron cavalry of Catholicism advances with the cross. Riga's knights, the Emperor's cuirassiers, Poland's winged hussars—and all who remain loyal to Rome—converge under a single banner. Those who sought to tear the Church apart now either kneel in repentance at the steps of Catholic courts or wander the wilderness, stripped of all shelter."
rig_sword_of_god_1.tt:0 "All §YProtestant§!, §YHussite§!, and §YReformed§! provinces owned by us and our subjects will convert to §YCatholicism§!.\nAll §YProtestant§!, §YHussite§!, and §YReformed§! centers of reformation will be removed."
rig_sword_of_god_2.tt:0 "We will declare war on the §YHoly Roman Emperor§! and all §YElectors§! not allied with us, to §Ydissolve the Holy Roman Empire§! and destroy this no-longer-holy empire."

rig_statute_of_religious_unity_title:0 "Statute of Religious Unity"
rig_statute_of_religious_unity_desc:0 "Swords may win wars, but only unity of faith secures lasting peace. The Protestant League has scattered, but embers of heresy still smolder in Riga's lands and among our subjects. We must walk every lane and visit every village to bring back those sheep who have strayed from the flock."
rig_statute_of_religious_unity_trigger.tt:0 "All provinces owned by us and our subjects must be Catholic."
rig_statute_of_religious_unity.tt:0 "All our §Ybishopric§! and §Oknightly order§! subjects will receive the same modifier."

rig_administrative_restructuring_title:0 "Administrative Restructuring"
rig_administrative_restructuring_desc:0 "Administrative restructuring is a necessary process for large-scale reforms, and we are no exception."

rig_thngs_to_do_title:0 "Things That Must Be Done"
rig_thngs_to_do_desc:0 "Riga's administrative system is slowly stiffening. The independence of subjects, the lethargy of local officials, and the breakdown of communication between center and periphery have grown as tangled as old roots. A crude uprooting would tear the whole earth with it. We must proceed step by step, forward and steady."

rig_diocesan_renovation_ordinace_title:0 "Diocesan Renovations" # Diocesan Renovation Ordinance
rig_diocesan_renovation_ordinace_desc:0 "The purge of corruption and investigation of bureaucracy have washed much filth from Riga's administration. We must seize this opportunity to reform the bureaucratic structure—cutting redundant layers and streamlining both our own system and that of our subject states."

rig_second_allegiance_act_title:0 "Second Allegiance Act"
rig_second_allegiance_act_desc:0 "After reforming the structure of the knightly orders, we shall further define the duties and rights of every knight. Each shall renew his oath before the altar according to the new covenant we have set down."

rig_second_association_act_title:0 "Second Association Act"
rig_second_association_act_desc:0 "Administrative reform sweeps through Riga like a tide, washing over every patch of land eroded by heavy taxes and the worm of corruption. The people have seen our resolve, but reform driven solely from above remains only a game for the few. We must open a channel from below, so that every voice can be heard. Only then can we remain forever united under the banner of the Land of Mary."

rig_concerning_civil_government_title:0 "On Civil Government"
rig_concerning_civil_government_desc:0 "Our administrative reforms are complete. May our order be as clear as the heavens—its courses fixed, its light undimmed."

rig_impermeable_plane_title:0 "Impenetrable Plane"
rig_impermeable_plane_desc:0 "The worms within the army have hollowed out Riga's iron wall. Admonitions and warnings have fallen on deaf ears. Only a silent operation—carried out before the enemy can suspect—can tear the rotting roots from the soil."

rig_one_night_of_riga_title:0 "One Night in Riga"
rig_one_night_of_riga_desc:0 "The gathered forces moved like mute ravens through the night, each following routes rehearsed a hundred times on the sand table. Every link held, every hinge turned. No fighting, no shouting—only the soft creak of doors pushed open, and the quiet clatter of goblets falling to the floor."
rig_one_night_of_riga_tt_false:0 "The time is not yet ripe."
rig_one_night_of_riga_tt_right:0 "The time has come."

rig_summarize_past_experience_title:0 "Summarize Past Experience"
rig_summarize_past_experience_desc:0 "Riga's military reforms have passed through the fires of blood and steel. Now it is time to pause and reflect on all we have endured, carving the lessons of this great undertaking into stone tablets, to guide those who come after."

rig_learning_thought_title:0 "Learning Thought"
rig_learning_thought_desc:0 "We have engaged an experienced army reformer to instruct us in advanced military thought—a move that will greatly aid both our military technology and the progress of our reforms."
rig_learning_thought.tt:0 "All our §Ybishopric§! and §Oknightly order§! subjects' military technology increases by §Y1§! level."

rig_promotion_of_new_talent_title:0 "Promotion of New Talent"
rig_promotion_of_new_talent_desc:0 "The corrupt commanders have been pulled from our army like weeds from a field. Now that the soil is turned, it awaits new seed. After rigorous screening, several promising figures have emerged to become the core leaders of our reformed army."

rig_uniform_oreder_title:0 "Uniform Order"
rig_uniform_oreder_desc:0 "Though Riga's new army and its allied forces march under the same banner, they still use different commands, different signals, and different marching paces. In peacetime, this might pass unnoticed; on the battlefield, it is fatal. It is time to unify the orders of all our forces—ours and our subjects' alike."
rig_uniform_oreder.tt:0 "All our §Ybishopric§! and §Oknightly order§! subjects gain the following modifiers:\nArmy movement speed §G+10%§!\nLand attrition §G-10%§!\nReinforce speed §G+25%§!"

rig_riga_steel_guardian_title:0 "Riga Steel Guardian"
rig_riga_steel_guardian_desc:0 "Our rebuilt army is sorely lacking in battle experience. Every knight of the military orders has been forged in fire; their hard-won knowledge will serve as a hammer. Our instructors will use it to beat our forces again and again, driving out the impurities of raw iron until only tempered steel remains."

rig_border_brave_army_title:0 "Borderland Brave Army"
rig_border_brave_army_desc:0 "Unlike the standardized drills of the knightly orders, our episcopal military districts have faced real enemies. Their style is rougher, more flexible. Our army organizers will coordinate our growing forces, drawing essential frontline experience from our subjects to sharpen our own edge."
rig_border_brave_army.tt:0 "Our §YEpiscopal Military District§! subjects gain §G5§! army tradition."

rig_thngs_which_lackluster_title:0 "Lackluster Performance"
rig_thngs_which_lackluster_desc:0 "To outsiders, Riga's administrative system may appear to run smoothly enough—calm, unremarkable. But to those who see clearly, it has become mediocre. This quietness is more dangerous than any riot, for a riot forces men to act, while mediocrity lets them drift in warm water until they no longer feel the heat. A deeper reform of Riga's administrative system has now been set in motion."

rig_a_day_in_riga_title:0 "A Day in Riga"
rig_a_day_in_riga_desc:0 "Before the morning bells had finished sounding, the cathedral's council chamber was already packed. Bureaucrats from every inner-city office hurried in, ready to hear our administrative advisor's latest solution to the problems of efficiency."

rig_sweep_away_corruption_title:0 "Sweep Away Corruption"
rig_sweep_away_corruption_desc:0 "The officials who demand ducats to pass a document, the soldiers who set up illegal tolls on subject borders, the stewards who falsify accounts—their hands are filthier than any robber's, for they wear the cloak of justice. The fight against corruption will be a long one, but at least we can make the corrupt know that the Archbishop's eye is fixed upon every stream of coin."

rig_scour_the_bureaucracy_title:0 "Investigate the Bureaucracy"
rig_scour_the_bureaucracy_desc:0 "In pursuing corruption, we uncovered a terrible truth: the entire bureaucracy had woven a net of mutual protection. You cover my false accounts; I hide your omissions. You inflate subject populations; I help you alter grain-storage figures. Those who refused to join the game were sidelined and squeezed out. It is time for a comprehensive background review and competency assessment of all clerical administrators and subject-state liaison officers."

rig_kinght_seconde_reorganization_title:0 "Second Reorganization"
rig_kinght_seconde_reorganization_desc:0 "Having swept away bureaucratic rot and torn up the tangled web of interests, the path to further reform has been cleared. At the First Council of Riga, we restructured the knightly orders. Now, with the times changed, a second reorganization is our priority—to ensure they remain our sharpest sword."

rig_clarify_responsibilities_title:0 "Clarify Responsibilities"
rig_clarify_responsibilities_desc:0 "Responsibilities are not chains that bind; they are guardrails that allow free walking. With the help of our administrative advisors, we shall clearly define the rights and obligations of the knightly orders, so that every knight knows for whom he fights, and why."

rig_be_sharply_demarcated_from_title:0 "Draw Clear Boundaries"
rig_be_sharply_demarcated_from_desc:0 "With the duties of the knightly orders clarified, we must now turn our gaze back to our own bureaucracy. To avoid overlapping authorities and blurred responsibilities between departments, every official must know exactly where he stands—neither overstepping nor shrinking back."

rig_each_performs_its_owned_functions_title:0 "To Each His Own Function" # Each Performs Its Own Functions
rig_each_performs_its_owned_functions_desc:0 "Unless every man in his post attends solely to his own charge, the clearest boundaries will remain mere ink on parchment. We shall require every officer—from the chief secretary of the cathedral to the lowliest tax collector in the outer districts—to know his duties precisely and to make them his sole focus during his tenure. Let every pen behind every door write only the documents that belong to its own office."

rig_military_reorganization_title:0 "Military Reorganization"
rig_military_reorganization_desc:0 "The rotten branches have been cut away, leaving deep gashes in the trunk. But pruning dead wood alone cannot make a tree stand tall. We must now undertake a complete rebuilding of our army—from the lowest rank to the highest."
rig_military_reorganization_trigger.tt:0 "We must disband all our armies to reorganize our military system!"
rig_military_reorganization.tt:0 "§YWe will immediately take measures to prevent subjects from rebelling during our military reorganization§!"

rig_military_theory_innovation_title:0 "Military Innovations" # Military Theory Innovation
rig_military_theory_innovation_desc:0 "After studying both ancient and modern military thought and tactics, Riga's officers have debated, reflected, and exchanged ideas at length. Drawing on Riga's unique circumstances, they have forged a wholly new military doctrine."

rig_military_organization_reform_title:0 "Organization Reforms" # Military Organization Reform
rig_military_organization_reform_desc:0 "After long preparation and countless setbacks, we are at last ready to rebuild the military structure of both our own forces and those of our subjects—from the ground up."

rig_military_joint_exercise_title:0 "Joint Military Drills"
rig_military_joint_exercise_desc:0 "Armchair strategies have never won wars. We need a full-scale exercise to prove that our reforms are no mere fantasy, and to show the world that Riga's troops are warriors tempered in iron and fire—the invincible guardians the Lord has given the Land of Mary."

rig_treatise_on_campaigns_title:0 "Treatise on Campaigns"
rig_treatise_on_campaigns_desc:0 "Our military reforms are complete. Now it is time to set a strategic direction more suited to the character of our nation."

rig_be_able_but_modest_title:0 "Harmonious Yet Discreet"
rig_be_able_but_modest_desc:0 "§O'He has told you, O mortal, what is good; and what does the Lord require of you but to do justice, to love kindness, and to walk humbly with your God?'§!\nSince the Second Council of Riga, we have undergone much. Administrative reform has reorganized the bureaucracy, making decrees flow like living water; military reform has tempered Riga's army, making its defenders stand firm as rock; religious reform has cleansed the robes of the Church, making faith shine bright as the morning star. We have achieved what the nations thought impossible—like David against Goliath. The people who were once oppressed by corruption now see the Archbishop standing with them in the market square, buying bread in the same queue. The subject states once divided by faith now see Riga's priests kneeling beside their envoys at the altar to receive the Eucharist. The greatest reform is not to build tall towers, but to tear down high walls.\nShining with the dust, not blinding; dust with the light, not humbled—such is the kingdom that pleases the Lord."

rig_at_the_crack_of_dawn_title:0 "At the Crack of Dawn"
rig_at_the_crack_of_dawn_desc:0 "Darkness covers every corner of the Land of Mary. A puppet of the heathen sits on Riga's throne; the subject princes nurse their own ambitions; and the true sons and daughters of Riga can wait no longer. At the crack of dawn—when darkness meets light, and mist mingles with morning—loyalist forces of the Archbishopric raise the banner of revolt in the capitals of every subject state at once. No one knows where this uprising will lead Riga, but every one of them knows this: they would rather fall in pursuit of the dawn than sleep forever in endless night."
rig_at_the_crack_of_dawn.tt:0 "§REverything around us is collapsing; we must begin to save our nation§!"

rig_economic_recovery_act_title:0 "Economic Recovery Act"
rig_economic_recovery_act_desc:0 "§O'For the poor will never cease from the land. Therefore I command you, saying, you shall open your hand wide to your brother, to the poor and needy in your land.'§!"
rig_economic_recovery_act.tt:0 "§OWe will partially mitigate the effects of bankruptcy§!\n\nWe will receive §Y20§! loans with §Y0§! interest."

rig_urban_renewal_ordinance_title:0 "Urban Renewal Ordinance"
rig_urban_renewal_ordinance_desc:0 "§O'They shall build up the ancient ruins, they shall raise up the former desolations; they shall repair the ruined cities, the devastations of many generations.'§!"

rig_military_support_act_title:0 "Military Support Act"
rig_military_support_act_desc:0 "§O'Be strong and courageous. Do not be afraid; do not be discouraged, for the Lord your God will be with you wherever you go.'§!"

rig_resource_reserve_act_title:0 "Resource Reserve Act"
rig_resource_reserve_act_desc:0 "§O'I will plant them in their own land, and they shall never again be uprooted from the land I have given them,' says the Lord your God.§!"

rig_stabilization_act_title:0 "Stabilization Act"
rig_stabilization_act_desc:0 "§O'I will give them an undivided heart and put a new spirit in them; I will remove from them their heart of stone and give them a heart of flesh.'§!"
rig_stabilization_act.tt:0 "§RAnd do what must be done§!"

rig_resistance_act_title:0 "Resistance Act"
rig_resistance_act_desc:0 "§O'But those who wait upon the Lord shall renew their strength; they shall mount up with wings like eagles; they shall run and not grow weary; they shall walk and not faint.'§!"
rig_resistance_act.tt:0 "§RRise from the ashes or be reduced to dust—all hinges on this battle§!"

rig_at_dawn_time_title:0 "Time at Dawn"
rig_at_dawn_time_desc:0 "The smoke has not yet cleared, but the dawn has pierced the deepest darkness. Those who lost their homes in the riots now gather salvageable timber from the ruins. The sacred vessels plundered in the sack are being found one by one in the enemy's storehouses. Families scattered in the turmoil are being reunited along the newly cleared roads. May the Lord grant that Riga may walk in the light from this day forward, until the trumpet of judgment sounds."
rig_at_dawn_time.tt:0 "§GEnd the disaster §YThe Dawn War§!§!"

rig_expand_stockholm_title:0 "Develop Stockholm"
rig_expand_stockholm_desc:0 "A city's development never happens in an instant; it must be shaped over time, gradually progressing toward prosperity."

rig_expand_londe_title:0 "Develop Lund"
rig_expand_londe_desc:0 "A city's development never happens in an instant; it must be shaped over time, gradually progressing toward prosperity."

rig_expand_moscow_title:0 "Develop Moscow"
rig_expand_moscow_desc:0 "A city's development never happens in an instant; it must be shaped over time, gradually progressing toward prosperity."

rig_expand_smolensk_title:0 "Develop Smolensk"
rig_expand_smolensk_desc:0 "A city's development never happens in an instant; it must be shaped over time, gradually progressing toward prosperity."

rig_expand_volhynia_title:0 "Develop Volhynia"
rig_expand_volhynia_desc:0 "A city's development never happens in an instant; it must be shaped over time, gradually progressing toward prosperity."

rig_expand_podolia_title:0 "Develop Podolia"
rig_expand_podolia_desc:0 "A city's development never happens in an instant; it must be shaped over time, gradually progressing toward prosperity."

rig_expand_warsaw_title:0 "Develop Warsaw"
rig_expand_warsaw_desc:0 "A city's development never happens in an instant; it must be shaped over time, gradually progressing toward prosperity."

rig_expand_posen_title:0 "Develop Poznań"
rig_expand_posen_desc:0 "A city's development never happens in an instant; it must be shaped over time, gradually progressing toward prosperity."

rig_the_curtain_is_rising_title:0 "The Curtain Rises"
rig_the_curtain_is_rising_desc:0 "When the veil covering the City of a Thousand Cities is lifted by the first ray of morning, Riga's bell towers ring as one, and the eyes of nations turn from every direction. What rises from the glimmer of the Daugava is a foretaste of a new heaven and a new earth."
rig_the_curtain_is_rising.tt:0 "§GAct II§!"

rig_back_on_track_title:0 "Back on Track"
rig_back_on_track_desc:0 "Over the centuries, Riga has drifted from its original calling. The heart that once raised the cross on the frozen lake has been gradually covered by the dust of account books and the cracks of scepters. Now, we must set all this right and reclaim our ancient mission: to protect pilgrims, to build hospitals and churches, and in every newly conquered land to plant the cross first, and set the boundary stone second. May the Lord forgive our years of wandering and guide us back to the ancient good way."

rig_before_the_soldiers_title:0 "Before the Troops Move..."
rig_before_the_soldiers_desc:0 "One essential task of a crusade is to turn the copper and iron of every mine into blades, spearheads, armor plates, and horseshoes for the warriors. We shall establish weapons workshops and forge the finest equipment, for there are no second chances on the battlefield."
rig_before_the_soldiers_trigger.tt:0 "All provinces producing §Ycopper§! or §Yiron§! owned by us or our subjects must have a §Yweapons manufactory§!"

rig_grain_and_grass_go_title:0 "...Provisions Go First"
rig_grain_and_grass_go_desc:0 "Another essential task is to turn every field of grain and pasture into food for the soldiers and fodder for their horses. We shall build granaries and mills, store the most ample provisions, for a hungry army can never seize victory."
rig_grain_and_grass_go_trigger.tt:0 "All provinces in the §YBaltic region§! owned by us or our subjects that produce §Ygrain§! or §Ylivestock§! must have a §Ysoldiers' household§! or §Yfarm estate§!"

rig_one_size_fits_all_title:0 "A Sweeping Strategy" # A Comprehensive Strategy
rig_one_size_fits_all_desc:0 "Crusader cannons may breach walls, but they cannot see through fog. We will place spies in every target city, weaving a net so dense that every step of the crusade falls on the enemy's blind spots, and every enemy blade strikes the shields we have already raised."

rig_in_the_name_of_the_sword_title:0 "In the Name of the Sword"
rig_in_the_name_of_the_sword_desc:0 ""

rig_repeat_the_banners_title:0 "Rally the Banners"
rig_repeat_the_banners_desc:0 ""

rig_dust_off_title:0 "Dust Off"
rig_dust_off_desc:0 "The ancient cities standing on the eastern shores of the Mediterranean and the Anatolian plateau—Constantinople, Antioch, Jerusalem, Alexandria, Damascus—were once lighthouses of Christianity in the East, but have gathered dust for centuries under the sands of heathendom and the mist of schism. Hagia Sophia's dome is flecked with crow feathers; the threshold of the Holy Sepulchre is worn hollow by infidel boots; spiders spin webs across the altar of St. Peter's cave church in Antioch. Let us sweep the dust from these cities and let them shine again under the one true faith."

rig_tver_fulcrum_title:0 "Tver Fulcrum"
rig_tver_fulcrum_desc:0 "The Volga rises from the lakes and marshes of the Valdai Hills and flows ten thousand miles to the Caspian Sea, cutting through the heart of Russia. Tver holds the upper reaches of this great river, at the crossroads between Novgorod and Moscow, the Baltic and the Volga basin. We shall make Tver a fulcrum to command the grain, fur, and timber trade of the Volga region, and to open Riga's doors ever wider to the East."

rig_be_ready_for_battle_title:0 "Rest on Arms, Await Battle"
rig_be_ready_for_battle_desc:0 "Within Riga's tents, knights rest on their saddles, soldiers grip their spears, even the pack horses snort in their sleep. The crusaders wait for a single trumpet—one blown from the cathedral tower, sealed with the Archbishop's bronze signet—a sound that shall cross all Europa and rouse the sleeping nations. When that horn sounds, they will no longer be farmers, craftsmen, merchants, or monks, but warriors of Riga, warriors of the Lord of Hosts."

rig_Kiev_fulcrum_title:0 "Kiev Fulcrum"
rig_Kiev_fulcrum_desc:0 "Kiev—Mother of Rus' Cities—sits upon the high banks of the Dnieper, its golden-domed St. Sophia looking down upon the passing barges. St. Vladimir baptized his people here; Yaroslav the Wise compiled the first Rus' law code here. Its walls have held against Pecheneg hooves, and its warehouses have welcomed Hanseatic envoys. We shall make Kiev a fulcrum to open the southern gateway to the Balkans and Anatolia."

rig_krakow_fulcrum_title:0 "Krakow Fulcrum"
rig_krakow_fulcrum_desc:0 "The Vistula surges from the northern slopes of the Carpathians, cutting through the hills and plains of Lesser Poland, carrying Hungarian copper, Ruthenian wax, and Polish grain northward. Kraków sits on the upper reaches of this river—the crown and heart of the Polish kingdom, where Piast kings were crowned and Jagiellonian monarchs laid to rest. We shall make Kraków a fulcrum to drive our influence into the heart of Germany."

rig_lift_the_curtain_title:0 "Lift the Curtain"
rig_lift_the_curtain_desc:0 "Riga's hand grasps the curtain rope. The moment it is drawn, what was hidden shall be revealed, and what was bound shall be set free. From this day forward, history will be divided into two parts: the darkness before the curtain fell, and the light after it was raised."

rig_new_world_mission_act_title:0 "New World Mission Act"
rig_new_world_mission_act_desc:0 "Rigaeria—rooted across the western sea in a strange land—has borne its first fruits among the heathen. One by one, natives are baptized; simple churches rise in the deep forests. Now that we can project power across the ocean, let us formally establish the sacred bond between the Archbishopric of Riga and Rigaeria."

rig_expansion_of_the_baltic_shipbuilding_title:0 "Expand Baltic Shipbuilding"
rig_expansion_of_the_baltic_shipbuilding_desc:0 "With trade expanding, Riga needs a fleet capable of commanding not only the Baltic, but the North Sea and even the Atlantic. Smugglers, pirates, and the privateers of enemy states will meet Riga's warships in every fjord and harbor."
rig_expansion_of_the_baltic_shipbuilding.tt:0 "All qualifying provinces in the §YBaltic Sea§! trade node and the §YSouth Karelia§! region will receive the above modifiers"

rig_formation_of_the_riga_combined_fleet_title:0 "A Combined Rigan Fleet" # Formation of the Rigan Combined Fleet
rig_formation_of_the_riga_combined_fleet_desc:0 "Having improved the infrastructure along the Baltic coast, it is time to place the building of a powerful fleet high on our agenda."

rig_formation_of_black_sea_fleet_title:0 "Expand Black Sea Ports"
rig_formation_of_black_sea_fleet_desc:0 "The Black Sea—called 'Pontus' by the Byzantines—is now under Riga's control. We shall make its waves bow to Rigan keels just as the Baltic's do."
rig_formation_of_black_sea_fleet.tt:0 "All qualifying provinces in the §YEastern European Steppe§! region will receive the above modifiers."

rig_across_the_bosphorus_title:0 "Across the Bosphorus"
rig_across_the_bosphorus_desc:0 "The City the World Desires is in our hands; Anatolia and Thrace lie under Riga's cross. Let our fleet sail through the Bosporus and cut through the waves of the Mediterranean."

rig_far_east_area_title:0 "Far Eastern Strategy"
rig_far_east_area_desc:0 "The eastern crusade has no holy city like Jerusalem as its goal. Its end is every tribe untouched by the Gospel, every prince who still burns incense to idols, every khan who hangs the heads of Christ's messengers before his tent. We will not force baptism by the sword—but we must use the sword to open the door for the preacher."
rig_far_east_area.tt:0 "After brief preparations, we will declare war on all nations whose capitals are located in the §YUral§!, §YEastern European Steppe§!, §YCaucasus§!, §YCentral Asia§!, or §YWest Siberia§! regions\n\nAdditionally, we will declare war on nations holding the provinces of §YTyumen§!, §YSamarqand§!, §YAstrakhan§!, §YKazan§!, or §YYerevan§!\n\nNations whose independence is §Yguaranteed§! by us, those in a §Ymilitary alliance§! with us, those in the §Ysame trade league§! as us, and §Ynon-sovereign states§! will not be declared war upon"

rig_give_subject_prestige_and_war_exhaustion:0 "Grant all our subjects §Y10§! prestige; any overflow will convert into §Ymonarch points§!\nReduce §Y2§! war exhaustion for all our subjects"

rig_be_the_first_title:0 "First to Bear the Brunt"
rig_be_the_first_desc:0 "Kazan—the Tatar throne on the Volga, the last heir of the Mongol Golden Horde, the iron gate of the East. Its riders have burned and raided outside Moscow; its tax collectors have levied tolls on Tver's caravans. It is the first nail to be pulled—the first to fall, the first to submit, the first to become Riga's springboard into the East. From its ruins, we shall look further—to Tyumen, to Samarkand, and beyond, to the lands where the sun rises."

rig_over_the_urals_title:0 "Cross the Urals"
rig_over_the_urals_desc:0 "The vanguard of the eastern crusade lashed sledges from larch wood, dismantled cannons and loaded them on reindeer, and climbed through the snow over the highest passes of the Urals. Beyond the Urals lies Tyumen—the first town of Western Siberia. No stone walls, only wooden palisades and earthen mounds; no palaces, only the khan's felt tents and fur warehouses. Yet its importance far outweighs its appearance: it is our first outpost in Asia, the crack through which the door to Siberia has been forced open."

rig_penetrate_deeply_into_title:0 "Penetrate Deeply"
rig_penetrate_deeply_into_desc:0 "Western Siberia—the tundra and taiga stretching east from the Urals to the Yenisei. Winter daylight is brief as a sigh; summer mosquitoes swarm like smoke. Now Riga's eastern crusaders have chewed the toughest frozen meat, waded through the most bone-chilling bogs, and heard the bear's roar along the banks of the Ob."

rig_second_piece_of_domijo_title:0 "Second Domino Piece"
rig_second_piece_of_domijo_desc:0 "When Kazan fell, its tremor traveled down the Volga. Astrakhan—the gateway to the Caspian, the mouth of the Volga. Here was the last port of the Golden Horde, the destination of Persian caravans bearing furs, the market for caviar and saltwater fish. Whoever holds Astrakhan holds a lock on every waterway between the Caspian and the Black Sea. The second domino has fallen, awakening those who still sleep in the East: Riga is coming; the cross is coming; the day of sword and Gospel together is at hand."

rig_across_the_caucasus_title:0 "Across the Caucasus"
rig_across_the_caucasus_desc:0 "Yerevan—ancient city of the Armenians, where the Apostle Bartholomew once preached. This city was trodden by Persians, Arabs, and Mongols in turn, yet never forgot the name of Christ. When Riga's cross appeared on the ridge, the Armenian catholicos came forth with his flock. May the God of Abraham, Isaac, and Jacob bless us, as He blessed Noah—letting his ark rest upon Mount Ararat beyond the city walls, and his offspring fill the whole earth."

rig_the_crossroad_title:0 "The Crossroad"
rig_the_crossroad_desc:0 "Samarkand—ancient city of the Sogdians, crown of Timur's empire, brightest pearl of the Silk Road. Its domed mosques and madrasas led the Arabs to say: 'Heaven lies under Samarkand's sky.' Its observatory and paper mills amazed the Persians: 'Half the world's wisdom is in this city.' Riga's eastern crusade met no fierce resistance here. Timur's descendants were busy fighting each other; the merchants cared more about tax rates than whether the crescent or the cross hung above the walls. Samarkand—the crossroads. Riga will not garrison it heavily, nor impose Latin decrees. Riga's purpose is to make this city a hub for eastern trade routes, a relay for intelligence, and a base for missions pushing further into the Far East."

rig_great_victory_in_the_east_title:0 "Thunder in the East"
rig_great_victory_in_the_east_desc: "Thunder rolls from the ridges of the Urals across the taiga of Western Siberia, and from the deserts of Central Asia toward the blue domes of Samarkand. From the Volga to the Ob, from the Caspian to Lake Balkhash, every nomad's hoof has been driven into the mud by the nail-studded boots of the Iron Guard; every shaman's drum has been silenced by the organ of Latin hymns."

rig_southern_strategy_title:0 "Southern Strategy"
rig_southern_strategy_desc:0 "The swords of the southern crusade shall point toward those five cities that once illuminated the ancient world: Constantinople, Antioch, Jerusalem, Alexandria, and Baghdad. Every heathen nation whose capital lies in these lands, and every ruler who has defiled the holy places with sword or idol, shall hear Riga's trumpet of war."
rig_southern_strategy.tt:0 "After brief preparations, we will declare war on all nations whose capitals are located in the §YBalkans§!, §YAnatolia§!, §YMashriq§!, or §YEgypt§! regions\n\nAdditionally, we will declare war on nations holding the provinces of §YConstantinople§!, §YAntioch§!, §YJerusalem§!, §YAlexandria§!, or §YBaghdad§!\n\nNations whose independence is §Yguaranteed§! by us, those in a §Ymilitary alliance§! with us, those in the §Ysame trade league§! as us, and §Ynon-sovereign states§! will not be declared war upon"

rig_balkan_tour_title:0 "Balkan Tour"
rig_balkan_tour_desc:0 "From the bends of the Danube to the waves of the Aegean, from Belgrade on the Sava to Constantinople by the Sea of Marmara—the whole of the Balkans has been measured under the hooves and trumpets of Riga's crusaders. Every hill once crowned with idols now bears a cross; every pass once contested by swords now echoes with Catholic prayer. In the name of the Father, the Son, and the Holy Spirit, this land is no longer a wilderness where nations tear each other apart, but a pasture of righteousness and peace."

rig_the_road_to_asia_minor_title:0 "The Road to Asia Minor"
rig_the_road_to_asia_minor_desc:0 "This land, called Asia Minor, witnessed the Apostle Paul's three missionary journeys, saw the Council of Nicaea establish the Creed, and buried the bones of countless martyrs. Now it is covered once more with the banners of the Catholic faith, as a shepherd gathers his scattered sheep back into the fold."

rig_mesopotamia_plain_title:0 "Mesopotamian Plain"
rig_mesopotamia_plain_desc:0 "Between the Tigris and the Euphrates lies the ancient plain called Mesopotamia. From the ruins of Nineveh to the mounds of Babylon, from Baghdad's House of Wisdom to Mosul's stone bridges, this land between two rivers has witnessed Assyrian chariots, Persian hosts, Arab scimitars, and Mongol gunpowder. Now Riga's cross stands firm here. May the waters of the Euphrates continue to water the olive branches Riga has planted in this soil, until they grow deep-rooted and broad-leafed, no longer fearing the storms of war."

rig_liberation_of_jerusalem_title:0 "Liberation of Jerusalem"
rig_liberation_of_jerusalem_desc:0 "The torch of the Northern Crusades was never extinguished—it was buried in Riga's ashes, in the silt of the Daugava, in the bones of every generation of knights. Now it has burst forth, burning through Anatolia, burning through Syria, burning through the chest of the Islamic world—and today it has broken open the gates of Jerusalem! From Pope Urban's first call at Clermont to the moment Riga's Iron Guard planted the cross on the Mount of Olives at dawn, all Christendom has waited too long. The keys to the Holy Sepulchre have been wrested from Muslim hands; the chains are broken, the bronze doors shattered; the olive oil brought from Riga's cathedral fills every silver lamp. All the great bells of the city ring in frenzy; on the summit of Golgotha, the Archbishop prostrates himself, watching the new day's light pierce a thousand years of shadow. The bells cross the Mediterranean to Constantinople, to Vienna, to Paris, to London, to the throne of the Pope in Rome—the whole Catholic world trembles at the liberation of this city! 'If I forget you, O Jerusalem, may my right hand forget its skill!' Now, at last, Riga's hands lift high the keys of the Holy City, offered to the Almighty, who was, and is, and is to come!"

rig_the_city_the_world_desires_title:0 "The City of the World's Desire" # The City the World Desires
rig_the_city_the_world_desires_desc:0 "Constantinople—Nova Roma, the City the World Desires, the Queen of Cities! Its Theodosian gates were once sheathed in gold and silver; its harbors in the Golden Horn once thronged with merchant ships; the dome of Hagia Sophia once made every beholder believe that heaven had truly come down to earth. Yet a century of Latin occupation, forty years of internal collapse, and the Ottoman infidels rising from the East had brought this Queen of Cities to her knees in the dust. But now, Riga's cross and keys have replaced the Palaiologan double eagle and the infidel's crescent atop the towers of the Gate of St. Romanus. Bells ring in chorus, trumpets shake the sky; let everything that has breath praise the Lord, for He has delivered this city from the hands of heretic and heathen into the hands of Riga—into the hands of the children of the Land of Mary!"

rig_march_on_antioch_title:0 "March on Antioch"
rig_march_on_antioch_desc:0 "Antioch—the Pearl of the Orontes, the Seleucid capital, Rome's eastern metropolis, the first fortress of Christianity among the Gentiles! St. Peter shepherded the flock here; St. Paul set out on his three missionary journeys from here. Yet for six hundred years, the minarets' spurs have pierced Antioch's breast; St. Peter's chair has served as a footstool for heathen priests; the cross has been torn from its walls. But tonight, before the altar of the Cave Church of St. Peter, the Archbishop shall personally light the first Easter candle, and all the soldiers and citizens of the city shall kneel before the apostle's icon, singing a hymn not heard here since the days of Justinian: 'This is the day the Lord has made; let us rejoice and be glad in it!'"

rig_return_to_the_holy_land_title:0 "Return to the Holy Land"
rig_return_to_the_holy_land_desc:0 "Zion is no longer beyond reach; Jerusalem is no longer crushed under the heathen yoke. The southern crusade set out from Riga, crossed the crimson twilight of the Balkans, trod the scorched earth of Anatolia, forded the rivers of Mesopotamia, and at last raised the cross once more above the Holy Sepulchre. The gate is open; the road is clear. Riga shall forever remember this pilgrimage from the northern wilderness to the Zion of the south."

rig_steady_front_title:0 "Steady the Front"
rig_steady_front_desc:0 "We have fully secured Anatolia, the Mashriq, and the Caucasus, weaving them into a closely knit web. Anatolian grain flows to Syria; Syrian cotton becomes cloaks for Caucasian cavalry; Caucasian warhorses reinforce the Anatolian guard. Riga no longer needs to haul supplies from the Baltic across thousands of miles—for these three regions are now self-sustaining, self-defending, and self-contained."

rig_rebuild_antiochus_title:0 "Rebuild Antioch"
rig_rebuild_antiochus_desc:0 "A city's growth is not achieved in an instant; it must be shaped by time, step by step, toward prosperity."

rig_rebuild_alexander_title:0 "Revive Alexandria"
rig_rebuild_alexander_desc:0 "A city's growth is not achieved in an instant; it must be shaped by time, step by step, toward prosperity."

rig_the_gift_of_the_nile_title:0 "The Gift of the Nile"
rig_the_gift_of_the_nile_desc:0 "The Nile—artery of Egypt, milk of the desert—rises from the mountains of Lake Victoria, crosses the wastelands of Sudan, and splits north of Cairo into seven branches, like a green hand reaching toward the Mediterranean. Without it, Egypt is nothing but scorched earth; with it, she can feed millions from Alexandria to Aswan. The flooding of the Nile comes like the Lord's grace, year after year in its season, filling Egypt's granaries—and filling Riga's coffers as well."

rig_the_legacy_of_the_french_crusaders_title:0 "Legacy of the Crusaders" # Legacy of the French Crusaders
rig_the_legacy_of_the_french_crusaders_desc:0 "In 1270, King Louis IX of France—seeking to avenge his defeat in 1250—landed with a great army in Tunis. Yet soon after landing, plague cut down his soldiers like an invisible scythe, and Louis himself died here. Now Riga's banner covers this land. We shall write a belated answer to those two failed French crusades—with strong fortresses, just taxes, and the Latin Gospel."

rig_to_solomon_land_title:0 "To the Land of Solomon"
rig_to_solomon_land_desc:0 "Ethiopia—the legendary realm of the Queen of Sheba's descendants—has bowed beneath Riga's cross. This highland plateau, ringed by mountains, is the last refuge of the Ark of the Covenant, the southernmost path of John the Baptist's way, and an ancient Christian haven unbroken since the Ethiopian eunuch's baptism by Philip the Apostle. Now the Land of Solomon and the Land of Mary are joined on the map. Where the Ark rests, Riga's cross shall stand; and the voices of Sheba's children shall add new melodies to the Gospel Riga brings."

rig_in_the_sand_title:0 "Amidst the Sands"
rig_in_the_sand_desc:0 "The Arabian Peninsula—a sea of sand enclosed by the Red Sea, the Persian Gulf, and the Indian Ocean—holds only sun, gravel, and the footprints of nomads between oases. It is not worth tilling, but it is worth conquering. For the Kaaba in Mecca, the Prophet's Mosque in Medina, and the Frankincense Road from Oman to Aden all lie within its interior. We shall plant the cross in every oasis and proclaim the one true faith on this land that gave birth to the heathens who threatened us most."

rig_patrol_the_mountains_title:0 "Patrol the Mountains"
rig_patrol_the_mountains_desc:0 "Persia—a plateau encircled by the Zagros, Alborz, and Hindu Kush ranges—has been a chessboard of emperors since antiquity. The Islamic call to prayer has echoed here for eight hundred years. Now, hoofbeats in the mountains stir the ancient trade routes from their slumber. Riga's patrols, like shuttles threading a loom, stitch the fragments of Persia into the robe of the Land of Mary. May the soul of Cyrus rest in his tomb at Pasargadae, for his land has found a master more patient than Alexander. Riga shall not burn Persepolis; it shall only sit upon its steps, reading the Scriptures to the people who yearn for redemption."

rig_below_the_junction_title:0 "Above the Confluence" # Beneath the Junction
rig_below_the_junction_desc:0 "Khorasan—in Persian, 'the land where the sun rises.' Its east is India and China; its west, Persia and Arabia; its north, the deserts of Khwarezm and the Aral Sea; its south, the salt flats of Sistan and the barren coasts of Makran. We shall make Khorasan a bridgehead from which to glimpse the splendor of India and China."

rig_western_frontier_title:0 "Western Frontier" # Western Frontier Stronghold
rig_western_frontier_desc:0 "We have pushed westward along the North African coast, taking the cities that passed from Vandals to Byzantines to Arabs to Berber tribes. Tripoli's walls cracked under the Iron Guard's cannons; Tunis's sultan handed over his keys at the negotiating table; Algiers' pirate ships burned to ash before Riga's fleet; and Tangier—that ancient port gazing at the Strait of Gibraltar—has opened its gates to Riga's governor."

rig_the_fire_of_africa_title:0 "The Fire of Africa"
rig_the_fire_of_africa_desc:0 "Our army swept across North Africa like a fire from east to west, burning the thorns of heathenry and lighting Riga's westernmost skyline—consuming at once the humiliation of the French Children's Crusade and Louis IX's plague-ridden sighs. In Fez, Marrakesh, Tlemcen, and even the Canary Islands beyond the sea, Riga's cathedrals rise from the dust, and the Lord's blessing falls upon the sunset lands for the first time in eight hundred years."
rig_the_fire_of_africa.tt:0 "All provinces in the §YMaghreb§! region producing §Yslaves§! will have their trade goods replaced, with the following probabilities:\n\n20% Livestock\n20% Grain\n20% Salt\n20% Wool\n10% Spices\n10% Sugar\n"

rig_uniting_the_horn_of_africa_title:0 "Advancing on the Horn" # Advancing on the Horn of Africa
rig_uniting_the_horn_of_africa_desc:0 "When Riga's Iron Guard finally encamped at the easternmost tip of Ras Hafun, this ancient region—renowned since time immemorial for frankincense, myrrh, and slaves—was at last covered by Riga's cross. From this day forward, the Horn of Africa shall be known not for the crack of slave-caravan whips, but for the shepherd's flute, the millstone's hum, the fragrance of coffee-roasting, and the furnace of the mint, all pouring a steady stream of wealth into Riga's treasury."
rig_uniting_the_horn_of_africa.tt:0 "All provinces in the §YHorn of Africa§! region producing §Yslaves§! will have their trade goods replaced, with the following probabilities:\n\n40% Livestock\n40% Grain\n10% Coffee\n10% Gold\n"

rig_deep_in_the_forest_title:0 "Deep in the Forest"
rig_deep_in_the_forest_desc:0 "Deep within the equatorial rainforest, along the Congo River that pulses like a vein through the continent, an ancient kingdom has grown among the dense woods and fertile soil. Ivory rises in hills, copper in mounds, and countless tribes build their cities in the clearings of the jungle. We shall not leave this land to stagnate in darkness—every village there shall become a stepping-stone for our advance into the heart of Africa."

rig_western_passage_title:0 "Western Passage"
rig_western_passage_desc:0 "Though Western Europe is nominally the world of the Catholic Church, the undercurrents of heresy still run strong. Embers of Catharism and the Devotio Moderna linger; new cracks spread across Britain and Germany. Secular kings grow increasingly distant from Rome, and princes seize bishops' crowns with gold and sword. We must help them—to take up the banner that has slipped from their hands."

rig_euphrates_and_tigris_rivers_title:0 "The Euphrates and Tigris" # The Euphrates and Tigris Rivers
rig_euphrates_and_tigris_rivers_desc:0 "The palm groves of Babylon have witnessed the cavalry of countless kings. Now, in the breeze along the Euphrates, they shall witness Riga's ploughshare turning fresh soil. We shall revive this land—the very birthplace of civilization—letting the waves of the Two Rivers carry the promise of harvest into every village."
rig_euphrates_and_tigris_rivers.tt:0 "All qualifying provinces in the §YMashriq§! region will receive the above modifiers\n"

rig_along_the_gulf_of_aden_title:0 "Along the Gulf of Aden..."
rig_along_the_gulf_of_aden_desc:0 "Shipyards have risen along the Gulf of Aden. Riga's shipwrights have designed a hull that is both light and strong, blending the agility of dhows with the tonnage of carracks—built to master the monsoon winds of the Indian Ocean. Aden shall no longer be a haven for pirates and smugglers, but an indispensable link in Riga's trade network."
rig_along_the_gulf_of_aden.tt:0 "All qualifying provinces will receive the above modifiers.\n"

rig_islamic_wine_title:0 "Islamic Wine"
rig_islamic_wine_desc:0 "Under the sun and sand of Arabia, there is a black drink called 'the wine of Islam' by those who do not drink grapes—coffee. It came from the highlands of Ethiopia to Yemen, where it was roasted in the shops of Mocha and used by Sufi mystics to keep vigil through the night. We shall refine its cultivation, select better varieties, and let the people of Riga taste this unique brew."
rig_islamic_wine.tt:0 "All qualifying provinces in the §YArabia§! and §YHorn of Africa§! regions will receive the above modifiers\n"

rig_gold_miner_title:0 "Gold Miner"
rig_gold_miner_desc:0 "The gold veins among the mountains of Ethiopia have now been revealed under pick and blasting powder. We shall open new mines, separating the gold with furnaces, mills, and sieves. Some of this gold will flow to the markets of Egypt, the Mashriq, and Europe; part will be sent to churches, so that the monks may adorn our domes with the gifts of the Queen of Sheba."

rig_to_hormuz_title:0 "...To Hormuz"
rig_to_hormuz_desc:0 "From Aden to Hormuz, Riga's shipyards along the Indian Ocean coast form a chain, linking the Red Sea to the Persian Gulf and the Horn of Africa to Arabia. From here we shall send our anchor chains to the coasts of Ceylon and Sumatra, until the goods of the entire Indian Ocean are laid out on Riga's counters."
rig_to_hormuz.tt:0 "All qualifying provinces will receive the above modifiers.\n"

rig_mediterranean_granary_title:0 "Mediterranean Granary"
rig_mediterranean_granary_desc:0 "Every acre of land watered by the Nile has been remeasured and replanned by Riga's hydraulic engineers and agronomists. Old canals are dredged; new waterwheels are erected; dikes and sluices have been rebuilt along riverbanks left untended through years of civil war. Egyptian grain, as in Roman times, shall once again fill the tables of the people."
rig_mediterranean_granary.tt:0 "All qualifying provinces in the §YEgypt§! region will receive the above modifiers\n"

rig_gain_a_firm_foothold_title:0 "Gain a Firm Foothold"
rig_gain_a_firm_foothold_desc:0 "Having secured control of all Khorasan, we shall build fortresses in the passes of the Sulaiman Mountains, preparing for the next step: spreading the Gospel into India."

rig_four_way_access_title:0 "White Cotton, Like Snow" # Four-Way Access
rig_four_way_access_desc:0 "Cotton—light as clouds, white as snow. We shall introduce new irrigation ditches and crop rotation, build storehouses and textile workshops, providing comfortable and fine garments for our people."
rig_four_way_access.tt:0 "All qualifying provinces in the §YKhorasan§! region will gain §Y2§! base tax and §Y2§! base manpower\n"

rig_eastern_entrance_title:0 "Eastern Entrance"
rig_eastern_entrance_desc:0 "Looking east from the cotton fields of Khorasan, our scouts have climbed the lookout points of the Hindu Kush and brought back news of the Indus Valley. Let us open a door never touched by the Catholic world—a door behind which lie not only spices and elephants, but countless nations who have never heard the Gospel."

rig_look_far_into_the_distance_title:0 "Gaze into the Distance"
rig_look_far_into_the_distance_desc:0 "After sweeping aside so many heretics and heathens, let us raise our eyes from the mountains of battle reports and maps, turning our gaze from the clamour around us to the line where sea and sky meet. There lie our brothers across the ocean: Rigaeria."
rig_look_far_into_the_distance.tt:0 "We will unlock decisions to alleviate the administrative pressure on §YRigaeria§!"

rig_cease_all_activities_title:0 "Cease All Activities"
rig_cease_all_activities_desc:0 "The clash of swords falls silent, for now. The knights who fought all their lives for Riga may at last hang their armour on the walls of their homes—as decoration, not as burden for the march. Soldiers pull up tent pegs, extinguish campfires, polish their tack and return it to the quartermaster. For this moment, on Riga's lands, every farmer once displaced has returned to his furrow; every family once named on the fallen lists has received its compensation and its candles of remembrance."
rig_cease_all_activities.tt:0 "During the duration of the above modifier, we cannot initiate §YGreat Campaigns§! or general war decisions"

rig_build_largely_title:0 "Large-Scale Construction"
rig_build_largely_desc:0 "The hands that swung hammers on the battlefield now turn to stone and timber. Roads are widened, walls reinforced, granaries restored, bridges built across rivers that once held armies at bay for days. From this day forward, every inch of land under Riga's rule shall be written in stone, mortar, and timber as a testament to the peace it bears. May these raised halls and workshops stand firm in the storm and witness our labour in the light of day."
rig_build_largely.tt:0 "Our non-§GRigan Chartered Trade Zone§! subjects will also receive the above modifiers"

rig_jerusalem_fulcrum_title:0 "Jerusalem Fulcrum"
rig_jerusalem_fulcrum_desc:0 "Jerusalem rises high on the hills of Judaea. From David to Solomon, from Isaiah to John the Baptist, every stone of this city is inscribed in sacred epic. Beneath the foundations of the Holy Sepulchre lies the crevice of Golgotha; upon the platform of the Temple Mount rests the legend of Abraham's offering; from the slopes of the Mount of Olives, one can still see the cloud-tracks of the Ascension. We shall make Jerusalem a fulcrum—for it is not only the gateway to Africa, but the gate to the Kingdom of Heaven."

rig_kilk_roads_title:0 "Silk Roads"
rig_kilk_roads_desc:0 "From Chang'an to Rome—that ancient road stretching ten thousand miles once carried the softest light of the East, silk, to the West. Now Riga holds its middle section firmly in hand. We shall expand the existing silk industries of Persia, weaving our own brocade across the breadth of Eurasia."
rig_kilk_roads.tt:0 "All qualifying provinces in the §YPersia§! region will receive the above modifiers\n"

rig_constantinople_fulcrum_title:0 "Constantinople Fulcrum"
rig_constantinople_fulcrum_desc:0 "The City the World Desires—with the Golden Horn to its north, the Sea of Marmara to its south, and the Bosporus separating it from Anatolia to the east—was the largest and most magnificent city in all Europe for a thousand years. Hagia Sophia's vast dome stands like heaven come to earth; the mosaic walls of the Great Palace still depict Justinian and his generals in golden tesserae; the obelisk and serpent column in the Hippodrome bear witness to the empire's conquest of the old world. We shall make Constantinople a fulcrum, and from it continue our advance into the former lands of Rome."

rig_tabriz_fulcrum_title:0 "Tabriz Fulcrum"
rig_tabriz_fulcrum_desc:0 "Tabriz lies in the valley at the northern foot of Mount Sahand, nestled at the northeastern edge of the Lake Urmia basin. It commands the throat between the Anatolian plateau and the Iranian heartland, and since ancient times has been the meeting point of East and West. This was the capital of the Ilkhanate, where the Mongol Khan once ruled over lands stretching from the Mediterranean to the Indus. We shall make Tabriz a fulcrum, preparing the way to spread the Gospel to South and East Asia."

rig_siberian_trade_route_title:0 "Siberian Trade Route"
rig_siberian_trade_route_desc:0 "Sable, silver fox, arctic fox, and beaver—creatures of the cold—are prized for the softness and warmth of their fur. Riga's hunters have crossed the Ob and Yenisei, seeking game in every deep forest and tanning pelts in workshops along the way, carrying their goods back along the post roads to the trading stations of Tyumen and Kazan."
rig_siberian_trade_route.tt:0 "All qualifying provinces in the §YWest Siberia§! region will receive the above modifiers\n"

rig_connection_origin_title:0 "Connect the Origin"
rig_connection_origin_desc:0 "The forests and fjords of Scandinavia are among Europe's oldest sources of fur—once supplying winter robes for Roman nobles and cloaks for Byzantine emperors. From distant Siberia to the fjord ports of Scandinavia, the entire fur trade route shall be woven into a single net, extending Riga's reach to every frost-bound land where pines grow and reindeer roam."
rig_connection_origin.tt:0 "All qualifying provinces in the §YScandinavia§! and §YRussia§! regions will receive the above modifiers\n"

rig_everything_is_ready_title:0 "Everything is Ready"
rig_everything_is_ready_desc:0 "After another season of growth, our lands are abundant and our people prosperous. Now it is time to complete our final and greatest plan—to rebuild Riga itself, making it a truly universal city!"

rig_broad_view_about_taking_title:0 "Observations & Acquisitions" # Broad Observation and Selective Acquisition
rig_broad_view_about_taking_desc:0 ""

rig_accumulate_steadily_title:0 "Accumulate and Release" # Accumulate Steadily, Release Swiftly
rig_accumulate_steadily_desc:0 ""

rig_make_the_world_a_city_and_the_city_a_world_title:0 "All the World in One City" # Fuse the World into One City; Build the City as a World
rig_make_the_world_a_city_and_the_city_a_world_desc:0 "Riga stands firm on the banks of the Daugava—firmly planted in the Land of Mary. From its dockyards with their towering cranes, the nearest quarter is a cluster of brick warehouses with Lübeck-style gables, where northern timber and furs are unloaded. A little farther stands a covered market modelled on the bazaar of Tabriz, where Persians, Armenians, and Jewish merchants trade in carpets, gems, and spices. Beyond that, a grain-processing lane rises with tall stone granaries and windmills, grinding together the wheat of the Volga basin and the grain of Egypt. In the centre of each workshop lane stands a public well, its design drawn from the hands of master-builders from across the world.\nPassing through Theodosian-style walls, and beneath an arch modelled after the stone gate of the Holy Sepulchre, one enters the inner city. Near the arch lies a quarter built of Anatolian stone; deeper in, a canal cuts across the district, flanked by narrow-gabled houses in the Low Country style—yet every windowsill holds African pottery or Indian ornaments. At the street corner stand three churches of different rites: a Latin Gothic spire, a Byzantine domed chapel, and an Armenian rock-hewn oratory. When all three bell towers ring at once, three scales of notes meet in the air, like a single hymn gathered from three directions.\nA great avenue runs straight from the gate to the cathedral, lined with obelisks brought from Egypt, columns from the ruins of the Parthenon, and Assyrian relief fragments from Mosul. Limestone from Jerusalem has been carved into columns and archways; mosaics copied from Constantinople adorn the dome; turquoise pottery from Tabriz decorates the main façade; and sky-blue tiles from Samarkand cover the outer walls of the Archbishop's cathedral, gleaming in the sun like the heavens over Persia.\nWhen this city is complete, whoever passes through its gates—whether a pilgrim from Western Europe or a merchant from the Far East—will find, in its winding alleys, a corner that reminds him of home, and another of a form he has never seen before. And when the tongues of all nations sound together in Riga's markets, that chorus will be like the praise of the heavens themselves—melting all nations into one, and making Riga the cloister of the world."

rig_expand_macedonia_title:0 "Develop Macedonia"
rig_expand_macedonia_desc:0 "A city's growth is not achieved in an instant; it must be shaped by time, step by step, toward prosperity."

